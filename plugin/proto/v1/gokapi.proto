// gokapi.proto - Protocol Buffers definition for the gokapi plugin system.
// This file serves as documentation for the wire protocol.
// The current implementation uses net/rpc with JSON serialization
// to avoid a protoc dependency. A future migration to gRPC can
// use this proto definition directly.

syntax = "proto3";

package gokapi.plugin.v1;

option go_package = "github.com/gokapi/gokapi/plugin/proto/v1;pluginv1";

// SpanMessage represents an inline markup element within a Fragment.
message SpanMessage {
  int32 span_type = 1;  // 0=Opening, 1=Closing, 2=Placeholder
  string type = 2;
  string id = 3;
  string data = 4;
  string outer_data = 5;
  bool deletable = 6;
  bool cloneable = 7;
}

// FragmentMessage represents text content with inline Spans.
message FragmentMessage {
  string coded_text = 1;
  repeated SpanMessage spans = 2;
}

// SegmentMessage represents a single segment within a Block.
message SegmentMessage {
  string id = 1;
  FragmentMessage content = 2;
}

// TargetEntry maps a locale to its target segments.
message TargetEntry {
  string locale = 1;
  repeated SegmentMessage segments = 2;
}

// BlockMessage represents a translatable content unit.
message BlockMessage {
  string id = 1;
  string name = 2;
  string type = 3;
  string mime_type = 4;
  bool translatable = 5;
  repeated SegmentMessage source = 6;
  repeated TargetEntry targets = 7;
  map<string, string> properties = 8;
}

// LayerMessage represents a structural layer.
message LayerMessage {
  string id = 1;
  string name = 2;
  string format = 3;
  string locale = 4;
  string encoding = 5;
  string mime_type = 6;
  string line_break = 7;
  bool is_multilingual = 8;
  string parent_id = 9;
  map<string, string> properties = 10;
}

// DataMessage represents non-translatable document structure.
message DataMessage {
  string id = 1;
  string name = 2;
  map<string, string> properties = 3;
}

// GroupStartMessage signals the beginning of a structural group.
message GroupStartMessage {
  string id = 1;
  string name = 2;
  string type = 3;
}

// GroupEndMessage signals the end of a structural group.
message GroupEndMessage {
  string id = 1;
}

// MediaMessage holds binary or media content.
message MediaMessage {
  string id = 1;
  string mime_type = 2;
  bytes data = 3;
  string uri = 4;
  string alt_text = 5;
  map<string, string> properties = 6;
}

// PartMessage is the fundamental unit flowing through a plugin.
message PartMessage {
  int32 part_type = 1;
  // Only one of these is set, based on part_type.
  BlockMessage block = 2;
  LayerMessage layer = 3;
  DataMessage data = 4;
  GroupStartMessage group_start = 5;
  GroupEndMessage group_end = 6;
  MediaMessage media = 7;
}

// InfoResponse contains plugin metadata.
message InfoResponse {
  string name = 1;
  string display_name = 2;
  repeated string mime_types = 3;
  repeated string extensions = 4;
}

// OpenRequest opens a document for reading.
message OpenRequest {
  string uri = 1;
  string source_locale = 2;
  string encoding = 3;
  bytes content = 4;
  string mime_type = 5;
  string format_id = 6;
}

// ReadResponse returns parts read from a document.
message ReadResponse {
  repeated PartMessage parts = 1;
  string error = 2;
}

// WriteRequest sends parts to write.
message WriteRequest {
  repeated PartMessage parts = 1;
  string locale = 2;
  string encoding = 3;
}

// WriteResponse returns the written output.
message WriteResponse {
  bytes output = 1;
  string error = 2;
}

// ProcessRequest sends parts for tool processing.
message ProcessRequest {
  repeated PartMessage parts = 1;
}

// ProcessResponse returns processed parts.
message ProcessResponse {
  repeated PartMessage parts = 1;
  string error = 2;
}

// FormatReaderPlugin reads documents and produces Parts.
service FormatReaderPlugin {
  rpc Info(InfoRequest) returns (InfoResponse);
  rpc Open(OpenRequest) returns (OpenResponse);
  rpc Read(ReadRequest) returns (ReadResponse);
  rpc Close(CloseRequest) returns (CloseResponse);
}

// FormatWriterPlugin reconstructs documents from Parts.
service FormatWriterPlugin {
  rpc Info(InfoRequest) returns (InfoResponse);
  rpc Write(WriteRequest) returns (WriteResponse);
}

// ToolPlugin processes Parts.
service ToolPlugin {
  rpc Info(ToolInfoRequest) returns (ToolInfoResponse);
  rpc Process(ProcessRequest) returns (ProcessResponse);
}

// Empty/simple request/response messages.
message InfoRequest {}
message OpenResponse { string error = 1; }
message ReadRequest {}
message CloseRequest {}
message CloseResponse { string error = 1; }
message ToolInfoRequest {}
message ToolInfoResponse {
  string name = 1;
  string description = 2;
}
