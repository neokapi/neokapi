version: 2

# Dependabot `cooldown` holds a freshly-published version back for N days before
# opening (or grouping) a PR for it. We apply it to every ecosystem as
# supply-chain hygiene — and, for npm specifically, so Dependabot stops opening
# PRs that CI rejects: `vp install` enforces a pnpm `minimumReleaseAge` gate
# (currently ~1 day), and an uncooled Dependabot would otherwise raise npm PRs
# minutes after a release (e.g. #1058) that fail with
# ERR_PNPM_MINIMUM_RELEASE_AGE_VIOLATION. The patch window (3 days) clears that
# gate with margin; majors are held longest. Tune the day counts to taste.
updates:
  # ── Framework Go modules (Apache-2.0) ──────────────────────────────────────
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, go, framework]
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /cli
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, go, framework]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /kapi
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, go, framework]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /apps/kapi-desktop
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, go, framework]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: github.com/wailsapp/wails/v3
        versions: ["3.0.0-alpha.8.3"]

  # ── Bowrain Go modules (AGPL) ──────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /bowrain/core
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, go, bowrain]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /bowrain/cli
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, go, bowrain]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /bowrain/plugin
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, go, bowrain]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /bowrain/plugin/schema
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, go, bowrain]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /bowrain
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, go, bowrain]
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: github.com/wailsapp/wails/v3
        versions: ["3.0.0-alpha.8.3"]

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, ci]
    groups:
      actions:
        patterns: ["*"]

  # ── npm (root workspace covers all frontend packages) ──────────────────────
  # cooldown here is load-bearing: it keeps Dependabot from opening npm PRs that
  # the pnpm minimumReleaseAge gate in `vp install` would immediately fail.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, npm]
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  # ── Docker base images ─────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /bowrain/docker/bowrain-server
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, docker, bowrain]

  - package-ecosystem: docker
    directory: /bowrain/docker/bowrain-worker
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, docker, bowrain]

  - package-ecosystem: docker
    directory: /bowrain/docker/bowrain-web
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, docker, bowrain]
    ignore:
      # Track Node LTS for the web-builder stage; skip Current-line majors
      # until they reach LTS (e.g. Node 26 → LTS Oct 2026). See PR #584.
      - dependency-name: node
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /bowrain/docker/keycloak
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels: [dependencies, docker, bowrain]
