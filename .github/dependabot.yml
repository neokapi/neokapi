version: 2
updates:
  # ── Framework Go modules (Apache-2.0) ──────────────────────────────────────
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, go, framework]
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /cli
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, go, framework]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /kapi
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, go, framework]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /apps/kapi-desktop
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, go, framework]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: github.com/wailsapp/wails/v3
        versions: ["3.0.0-alpha.8.3"]

  # ── Bowrain Go modules (AGPL) ──────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /bowrain/core
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, go, bowrain]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /bowrain/cli
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, go, bowrain]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /bowrain/plugin
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, go, bowrain]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /bowrain/plugin/schema
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, go, bowrain]
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /bowrain
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, go, bowrain]
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: github.com/wailsapp/wails/v3
        versions: ["3.0.0-alpha.8.3"]

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    groups:
      actions:
        patterns: ["*"]

  # ── npm (root workspace covers all frontend packages) ──────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, npm]
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  # ── Docker base images ─────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /bowrain/docker/bowrain-server
    schedule:
      interval: weekly
    labels: [dependencies, docker, bowrain]

  - package-ecosystem: docker
    directory: /bowrain/docker/bowrain-worker
    schedule:
      interval: weekly
    labels: [dependencies, docker, bowrain]

  - package-ecosystem: docker
    directory: /bowrain/docker/bowrain-web
    schedule:
      interval: weekly
    labels: [dependencies, docker, bowrain]
    ignore:
      # Track Node LTS for the web-builder stage; skip Current-line majors
      # until they reach LTS (e.g. Node 26 → LTS Oct 2026). See PR #584.
      - dependency-name: node
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /bowrain/docker/keycloak
    schedule:
      interval: weekly
    labels: [dependencies, docker, bowrain]
