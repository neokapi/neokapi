name: Convert Go test output to JUnit
description: >
  Installs a pinned go-junit-report and converts a `go test -json` output
  file to JUnit XML. Used by every test job so the tool version is pinned
  in exactly one place.
inputs:
  in:
    description: Path to the go test -json output file.
    required: true
  out:
    description: Path to write the JUnit XML report.
    required: true
runs:
  using: composite
  steps:
    - name: Install go-junit-report
      shell: bash
      run: go install github.com/jstemmer/go-junit-report/v2@v2.1.0
    - name: Convert to JUnit XML
      shell: bash
      run: go-junit-report -in "${{ inputs.in }}" -out "${{ inputs.out }}"
