name: Setup Go & Modules
description: Install Go, download modules for all modules, and create embed placeholders

inputs:
  go-version:
    description: Go version to install
    required: false
    default: "1.26.0"

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
        cache-dependency-path: |
          go.sum
          cli/go.sum
          kapi/go.sum
          bowrain/go.sum
          bowrain/core/go.sum
          bowrain/cli/go.sum

    - name: Download modules
      shell: bash
      run: |
        go mod download && go mod verify
        cd cli && go mod download && go mod verify
        cd ../kapi && go mod download && go mod verify
        cd ../apps/kapi-desktop && go mod download && go mod verify
        cd ../../bowrain/core && go mod download && go mod verify
        cd ../cli && go mod download && go mod verify
        cd .. && go mod download && go mod verify

    - name: Create embed placeholders
      shell: bash
      run: |
        mkdir -p bowrain/apps/web/dist && echo placeholder > bowrain/apps/web/dist/index.html
        mkdir -p bowrain/apps/bowrain/frontend/dist && echo placeholder > bowrain/apps/bowrain/frontend/dist/index.html
        mkdir -p apps/kapi-desktop/frontend/dist && echo placeholder > apps/kapi-desktop/frontend/dist/index.html
