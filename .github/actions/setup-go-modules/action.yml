name: Setup Go & Modules
description: Install Go, download modules for all modules, and create embed placeholders

inputs:
  go-version:
    description: Go version to install
    required: false
    default: "1.26.0"

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
        cache-dependency-path: |
          framework/go.sum
          framework/cli/go.sum
          framework/kapi/go.sum
          platform/go.sum
          platform/core/go.sum
          platform/cli/go.sum

    - name: Download modules
      shell: bash
      run: |
        cd framework && go mod download && go mod verify
        cd cli && go mod download && go mod verify
        cd ../kapi && go mod download && go mod verify
        cd ../../platform/core && go mod download && go mod verify
        cd ../cli && go mod download && go mod verify
        cd .. && go mod download && go mod verify

    - name: Create embed placeholders
      shell: bash
      run: |
        mkdir -p platform/apps/web/dist && echo placeholder > platform/apps/web/dist/index.html
        mkdir -p platform/apps/bowrain/frontend/dist && echo placeholder > platform/apps/bowrain/frontend/dist/index.html
