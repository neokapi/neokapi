name: Setup Node & UI
description: Install VitePlus, Node.js, npm workspace dependencies, and build shared UI package

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - uses: voidzero-dev/setup-vp@v1
      with:
        version: "0.1.13"
        node-version: ${{ inputs.node-version }}
        cache: true
        cache-dependency-path: platform/package-lock.json
        run-install: false

    - name: Install workspace dependencies
      shell: bash
      working-directory: platform
      run: npm ci

    - name: Build shared UI package
      shell: bash
      working-directory: platform/packages/ui
      run: npx tsc
