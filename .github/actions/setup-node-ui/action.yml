name: Setup Node & UI
description: Install VitePlus, Node.js, and workspace dependencies

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - uses: voidzero-dev/setup-vp@v1
      with:
        version: "0.1.23"
        node-version: ${{ inputs.node-version }}
        cache: true
        cache-dependency-path: pnpm-lock.yaml
        run-install: false

    - name: Install workspace dependencies
      shell: bash
      env:
        # Required by .npmrc to authenticate with @neokapi scoped packages on
        # npm.pkg.github.com (e.g. @neokapi/react). Workflows that consume
        # this action must grant `permissions: packages: read`.
        GITHUB_TOKEN: ${{ github.token }}
      run: vp install --frozen-lockfile
