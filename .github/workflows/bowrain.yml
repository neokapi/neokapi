name: Bowrain Build

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  build:
    name: Build Bowrain (${{ matrix.build.platform }})
    strategy:
      fail-fast: false
      matrix:
        build:
          - { platform: linux/amd64, os: ubuntu-latest }
          - { platform: windows/amd64, os: windows-latest }
          - { platform: darwin/universal, os: macos-latest }
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        working-directory: apps/bowrain/frontend
        run: npm install

      - name: Build Bowrain
        working-directory: apps/bowrain
        run: wails3 build
