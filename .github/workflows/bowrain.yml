name: Bowrain Build

on:
  # Weekly smoke build of the desktop app on all three platforms. This is a
  # no-artifact canary, so a daily macOS (10x) + Windows (2x) matrix was pure
  # cost; weekly keeps the early-warning signal at ~1/7th the spend. Use
  # workflow_dispatch for an on-demand build between Mondays.
  schedule:
    - cron: "0 6 * * 1" # weekly, Mondays at 06:00 UTC
  workflow_dispatch:

jobs:
  build:
    name: Build Bowrain (${{ matrix.build.platform }})
    strategy:
      fail-fast: false
      matrix:
        build:
          - { platform: linux/amd64, os: ubuntu-latest }
          - { platform: windows/amd64, os: windows-2025 }
          - { platform: darwin/universal, os: macos-latest }
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - uses: ./.github/actions/setup-node-ui

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libicu-dev pkg-config

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Type-check shared UI package
        working-directory: bowrain/packages/ui
        run: vp check --no-fmt --no-lint

      - name: Build Bowrain
        working-directory: bowrain/apps/bowrain
        run: wails3 build
