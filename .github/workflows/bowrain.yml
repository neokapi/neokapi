name: Bowrain Build

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Bowrain (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd apps/bowrain/frontend && npm install

      - name: Build frontend
        run: cd apps/bowrain/frontend && npm run build

      - name: Build Bowrain
        run: cd apps/bowrain && wails build -platform linux/amd64 -clean -tags webkit2_41
