name: Nightly

# The full gate on the forward-compat Go toolchain. ci.yml pins Go 1.26.0 on
# every PR and push (fast feedback); this nightly re-runs the heavier suites on
# Go `stable` with the race detector, so a toolchain regression surfaces within
# a day without taxing the per-commit path. The event is `schedule`, so the
# Makefile's event-aware profile uses the FULL mode (race + shuffle + coverage,
# containers included) — same as a push to main.

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  govulncheck:
    name: govulncheck (known-vulnerability scan)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules
        with:
          go-version: stable
      # The bowrain module includes the Wails desktop backend, whose cgo links
      # GTK/WebKit on Linux. Without these dev headers govulncheck's loader can't
      # import C in those packages ("could not import C"). Mirrors the full-suite
      # job's deps.
      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libicu-dev pkg-config
      - name: Scan framework module
        run: go run golang.org/x/vuln/cmd/govulncheck@latest -tags fts5 ./...
      - name: Scan bowrain module
        run: cd bowrain && go run golang.org/x/vuln/cmd/govulncheck@latest -tags fts5 ./...
      - name: Scan cli + kapi modules
        run: |
          (cd cli && go run golang.org/x/vuln/cmd/govulncheck@latest -tags fts5 ./...)
          (cd kapi && go run golang.org/x/vuln/cmd/govulncheck@latest -tags fts5 ./...)

  full-suite:
    name: Full suite (Go stable, race)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules
        with:
          go-version: stable

      # The Wails app backends link GTK/WebKit on Linux; the bowrain module's
      # cgo build also needs these. Mirrors the desktop CI jobs.
      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libicu-dev pkg-config

      - name: Framework + CLI + kapi (race, stable)
        run: make test-framework test-cli test-kapi

      - name: Platform + bowrain (race, containers, stable)
        run: make test-platform test-bowrain

  # ── Vision ONNX (real models) ───────────────────────────────────────────────
  # Exercises the kapi-vision plugin against the REAL PP-OCRv5 (OCR) and
  # PP-DocLayoutV3 (layout) models and a real onnxruntime — the numeric/inference
  # path the per-PR suite can't reach. Those tests are gated behind `-tags onnx`
  # plus KAPI_VISION_ORT_LIB / KAPI_VISION_MODELS_DIR (everything else uses fakes),
  # so they only run here. onnxruntime + the models are cached by version/tag, so
  # only the first run pays the ~350 MB download. (A full render→layout e2e over a
  # real PDF — kapi-pdfium tier3 → vision — is a planned extension; this validates
  # OCR + layout model inference directly, which local/fake tests cannot.)
  vision-onnx:
    name: Vision ONNX (real models)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ONNXRUNTIME_VERSION: "1.25.0" # matches yalue/onnxruntime_go (ORT_API_VERSION 25)
      VISION_MODELS_TAG: "vision-models-v1"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules
        with:
          go-version: stable

      - name: Cache onnxruntime
        id: cache-ort
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ort
          key: onnxruntime-linux-x64-${{ env.ONNXRUNTIME_VERSION }}
      - name: Download onnxruntime
        if: steps.cache-ort.outputs.cache-hit != 'true'
        run: |
          asset="onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz"
          url="https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/${asset}"
          mkdir -p "$RUNNER_TEMP/ort"
          curl -sSfL -o "$RUNNER_TEMP/${asset}" "$url"
          tar -xzf "$RUNNER_TEMP/${asset}" -C "$RUNNER_TEMP/ort" --strip-components=1

      - name: Cache vision models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/models
          key: vision-models-${{ env.VISION_MODELS_TAG }}
      - name: Download model assets
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/models"
          base="https://github.com/neokapi/neokapi/releases/download/${VISION_MODELS_TAG}"
          for f in ppocrv5_det.onnx ppocrv5_rec.onnx ppocrv5_dict.txt ppdoclayoutv3.onnx; do
            curl -sSfL -o "$RUNNER_TEMP/models/$f" "$base/$f"
          done

      # The smoke tests verify each model file against its pinned SHA-256 (via
      # models.Ensure) before running, so a corrupt download fails loudly.
      - name: Run kapi-vision ONNX smoke tests (real models)
        env:
          KAPI_VISION_ORT_LIB: ${{ runner.temp }}/ort/lib/libonnxruntime.so
          KAPI_VISION_MODELS_DIR: ${{ runner.temp }}/models
          GOWORK: "off" # plugins/vision is its own module (not in go.work)
        run: |
          cd plugins/vision
          CGO_ENABLED=1 go test -tags onnx -v ./internal/ocr/...

  # ── PDF tier-3 end-to-end (kapi + kapi-pdfium + kapi-vision) ─────────────────
  # The cross-process wiring the smoke lane can't cover: build the real kapi CLI
  # and both plugins, install them, and read a real PDF with tier3 on so
  # kapi-pdfium renders each page and kapi-vision runs the layout model over the
  # raster (host decorator). Asserts the chain segments the page into many
  # structured blocks (the fast path yields ~1/page). onnxruntime + models reuse
  # the same caches as vision-onnx; libpdfium is cached too.
  vision-pdf-e2e:
    name: Vision PDF tier-3 e2e (kapi + plugins)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      ONNXRUNTIME_VERSION: "1.25.0"
      VISION_MODELS_TAG: "vision-models-v1"
      PDFIUM_RELEASE: "chromium/7891" # matches release-pdfium.yml
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules
        with:
          go-version: stable

      # kapi links the cgo ICU tokenizer / FTS5 path; the pdfium plugin's
      # static-pc build uses pkg-config.
      - name: Install cgo deps
        run: sudo apt-get update && sudo apt-get install -y libicu-dev pkg-config

      - name: Cache onnxruntime
        id: cache-ort
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ort
          key: onnxruntime-linux-x64-${{ env.ONNXRUNTIME_VERSION }}
      - name: Download onnxruntime
        if: steps.cache-ort.outputs.cache-hit != 'true'
        run: |
          asset="onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz"
          url="https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/${asset}"
          mkdir -p "$RUNNER_TEMP/ort"
          curl -sSfL -o "$RUNNER_TEMP/${asset}" "$url"
          tar -xzf "$RUNNER_TEMP/${asset}" -C "$RUNNER_TEMP/ort" --strip-components=1

      - name: Cache vision models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/models
          key: vision-models-${{ env.VISION_MODELS_TAG }}
      - name: Download model assets
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/models"
          base="https://github.com/neokapi/neokapi/releases/download/${VISION_MODELS_TAG}"
          for f in ppocrv5_det.onnx ppocrv5_rec.onnx ppocrv5_dict.txt ppdoclayoutv3.onnx; do
            curl -sSfL -o "$RUNNER_TEMP/models/$f" "$base/$f"
          done

      - name: Cache libpdfium
        id: cache-pdfium
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/pdfium
          key: pdfium-linux-x64-${{ env.PDFIUM_RELEASE }}
      - name: Download libpdfium (bblanchon)
        if: steps.cache-pdfium.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/pdfium"
          url="https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_RELEASE}/pdfium-linux-x64.tgz"
          curl -sSfL "$url" | tar xz -C "$RUNNER_TEMP/pdfium"

      - name: Build kapi
        run: make build

      - name: Package + install plugins
        run: |
          set -euo pipefail
          PLUGINS="$RUNNER_TEMP/plugins"; mkdir -p "$PLUGINS/pdfium" "$PLUGINS/vision"
          scripts/package-pdfium-plugin.sh --version 0.0.0 \
            --pdfium-dir "$RUNNER_TEMP/pdfium" --out-dir "$RUNNER_TEMP/pdfium-out"
          scripts/package-vision-plugin.sh --version 0.0.0 \
            --ort-dir "$RUNNER_TEMP/ort" --models-dir "$RUNNER_TEMP/models" \
            --out-dir "$RUNNER_TEMP/vision-out"
          tar xzf "$RUNNER_TEMP"/pdfium-out/kapi-pdfium_*.tar.gz -C "$PLUGINS/pdfium"
          tar xzf "$RUNNER_TEMP"/vision-out/kapi-vision_*.tar.gz -C "$PLUGINS/vision"

      - name: Run PDF tier-3 e2e
        env:
          KAPI_BIN: ${{ github.workspace }}/bin/kapi
          KAPI_PLUGINS_DIR: ${{ runner.temp }}/plugins
          KAPI_VISION_ORT_LIB: ${{ runner.temp }}/ort/lib/libonnxruntime.so
          KAPI_VISION_MODELS_DIR: ${{ runner.temp }}/models
        run: bash scripts/e2e-vision-pdf.sh
