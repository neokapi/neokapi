name: Docs — Verify Snippets

# CI gate: every <RunnableSnippet> (auto-run) and scene smoke_contract must
# exit zero in the browser wasm. A broken example fails this job before it
# ever reaches the reader.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/docs/**"
      - "web/walkthroughs/**"
      - "kapi/cmd/kapi-wasm-cli/**"
      - "kapi/**/*.go"
      - "cli/**/*.go"
      - "core/**/*.go"
      - "scripts/verify-snippets/**"
      - ".github/workflows/docs-verify-snippets.yml"
  pull_request:
    paths:
      - "web/docs/**"
      - "web/walkthroughs/**"
      - "kapi/cmd/kapi-wasm-cli/**"
      - "kapi/**/*.go"
      - "cli/**/*.go"
      - "core/**/*.go"
      - "scripts/verify-snippets/**"
      - ".github/workflows/docs-verify-snippets.yml"

# Cancel superseded PR runs; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  verify-snippets:
    name: Verify docs snippets in wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build kapi CLI wasm
        run: make web-wasm-cli

      - name: Run snippet verifier
        run: node --experimental-strip-types scripts/verify-snippets/harness.ts

      - name: Verify .klz + .kapi workflows in wasm (JSON + Office)
        run: GOROOT="$(go env GOROOT)" node --experimental-strip-types scripts/klz-wasm-smoke.ts

