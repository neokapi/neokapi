name: Release SaT plugin

# The kapi-sat ML segmenter plugin releases independently of the neokapi CLI,
# on its own `sat-v*` tag (e.g. `sat-v0.1.0` -> kapi-sat version 0.1.0). This
# matches the okapi-bridge "independent plugin" model: the plugin changes far
# less often than kapi and carries the heaviest/riskiest build legs (a 4-platform
# cgo matrix incl. a Windows Rust build), so coupling it to every kapi release
# would rebuild/republish it needlessly and block on its flakiest leg.
on:
  push:
    tags:
      - "sat-v*"
  # Build-only dry run for iterating on the platform matrix (e.g. bringing up
  # windows/arm64) WITHOUT publishing a release or registering into the plugin
  # registry. The publish + register jobs below are gated to tag pushes only.
  workflow_dispatch: {}

permissions:
  contents: write
  # cosign keyless requires a fresh GitHub Actions OIDC token to mint a
  # short-lived Fulcio cert for signing the kapi-sat plugin tarballs.
  id-token: write

jobs:
  # ── kapi-sat ML segmenter plugin ────────────────────────────────────────────
  # Build + sign + publish the kapi-sat plugin tarball per platform. kapi-sat is
  # a cgo binary (-tags onnx): it links daulet/tokenizers (static .a) at build
  # time and loads the onnxruntime SHARED library at runtime. The tarball bundles
  # the onnxruntime shared lib at lib/<unversioned-name> beside the binary, where
  # plugins/sat/internal/sat/ort_onnx.go:resolveORTLib() finds it with no env.
  # Models are NOT bundled — they download from HuggingFace at first use.
  #
  # Version pins (must be kept in lockstep with plugins/sat/go.mod):
  #   * onnxruntime 1.25.0 — yalue/onnxruntime_go v1.30.1 targets the 1.25.0 C
  #     API headers and its bundled test dylib links the 1.25.0 runtime (e.g.
  #     libonnxruntime.1.25.0.dylib). Other 1.2x releases may load via C-API
  #     back-compat, but 1.25.0 is the matched, tested ABI — keep this pinned.
  #   * daulet/tokenizers v1.27.0 — matches plugins/sat/go.mod. darwin/linux use
  #     the prebuilt libtokenizers.a from that tag; Windows has no prebuilt lib
  #     and is built from Rust source (see the Windows leg).
  build-sat-plugin:
    name: Build kapi-sat plugin (${{ matrix.build.platform }})
    strategy:
      fail-fast: false
      matrix:
        build:
          # Intel macOS (darwin/amd64) is intentionally omitted: like the cgo
          # Wails desktop apps (Bowrain, Kapi Desktop), this plugin is cgo and
          # can't cross-compile, so it would need a scarce native macos-13
          # runner. arm64 is the supported Mac target.
          - { platform: darwin/arm64, os: macos-latest, goos: darwin, goarch: arm64 }
          - { platform: linux/amd64, os: ubuntu-latest, goos: linux, goarch: amd64 }
          - { platform: linux/arm64, os: ubuntu-24.04-arm, goos: linux, goarch: arm64 }
          - { platform: windows/amd64, os: windows-2025, goos: windows, goarch: amd64 }
          # windows/arm64: native windows-11-arm runner. No GCC mingw for
          # aarch64-windows exists, so the toolchain is LLVM-based throughout —
          # MSYS2 CLANGARM64 (clang + libc++) for cgo, and the Rust
          # aarch64-pc-windows-gnullvm target (same LLVM/UCRT/libc++ ABI) for the
          # tokenizers static lib. (#804)
          - { platform: windows/arm64, os: windows-11-arm, goos: windows, goarch: arm64 }
    runs-on: ${{ matrix.build.os }}
    env:
      # Pinned native-dependency versions (see job-level comment above).
      ONNXRUNTIME_VERSION: "1.25.0"
      TOKENIZERS_VERSION: "v1.27.0"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      # Tarball signing is only needed for publishing (tag pushes). Skip on the
      # build-only workflow_dispatch.
      #
      # The installer action has no windows/arm64 build, so use it for every
      # other leg and `go install` cosign on windows/arm64. (On the build-only
      # dispatch neither runs — signing is gated to tags.)
      - name: Install cosign (tarball signing)
        if: startsWith(github.ref, 'refs/tags/sat-v') && !(runner.os == 'Windows' && matrix.build.goarch == 'arm64')
        uses: sigstore/cosign-installer@v3

      - name: Install cosign via go (windows/arm64)
        if: startsWith(github.ref, 'refs/tags/sat-v') && runner.os == 'Windows' && matrix.build.goarch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/sigstore/cosign/v2/cmd/cosign@v2.4.1
          # setup-go doesn't add GOPATH/bin to PATH; do it so the sign step finds cosign.
          cygpath -w "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/sat-v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#sat-v}" >> "$GITHUB_OUTPUT"
          else
            # Build-only dispatch from a branch: use a filename-safe placeholder
            # (the branch ref can contain "/", which breaks tarball paths).
            echo "VERSION=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      # ── onnxruntime shared library (runtime dep; bundled into the tarball) ────
      - name: Download onnxruntime (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.build.goos }}
          GOARCH: ${{ matrix.build.goarch }}
        run: |
          set -euo pipefail
          case "${GOOS}/${GOARCH}" in
            darwin/arm64) asset="onnxruntime-osx-arm64-${ONNXRUNTIME_VERSION}.tgz" ;;
            darwin/amd64) asset="onnxruntime-osx-x86_64-${ONNXRUNTIME_VERSION}.tgz" ;;
            linux/amd64)  asset="onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz" ;;
            linux/arm64)  asset="onnxruntime-linux-aarch64-${ONNXRUNTIME_VERSION}.tgz" ;;
            *) echo "::error::no onnxruntime asset mapping for ${GOOS}/${GOARCH}"; exit 1 ;;
          esac
          url="https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/${asset}"
          echo "Downloading $url"
          mkdir -p "$RUNNER_TEMP/ort"
          curl -sSfL -o "$RUNNER_TEMP/${asset}" "$url"
          tar -xzf "$RUNNER_TEMP/${asset}" -C "$RUNNER_TEMP/ort"
          # The archive extracts to a single versioned top-level dir.
          ort_root="$(find "$RUNNER_TEMP/ort" -maxdepth 1 -mindepth 1 -type d | head -n1)"
          echo "ORT_DIR=${ort_root}" >> "$GITHUB_ENV"

      - name: Download onnxruntime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOARCH: ${{ matrix.build.goarch }}
        run: |
          $slug = if ($env:GOARCH -eq 'arm64') { 'win-arm64' } else { 'win-x64' }
          $asset = "onnxruntime-$slug-$env:ONNXRUNTIME_VERSION.zip"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$env:ONNXRUNTIME_VERSION/$asset"
          Write-Host "Downloading $url"
          $dest = "$env:RUNNER_TEMP\$asset"
          Invoke-WebRequest -Uri $url -OutFile $dest
          $ortRoot = "$env:RUNNER_TEMP\ort"
          Expand-Archive -Path $dest -DestinationPath $ortRoot -Force
          # Single versioned top-level dir inside the zip.
          $inner = (Get-ChildItem -Path $ortRoot -Directory | Select-Object -First 1).FullName
          "ORT_DIR=$inner" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── daulet/tokenizers static library (build-time dep) ─────────────────────
      # darwin/linux: prebuilt libtokenizers.a from the pinned release tag.
      # Asset naming: darwin uses arm64/x86_64, linux uses amd64/arm64.
      - name: Download libtokenizers (Unix prebuilt)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.build.goos }}
          GOARCH: ${{ matrix.build.goarch }}
        run: |
          set -euo pipefail
          case "${GOOS}/${GOARCH}" in
            darwin/arm64) asset="libtokenizers.darwin-arm64.tar.gz" ;;
            darwin/amd64) asset="libtokenizers.darwin-x86_64.tar.gz" ;;
            linux/amd64)  asset="libtokenizers.linux-amd64.tar.gz" ;;
            linux/arm64)  asset="libtokenizers.linux-arm64.tar.gz" ;;
            *) echo "::error::no libtokenizers asset mapping for ${GOOS}/${GOARCH}"; exit 1 ;;
          esac
          url="https://github.com/daulet/tokenizers/releases/download/${TOKENIZERS_VERSION}/${asset}"
          echo "Downloading $url"
          mkdir -p "$RUNNER_TEMP/tok"
          curl -sSfL -o "$RUNNER_TEMP/${asset}" "$url"
          tar -xzf "$RUNNER_TEMP/${asset}" -C "$RUNNER_TEMP/tok"
          test -f "$RUNNER_TEMP/tok/libtokenizers.a" || { echo "::error::libtokenizers.a missing after extract"; ls -la "$RUNNER_TEMP/tok"; exit 1; }
          echo "TOKENIZERS_LIB=$RUNNER_TEMP/tok" >> "$GITHUB_ENV"

      # Windows: no prebuilt lib is published by daulet/tokenizers, so build the
      # tokenizers-ffi crate from Rust source. The crate bundles C++ (esaxx via
      # the cc crate), so the C++ runtime the .a expects must match what cgo
      # links at the end:
      #   * amd64 -> x86_64-pc-windows-gnu (GCC mingw / libstdc++); cgo on
      #     windows-2025 uses the bundled mingw gcc. The upstream cgo directive's
      #     -lstdc++ is correct here.
      #   * arm64 -> aarch64-pc-windows-gnullvm (LLVM mingw / libc++); there is no
      #     GCC mingw for aarch64-windows. cgo links with CLANGARM64 clang, so the
      #     C++ runtime is libc++ — the upstream -lstdc++ is WRONG for this leg and
      #     the final cgo link is expected to need -lc++ (see #804).
      - name: Install Rust (Windows)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.build.goarch == 'arm64' && 'aarch64-pc-windows-gnullvm' || 'x86_64-pc-windows-gnu' }}

      # amd64: GCC-mingw ABI, build in plain bash with the runner's gcc.
      - name: Build libtokenizers from source (Windows amd64)
        if: runner.os == 'Windows' && matrix.build.goarch == 'amd64'
        shell: bash
        run: |
          set -euo pipefail
          git clone --branch "${TOKENIZERS_VERSION}" --depth 1 \
            https://github.com/daulet/tokenizers "$RUNNER_TEMP/tokenizers-src"
          cd "$RUNNER_TEMP/tokenizers-src"
          cargo build --release -p tokenizers-ffi --target x86_64-pc-windows-gnu
          mkdir -p "$RUNNER_TEMP/tok"
          # staticlib output for the gnu target is libtokenizers_ffi.a; the cgo
          # directive looks for -ltokenizers => libtokenizers.a.
          cp "target/x86_64-pc-windows-gnu/release/libtokenizers_ffi.a" "$RUNNER_TEMP/tok/libtokenizers.a"
          echo "TOKENIZERS_LIB=$RUNNER_TEMP/tok" >> "$GITHUB_ENV"

      # arm64: LLVM mingw (CLANGARM64) provides clang + libc++ for both the crate's
      # C++ (esaxx) and the later cgo link. Export clang onto the Windows PATH +
      # CC so the shared package step's `go build` (plain bash) uses it too.
      - name: Set up MSYS2 CLANGARM64 (Windows arm64)
        if: runner.os == 'Windows' && matrix.build.goarch == 'arm64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          path-type: inherit
          install: >-
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-cmake
            make

      - name: Build libtokenizers from source (Windows arm64)
        if: runner.os == 'Windows' && matrix.build.goarch == 'arm64'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export CC=clang CXX=clang++
          git clone --branch "${TOKENIZERS_VERSION}" --depth 1 \
            https://github.com/daulet/tokenizers "$RUNNER_TEMP/tokenizers-src"
          cd "$RUNNER_TEMP/tokenizers-src"
          cargo build --release -p tokenizers-ffi --target aarch64-pc-windows-gnullvm
          mkdir -p "$RUNNER_TEMP/tok"
          cp "target/aarch64-pc-windows-gnullvm/release/libtokenizers_ffi.a" "$RUNNER_TEMP/tok/libtokenizers.a"
          echo "TOKENIZERS_LIB=$RUNNER_TEMP/tok" >> "$GITHUB_ENV"
          # Put CLANGARM64 clang on the Windows PATH + set CC so the shared package
          # step (plain bash) links the cgo binary with the matching libc++ ABI.
          echo "CC=clang" >> "$GITHUB_ENV"
          cygpath -w "$(dirname "$(command -v clang)")" >> "$GITHUB_PATH"

      # ── build (only) into a staging dir so macOS can sign before tar ──────────
      # On macOS we build the binary first, Developer-ID sign + notarize it, then
      # let the packaging script bundle the (already-signed) binary into the tar.
      # On Linux/Windows the packaging script builds + tars in one shot.
      - name: Build kapi-sat (macOS, pre-sign)
        if: runner.os == 'macOS'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X github.com/neokapi/neokapi/core/version.Version=${VERSION} -X github.com/neokapi/neokapi/core/version.Commit=${GH_SHA::7} -X github.com/neokapi/neokapi/core/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p "$RUNNER_TEMP/prebuilt"
          (cd plugins/sat && GOWORK=off CGO_ENABLED=1 \
            CGO_LDFLAGS="-L${TOKENIZERS_LIB}" \
            go build -tags onnx -trimpath -ldflags "${LDFLAGS}" \
            -o "$RUNNER_TEMP/prebuilt/kapi-sat" ./cmd/kapi-sat)
          echo "SAT_PREBUILT_BIN=$RUNNER_TEMP/prebuilt/kapi-sat" >> "$GITHUB_ENV"

      # macOS Developer-ID signing + notarization of the staged Mach-O set
      # (plugin binary + bundled onnxruntime dylib), via the shared composite
      # action. reloc-id pins the dylib install id BEFORE signing so the package
      # script's guarded install_name_tool no-op preserves the signature.
      - name: Sign + notarize macOS Mach-O
        if: runner.os == 'macOS'
        uses: ./.github/actions/macos-sign
        with:
          label: kapi-sat
          binaries: ${{ env.SAT_PREBUILT_BIN }}
          dylib-globs: ${{ env.ORT_DIR }}/lib/libonnxruntime*.dylib
          reloc-id: '@loader_path/libonnxruntime.dylib'
          notarize: ${{ startsWith(github.ref, 'refs/tags/sat-v') }}
          developer-id-p12-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          developer-id-p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          sign-identity: ${{ secrets.APPLE_SIGN_IDENTITY }}
          api-key-p8-base64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          api-issuer-id: ${{ secrets.APPLE_API_ISSUER_ID }}

      # ── package the tarball ───────────────────────────────────────────────────
      # The packaging script builds the binary unless a pre-built (already-signed)
      # one is provided via SAT_PREBUILT_BIN — see scripts/package-sat-plugin.sh.
      - name: Package kapi-sat tarball
        id: package
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          scripts/package-sat-plugin.sh \
            --version "${VERSION}" \
            --ort-dir "${ORT_DIR}" \
            --tokenizers-lib "${TOKENIZERS_LIB}" \
            --out-dir "$RUNNER_TEMP/sat-out"

      # ── cosign keyless sign + upload ──────────────────────────────────────────
      - name: Cosign sign tarball (keyless)
        if: startsWith(github.ref, 'refs/tags/sat-v')
        shell: bash
        env:
          TARBALL: ${{ steps.package.outputs.tarball }}
        run: |
          set -euo pipefail
          # --new-bundle-format emits a real Sigstore protobuf bundle
          # (media type application/vnd.dev.sigstore.bundle…), consistent with
          # how other plugins (bowrain, okapi-bridge) are signed. WITHOUT this
          # flag, `cosign sign-blob --bundle` writes the LEGACY cosign bundle
          # ({"base64Signature","cert","rekorBundle"}), which sigstore-go's
          # bundle parser rejects ("unknown field base64Signature") — the bug
          # that broke `kapi plugins install sat`.
          #
          # NOTE: the installer's verifier still accepts legacy bundles
          # (cli/pluginhost/registry/cosign.go: convertLegacyCosignBundle)
          # because already-published sat releases shipped the legacy format and
          # cannot be re-signed. Keep that path until no legacy artifacts remain
          # referenced by the registry.
          cosign sign-blob --yes --new-bundle-format \
            --bundle "${TARBALL}.sigstore.json" "${TARBALL}"

      # Upload the tarball + signature as a workflow ARTIFACT (not directly to
      # the GitHub release): the matrix legs run concurrently, and several
      # softprops/action-gh-release calls racing to create/update the same
      # release can silently drop an asset. A single publish job (below)
      # downloads all artifacts and uploads them to the release in one writer.
      - name: Upload tarball + signature artifact
        uses: actions/upload-artifact@v7
        with:
          name: sat-tarball-${{ matrix.build.goos }}-${{ matrix.build.goarch }}
          # Glob the output dir via a native per-OS path (runner.temp), NOT the
          # script's stdout path: on the Windows runner the bash script emits a
          # git-bash-style path (/d/a/_temp/…) that the JS upload-artifact action
          # cannot resolve, so it silently uploads nothing (the tarball is on
          # disk — its checksum artifact proves it). if-no-files-found: error
          # turns a future miss into a hard failure instead of a 404'd release.
          path: |
            ${{ runner.temp }}/sat-out/*.tar.gz
            ${{ runner.temp }}/sat-out/*.tar.gz.sigstore.json
          if-no-files-found: error
          retention-days: 14

      # Expose the per-platform sha256 as a checksum artifact for the registry
      # step (which runs on a separate runner). One file per leg:
      #   kapi-sat_<ver>_<os>_<arch>.tar.gz <sha256>
      - name: Write checksum artifact
        shell: bash
        env:
          SAT_SHA256: ${{ steps.package.outputs.sha256 }}
          SAT_TARBALL_NAME: ${{ steps.package.outputs.tarball_name }}
          LEG_GOOS: ${{ matrix.build.goos }}
          LEG_GOARCH: ${{ matrix.build.goarch }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sat-checksums"
          echo "${SAT_SHA256}  ${SAT_TARBALL_NAME}" \
            > "$RUNNER_TEMP/sat-checksums/${LEG_GOOS}_${LEG_GOARCH}.sha256"

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v7
        with:
          name: sat-checksum-${{ matrix.build.goos }}-${{ matrix.build.goarch }}
          path: ${{ runner.temp }}/sat-checksums/*.sha256
          retention-days: 14

  # Single-writer publish: download every leg's tarball + signature artifact
  # and upload them to the GitHub release in ONE softprops call, avoiding the
  # concurrent-release-write race that can drop an asset when matrix legs each
  # upload directly.
  publish-sat-release:
    name: Publish kapi-sat release
    # Tag pushes only — workflow_dispatch is a build-only dry run.
    if: startsWith(github.ref, 'refs/tags/sat-v')
    needs: build-sat-plugin
    runs-on: ubuntu-latest
    steps:
      - name: Download all tarball + signature artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sat-tarball-*
          path: sat-release
          merge-multiple: true

      - name: Upload all assets to the release
        uses: softprops/action-gh-release@v3
        with:
          # The SaT plugin has its own tag line (sat-v*); it must NOT become the
          # repo's "latest" release, or setup-kapi's resolve-version (which reads
          # releases/latest) would pick up the SaT tag instead of the kapi CLI.
          make_latest: false
          files: |
            sat-release/*.tar.gz
            sat-release/*.tar.gz.sigstore.json

  # Register the new kapi-sat plugin version into neokapi/registry so
  # `kapi plugins install sat` resolves to this build. Mirrors the goreleaser
  # job's "Update manifest plugin registry" step but for --plugin sat across the
  # four supported platforms.
  #
  # PREREQUISITE: neokapi/registry's manifest-plugins.json must already contain a
  # "sat" stub plugin entry (registry-update refuses to create new top-level
  # plugins — it errors "plugin not declared"). Add the stub once, mirroring the
  # existing "bowrain"/"okapi-bridge" entries.
  register-sat-plugin:
    name: Register kapi-sat in plugin registry
    # Tag pushes only — workflow_dispatch is a build-only dry run.
    if: startsWith(github.ref, 'refs/tags/sat-v')
    needs: publish-sat-release
    runs-on: ubuntu-latest
    steps:
      - name: Download SaT checksum artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sat-checksum-*
          path: sat-checksums
          merge-multiple: true

      - name: Update manifest plugin registry (sat)
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#sat-v}"
          if [ -z "${REGISTRY_TOKEN:-}" ]; then
            echo "REGISTRY_TOKEN not set; skipping registry update"
            exit 0
          fi

          GOBIN=/tmp go install github.com/neokapi/registry/tools/registry-update@main

          # Collect the per-platform shas from the downloaded checksum files
          # (one "<sha>  <tarball-name>" line each).
          declare -A SHAS
          for f in sat-checksums/*.sha256; do
            [ -f "$f" ] || continue
            sum=$(awk '{print $1}' "$f")
            file=$(awk '{print $2}' "$f")
            SHAS[$file]=$sum
          done

          REPO_URL="https://github.com/${REPO}/releases/download/${REF_NAME}"
          CERT_ID="https://github.com/${REPO}/.github/workflows/release-sat.yml@refs/tags/${REF_NAME}"
          declare -a ARGS
          for plat in darwin/arm64 linux/arm64 linux/amd64 windows/amd64 windows/arm64; do
            os=${plat%/*}
            arch=${plat#*/}
            file="kapi-sat_${VERSION}_${os}_${arch}.tar.gz"
            if [ -n "${SHAS[$file]:-}" ]; then
              ARGS+=(
                "--platform" "$plat"
                "--url" "${REPO_URL}/${file}"
                "--sha256" "${SHAS[$file]}"
                "--signature" "${REPO_URL}/${file}.sigstore.json"
              )
            else
              echo "::warning::no checksum for ${file}; skipping ${plat}"
            fi
          done

          if [ ${#ARGS[@]} -eq 0 ]; then
            echo "::error::no platform artifacts found for sat ${VERSION}"
            exit 1
          fi

          git clone "https://x-access-token:${REGISTRY_TOKEN}@github.com/neokapi/registry.git" /tmp/registry
          /tmp/registry-update \
            --registry /tmp/registry/manifest-plugins.json \
            --plugin sat \
            --version "$VERSION" \
            --channel stable \
            --released "$(date -u +%Y-%m-%d)" \
            --cert-identity "$CERT_ID" \
            --cert-oidc-issuer https://token.actions.githubusercontent.com \
            "${ARGS[@]}"
          cd /tmp/registry
          git config user.email "release-bot@neokapi.dev"
          git config user.name "release-bot"
          git add manifest-plugins.json
          if ! git diff --staged --quiet; then
            git commit -m "Register sat ${VERSION}"
            git push
          fi
