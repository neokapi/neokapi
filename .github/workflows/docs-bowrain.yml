name: Docs — bowrain

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bowrain/web/docs/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-bowrain.yml"
  pull_request:
    paths:
      - "bowrain/web/docs/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-bowrain.yml"

# Cancel superseded PR runs; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  KAPI_WEB_SITE: https://neokapi.github.io/web/neokapi/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: vp install

      # All bowrain docs videos — the CLI scene tapes (bowrain-cli/) and the
      # framed walkthrough videos (bowrain-web/ + bowrain-desktop/) — are recorded
      # on a desktop against a real running stack, which CI cannot reproduce, and
      # published to the bowrain-docs-assets release (make bowrain-kapi-scenes /
      # the harness, then make publish-bowrain-docs-assets). CI no longer records
      # anything; it stages the assets here, mirroring docs-kapi.yml.
      - name: Stage bowrain videos + images from bowrain-docs-assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p bowrain/web/docs/static/video
          if gh release download bowrain-docs-assets -p bowrain-docs-assets.tar.gz -D /tmp/bda 2>/dev/null; then
            tar xzf /tmp/bda/bowrain-docs-assets.tar.gz -C /tmp/bda
            [ -d /tmp/bda/video ] && cp -R /tmp/bda/video/. bowrain/web/docs/static/video/
            [ -d /tmp/bda/img ] && { mkdir -p bowrain/web/docs/static/img; cp -R /tmp/bda/img/. bowrain/web/docs/static/img/; }
            echo "Staged bowrain videos: $(find bowrain/web/docs/static/video -name '*.webm' 2>/dev/null | wc -l) webm"
          else
            echo "::warning::bowrain-docs-assets release unavailable; videos will be missing"
          fi

      # bowrain/web/docs is a standalone Docusaurus app (not in the pnpm
      # workspace, by design — see PR #425); install it on its own.
      - name: Install bowrain docs site dependencies
        # strict-dep-builds=false: core-js' build is intentionally ignored
        # (allowBuilds in pnpm-workspace.yaml); without it pnpm 11 exits non-zero
        # with ERR_PNPM_IGNORED_BUILDS and fails the docs build.
        run: corepack pnpm install --ignore-workspace --config.strict-dep-builds=false
        working-directory: bowrain/web/docs

      - name: Stage walkthrough scene .webm into static/video/bowrain/
        run: bash bowrain/web/docs/scripts/stage-scenes.sh

      - name: Determine base URL (production vs PR preview)
        id: base
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
            echo "docs_base=/web/prs/${PR_NUMBER}/bowrain/docs/" >> "$GITHUB_OUTPUT"
          else
            echo "docs_base=/web/bowrain/docs/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build bowrain Docusaurus site
        run: vpx docusaurus build
        working-directory: bowrain/web/docs
        env:
          DOCS_BASE_URL: ${{ steps.base.outputs.docs_base }}

      - name: Upload bowrain site artifact
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-site
          path: bowrain/web/docs/build
          retention-days: 7
