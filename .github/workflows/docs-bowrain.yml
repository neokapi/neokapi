name: Docs — bowrain

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bowrain/web/docs/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-bowrain.yml"
  pull_request:
    paths:
      - "bowrain/web/docs/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-bowrain.yml"

# Cancel superseded PR runs; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  KAPI_WEB_SITE: https://neokapi.github.io/web/neokapi/

jobs:
  build:
    runs-on: ubuntu-latest
    # CDN_URL is the R2 origin to serve videos AND screenshots from (DOCS_CDN_URL
    # repo variable). ON for push and same-repo PRs: ThemedVideo/ThemedImage
    # reference them by URL, so nothing is staged into the artifact and PR
    # previews (served from R2) stay tiny. FORK PRs keep it empty (no publish
    # secret, no deployed preview) and build same-origin.
    env:
      CDN_URL: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && vars.DOCS_CDN_URL || '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: vp install

      # Bowrain docs videos AND screenshots — produced by the harness on a desktop
      # against a real running stack, which CI cannot reproduce — are served from
      # the CDN (R2) for push and same-repo PRs: ThemedVideo / ThemedImage
      # reference them by URL, nothing is staged into the artifact. The
      # bowrain-docs-assets release is retired; publish from the desktop with
      # `make publish-cdn-bowrain-videos` and `make publish-cdn-bowrain-images`.
      # Fork PRs (CDN off) build without them and never deploy a preview.

      # bowrain/web/docs is a standalone Docusaurus app (not in the pnpm
      # workspace, by design — see PR #425); install it on its own.
      - name: Install bowrain docs site dependencies
        # strict-dep-builds=false: core-js' build is intentionally ignored
        # (allowBuilds in pnpm-workspace.yaml); without it pnpm 11 exits non-zero
        # with ERR_PNPM_IGNORED_BUILDS and fails the docs build.
        run: corepack pnpm install --ignore-workspace --config.strict-dep-builds=false
        working-directory: bowrain/web/docs

      - name: Determine base URL (production vs PR preview)
        id: base
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
            echo "docs_base=/web/prs/${PR_NUMBER}/bowrain/docs/" >> "$GITHUB_OUTPUT"
          else
            echo "docs_base=/web/bowrain/docs/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build bowrain Docusaurus site
        run: vpx docusaurus build
        working-directory: bowrain/web/docs
        env:
          DOCS_BASE_URL: ${{ steps.base.outputs.docs_base }}
          # Empty → videos same-origin (unchanged). Set → videos load from the CDN.
          DOCS_CDN_URL: ${{ env.CDN_URL }}

      - name: Upload bowrain site artifact
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-site
          path: bowrain/web/docs/build
          retention-days: 7
