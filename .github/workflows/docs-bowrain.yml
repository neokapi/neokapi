name: Docs — bowrain

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bowrain/website/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-bowrain.yml"
  pull_request:
    paths:
      - "bowrain/website/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-bowrain.yml"

permissions:
  contents: read

env:
  KAPI_WEB_SITE: https://neokapi.github.io/web/neokapi/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: vp install

      - name: Fetch last-known-good docs assets (bowrain only)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view docs-assets > /dev/null 2>&1; then
            if gh release download docs-assets --pattern 'docs-assets.tar.gz' --dir /tmp 2>/dev/null; then
              mkdir -p bowrain/website/static
              tar xzf /tmp/docs-assets.tar.gz -C bowrain/website/static --wildcards \
                'img/bowrain*' 'img/web-app*' 'video/bowrain*' 'video/web-app*' 'video/bowrain-cli*' 2>/dev/null || true
            fi
          fi

      - name: Build bowrain Docusaurus site
        run: vp run build
        working-directory: bowrain/website

      - name: Upload bowrain site artifact
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-site
          path: bowrain/website/build
          retention-days: 7
