name: Docs — bowrain

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bowrain/web/docs/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-bowrain.yml"
  pull_request:
    paths:
      - "bowrain/web/docs/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-bowrain.yml"

# Cancel superseded PR runs; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  KAPI_WEB_SITE: https://neokapi.github.io/web/neokapi/

jobs:
  build:
    runs-on: ubuntu-latest
    # CDN_URL is the R2 origin to serve videos from (DOCS_CDN_URL repo variable).
    # Empty → videos stay same-origin (the default). Set on a push → videos load
    # from the CDN (published to R2 from the desktop) and aren't staged here. PR
    # previews always stay same-origin.
    env:
      CDN_URL: ${{ github.event_name != 'pull_request' && vars.DOCS_CDN_URL || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: vp install

      # All bowrain docs videos — the CLI demos (bowrain-cli/) and the framed
      # walkthrough videos (bowrain-web/ + bowrain-desktop/) — are produced by the
      # harness on a desktop against a real running stack, which CI cannot
      # reproduce, and published to the bowrain-docs-assets release (make
      # publish-bowrain-docs-assets). CI never records; it stages the assets here,
      # mirroring docs-kapi.yml.
      # Images are always staged (small, served same-origin). Videos are staged
      # only when NOT serving from the CDN; with the CDN on they're published to
      # R2 from the desktop (make publish-cdn-bowrain-videos), not bundled here.
      - name: Stage bowrain videos + images from bowrain-docs-assets
        env:
          GH_TOKEN: ${{ github.token }}
          CDN_URL: ${{ env.CDN_URL }}
        run: |
          mkdir -p bowrain/web/docs/static/video
          if gh release download bowrain-docs-assets -p bowrain-docs-assets.tar.gz -D /tmp/bda 2>/dev/null; then
            tar xzf /tmp/bda/bowrain-docs-assets.tar.gz -C /tmp/bda
            [ -d /tmp/bda/img ] && { mkdir -p bowrain/web/docs/static/img; cp -R /tmp/bda/img/. bowrain/web/docs/static/img/; }
            if [ -z "$CDN_URL" ]; then
              [ -d /tmp/bda/video ] && cp -R /tmp/bda/video/. bowrain/web/docs/static/video/
              echo "Staged bowrain videos: $(find bowrain/web/docs/static/video -name '*.webm' 2>/dev/null | wc -l) webm"
            else
              echo "CDN enabled — videos served from R2; images staged only"
            fi
          else
            echo "::warning::bowrain-docs-assets release unavailable; videos/images will be missing"
          fi

      # bowrain/web/docs is a standalone Docusaurus app (not in the pnpm
      # workspace, by design — see PR #425); install it on its own.
      - name: Install bowrain docs site dependencies
        # strict-dep-builds=false: core-js' build is intentionally ignored
        # (allowBuilds in pnpm-workspace.yaml); without it pnpm 11 exits non-zero
        # with ERR_PNPM_IGNORED_BUILDS and fails the docs build.
        run: corepack pnpm install --ignore-workspace --config.strict-dep-builds=false
        working-directory: bowrain/web/docs

      - name: Determine base URL (production vs PR preview)
        id: base
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
            echo "docs_base=/web/prs/${PR_NUMBER}/bowrain/docs/" >> "$GITHUB_OUTPUT"
          else
            echo "docs_base=/web/bowrain/docs/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build bowrain Docusaurus site
        run: vpx docusaurus build
        working-directory: bowrain/web/docs
        env:
          DOCS_BASE_URL: ${{ steps.base.outputs.docs_base }}
          # Empty → videos same-origin (unchanged). Set → videos load from the CDN.
          DOCS_CDN_URL: ${{ env.CDN_URL }}

      - name: Upload bowrain site artifact
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-site
          path: bowrain/web/docs/build
          retention-days: 7
