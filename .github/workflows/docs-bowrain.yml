name: Docs — bowrain

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bowrain/web/docs/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-bowrain.yml"
  pull_request:
    paths:
      - "bowrain/web/docs/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-bowrain.yml"

permissions:
  contents: read

env:
  KAPI_WEB_SITE: https://neokapi.github.io/web/neokapi/

jobs:
  record-cli-scenes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true

      - name: Build kapi + kapi-bowrain plugin
        run: make build build-kapi-bowrain-plugin

      # Bowrain commands run as `kapi <cmd>` via the kapi-bowrain plugin (the
      # standalone `bowrain` binary is retired). kapi discovers plugins by a
      # manifest.json sidecar under a plugins dir, so place the built binary +
      # its manifest where kapi looks; otherwise the tapes' `kapi push`/`kapi
      # status`/… would print "unknown command".
      - name: Install kapi-bowrain plugin into kapi's discovery path
        run: |
          PLUGIN_DIR="$HOME/.local/share/kapi/plugins/bowrain"
          mkdir -p "$PLUGIN_DIR"
          cp bin/kapi-bowrain "$PLUGIN_DIR/kapi-bowrain"
          cp bowrain/cli/cmd/kapi-bowrain/manifest.json "$PLUGIN_DIR/manifest.json"
          bin/kapi plugin list || true

      - name: Install VHS + Xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg ttyd xvfb
          curl -L "https://github.com/charmbracelet/vhs/releases/download/v0.9.0/vhs_0.9.0_amd64.deb" -o /tmp/vhs.deb
          sudo dpkg -i /tmp/vhs.deb

      - name: Record CLI terminal scenes
        env:
          DISPLAY: ":99"
          BOWRAIN_BACKEND_URL: ${{ env.KAPI_WEB_SITE && '' || 'https://dev.bowrain.cloud' }}
        run: |
          export PATH="$PWD/bin:$PATH"
          # The tapes `cd $WALKTHROUGH_DIR` before running `kapi init`/push/sync.
          # Point it at a fresh dir OUTSIDE the repo checkout so those commands
          # never walk up into — or act on — the repo-root dogfood .kapi project.
          export WALKTHROUGH_DIR="${RUNNER_TEMP:-/tmp}/bowrain-walkthrough"
          rm -rf "$WALKTHROUGH_DIR" && mkdir -p "$WALKTHROUGH_DIR"
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          if [ -d bowrain/web/docs/scenes ]; then
            for scene_dir in bowrain/web/docs/scenes/*/; do
              for tape in "$scene_dir"*.tape; do
                [ -f "$tape" ] || continue
                echo "Recording $tape"
                (cd "$scene_dir" && timeout 180 vhs "$(basename "$tape")") || echo "::warning::tape $tape failed"
              done
            done
          fi

      - name: Stage recorded assets under static/video/bowrain-cli/
        run: |
          mkdir -p bowrain/web/docs/static/video/bowrain-cli
          if [ -d bowrain/web/docs/scenes ]; then
            for webm in bowrain/web/docs/scenes/*/*.webm; do
              [ -f "$webm" ] || continue
              cp "$webm" "bowrain/web/docs/static/video/bowrain-cli/$(basename "$webm")"
            done
          fi

      - name: Upload recorded scenes
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-cli-scenes
          path: bowrain/web/docs/static/video/bowrain-cli
          retention-days: 7

  build:
    needs: record-cli-scenes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: vp install

      - name: Download recorded CLI scenes
        uses: actions/download-artifact@v8
        with:
          name: bowrain-cli-scenes
          path: bowrain/web/docs/static/video/bowrain-cli

      # The framed walkthrough videos (bowrain-web/ + bowrain-desktop/) are
      # rendered on a desktop against a real running stack — CI can't reproduce
      # that — and published to the bowrain-docs-assets release via
      # `make publish-bowrain-docs-assets`. Stage them here, mirroring kapi's
      # docs-assets staging in docs-kapi.yml.
      - name: Stage bowrain framed videos from bowrain-docs-assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p bowrain/web/docs/static/video
          if gh release download bowrain-docs-assets -p bowrain-docs-assets.tar.gz -D /tmp/bda 2>/dev/null; then
            tar xzf /tmp/bda/bowrain-docs-assets.tar.gz -C /tmp/bda
            [ -d /tmp/bda/video ] && cp -R /tmp/bda/video/. bowrain/web/docs/static/video/
            [ -d /tmp/bda/img ] && { mkdir -p bowrain/web/docs/static/img; cp -R /tmp/bda/img/. bowrain/web/docs/static/img/; }
            echo "Staged bowrain framed videos: $(find bowrain/web/docs/static/video -name '*.webm' 2>/dev/null | wc -l) webm"
          else
            echo "::warning::bowrain-docs-assets release unavailable; framed videos will be missing"
          fi

      # bowrain/website is a standalone Docusaurus app (not in the npm
      # workspace, by design — see PR #425). Install its deps locally and
      # invoke the build script via npm directly so vp doesn't try to
      # resolve a non-existent `bowrain-docs#build` workspace task.
      - name: Install bowrain docs site dependencies
        run: npm install --no-audit --no-fund
        working-directory: bowrain/web/docs

      - name: Stage walkthrough scene .webm into static/video/bowrain/
        run: bash bowrain/web/docs/scripts/stage-scenes.sh

      - name: Determine base URL (production vs PR preview)
        id: base
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
            echo "docs_base=/web/prs/${PR_NUMBER}/bowrain/docs/" >> "$GITHUB_OUTPUT"
          else
            echo "docs_base=/web/bowrain/docs/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build bowrain Docusaurus site
        run: npm run build
        working-directory: bowrain/web/docs
        env:
          DOCS_BASE_URL: ${{ steps.base.outputs.docs_base }}

      - name: Upload bowrain site artifact
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-site
          path: bowrain/web/docs/build
          retention-days: 7
