name: Docs — bowrain

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bowrain/website/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-bowrain.yml"
  pull_request:
    paths:
      - "bowrain/website/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-bowrain.yml"

permissions:
  contents: read

env:
  KAPI_WEB_SITE: https://neokapi.github.io/web/neokapi/

jobs:
  record-cli-scenes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true

      - name: Build bowrain + kapi binaries
        run: make build build-bowrain-cli

      - name: Install VHS + Xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg ttyd xvfb
          curl -L "https://github.com/charmbracelet/vhs/releases/download/v0.9.0/vhs_0.9.0_amd64.deb" -o /tmp/vhs.deb
          sudo dpkg -i /tmp/vhs.deb

      - name: Record CLI terminal scenes
        env:
          DISPLAY: ":99"
          BOWRAIN_BACKEND_URL: ${{ env.KAPI_WEB_SITE && '' || 'https://dev.bowrain.cloud' }}
        run: |
          export PATH="$PWD/bin:$PATH"
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          if [ -d bowrain/website/scenes ]; then
            for scene_dir in bowrain/website/scenes/*/; do
              for tape in "$scene_dir"*.tape; do
                [ -f "$tape" ] || continue
                echo "Recording $tape"
                (cd "$scene_dir" && timeout 180 vhs "$(basename "$tape")") || echo "::warning::tape $tape failed"
              done
            done
          fi

      - name: Stage recorded assets under static/video/bowrain-cli/
        run: |
          mkdir -p bowrain/website/static/video/bowrain-cli
          if [ -d bowrain/website/scenes ]; then
            for webm in bowrain/website/scenes/*/*.webm; do
              [ -f "$webm" ] || continue
              cp "$webm" "bowrain/website/static/video/bowrain-cli/$(basename "$webm")"
            done
          fi

      - name: Upload recorded scenes
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-cli-scenes
          path: bowrain/website/static/video/bowrain-cli
          retention-days: 7

  build:
    needs: record-cli-scenes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: vp install

      - name: Download recorded CLI scenes
        uses: actions/download-artifact@v5
        with:
          name: bowrain-cli-scenes
          path: bowrain/website/static/video/bowrain-cli

      - name: Build bowrain Docusaurus site
        run: vp run build
        working-directory: bowrain/website

      - name: Upload bowrain site artifact
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-site
          path: bowrain/website/build
          retention-days: 7
