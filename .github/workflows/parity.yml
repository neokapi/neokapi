name: Parity (#448)

# Runs the cli/parity/ test suite against a freshly built kapi binary
# and a freshly built okapi-bridge plugin. The workflow exits non-zero
# whenever any filter or step parity row fails — this is the gate the
# release workflow consults before tagging.
#
# Triggers:
#   - Every push to main (so a regression on main is caught immediately).
#   - Every PR to main that touches code involved in parity.
#   - Manual dispatch for debugging.
#
# Security: the only workflow_dispatch input is the Okapi version, which
# is consumed exclusively via $OKAPI_VERSION (env), never inlined into
# `run:` strings.

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "cli/**"
      - "kapi/**"
      - "go.work"
      - "go.mod"
      - "go.sum"
      - "scripts/parity-sandbox.sh"
      - "Makefile"
      - ".github/workflows/parity.yml"
  pull_request:
    branches: [main]
    paths:
      - "core/**"
      - "cli/**"
      - "kapi/**"
      - "go.work"
      - "go.mod"
      - "go.sum"
      - "scripts/parity-sandbox.sh"
      - "Makefile"
      - ".github/workflows/parity.yml"
  workflow_dispatch:
    inputs:
      okapi_version:
        description: "Okapi Framework version to test against"
        required: false
        default: "1.48.0"

permissions:
  contents: read

jobs:
  parity:
    name: parity-test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OKAPI_VERSION: ${{ inputs.okapi_version || '1.48.0' }}
    steps:
      - name: Checkout neokapi
        uses: actions/checkout@v6
        with:
          path: neokapi
          fetch-depth: 0

      - name: Checkout okapi-bridge
        uses: actions/checkout@v6
        with:
          repository: neokapi/okapi-bridge
          path: okapi-bridge
          fetch-depth: 1

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: neokapi/go.mod

      - name: Install ICU dev libraries
        run: sudo apt-get update && sudo apt-get install -y libicu-dev pkg-config

      - name: Build okapi-bridge plugin tarball
        working-directory: okapi-bridge
        run: |
          make build V="$OKAPI_VERSION"
          make plugin-v2 V="$OKAPI_VERSION"

      - name: Run parity test suite
        working-directory: neokapi
        env:
          OKAPI_BRIDGE_REPO: ${{ github.workspace }}/okapi-bridge
        run: make parity-test

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-test-comparison
          path: neokapi/.parity/test-comparison.json
          if-no-files-found: error
          retention-days: 90
