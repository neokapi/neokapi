name: Parity (#448)

# Runs the cli/parity/ test suite against a freshly built kapi binary
# and a freshly built okapi-bridge plugin. The workflow exits non-zero
# whenever any filter or step parity row fails — this is the gate the
# release workflow consults before tagging.
#
# Triggers:
#   - Every push to main (so a regression on main is caught immediately).
#   - Every PR to main that touches code involved in parity.
#   - Manual dispatch for debugging.
#
# Security: the only workflow_dispatch input is the Okapi version, which
# is consumed exclusively via $OKAPI_VERSION (env), never inlined into
# `run:` strings.

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "cli/**"
      - "kapi/**"
      - "go.work"
      - "go.mod"
      - "go.sum"
      - "scripts/parity-sandbox.sh"
      - "Makefile"
      - ".github/workflows/parity.yml"
  pull_request:
    branches: [main]
    paths:
      - "core/**"
      - "cli/**"
      - "kapi/**"
      - "go.work"
      - "go.mod"
      - "go.sum"
      - "scripts/parity-sandbox.sh"
      - "Makefile"
      - ".github/workflows/parity.yml"
  workflow_dispatch:
    inputs:
      okapi_version:
        description: "Okapi Framework version to test against"
        required: false
        default: "1.48.0"

# Cancel superseded PR runs; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  parity:
    name: parity-test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OKAPI_VERSION: ${{ inputs.okapi_version || '1.48.0' }}
    steps:
      - name: Checkout neokapi
        uses: actions/checkout@v7
        with:
          path: neokapi
          fetch-depth: 0

      - name: Checkout okapi-bridge
        uses: actions/checkout@v7
        with:
          repository: neokapi/okapi-bridge
          path: okapi-bridge
          fetch-depth: 1

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: neokapi/go.mod

      - name: Install ICU dev libraries
        run: sudo apt-get update && sudo apt-get install -y libicu-dev pkg-config

      - name: Regenerate version-specific POM
        # The okapi-releases/<V>/pom.xml committed in okapi-bridge
        # references a stale parent version (e.g. 2.20.0-SNAPSHOT)
        # that drifts as the root POM is bumped. Regenerate it so the
        # parent reference matches the current root POM's version
        # (read from neokapi:okapi-bridge-parent at HEAD).
        working-directory: okapi-bridge
        run: make generate-pom V="$OKAPI_VERSION"

      - name: Install okapi-bridge parent POM into local Maven repo
        # The version-specific module declares neokapi:okapi-bridge-parent
        # as its parent POM. `mvn package` on the version module doesn't
        # walk up to install the parent first, so the build fails on CI
        # where ~/.m2 starts empty. Install the parent POM (-N: this
        # module only, no recursion) before running the version build.
        working-directory: okapi-bridge
        run: mvn -B install -N -DskipTests -q

      - name: Build okapi-bridge plugin tarball
        working-directory: okapi-bridge
        run: |
          make build V="$OKAPI_VERSION"
          make plugin-v2 V="$OKAPI_VERSION"

      - name: Run parity test suite
        working-directory: neokapi
        env:
          OKAPI_BRIDGE_REPO: ${{ github.workspace }}/okapi-bridge
        run: make parity-test

      - name: Route parity regressions by support tier (#850)
        # Additive routing on top of the parity gate above. Map the parity
        # report's failing rows to each format's declared support tier
        # (core/formats/support.yaml) and route by tier (format-maturity.md §1,
        # "enforcement direction"): a *Supported* format regression fails this
        # release-consulted job; Maintained/Available failures emit ::warning
        # annotations and a machine list (so a follow-on step can open issues)
        # but never fail.
        #
        # NO-OP TODAY: support.yaml declares zero Supported formats, so there is
        # no blocking condition and this step always passes. It becomes
        # load-bearing as the tier-review ritual promotes formats to Supported.
        #
        # The parity-test step above already over-delivers (it fails on any
        # parity row regardless of tier); this step adds only the tier
        # *distinction* the rubric requires. It runs on always() so it can
        # classify the report even when the parity gate failed. Route mode reads
        # only support.yaml `tier` + each spec.yaml `format:` and falls back to a
        # dependency-free parser when js-yaml is absent, so this single `node`
        # call is safe on this Go/Java runner (no node_modules).
        if: always()
        working-directory: neokapi
        run: |
          if [ ! -f .parity/test-comparison.json ]; then
            echo "::warning::no parity report at neokapi/.parity/test-comparison.json — skipping tier routing"
            exit 0
          fi
          node scripts/format-ops/check-support-gates.mjs --route .parity/test-comparison.json

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parity-test-comparison
          path: neokapi/.parity/test-comparison.json
          if-no-files-found: error
          retention-days: 90
