name: Bridge Filter Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # Nightly at 3 AM UTC
  push:
    tags:
      - "v*"

permissions:
  contents: read
  checks: write

jobs:
  test-bridge-filters:
    name: Bridge Filter Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify JDK
        run: java -version

      - name: Cache okapi-bridge JAR
        uses: actions/cache@v4
        with:
          path: ~/.cache/neokapi/bridge/
          key: okapi-bridge-v2.17.0-okapi1.48.0

      - name: Fetch okapi-bridge JAR
        run: |
          bash scripts/fetch-okapi-bridge.sh
          echo "NEOKAPI_BRIDGE_JAR=$HOME/.cache/neokapi/bridge/v2.17.0-okapi1.48.0/okapi-bridge.jar" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.NEOKAPI_GITHUB_TOKEN }}

      - name: Cache okapi test data
        uses: actions/cache@v4
        with:
          path: okapi-testdata/
          key: okapi-testdata-1.48.0-v4

      - name: Fetch okapi test data
        run: bash scripts/fetch-okapi-testdata.sh
        env:
          GITHUB_TOKEN: ${{ secrets.NEOKAPI_GITHUB_TOKEN }}

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Start shared bridge JVM pool
        run: |
          eval "$(bash scripts/start-bridge-pool.sh 4)"
          echo "NEOKAPI_BRIDGE_ADDRS=$NEOKAPI_BRIDGE_ADDRS" >> "$GITHUB_ENV"
          echo "BRIDGE_PIDS=$BRIDGE_PIDS" >> "$GITHUB_ENV"
          echo "Started 4 bridge JVMs: $NEOKAPI_BRIDGE_ADDRS"

      - name: Run bridge filter integration tests
        id: run-tests
        working-directory: framework
        run: go test -race -p 1 -tags=integration -count=1 -timeout 30m -json ./core/plugin/bridge/filters/... 2>&1 | bash ../scripts/go-test-progress.sh > ../test-results-bridge.json
        continue-on-error: true

      - name: Stop bridge JVM pool
        if: always()
        run: |
          for pid in $BRIDGE_PIDS; do
            kill "$pid" 2>/dev/null || true
          done

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in test-results-bridge.json -out junit-bridge.xml

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Bridge Filter Tests
          path: junit-bridge.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload bridge test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-bridge
          path: test-results-bridge.json
          retention-days: 7
