name: Deploy Ctrl

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]
    paths:
      - "bowrain/apps/ctrl/**"
      - "bowrain/packages/ui/**"

jobs:
  build:
    name: Build Ctrl Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-ui

      - name: Build ctrl app
        working-directory: bowrain/apps/ctrl
        run: vp run build

      - name: Upload ctrl artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ctrl-dist
          path: bowrain/apps/ctrl/dist
          retention-days: 7

  trigger-deploy:
    name: Trigger Deploy
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.NEOKAPI_GITHUB_TOKEN }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Deploy ctrl web assets
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          gh workflow run deploy-ctrl-web.yml \
            --repo neokapi/bowrain-infra \
            -f environment="$ENVIRONMENT" \
            -f runId="$RUN_ID"
