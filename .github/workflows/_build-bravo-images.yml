name: _Build Bravo Images

on:
  workflow_call:
    inputs:
      image-tag:
        description: "Image tag"
        required: true
        type: string

jobs:
  build:
    name: Build Bravo Agent & Sandbox Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push bravo-agent image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/bravo-agent/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bravo-agent:${{ inputs.image-tag }}
            ghcr.io/neokapi/bravo-agent:latest
          cache-from: type=gha,scope=bravo-agent
          cache-to: type=gha,mode=max,scope=bravo-agent

      - name: Build and push bravo-sandbox-node image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/bravo-sandbox-node/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bravo-sandbox-node:${{ inputs.image-tag }}
            ghcr.io/neokapi/bravo-sandbox-node:latest
          cache-from: type=gha,scope=bravo-sandbox-node
          cache-to: type=gha,mode=max,scope=bravo-sandbox-node

      - name: Build and push bravo-sandbox-python image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/bravo-sandbox-python/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bravo-sandbox-python:${{ inputs.image-tag }}
            ghcr.io/neokapi/bravo-sandbox-python:latest
          cache-from: type=gha,scope=bravo-sandbox-python
          cache-to: type=gha,mode=max,scope=bravo-sandbox-python
