name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared UI package
        working-directory: packages/ui
        run: npx tsc

      - name: Run UI unit tests
        working-directory: packages/ui
        run: npm test

      - name: Build SaaS web UI
        working-directory: bowrain/apps/web
        run: npm run build

      - name: Build kapi web UI
        working-directory: bowrain/apps/kapi-web
        run: npm run build

      - name: Create Bowrain frontend placeholder
        run: mkdir -p bowrain/apps/bowrain/frontend/dist && echo placeholder > bowrain/apps/bowrain/frontend/dist/index.html

      - name: Download modules
        run: |
          go mod download && go mod verify
          cd platform && go mod download && go mod verify
          cd ../kapi && go mod download && go mod verify
          cd ../bowrain && go mod download && go mod verify

      - name: Reset go.work.sum
        run: git checkout -- go.work.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/gokapi/bowrain-server:${{ steps.version.outputs.VERSION }}
            ghcr.io/gokapi/bowrain-server:latest

  build-bowrain:
    name: Build Bowrain (${{ matrix.build.platform }})
    strategy:
      fail-fast: false
      matrix:
        build:
          - { platform: linux/amd64, os: ubuntu-latest }
          - { platform: windows/amd64, os: windows-latest }
          - { platform: darwin/universal, os: macos-latest }
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared UI package
        working-directory: packages/ui
        run: npx tsc

      # Build frontend and assets manually to avoid Wails Taskfile running
      # `npm install` which conflicts with the workspace npm ci above.
      - name: Generate Wails bindings
        working-directory: bowrain/apps/bowrain
        shell: bash
        run: |
          go mod tidy
          wails3 generate bindings -f '-tags production -trimpath -buildvcs=false -ldflags="-w -s"' -clean=true
          # shellcheck disable=SC2016
          sed -i.bak 's/= $0\./= store$0./g' frontend/bindings/github.com/gokapi/gokapi/bowrain/apps/bowrain/backend/app.js
          rm -f frontend/bindings/github.com/gokapi/gokapi/bowrain/apps/bowrain/backend/app.js.bak

      - name: Build Bowrain frontend
        working-directory: bowrain/apps/bowrain/frontend
        run: npm run build

      - name: Generate icons
        working-directory: bowrain/apps/bowrain/build
        run: wails3 generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico

      - name: Generate Windows resources
        if: runner.os == 'Windows'
        working-directory: bowrain/apps/bowrain
        shell: bash
        run: wails3 generate syso -arch amd64 -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_amd64.syso

      - name: Build Bowrain (Linux)
        if: runner.os == 'Linux'
        working-directory: bowrain/apps/bowrain
        env:
          GOOS: linux
          CGO_ENABLED: "1"
        run: go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/Bowrain

      - name: Build Bowrain (Windows)
        if: runner.os == 'Windows'
        working-directory: bowrain/apps/bowrain
        shell: bash
        env:
          GOOS: windows
          CGO_ENABLED: "0"
        run: |
          go build -tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui" -o bin/Bowrain.exe
          rm -f ./*.syso

      - name: Build Bowrain (macOS universal)
        if: runner.os == 'macOS'
        working-directory: bowrain/apps/bowrain
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-mmacosx-version-min=10.15"
          CGO_LDFLAGS: "-mmacosx-version-min=10.15"
          MACOSX_DEPLOYMENT_TARGET: "10.15"
        run: |
          GOOS=darwin GOARCH=arm64 go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/Bowrain-arm64
          GOOS=darwin GOARCH=amd64 go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/Bowrain-amd64
          lipo -create -output bin/Bowrain bin/Bowrain-amd64 bin/Bowrain-arm64
          rm bin/Bowrain-amd64 bin/Bowrain-arm64

      - name: Create macOS .app bundle
        if: runner.os == 'macOS'
        working-directory: bowrain/apps/bowrain
        run: |
          mkdir -p bin/Bowrain.app/Contents/MacOS
          mkdir -p bin/Bowrain.app/Contents/Resources
          cp build/darwin/icons.icns bin/Bowrain.app/Contents/Resources
          cp bin/Bowrain bin/Bowrain.app/Contents/MacOS
          cp build/darwin/Info.plist bin/Bowrain.app/Contents

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # macOS: Import Developer ID certificate for code signing
      - name: Import signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "No signing certificate configured — will use ad-hoc signing"
            exit 0
          fi
          # Decode certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Clean up certificate file
          rm /tmp/certificate.p12

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # macOS: Sign with Developer ID or ad-hoc fallback
      - name: Sign macOS app bundle
        if: runner.os == 'macOS'
        working-directory: bowrain/apps/bowrain
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          if [ -n "$APPLE_SIGN_IDENTITY" ]; then
            echo "Signing with Developer ID: $APPLE_SIGN_IDENTITY"
            codesign --force --deep --options runtime \
              --entitlements build/darwin/entitlements.plist \
              --sign "$APPLE_SIGN_IDENTITY" \
              bin/Bowrain.app
          else
            echo "No APPLE_SIGN_IDENTITY set — using ad-hoc signing"
            codesign --force --deep --sign - bin/Bowrain.app
          fi

      # macOS: Create DMG (output to repo root for upload step)
      - name: Create DMG
        if: runner.os == 'macOS'
        working-directory: bowrain/apps/bowrain
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p dmg
          cp -R bin/Bowrain.app dmg/
          ln -s /Applications dmg/Applications
          hdiutil create \
            -volname "Bowrain v${VERSION}" \
            -srcfolder dmg \
            -ov \
            -format UDZO \
            "../../../bowrain-${VERSION}-macOS-universal.dmg"

      # macOS: Sign DMG with Developer ID if available
      - name: Sign DMG
        if: runner.os == 'macOS'
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG="bowrain-${VERSION}-macOS-universal.dmg"
          if [ -n "$APPLE_SIGN_IDENTITY" ]; then
            codesign --force --sign "$APPLE_SIGN_IDENTITY" "$DMG"
          fi

      # macOS: Notarize DMG with Apple
      - name: Notarize DMG
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ -z "$APPLE_ID" ]; then
            echo "No APPLE_ID set — skipping notarization"
            exit 0
          fi
          DMG="bowrain-${VERSION}-macOS-universal.dmg"
          echo "Submitting $DMG for notarization..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m
          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG"

      # macOS: Clean up keychain
      - name: Clean up signing keychain
        if: always() && runner.os == 'macOS'
        env:
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Upload DMG to release
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-macOS-universal.dmg"

      # Windows: Create ZIP
      - name: Create ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "bowrain/apps/bowrain/bin/Bowrain.exe" -DestinationPath "bowrain-${{ steps.version.outputs.VERSION }}-windows-amd64.zip"

      - name: Upload ZIP to release
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-windows-amd64.zip"

      # Linux: Create tarball
      - name: Create tarball
        if: runner.os == 'Linux'
        run: |
          tar -czf "bowrain-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz" \
            -C bowrain/apps/bowrain/bin Bowrain

      - name: Upload tarball to release
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz"

  update-bowrain-cask:
    name: Update Bowrain Cask
    runs-on: ubuntu-latest
    needs: build-bowrain
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Bowrain DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "bowrain-*-macOS-universal.dmg"

      - name: Compute checksum
        id: checksum
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "BOWRAIN_DMG=$(sha256sum bowrain-${VERSION}-macOS-universal.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: gokapi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update bowrain cask
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA_BOWRAIN: ${{ steps.checksum.outputs.BOWRAIN_DMG }}
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/bowrain.rb << CASK
          # Use absolute tap path so the require works even when Homebrew loads
          # the cask from its metadata cache during upgrades.
          require "#{Tap.fetch("gokapi", "tap").path}/lib/private_download_strategy"

          cask "bowrain" do
            version "${VERSION}"
            sha256 "${SHA_BOWRAIN}"

            url "https://github.com/gokapi/gokapi/releases/download/v#{version}/bowrain-#{version}-macOS-universal.dmg",
                using: GitHubPrivateRepositoryReleaseDownloadStrategy
            name "Bowrain"
            desc "AI-native translation editor"
            homepage "https://github.com/gokapi/gokapi"

            depends_on formula: "gokapi/tap/bowrain-cli"

            app "Bowrain.app"

            postflight do
              system_command "/usr/bin/xattr",
                            args: ["-dr", "com.apple.quarantine", "#{appdir}/Bowrain.app"],
                            sudo: false
            end

            caveats <<~EOS
              The bowrain CLI is provided by the bowrain-cli formula (installed
              automatically). Run "bowrain ui" to launch the desktop app.
            EOS

            zap trash: [
              "~/Library/Application Support/Bowrain",
              "~/Library/Preferences/com.wails.bowrain.plist",
              "~/Library/Caches/Bowrain",
            ]
          end
          CASK

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/bowrain.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update bowrain cask to ${{ steps.version.outputs.VERSION }}" && git push
          fi
