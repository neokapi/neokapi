name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - name: Run tests
        run: go test ./ai/... ./cmd/... ./mt/... ./core/... ./examples/... ./formats/... ./internal/... ./lib/... ./plugin/...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  build-bowrain:
    name: Build Bowrain (${{ matrix.build.platform }})
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        build:
          - { platform: linux/amd64, os: ubuntu-latest }
          - { platform: windows/amd64, os: windows-latest }
          - { platform: darwin/universal, os: macos-latest }
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        working-directory: apps/bowrain/frontend
        run: npm install

      - name: Build Bowrain
        if: runner.os != 'macOS'
        working-directory: apps/bowrain
        run: wails3 build

      - name: Package Bowrain (macOS universal)
        if: runner.os == 'macOS'
        working-directory: apps/bowrain
        run: wails3 task darwin:package:universal

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # macOS: Install CLI launcher into .app bundle and create DMG
      - name: Install CLI launcher
        if: runner.os == 'macOS'
        working-directory: apps/bowrain
        run: |
          mkdir -p bin/Bowrain.app/Contents/Resources/bin
          cp resources/bowrain-launcher.sh bin/Bowrain.app/Contents/Resources/bin/bowrain
          chmod +x bin/Bowrain.app/Contents/Resources/bin/bowrain

      - name: Re-sign after adding launcher
        if: runner.os == 'macOS'
        working-directory: apps/bowrain
        run: codesign --force --deep --sign - bin/Bowrain.app

      - name: Create DMG
        if: runner.os == 'macOS'
        working-directory: apps/bowrain
        run: |
          mkdir -p dmg
          cp -R bin/Bowrain.app dmg/
          ln -s /Applications dmg/Applications
          hdiutil create \
            -volname "Bowrain v${{ steps.version.outputs.VERSION }}" \
            -srcfolder dmg \
            -ov \
            -format UDZO \
            "../../bowrain-${{ steps.version.outputs.VERSION }}-macOS-universal.dmg"

      - name: Upload DMG to release
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v1
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-macOS-universal.dmg"

      # Windows: Create ZIP
      - name: Create ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "apps/bowrain/bin/Bowrain.exe" -DestinationPath "bowrain-${{ steps.version.outputs.VERSION }}-windows-amd64.zip"

      - name: Upload ZIP to release
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v1
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-windows-amd64.zip"

      # Linux: Create tarball
      - name: Create tarball
        if: runner.os == 'Linux'
        run: |
          tar -czf "bowrain-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz" \
            -C apps/bowrain/bin Bowrain

      - name: Upload tarball to release
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v1
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz"

  update-bowrain-cask:
    name: Update Bowrain Cask
    runs-on: ubuntu-latest
    needs: build-bowrain
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Bowrain DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "bowrain-*-macOS-universal.dmg"

      - name: Compute checksum
        id: checksum
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "BOWRAIN_DMG=$(sha256sum bowrain-${VERSION}-macOS-universal.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: gokapi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update bowrain cask
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA_BOWRAIN: ${{ steps.checksum.outputs.BOWRAIN_DMG }}
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/bowrain.rb << CASK
          # Use absolute tap path so the require works even when Homebrew loads
          # the cask from its metadata cache during upgrades.
          require "#{Tap.fetch("gokapi", "tap").path}/lib/private_download_strategy"

          cask "bowrain" do
            version "${VERSION}"
            sha256 "${SHA_BOWRAIN}"

            url "https://github.com/gokapi/gokapi/releases/download/v#{version}/bowrain-#{version}-macOS-universal.dmg",
                using: GitHubPrivateRepositoryReleaseDownloadStrategy
            name "Bowrain"
            desc "AI-native translation editor"
            homepage "https://github.com/gokapi/gokapi"

            app "Bowrain.app"
            binary "Bowrain.app/Contents/Resources/bin/bowrain", target: "bowrain"

            postflight do
              system_command "/usr/bin/xattr",
                            args: ["-dr", "com.apple.quarantine", "#{appdir}/Bowrain.app"],
                            sudo: false
            end

            caveats <<~EOS
              If Bowrain.app was previously installed from a DMG, run:
                brew install --cask --force gokapi/tap/bowrain
              to let Homebrew manage it. Future upgrades will work normally.
            EOS

            zap trash: [
              "~/Library/Application Support/Bowrain",
              "~/Library/Preferences/com.wails.bowrain.plist",
              "~/Library/Caches/Bowrain",
            ]
          end
          CASK

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/bowrain.rb
          git diff --cached --quiet && echo "No changes to commit" || \
            (git commit -m "Update bowrain cask to ${{ steps.version.outputs.VERSION }}" && git push)
