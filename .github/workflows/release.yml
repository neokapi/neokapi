name: Release

on:
  push:
    tags:
      # CLI/desktop version tags only (v1.2.3). Must NOT be the broad "v*", which
      # also matches plugin tags that begin with a "v" — notably "vision-v*" and
      # the "vision-models-*" asset tag — and would wrongly trigger a full
      # CLI+desktop release. Plugins release via their own release-<plugin>.yml.
      - "v[0-9]*"

permissions:
  contents: write
  packages: write
  # cosign keyless requires a fresh GitHub Actions OIDC token to mint a
  # short-lived Fulcio cert for signing the kapi-bowrain plugin tarball.
  id-token: write

jobs:
  # Verify the parity workflow (#448) succeeded for the tagged commit
  # before any release artifact is built or published. Parity runs on
  # every push to main, so the result is normally already cached by the
  # time a release tag is pushed.
  #
  # If parity has not run for the tagged commit (e.g. the commit only
  # touched paths excluded from the parity workflow's paths-filter),
  # this gate fails closed: pre-release work for #448 explicitly
  # requires the parity report to be fresh for every release.
  parity-gate:
    name: Parity Gate (#448)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Verify parity workflow status for tagged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Looking up parity workflow status for ${REPO}@${SHA}..."
          # Consider ALL parity runs for this commit, not just the most recent:
          # the gate passes if ANY of them succeeded. This is robust to a second
          # (e.g. manually-dispatched) parity run being in-flight or failed while
          # an earlier run already passed for the same SHA — picking only
          # workflow_runs[0] would spuriously block the release.
          runs=$(gh api \
            "repos/${REPO}/actions/workflows/parity.yml/runs?head_sha=${SHA}&per_page=50" \
            --jq '[.workflow_runs[] | .status+":"+(.conclusion//"none")]')
          echo "Parity runs for ${SHA}: ${runs}"
          successes=$(echo "$runs" | grep -c '"completed:success"' || true)
          inflight=$(echo "$runs" | grep -cE '"(queued|in_progress|requested|waiting|pending):' || true)
          if [ "$successes" -gt 0 ]; then
            echo "Parity gate passed (a successful parity run exists for ${SHA})."
          elif [ "$inflight" -gt 0 ]; then
            echo "::error::Parity is still running for ${SHA} and none has succeeded yet. Wait for it to finish, then re-run this job."
            exit 1
          else
            echo "::error::No successful parity run for ${SHA}. Run parity.yml against this commit (it succeeds on push for core changes; otherwise 'gh workflow run parity.yml --ref main') before releasing."
            exit 1
          fi

  # Build the CLI binaries (kapi + kapi-bowrain) natively per OS/arch with
  # cgo + statically-linked ICU + the fts5 tag, so they match the framework the
  # desktop apps use (native mattn SQLite + ICU FTS5 tokenizer + UAX-29). cgo
  # rules out single-runner cross-compilation, so each target builds on its own
  # native runner and uploads the binaries as artifacts; the package-cli job
  # below archives/checksums/signs them and publishes the brew formulae.
  #
  # ICU provisioning differs per OS (see the per-OS steps): brew on macOS,
  # built-from-source (PIC, static) on Linux, MSYS2 mingw on Windows. All feed
  # scripts/gen-icu-static-pc.sh, which forces static linking.
  #
  # NOTE: this matrix is new and only macOS has been validated locally; the
  # Linux (source ICU + PIE/PIC) and Windows (MSYS2 mingw, -static C++ runtime,
  # ICU archive names) legs are expected to need CI iteration.
  build-cli:
    name: Build CLI (${{ matrix.target.goos }}/${{ matrix.target.goarch }})
    needs: parity-gate
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: darwin, goarch: arm64, os: macos-latest, icu: brew }
          # macOS is Apple-Silicon only (matches the desktop apps); Intel mac is
          # not a priority target.
          - { goos: linux, goarch: amd64, os: ubuntu-latest, icu: source }
          - { goos: linux, goarch: arm64, os: ubuntu-24.04-arm, icu: source }
          # Windows ICU comes from MSYS2: x86_64 uses the gcc MINGW64 env, arm64
          # uses the clang CLANGARM64 env on a native windows-11-arm runner.
          - { goos: windows, goarch: amd64, os: windows-2025, icu: msys2, msystem: MINGW64, mtriple: x86_64, cc: gcc, cgo_ldflags: "-static -static-libgcc -static-libstdc++", mroot: /mingw64 }
          - { goos: windows, goarch: arm64, os: windows-11-arm, icu: msys2, msystem: CLANGARM64, mtriple: clang-aarch64, cc: clang, cgo_ldflags: "-static", mroot: /clangarm64 }
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Compute build metadata
        id: meta
        shell: bash
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "LDFLAGS=-s -w -X github.com/neokapi/neokapi/core/version.Version=${VERSION} -X github.com/neokapi/neokapi/core/version.Commit=${GH_SHA::7} -X github.com/neokapi/neokapi/core/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X main.pluginVersion=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create //go:embed placeholders
        shell: bash
        run: |
          mkdir -p bowrain/apps/bowrain/frontend/dist && touch bowrain/apps/bowrain/frontend/dist/placeholder
          mkdir -p apps/kapi-desktop/frontend/dist && touch apps/kapi-desktop/frontend/dist/placeholder

      # ---- ICU provisioning (sets PKG_CONFIG_PATH for the static .pc) ----
      - name: Provision static ICU (macOS)
        if: matrix.target.goos == 'darwin'
        run: |
          brew install pkg-config icu4c@78
          PCDIR=$(bash scripts/gen-icu-static-pc.sh)
          {
            echo "PKG_CONFIG_PATH=${PCDIR}"
            echo "MACOSX_DEPLOYMENT_TARGET=11.0"
          } >> "$GITHUB_ENV"

      - name: Provision static ICU (Linux, from source)
        if: matrix.target.goos == 'linux'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential pkg-config curl
          ICU_PREFIX=$(bash scripts/build-icu-static.sh /opt/icu-static)
          PCDIR=$(ICU_PREFIX="$ICU_PREFIX" bash scripts/gen-icu-static-pc.sh)
          echo "PKG_CONFIG_PATH=${PCDIR}" >> "$GITHUB_ENV"

      # ---- Build (macOS / Linux) ----
      - name: Build kapi + kapi-bowrain (macOS / Linux)
        if: matrix.target.goos != 'windows'
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "1"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          set -euo pipefail
          mkdir -p out
          ( cd kapi && go build -tags fts5 -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o ../out/kapi ./cmd/kapi )
          ( cd bowrain/cli && go build -tags fts5 -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o ../../out/kapi-bowrain ./cmd/kapi-bowrain )

      # ---- Build (Windows, MSYS2 mingw + static ICU) ----
      - name: Set up MSYS2 (Windows)
        if: matrix.target.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.target.msystem }}
          # inherit so the Windows-native `go` (from setup-go) is on the msys2
          # shell's PATH alongside the mingw toolchain/pkg-config.
          path-type: inherit
          install: >-
            mingw-w64-${{ matrix.target.mtriple }}-${{ matrix.target.cc }}
            mingw-w64-${{ matrix.target.mtriple }}-icu
            mingw-w64-${{ matrix.target.mtriple }}-pkg-config

      - name: Build kapi + kapi-bowrain (Windows)
        if: matrix.target.goos == 'windows'
        shell: msys2 {0}
        env:
          GOOS: windows
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "1"
          # Static C++/toolchain runtimes so kapi.exe needs no mingw DLLs beside it.
          CGO_LDFLAGS: ${{ matrix.target.cgo_ldflags }}
          CC: ${{ matrix.target.cc }}
          MROOT: ${{ matrix.target.mroot }}
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          set -euo pipefail
          # go from the Windows runner (setup-go) is on PATH; CC = mingw/clang cc.
          export CC
          # mingw ICU lives under $MROOT, but the native cc/ld can't open MSYS
          # virtual paths ($MROOT/...). Feed gen-icu-static-pc.sh Windows-form
          # paths (cygpath -m) so the .pc references archives ld can open, and
          # convert the generated .pc dir for the (native) pkg-config too.
          PCDIR=$(ICU_LIBDIR="$(cygpath -m "$MROOT/lib")" ICU_INCLUDEDIR="$(cygpath -m "$MROOT/include")" bash scripts/gen-icu-static-pc.sh)
          export PKG_CONFIG_PATH="$(cygpath -m "$PCDIR")"
          mkdir -p out
          ( cd kapi && go build -tags fts5 -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o ../out/kapi.exe ./cmd/kapi )
          ( cd bowrain/cli && go build -tags fts5 -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o ../../out/kapi-bowrain.exe ./cmd/kapi-bowrain )

      # ---- Sign the macOS kapi binary (quill: Developer ID + notarize) ----
      - name: Sign + notarize kapi (macOS)
        if: matrix.target.goos == 'darwin'
        env:
          QUILL_SIGN_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          QUILL_NOTARY_KEY: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          QUILL_NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          QUILL_NOTARY_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          curl -sSfL https://get.anchore.io/quill | sudo sh -s -- -b /usr/local/bin v0.7.1
          IS_SNAPSHOT=false
          [ -z "${QUILL_SIGN_P12:-}" ] && IS_SNAPSHOT=true
          bash scripts/quill-sign-darwin.sh out/kapi darwin "$IS_SNAPSHOT"

      # ---- Upload binaries for the package-cli job ----
      - name: Upload CLI binaries
        uses: actions/upload-artifact@v7
        with:
          name: cli-bins-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: out/*
          retention-days: 14

      # Windows kapi.exe is published out of band (Authenticode-signed locally
      # with Certum, scripts/publish-windows-signed.sh) — keep its zip artifact.
      # git-bash on the Windows runner has no `zip`; use PowerShell's
      # Compress-Archive (as the desktop Windows zip steps do).
      - name: Package Windows kapi CLI zip (out-of-band signing)
        if: matrix.target.goos == 'windows'
        shell: pwsh
        run: Compress-Archive -Path out/kapi.exe -DestinationPath "out/kapi_${{ steps.meta.outputs.VERSION }}_windows_${{ matrix.target.goarch }}.zip" -Force
      - name: Upload Windows kapi zip
        if: matrix.target.goos == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: kapi-cli-windows-${{ matrix.target.goarch }}
          path: out/kapi_*_windows_${{ matrix.target.goarch }}.zip
          retention-days: 14

  # Package + publish the CLI binaries built by build-cli. This replaces the
  # former GoReleaser job: GoReleaser OSS can't consume externally-built (cgo +
  # static-ICU) binaries (`builder: prebuilt` is Pro only), so we reproduce its
  # CLI outputs directly — archives, checksums, cosign signatures for the
  # kapi-bowrain plugin tarballs, the kapi-cli/bowrain-cli brew formulae, and
  # the GitHub release upload — using the same artifact names downstream
  # consumers (formulae, docs, plugin registry) already expect.
  package-cli:
    name: Package + publish CLI
    needs: [parity-gate, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      # Release gate: shared UI must type-check + pass unit tests (previously
      # run inside the GoReleaser job).
      - uses: ./.github/actions/setup-node-ui
      # The shared UI imports @neokapi/kapi-react/runtime (a built ./dist subpath
      # export, not committed), so build kapi-react before the type-check/tests.
      - name: Build @neokapi/kapi-react
        working-directory: packages/kapi-react
        run: vp run build
      - name: Type-check shared UI package
        working-directory: bowrain/packages/ui
        run: vp check --no-fmt --no-lint
      - name: Run UI unit tests
        working-directory: bowrain/packages/ui
        run: vp test

      - name: Install cosign (for kapi-bowrain plugin signing)
        uses: sigstore/cosign-installer@v3

      - name: Download CLI binaries
        uses: actions/download-artifact@v8
        with:
          pattern: cli-bins-*
          path: cli-artifacts

      - name: Package archives + checksums
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/package-cli.sh "$VERSION" cli-artifacts dist \
            bowrain/cli/cmd/kapi-bowrain/manifest.json

      # Keyless cosign signature (sigstore bundle) for the kapi-bowrain plugin
      # tarballs (kapi's plugin-install verifier requires it) AND the kapi CLI
      # archives (so `kapi update` can verify a self-replace — see
      # cli/selfupdate). Mirrors the former GoReleaser `signs` block.
      - name: Sign CLI archives (cosign)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          shopt -s nullglob
          for a in dist/kapi_*.tar.gz dist/kapi-bowrain_*.tar.gz dist/kapi-bowrain_*.zip; do
            cosign sign-blob --yes --new-bundle-format=true \
              --bundle "${a}.sigstore.json" "$a"
          done

      # Channel is tag-driven: a full tag (v1.2.0) feeds the `stable` channel; a
      # prerelease tag (v1.2.0-rc.1, v1.2.0-beta.1, …) feeds the `beta` fast
      # track. Stable formulae are kapi-cli/bowrain-cli; beta formulae are the
      # @beta variants so the two tracks install side by side.
      - name: Resolve release channel
        id: channel
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$REF_NAME" in
            *-*) echo "channel=beta" >> "$GITHUB_OUTPUT" ;;
            *)   echo "channel=stable" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Generate brew formulae
        env:
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/gen-brew-formula.sh "$VERSION" "${{ github.repository }}" \
            dist/checksums.txt brew-formulae "$CHANNEL"

      - name: Publish CLI archives to release
        uses: softprops/action-gh-release@v3
        with:
          # Prerelease tags (vX.Y.Z-rcN) produce a GitHub *prerelease* with
          # downloadable assets but skip every live-channel write below.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/kapi_*.tar.gz
            dist/kapi-bowrain_*.tar.gz
            dist/kapi-bowrain_*.zip
            dist/*.sigstore.json
            dist/checksums.txt
          body: |
            ## Installation

            **Homebrew (kapi CLI, Apache-2.0, no plugins):**
            ```
            brew install neokapi/tap/kapi-cli
            ```

            **Homebrew (kapi + bowrain plugin):**
            ```
            brew install neokapi/tap/bowrain-cli
            ```

            **Homebrew (Kapi desktop app, macOS):**
            ```
            brew install --cask neokapi/tap/kapi
            ```

            **Homebrew (Bowrain desktop app, macOS):**
            ```
            brew install --cask neokapi/tap/bowrain
            ```

      # Push the generated formulae (stable: kapi-cli/bowrain-cli; beta: the
      # @beta variants) to the tap. Both stable and prerelease tags publish —
      # only the formula names and channel differ.
      - name: Push brew formulae to homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/neokapi/homebrew-tap.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp brew-formulae/*.rb /tmp/tap/Formula/
          cd /tmp/tap
          git config user.email "release-bot@neokapi.dev"
          git config user.name "release-bot"
          git add Formula/*.rb
          if ! git diff --staged --quiet; then
            git commit -m "kapi-cli + bowrain-cli ${VERSION} (${CHANNEL})"
            git push
          fi

      # Push the new kapi-bowrain plugin version into the manifest-plugins
      # registry so `kapi plugin install bowrain` resolves to this build.
      # Includes cosign signature URLs + cert-identity so kapi's verifier
      # can validate the install (signatures are mandatory unless --unsafe).
      - name: Update manifest plugin registry
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          if [ -z "${REGISTRY_TOKEN:-}" ]; then
            echo "REGISTRY_TOKEN not set; skipping registry update"
            exit 0
          fi

          GOBIN=/tmp go install github.com/neokapi/registry/tools/registry-update@main

          declare -A SHAS
          while IFS= read -r line; do
            sum=$(echo "$line" | awk '{print $1}')
            file=$(echo "$line" | awk '{print $2}')
            SHAS[$file]=$sum
          done < dist/checksums.txt

          REPO_URL="https://github.com/${REPO}/releases/download/${REF_NAME}"
          CERT_ID="https://github.com/${REPO}/.github/workflows/release.yml@refs/tags/${REF_NAME}"
          RELEASED="$(date -u +%Y-%m-%d)"
          ISSUER="https://token.actions.githubusercontent.com"

          # Build per-platform args for a given archive prefix (kapi-bowrain or
          # kapi). The kapi CLI ships the same darwin/linux platforms as the
          # plugin (Windows kapi is signed + published out of band, so it is not
          # yet in the self-update index).
          build_args() {
            local prefix="$1"; shift
            CLI_ARGS=()
            for plat in "$@"; do
              local os=${plat%/*} arch=${plat#*/}
              local file="${prefix}_${VERSION}_${os}_${arch}.tar.gz"
              if [ -n "${SHAS[$file]:-}" ]; then
                CLI_ARGS+=(
                  "--platform" "$plat"
                  "--url" "${REPO_URL}/${file}"
                  "--sha256" "${SHAS[$file]}"
                  "--signature" "${REPO_URL}/${file}.sigstore.json"
                )
              fi
            done
          }

          git clone "https://x-access-token:${REGISTRY_TOKEN}@github.com/neokapi/registry.git" /tmp/registry

          # --- bowrain plugin → manifest-plugins.json ---
          build_args kapi-bowrain darwin/arm64 linux/arm64 linux/amd64
          /tmp/registry-update \
            --registry /tmp/registry/manifest-plugins.json \
            --plugin bowrain \
            --version "$VERSION" \
            --channel "$CHANNEL" \
            --released "$RELEASED" \
            --cert-identity "$CERT_ID" \
            --cert-oidc-issuer "$ISSUER" \
            "${CLI_ARGS[@]}"

          # --- kapi CLI → cli.json (drives `kapi update` self-replace) ---
          # Seed the index on first use; registry-update needs valid JSON.
          [ -f /tmp/registry/cli.json ] || echo '{"schema":"v2","plugins":{}}' > /tmp/registry/cli.json
          build_args kapi darwin/arm64 linux/arm64 linux/amd64
          /tmp/registry-update \
            --registry /tmp/registry/cli.json \
            --plugin kapi \
            --version "$VERSION" \
            --channel "$CHANNEL" \
            --released "$RELEASED" \
            --cert-identity "$CERT_ID" \
            --cert-oidc-issuer "$ISSUER" \
            "${CLI_ARGS[@]}"

          cd /tmp/registry
          git config user.email "release-bot@neokapi.dev"
          git config user.name "release-bot"
          git add manifest-plugins.json cli.json
          if ! git diff --staged --quiet; then
            git commit -m "Register bowrain + kapi ${VERSION} (${CHANNEL})"
            git push
          fi

  docker:
    name: Docker (${{ matrix.image }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: package-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: bowrain-server, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bowrain-server, arch: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64 }
          - { image: bowrain-worker, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bowrain-worker, arch: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64 }
          - { image: bowrain-web, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bowrain-web, arch: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64 }
          - { image: bravo-agent, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bravo-sandbox-node, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - {
              image: bravo-sandbox-python,
              arch: amd64,
              runner: ubuntu-latest,
              platform: linux/amd64,
            }
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "VERSION=${GITHUB_REF_NAME#v}"
            echo "COMMIT=${GH_SHA::7}"
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/${{ matrix.image }}/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/neokapi/${{ matrix.image }}:${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            COMMIT=${{ steps.version.outputs.COMMIT }}
            BUILD_DATE=${{ steps.version.outputs.BUILD_DATE }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

  docker-manifest:
    name: Docker Manifests
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform manifests
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          for IMAGE in bowrain-server bowrain-worker bowrain-web; do
            docker buildx imagetools create \
              -t "ghcr.io/neokapi/$IMAGE:$VERSION" \
              -t "ghcr.io/neokapi/$IMAGE:latest" \
              "ghcr.io/neokapi/$IMAGE:$VERSION-amd64" \
              "ghcr.io/neokapi/$IMAGE:$VERSION-arm64"
          done

      - name: Tag bravo images (amd64 only)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          for IMAGE in bravo-agent bravo-sandbox-node bravo-sandbox-python; do
            docker buildx imagetools create \
              -t "ghcr.io/neokapi/$IMAGE:$VERSION" \
              -t "ghcr.io/neokapi/$IMAGE:latest" \
              "ghcr.io/neokapi/$IMAGE:$VERSION-amd64"
          done

  docker-keycloak:
    name: Docker (bowrain-keycloak)
    runs-on: ubuntu-latest
    needs: package-cli
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-ui

      # The keycloak theme bundles @neokapi/ui, which imports
      # @neokapi/kapi-react/runtime (a built ./dist subpath export). Build
      # kapi-react first so the theme's vite build resolves it.
      - name: Build @neokapi/kapi-react
        working-directory: packages/kapi-react
        run: vp run build

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Keycloak theme
        run: make -C bowrain keycloak-theme

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push keycloak image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/keycloak/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bowrain-keycloak:${{ steps.version.outputs.VERSION }}
            ghcr.io/neokapi/bowrain-keycloak:${{ github.sha }}
            ghcr.io/neokapi/bowrain-keycloak:latest
          cache-from: type=gha,scope=bowrain-keycloak
          cache-to: type=gha,mode=max,scope=bowrain-keycloak

  build-bowrain:
    name: Build Bowrain (${{ matrix.build.platform }})
    needs: parity-gate
    strategy:
      fail-fast: false
      matrix:
        build:
          - { platform: linux/amd64, os: ubuntu-latest, arch: amd64 }
          - { platform: linux/arm64, os: ubuntu-24.04-arm, arch: arm64 }
          # Windows ICU comes from MSYS2: x86_64 uses the gcc MINGW64 env, arm64
          # uses the clang CLANGARM64 env on a native windows-11-arm runner.
          - { platform: windows/amd64, os: windows-2025, arch: amd64, msystem: MINGW64, mtriple: x86_64, cc: gcc, cgo_ldflags: "-static -static-libgcc -static-libstdc++", mroot: /mingw64 }
          - { platform: windows/arm64, os: windows-11-arm, arch: arm64, msystem: CLANGARM64, mtriple: clang-aarch64, cc: clang, cgo_ldflags: "-static", mroot: /clangarm64 }
          - { platform: darwin/arm64, os: macos-latest, arch: arm64 }
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - uses: ./.github/actions/setup-node-ui

      - name: Compute build metadata
        id: meta
        shell: bash
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "VERSION=${GITHUB_REF_NAME#v}"
            echo "COMMIT=${GH_SHA::7}"
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "LDFLAGS=-w -s -X github.com/neokapi/neokapi/core/version.Version=${GITHUB_REF_NAME#v} -X github.com/neokapi/neokapi/core/version.Commit=${GH_SHA::7} -X github.com/neokapi/neokapi/core/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev build-essential curl pkg-config
          # Statically link our ICU usage (FTS5 tokenizer + UAX-29) so the
          # distributed Linux binary doesn't bind to the build host's libicu
          # major version. Built PIC + from source, same as the CLI. GTK/WebKit
          # still load the system libicu at runtime — that's their own, separate,
          # version-suffixed dependency and does not clash with our static copy.
          ICU_PREFIX=$(bash scripts/build-icu-static.sh /opt/icu-static)
          PCDIR=$(ICU_PREFIX="$ICU_PREFIX" bash scripts/gen-icu-static-pc.sh)
          echo "PKG_CONFIG_PATH=${PCDIR}" >> "$GITHUB_ENV"

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config
          # macOS ships ICU at /usr/lib/libicucore.dylib, but no headers and no
          # versioned symbols. Install icu4c (keg-only) for its headers + static
          # archives.
          brew install icu4c
          # Force STATIC ICU linking. A distributed/notarized .app must not
          # depend on a Homebrew icu dylib: it is absent on users' machines, and
          # even when present its code signature has a different Team ID than the
          # notarized app, so dyld aborts at launch (SIGABRT before main). The
          # override .pc files link libicu*.a by absolute path instead, leaving
          # only the Apple-signed /usr/lib/libc++.1.dylib at runtime.
          # See scripts/gen-icu-static-pc.sh.
          PCDIR=$(bash scripts/gen-icu-static-pc.sh)
          {
            echo "PKG_CONFIG_PATH=${PCDIR}"
            echo "CPPFLAGS=-I$(brew --prefix icu4c)/include"
          } >> "$GITHUB_ENV"

      # Windows: mingw toolchain + static ICU for the cgo build step below.
      # (Bindings generation stays CGO=0 — it reflects the app's service API,
      # which doesn't depend on cgo — so only the final build needs this.)
      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.build.msystem }}
          path-type: inherit
          install: >-
            mingw-w64-${{ matrix.build.mtriple }}-${{ matrix.build.cc }}
            mingw-w64-${{ matrix.build.mtriple }}-icu
            mingw-w64-${{ matrix.build.mtriple }}-pkg-config

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Type-check shared UI package
        working-directory: bowrain/packages/ui
        run: vp check --no-fmt --no-lint

      # Build frontend and assets manually to avoid Wails Taskfile running
      # `npm install` which conflicts with the workspace npm ci above.
      - name: Generate Wails bindings
        working-directory: bowrain/apps/bowrain
        shell: bash
        env:
          # On macOS/Linux the icu cgo packages compile during bindings analysis
          # (toolchain + static .pc are present), so keep cgo on. On Windows the
          # mingw toolchain isn't on this shell's PATH; bindings reflect the
          # service API (cgo-independent), so build them with cgo off — the final
          # Windows build step (msys2) does the cgo + static-ICU compile.
          CGO_ENABLED: ${{ runner.os == 'Windows' && '0' || '1' }}
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          go mod tidy
          wails3 generate bindings -f "-tags production,fts5 -trimpath -buildvcs=false -ldflags=\"${BUILD_LDFLAGS}\"" -clean=true
          # shellcheck disable=SC2016
          sed -i.bak 's/= $0\./= store$0./g' frontend/bindings/github.com/neokapi/neokapi/bowrain/apps/bowrain/backend/app.js
          rm -f frontend/bindings/github.com/neokapi/neokapi/bowrain/apps/bowrain/backend/app.js.bak

      # The bowrain frontend bundles @neokapi/flow-editor, which imports
      # @neokapi/kapi-react/runtime — a built ./dist subpath export (not
      # committed). Build kapi-react first so the import resolves (mirrors the
      # kapi-desktop job).
      - name: Build @neokapi/kapi-react
        working-directory: packages/kapi-react
        run: vp run build

      - name: Build Bowrain frontend
        working-directory: bowrain/apps/bowrain/frontend
        run: vp run build

      - name: Generate icons
        working-directory: bowrain/apps/bowrain/build
        run: wails3 generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico

      - name: Generate Windows resources
        if: runner.os == 'Windows'
        working-directory: bowrain/apps/bowrain
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.VERSION }}
          ARCH: ${{ matrix.build.arch }}
        run: |
          # Render a version-stamped info.json so the .exe version resource
          # (shown in the app's About dialog / file Properties) matches the
          # built binary and carries a current copyright year.
          [ -n "$VERSION" ] || VERSION="0.0.0-dev"
          NUM="$(printf '%s' "$VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)"
          [ -n "$NUM" ] || NUM="0.0.0"
          jq --arg pv "$VERSION" --arg fv "${NUM}.0" --arg cr "© 2025-$(date +%Y) neokapi" \
            '.fixed.file_version=$fv | .info["0000"].ProductVersion=$pv | .info["0000"].LegalCopyright=$cr' \
            build/windows/info.json > build/windows/info.gen.json
          wails3 generate syso -arch "$ARCH" -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.gen.json -out "wails_windows_${ARCH}.syso"
          rm -f build/windows/info.gen.json

      - name: Build Bowrain (Linux)
        if: runner.os == 'Linux'
        working-directory: bowrain/apps/bowrain
        env:
          GOOS: linux
          CGO_ENABLED: "1"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: go build -tags production,fts5 -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o bin/Bowrain

      # cgo build under MSYS2 mingw with statically-linked ICU, so the Windows
      # desktop app uses the same native SQLite + ICU framework as macOS/Linux
      # (no unicode61/modernc divergence). Runs in the msys2 shell so gcc +
      # pkg-config + the static .pc all share one unix-path environment; the
      # static C++/gcc runtimes mean Bowrain.exe needs no mingw DLLs alongside.
      - name: Build Bowrain (Windows)
        if: runner.os == 'Windows'
        working-directory: bowrain/apps/bowrain
        shell: msys2 {0}
        env:
          GOOS: windows
          GOARCH: ${{ matrix.build.arch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.build.cc }}
          CGO_LDFLAGS: ${{ matrix.build.cgo_ldflags }}
          MROOT: ${{ matrix.build.mroot }}
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          set -euo pipefail
          # Native cc/ld can't open MSYS virtual paths ($MROOT/...); feed
          # Windows-form paths (cygpath -m) and convert the .pc dir for the
          # native pkg-config too.
          PCDIR=$(ICU_LIBDIR="$(cygpath -m "$MROOT/lib")" ICU_INCLUDEDIR="$(cygpath -m "$MROOT/include")" bash "${GITHUB_WORKSPACE}/scripts/gen-icu-static-pc.sh")
          export PKG_CONFIG_PATH="$(cygpath -m "$PCDIR")"
          go build -tags production,fts5 -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS} -H windowsgui" -o bin/Bowrain.exe
          rm -f ./*.syso

      - name: Build Bowrain (macOS arm64)
        if: runner.os == 'macOS'
        working-directory: bowrain/apps/bowrain
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-mmacosx-version-min=11.0"
          CGO_LDFLAGS: "-mmacosx-version-min=11.0"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          GOOS=darwin GOARCH=arm64 go build -tags production,fts5 -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o bin/Bowrain

      - name: Create macOS .app bundle
        if: runner.os == 'macOS'
        working-directory: bowrain/apps/bowrain
        run: |
          mkdir -p bin/Bowrain.app/Contents/MacOS
          mkdir -p bin/Bowrain.app/Contents/Resources
          cp build/darwin/icons.icns bin/Bowrain.app/Contents/Resources
          cp bin/Bowrain bin/Bowrain.app/Contents/MacOS
          cp build/darwin/Info.plist bin/Bowrain.app/Contents
          # Stamp the bundle with the real release version + current copyright
          # year so the native macOS About dialog matches the built binary
          # instead of the static placeholder in build/darwin/Info.plist.
          VERSION="${{ steps.meta.outputs.VERSION }}"
          [ -n "$VERSION" ] || VERSION="0.0.0-dev"
          PLIST=bin/Bowrain.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :NSHumanReadableCopyright © 2025-$(date +%Y) neokapi" "$PLIST"

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        id: signing
        if: runner.os == 'macOS'
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID_P12_BASE64" ]; then
            echo "No Developer ID certificate configured — will use ad-hoc signing"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Add to the search list AND make default so notarytool resolves the
          # stored credential profile without an explicit --keychain.
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security default-keychain -s "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Store notarization credentials (App Store Connect API key)
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          xcrun notarytool store-credentials "neokapi-notary" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH"
          rm -f "$KEY_PATH"

      - name: Sign + notarize app bundle (Wails)
        if: runner.os == 'macOS'
        working-directory: bowrain/apps/bowrain
        env:
          SIGNING_ENABLED: ${{ steps.signing.outputs.enabled }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          if [ "$SIGNING_ENABLED" = "true" ]; then
            echo "Signing + notarizing with Developer ID via 'wails3 tool sign'"
            # Hardened runtime is on by default; --notarize submits to the notary
            # service and staples the ticket to the .app.
            wails3 tool sign \
              --input bin/Bowrain.app \
              --identity "$APPLE_SIGN_IDENTITY" \
              --entitlements build/darwin/entitlements.plist \
              --notarize \
              --keychain-profile neokapi-notary
          else
            echo "No Developer ID — using ad-hoc signing (not distributable)"
            codesign --force --deep --sign - bin/Bowrain.app
          fi

      - name: Create DMG
        if: runner.os == 'macOS'
        working-directory: bowrain/apps/bowrain
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p dmg
          cp -R bin/Bowrain.app dmg/
          ln -s /Applications dmg/Applications
          # hdiutil flakes with "Resource busy" on macos-latest; retry up to 3x.
          for i in 1 2 3; do
            hdiutil create \
              -volname "Bowrain v${VERSION}" \
              -srcfolder dmg \
              -ov \
              -format UDZO \
              "../../../bowrain-${VERSION}-macOS-arm64.dmg" && break
            echo "hdiutil attempt $i failed, retrying after 5s..."
            sleep 5
          done

      - name: Sign + notarize DMG
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG="bowrain-${VERSION}-macOS-arm64.dmg"
          codesign --force --sign "$APPLE_SIGN_IDENTITY" "$DMG"
          echo "Submitting $DMG for notarization..."
          xcrun notarytool submit "$DMG" --keychain-profile neokapi-notary --wait
          echo "Stapling notarization ticket to DMG..."
          xcrun stapler staple "$DMG"

      # macOS: Clean up keychain
      - name: Clean up signing keychain
        if: always() && runner.os == 'macOS'
        env:
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Upload DMG to release
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: "bowrain-${{ steps.version.outputs.VERSION }}-macOS-arm64.dmg"

      # Windows: Create ZIP
      - name: Create ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "bowrain/apps/bowrain/bin/Bowrain.exe" -DestinationPath "bowrain-${{ steps.version.outputs.VERSION }}-windows-${{ matrix.build.arch }}.zip"

      - name: Upload Windows ZIP as artifact (Authenticode-signed locally before release)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-windows-${{ matrix.build.arch }}
          path: "bowrain-${{ steps.version.outputs.VERSION }}-windows-${{ matrix.build.arch }}.zip"
          retention-days: 14

      # Linux: Create tarball
      - name: Create tarball
        if: runner.os == 'Linux'
        run: |
          tar -czf "bowrain-${{ steps.version.outputs.VERSION }}-linux-${{ matrix.build.arch }}.tar.gz" \
            -C bowrain/apps/bowrain/bin Bowrain

      - name: Upload tarball to release
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: "bowrain-${{ steps.version.outputs.VERSION }}-linux-${{ matrix.build.arch }}.tar.gz"

  build-kapi-desktop:
    name: Build Kapi Desktop (${{ matrix.build.platform }})
    needs: package-cli
    strategy:
      fail-fast: false
      matrix:
        build:
