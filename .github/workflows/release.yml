name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  # cosign keyless requires a fresh GitHub Actions OIDC token to mint a
  # short-lived Fulcio cert for signing the kapi-bowrain plugin tarball.
  id-token: write

jobs:
  # Verify the parity workflow (#448) succeeded for the tagged commit
  # before any release artifact is built or published. Parity runs on
  # every push to main, so the result is normally already cached by the
  # time a release tag is pushed.
  #
  # If parity has not run for the tagged commit (e.g. the commit only
  # touched paths excluded from the parity workflow's paths-filter),
  # this gate fails closed: pre-release work for #448 explicitly
  # requires the parity report to be fresh for every release.
  parity-gate:
    name: Parity Gate (#448)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Verify parity workflow status for tagged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Looking up parity workflow status for ${REPO}@${SHA}..."
          # The most recent completed parity run for this commit. Status
          # is one of: success, failure, cancelled, skipped, "" (none).
          conclusion=$(gh api \
            "repos/${REPO}/actions/workflows/parity.yml/runs?head_sha=${SHA}&per_page=1" \
            --jq '.workflow_runs[0].conclusion // ""')
          echo "Parity conclusion: '${conclusion}'"
          case "$conclusion" in
            success)
              echo "Parity gate passed."
              ;;
            failure|cancelled|timed_out|action_required|startup_failure)
              echo "::error::Parity workflow concluded as '${conclusion}' for ${SHA}; aborting release."
              exit 1
              ;;
            "")
              echo "::error::No parity workflow run found for ${SHA}. Re-run parity.yml against this commit before tagging the release."
              exit 1
              ;;
            *)
              echo "::error::Parity workflow has not finished (conclusion='${conclusion}') for ${SHA}. Wait for it to complete and re-tag, or re-run the parity workflow."
              exit 1
              ;;
          esac

  goreleaser:
    name: GoReleaser
    needs: parity-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - uses: ./.github/actions/setup-node-ui

      - name: Build shared UI package
        working-directory: bowrain/packages/ui
        run: npx tsc

      - name: Run UI unit tests
        working-directory: bowrain/packages/ui
        run: vp test

      - name: Build SaaS web UI
        working-directory: bowrain/apps/web
        run: vp run build

      - name: Create Bowrain frontend placeholder
        run: mkdir -p bowrain/apps/bowrain/frontend/dist && echo placeholder > bowrain/apps/bowrain/frontend/dist/index.html

      - name: Download modules
        run: |
          go mod download && go mod verify
          cd cli && go mod download && go mod verify
          cd ../kapi && go mod download && go mod verify
          cd ../apps/kapi-desktop && go mod download && go mod verify
          cd ../../bowrain/core && go mod download && go mod verify
          cd ../cli && go mod download && go mod verify
          cd .. && go mod download && go mod verify

      - name: Reset go.work.sum
        run: git checkout -- go.work.sum

      - name: Install cosign (for kapi-bowrain plugin signing)
        uses: sigstore/cosign-installer@v3

      - name: Install quill (macOS signing + notarization for CLI binaries)
        run: |
          curl -sSfL https://get.anchore.io/quill | sudo sh -s -- -b /usr/local/bin v0.7.1
          quill version

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # quill: Developer ID signing + notarization of the macOS kapi binaries.
          QUILL_SIGN_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          QUILL_NOTARY_KEY: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          QUILL_NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          QUILL_NOTARY_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}

      # Push the new kapi-bowrain plugin version into the manifest-plugins
      # registry so `kapi plugin install bowrain` resolves to this build.
      # Includes cosign signature URLs + cert-identity so kapi's verifier
      # can validate the install (signatures are mandatory unless --unsafe).
      - name: Update manifest plugin registry
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          if [ -z "${REGISTRY_TOKEN:-}" ]; then
            echo "REGISTRY_TOKEN not set; skipping registry update"
            exit 0
          fi

          GOBIN=/tmp go install github.com/neokapi/registry/tools/registry-update@main

          declare -A SHAS
          while IFS= read -r line; do
            sum=$(echo "$line" | awk '{print $1}')
            file=$(echo "$line" | awk '{print $2}')
            SHAS[$file]=$sum
          done < dist/checksums.txt

          REPO_URL="https://github.com/${REPO}/releases/download/${REF_NAME}"
          CERT_ID="https://github.com/${REPO}/.github/workflows/release.yml@refs/tags/${REF_NAME}"
          declare -a ARGS
          for plat in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64; do
            os=${plat%/*}
            arch=${plat#*/}
            file="kapi-bowrain_${VERSION}_${os}_${arch}.tar.gz"
            if [ -n "${SHAS[$file]:-}" ]; then
              ARGS+=(
                "--platform" "$plat"
                "--url" "${REPO_URL}/${file}"
                "--sha256" "${SHAS[$file]}"
                "--signature" "${REPO_URL}/${file}.sigstore.json"
              )
            fi
          done

          git clone "https://x-access-token:${REGISTRY_TOKEN}@github.com/neokapi/registry.git" /tmp/registry
          /tmp/registry-update \
            --registry /tmp/registry/manifest-plugins.json \
            --plugin bowrain \
            --version "$VERSION" \
            --channel stable \
            --released "$(date -u +%Y-%m-%d)" \
            --cert-identity "$CERT_ID" \
            --cert-oidc-issuer https://token.actions.githubusercontent.com \
            "${ARGS[@]}"
          cd /tmp/registry
          git config user.email "release-bot@neokapi.dev"
          git config user.name "release-bot"
          git add manifest-plugins.json
          if ! git diff --staged --quiet; then
            git commit -m "Register bowrain ${VERSION}"
            git push
          fi

  docker:
    name: Docker (${{ matrix.image }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: bowrain-server, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bowrain-server, arch: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64 }
          - { image: bowrain-worker, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bowrain-worker, arch: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64 }
          - { image: bowrain-web, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bowrain-web, arch: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64 }
          - { image: bravo-agent, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bravo-sandbox-node, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - {
              image: bravo-sandbox-python,
              arch: amd64,
              runner: ubuntu-latest,
              platform: linux/amd64,
            }
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "VERSION=${GITHUB_REF_NAME#v}"
            echo "COMMIT=${GH_SHA::7}"
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/${{ matrix.image }}/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/neokapi/${{ matrix.image }}:${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            COMMIT=${{ steps.version.outputs.COMMIT }}
            BUILD_DATE=${{ steps.version.outputs.BUILD_DATE }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

  docker-manifest:
    name: Docker Manifests
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform manifests
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          for IMAGE in bowrain-server bowrain-worker bowrain-web; do
            docker buildx imagetools create \
              -t "ghcr.io/neokapi/$IMAGE:$VERSION" \
              -t "ghcr.io/neokapi/$IMAGE:latest" \
              "ghcr.io/neokapi/$IMAGE:$VERSION-amd64" \
              "ghcr.io/neokapi/$IMAGE:$VERSION-arm64"
          done

      - name: Tag bravo images (amd64 only)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          for IMAGE in bravo-agent bravo-sandbox-node bravo-sandbox-python; do
            docker buildx imagetools create \
              -t "ghcr.io/neokapi/$IMAGE:$VERSION" \
              -t "ghcr.io/neokapi/$IMAGE:latest" \
              "ghcr.io/neokapi/$IMAGE:$VERSION-amd64"
          done

  docker-keycloak:
    name: Docker (bowrain-keycloak)
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-ui

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Keycloak theme
        run: make -C bowrain keycloak-theme

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push keycloak image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/keycloak/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bowrain-keycloak:${{ steps.version.outputs.VERSION }}
            ghcr.io/neokapi/bowrain-keycloak:${{ github.sha }}
            ghcr.io/neokapi/bowrain-keycloak:latest
          cache-from: type=gha,scope=bowrain-keycloak
          cache-to: type=gha,mode=max,scope=bowrain-keycloak

  build-bowrain:
    name: Build Bowrain (${{ matrix.build.platform }})
    needs: parity-gate
    strategy:
      fail-fast: false
      matrix:
        build:
          - { platform: linux/amd64, os: ubuntu-latest, arch: amd64 }
          - { platform: linux/arm64, os: ubuntu-24.04-arm, arch: arm64 }
          - { platform: windows/amd64, os: windows-latest, arch: amd64 }
          - { platform: windows/arm64, os: windows-latest, arch: arm64 }
          - { platform: darwin/arm64, os: macos-latest, arch: arm64 }
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - uses: ./.github/actions/setup-node-ui

      - name: Compute build metadata
        id: meta
        shell: bash
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "VERSION=${GITHUB_REF_NAME#v}"
            echo "COMMIT=${GH_SHA::7}"
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "LDFLAGS=-w -s -X github.com/neokapi/neokapi/core/version.Version=${GITHUB_REF_NAME#v} -X github.com/neokapi/neokapi/core/version.Commit=${GH_SHA::7} -X github.com/neokapi/neokapi/core/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libicu-dev pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config
          # macOS ships ICU at /usr/lib/libicucore.dylib, but no headers.
          # Install icu4c (keg-only) and expose its pkg-config files.
          brew install icu4c
          ICU_PREFIX=$(brew --prefix icu4c)
          {
            echo "PKG_CONFIG_PATH=${ICU_PREFIX}/lib/pkgconfig"
            echo "LDFLAGS=-L${ICU_PREFIX}/lib"
            echo "CPPFLAGS=-I${ICU_PREFIX}/include"
          } >> "$GITHUB_ENV"

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build shared UI package
        working-directory: bowrain/packages/ui
        run: npx tsc

      # Build frontend and assets manually to avoid Wails Taskfile running
      # `npm install` which conflicts with the workspace npm ci above.
      - name: Generate Wails bindings
        working-directory: bowrain/apps/bowrain
        shell: bash
        env:
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          go mod tidy
          wails3 generate bindings -f "-tags production -trimpath -buildvcs=false -ldflags=\"${BUILD_LDFLAGS}\"" -clean=true
          # shellcheck disable=SC2016
          sed -i.bak 's/= $0\./= store$0./g' frontend/bindings/github.com/neokapi/neokapi/bowrain/apps/bowrain/backend/app.js
          rm -f frontend/bindings/github.com/neokapi/neokapi/bowrain/apps/bowrain/backend/app.js.bak

      - name: Build Bowrain frontend
        working-directory: bowrain/apps/bowrain/frontend
        run: vp run build

      - name: Generate icons
        working-directory: bowrain/apps/bowrain/build
        run: wails3 generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico

      - name: Generate Windows resources
        if: runner.os == 'Windows'
        working-directory: bowrain/apps/bowrain
        shell: bash
        run: wails3 generate syso -arch ${{ matrix.build.arch }} -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_${{ matrix.build.arch }}.syso

      - name: Build Bowrain (Linux)
        if: runner.os == 'Linux'
        working-directory: bowrain/apps/bowrain
        env:
          GOOS: linux
          CGO_ENABLED: "1"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o bin/Bowrain

      - name: Build Bowrain (Windows)
        if: runner.os == 'Windows'
        working-directory: bowrain/apps/bowrain
        shell: bash
        env:
          GOOS: windows
          GOARCH: ${{ matrix.build.arch }}
          CGO_ENABLED: "0"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS} -H windowsgui" -o bin/Bowrain.exe
          rm -f ./*.syso

      - name: Build Bowrain (macOS arm64)
        if: runner.os == 'macOS'
        working-directory: bowrain/apps/bowrain
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-mmacosx-version-min=11.0"
          CGO_LDFLAGS: "-mmacosx-version-min=11.0"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          GOOS=darwin GOARCH=arm64 go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o bin/Bowrain

      - name: Create macOS .app bundle
        if: runner.os == 'macOS'
        working-directory: bowrain/apps/bowrain
        run: |
          mkdir -p bin/Bowrain.app/Contents/MacOS
          mkdir -p bin/Bowrain.app/Contents/Resources
          cp build/darwin/icons.icns bin/Bowrain.app/Contents/Resources
          cp bin/Bowrain bin/Bowrain.app/Contents/MacOS
          cp build/darwin/Info.plist bin/Bowrain.app/Contents

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        id: signing
        if: runner.os == 'macOS'
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID_P12_BASE64" ]; then
            echo "No Developer ID certificate configured — will use ad-hoc signing"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Add to the search list AND make default so notarytool resolves the
          # stored credential profile without an explicit --keychain.
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security default-keychain -s "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Store notarization credentials (App Store Connect API key)
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          xcrun notarytool store-credentials "neokapi-notary" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH"
          rm -f "$KEY_PATH"

      - name: Sign + notarize app bundle (Wails)
        if: runner.os == 'macOS'
        working-directory: bowrain/apps/bowrain
        env:
          SIGNING_ENABLED: ${{ steps.signing.outputs.enabled }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          if [ "$SIGNING_ENABLED" = "true" ]; then
            echo "Signing + notarizing with Developer ID via 'wails3 tool sign'"
            # Hardened runtime is on by default; --notarize submits to the notary
            # service and staples the ticket to the .app.
            wails3 tool sign \
              --input bin/Bowrain.app \
              --identity "$APPLE_SIGN_IDENTITY" \
              --entitlements build/darwin/entitlements.plist \
              --notarize \
              --keychain-profile neokapi-notary
          else
            echo "No Developer ID — using ad-hoc signing (not distributable)"
            codesign --force --deep --sign - bin/Bowrain.app
          fi

      - name: Create DMG
        if: runner.os == 'macOS'
        working-directory: bowrain/apps/bowrain
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p dmg
          cp -R bin/Bowrain.app dmg/
          ln -s /Applications dmg/Applications
          # hdiutil flakes with "Resource busy" on macos-latest; retry up to 3x.
          for i in 1 2 3; do
            hdiutil create \
              -volname "Bowrain v${VERSION}" \
              -srcfolder dmg \
              -ov \
              -format UDZO \
              "../../../bowrain-${VERSION}-macOS-arm64.dmg" && break
            echo "hdiutil attempt $i failed, retrying after 5s..."
            sleep 5
          done

      - name: Sign + notarize DMG
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG="bowrain-${VERSION}-macOS-arm64.dmg"
          codesign --force --sign "$APPLE_SIGN_IDENTITY" "$DMG"
          echo "Submitting $DMG for notarization..."
          xcrun notarytool submit "$DMG" --keychain-profile neokapi-notary --wait
          echo "Stapling notarization ticket to DMG..."
          xcrun stapler staple "$DMG"

      # macOS: Clean up keychain
      - name: Clean up signing keychain
        if: always() && runner.os == 'macOS'
        env:
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Upload DMG to release
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v3
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-macOS-arm64.dmg"

      # Windows: Create ZIP
      - name: Create ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "bowrain/apps/bowrain/bin/Bowrain.exe" -DestinationPath "bowrain-${{ steps.version.outputs.VERSION }}-windows-${{ matrix.build.arch }}.zip"

      - name: Upload Windows ZIP as artifact (Authenticode-signed locally before release)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: bowrain-windows-${{ matrix.build.arch }}
          path: "bowrain-${{ steps.version.outputs.VERSION }}-windows-${{ matrix.build.arch }}.zip"
          retention-days: 14

      # Linux: Create tarball
      - name: Create tarball
        if: runner.os == 'Linux'
        run: |
          tar -czf "bowrain-${{ steps.version.outputs.VERSION }}-linux-${{ matrix.build.arch }}.tar.gz" \
            -C bowrain/apps/bowrain/bin Bowrain

      - name: Upload tarball to release
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v3
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-linux-${{ matrix.build.arch }}.tar.gz"

  build-kapi-desktop:
    name: Build Kapi Desktop (${{ matrix.build.platform }})
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        build:
          - { platform: linux/amd64, os: ubuntu-latest, arch: amd64 }
          - { platform: linux/arm64, os: ubuntu-24.04-arm, arch: arm64 }
          - { platform: windows/amd64, os: windows-latest, arch: amd64 }
          - { platform: windows/arm64, os: windows-latest, arch: arm64 }
          - { platform: darwin/arm64, os: macos-latest, arch: arm64 }
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - uses: ./.github/actions/setup-node-ui

      - name: Compute build metadata
        id: meta
        shell: bash
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "VERSION=${GITHUB_REF_NAME#v}"
            echo "COMMIT=${GH_SHA::7}"
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "LDFLAGS=-w -s -X github.com/neokapi/neokapi/core/version.Version=${GITHUB_REF_NAME#v} -X github.com/neokapi/neokapi/core/version.Commit=${GH_SHA::7} -X github.com/neokapi/neokapi/core/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libicu-dev pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config
          # macOS ships ICU at /usr/lib/libicucore.dylib, but no headers.
          # Install icu4c (keg-only) and expose its pkg-config files.
          brew install icu4c
          ICU_PREFIX=$(brew --prefix icu4c)
          {
            echo "PKG_CONFIG_PATH=${ICU_PREFIX}/lib/pkgconfig"
            echo "LDFLAGS=-L${ICU_PREFIX}/lib"
            echo "CPPFLAGS=-I${ICU_PREFIX}/include"
          } >> "$GITHUB_ENV"

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Generate Wails bindings
        working-directory: apps/kapi-desktop
        shell: bash
        env:
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          go mod tidy
          wails3 generate bindings -f "-tags production -trimpath -buildvcs=false -ldflags=\"${BUILD_LDFLAGS}\"" -clean=true

      # The kapi-desktop frontend's vite.config.ts imports
      # @neokapi/kapi-react/vite, whose entry resolves to dist/plugin/vite.js.
      # That dist tree is built (not committed), so build kapi-react first.
      - name: Build @neokapi/kapi-react
        working-directory: packages/kapi-react
        run: vp run build

      - name: Build Kapi Desktop frontend
        working-directory: apps/kapi-desktop/frontend
        run: vp run build:dev

      - name: Generate icons
        working-directory: apps/kapi-desktop/build
        run: wails3 generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico

      - name: Generate Windows resources
        if: runner.os == 'Windows'
        working-directory: apps/kapi-desktop
        shell: bash
        run: wails3 generate syso -arch ${{ matrix.build.arch }} -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_${{ matrix.build.arch }}.syso

      - name: Build Kapi Desktop (Linux)
        if: runner.os == 'Linux'
        working-directory: apps/kapi-desktop
        env:
          GOOS: linux
          CGO_ENABLED: "1"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o bin/Kapi

      - name: Build Kapi Desktop (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/kapi-desktop
        shell: bash
        env:
          GOOS: windows
          GOARCH: ${{ matrix.build.arch }}
          CGO_ENABLED: "0"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS} -H windowsgui" -o bin/Kapi.exe
          rm -f ./*.syso

      - name: Build Kapi Desktop (macOS arm64)
        if: runner.os == 'macOS'
        working-directory: apps/kapi-desktop
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-mmacosx-version-min=11.0"
          CGO_LDFLAGS: "-mmacosx-version-min=11.0"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          GOOS=darwin GOARCH=arm64 go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o bin/Kapi

      - name: Create macOS .app bundle
        if: runner.os == 'macOS'
        working-directory: apps/kapi-desktop
        run: |
          mkdir -p bin/Kapi.app/Contents/MacOS
          mkdir -p bin/Kapi.app/Contents/Resources
          cp build/darwin/icons.icns bin/Kapi.app/Contents/Resources
          cp bin/Kapi bin/Kapi.app/Contents/MacOS
          cp build/darwin/Info.plist bin/Kapi.app/Contents

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        id: signing
        if: runner.os == 'macOS'
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID_P12_BASE64" ]; then
            echo "No Developer ID certificate configured — will use ad-hoc signing"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Add to the search list AND make default so notarytool resolves the
          # stored credential profile without an explicit --keychain.
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security default-keychain -s "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Store notarization credentials (App Store Connect API key)
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          xcrun notarytool store-credentials "neokapi-notary" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH"
          rm -f "$KEY_PATH"

      - name: Sign + notarize app bundle (Wails)
        if: runner.os == 'macOS'
        working-directory: apps/kapi-desktop
        env:
          SIGNING_ENABLED: ${{ steps.signing.outputs.enabled }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          if [ "$SIGNING_ENABLED" = "true" ]; then
            echo "Signing + notarizing with Developer ID via 'wails3 tool sign'"
            # Hardened runtime is on by default; --notarize submits to the notary
            # service and staples the ticket to the .app.
            wails3 tool sign \
              --input bin/Kapi.app \
              --identity "$APPLE_SIGN_IDENTITY" \
              --entitlements build/darwin/entitlements.plist \
              --notarize \
              --keychain-profile neokapi-notary
          else
            echo "No Developer ID — using ad-hoc signing (not distributable)"
            codesign --force --deep --sign - bin/Kapi.app
          fi

      - name: Create DMG
        if: runner.os == 'macOS'
        working-directory: apps/kapi-desktop
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p dmg
          cp -R bin/Kapi.app dmg/
          ln -s /Applications dmg/Applications
          # hdiutil flakes with "Resource busy" on macos-latest; retry up to 3x.
          for i in 1 2 3; do
            hdiutil create \
              -volname "Kapi v${VERSION}" \
              -srcfolder dmg \
              -ov \
              -format UDZO \
              "../../../kapi-desktop-${VERSION}-macOS-arm64.dmg" && break
            echo "hdiutil attempt $i failed, retrying after 5s..."
            sleep 5
          done

      - name: Sign + notarize DMG
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG="kapi-desktop-${VERSION}-macOS-arm64.dmg"
          codesign --force --sign "$APPLE_SIGN_IDENTITY" "$DMG"
          echo "Submitting $DMG for notarization..."
          xcrun notarytool submit "$DMG" --keychain-profile neokapi-notary --wait
          echo "Stapling notarization ticket to DMG..."
          xcrun stapler staple "$DMG"

      - name: Clean up signing keychain
        if: always() && runner.os == 'macOS'
        env:
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Upload DMG to release
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v3
        with:
          files: "kapi-desktop-${{ steps.version.outputs.VERSION }}-macOS-arm64.dmg"

      - name: Create ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "apps/kapi-desktop/bin/Kapi.exe" -DestinationPath "kapi-desktop-${{ steps.version.outputs.VERSION }}-windows-${{ matrix.build.arch }}.zip"

      - name: Upload Windows ZIP as artifact (Authenticode-signed locally before release)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: kapi-desktop-windows-${{ matrix.build.arch }}
          path: "kapi-desktop-${{ steps.version.outputs.VERSION }}-windows-${{ matrix.build.arch }}.zip"
          retention-days: 14

      - name: Create tarball
        if: runner.os == 'Linux'
        run: |
          tar -czf "kapi-desktop-${{ steps.version.outputs.VERSION }}-linux-${{ matrix.build.arch }}.tar.gz" \
            -C apps/kapi-desktop/bin Kapi

      - name: Upload tarball to release
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v3
        with:
          files: "kapi-desktop-${{ steps.version.outputs.VERSION }}-linux-${{ matrix.build.arch }}.tar.gz"

  # kapi CLI Windows binaries — built here as workflow artifacts (NOT attached to
  # the release) so they can be Authenticode-signed locally with a Certum cert and
  # added to the published release (scripts/publish-windows-signed.sh). The
  # CI-signed macOS + Linux CLI builds and the GitHub release are owned by the
  # goreleaser job.
  build-windows-cli:
    name: Build kapi CLI (Windows, unsigned artifact)
    needs: parity-gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
      - name: Build kapi.exe
        working-directory: kapi
        env:
          GOOS: windows
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          GH_SHA: ${{ github.sha }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X github.com/neokapi/neokapi/core/version.Version=${VERSION} -X github.com/neokapi/neokapi/core/version.Commit=${GH_SHA::7} -X github.com/neokapi/neokapi/core/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags="${LDFLAGS}" -o kapi.exe ./cmd/kapi
          zip -q "kapi_${VERSION}_windows_${GOARCH}.zip" kapi.exe
      - uses: actions/upload-artifact@v4
        with:
          name: kapi-cli-windows-${{ matrix.arch }}
          path: kapi/kapi_*_windows_${{ matrix.arch }}.zip
          retention-days: 14

  # ── kapi-sat ML segmenter plugin ────────────────────────────────────────────
  # Build + sign + publish the kapi-sat plugin tarball per platform. kapi-sat is
  # a cgo binary (-tags onnx): it links daulet/tokenizers (static .a) at build
  # time and loads the onnxruntime SHARED library at runtime. The tarball bundles
  # the onnxruntime shared lib at lib/<unversioned-name> beside the binary, where
  # plugins/sat/internal/sat/ort_onnx.go:resolveORTLib() finds it with no env.
  # Models are NOT bundled — they download from HuggingFace at first use.
  #
  # Version pins (must be kept in lockstep with plugins/sat/go.mod):
  #   * onnxruntime 1.25.0 — onnxruntime_go v1.30.1 is built against the
  #     onnxruntime 1.25.0 C API headers (its README §"Note on onnxruntime
  #     Library Versions"; its bundled test_data dylib links
  #     libonnxruntime.1.25.0.dylib). Other 1.2x releases may load via C-API
  #     back-compat, but 1.25.0 is the matched, tested ABI — keep this pinned.
  #   * daulet/tokenizers v1.27.0 — matches plugins/sat/go.mod. darwin/linux use
  #     the prebuilt libtokenizers.a from that tag; Windows has no prebuilt lib
  #     and is built from Rust source (see the Windows leg).
  build-sat-plugin:
    name: Build kapi-sat plugin (${{ matrix.build.platform }})
    needs: parity-gate
    strategy:
      fail-fast: false
      matrix:
        build:
          - { platform: darwin/arm64, os: macos-latest, goos: darwin, goarch: arm64 }
          - { platform: darwin/amd64, os: macos-13, goos: darwin, goarch: amd64 }
          - { platform: linux/amd64, os: ubuntu-latest, goos: linux, goarch: amd64 }
          - { platform: linux/arm64, os: ubuntu-24.04-arm, goos: linux, goarch: arm64 }
          - { platform: windows/amd64, os: windows-latest, goos: windows, goarch: amd64 }
    runs-on: ${{ matrix.build.os }}
    env:
      # Pinned native-dependency versions (see job-level comment above).
      ONNXRUNTIME_VERSION: "1.25.0"
      TOKENIZERS_VERSION: "v1.27.0"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Install cosign (tarball signing)
        uses: sigstore/cosign-installer@v3

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── onnxruntime shared library (runtime dep; bundled into the tarball) ────
      - name: Download onnxruntime (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.build.goos }}
          GOARCH: ${{ matrix.build.goarch }}
        run: |
          set -euo pipefail
          case "${GOOS}/${GOARCH}" in
            darwin/arm64) asset="onnxruntime-osx-arm64-${ONNXRUNTIME_VERSION}.tgz" ;;
            darwin/amd64) asset="onnxruntime-osx-x86_64-${ONNXRUNTIME_VERSION}.tgz" ;;
            linux/amd64)  asset="onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz" ;;
            linux/arm64)  asset="onnxruntime-linux-aarch64-${ONNXRUNTIME_VERSION}.tgz" ;;
            *) echo "::error::no onnxruntime asset mapping for ${GOOS}/${GOARCH}"; exit 1 ;;
          esac
          url="https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/${asset}"
          echo "Downloading $url"
          mkdir -p "$RUNNER_TEMP/ort"
          curl -sSfL -o "$RUNNER_TEMP/${asset}" "$url"
          tar -xzf "$RUNNER_TEMP/${asset}" -C "$RUNNER_TEMP/ort"
          # The archive extracts to a single versioned top-level dir.
          ort_root="$(find "$RUNNER_TEMP/ort" -maxdepth 1 -mindepth 1 -type d | head -n1)"
          echo "ORT_DIR=${ort_root}" >> "$GITHUB_ENV"

      - name: Download onnxruntime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "onnxruntime-win-x64-$env:ONNXRUNTIME_VERSION.zip"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$env:ONNXRUNTIME_VERSION/$asset"
          Write-Host "Downloading $url"
          $dest = "$env:RUNNER_TEMP\$asset"
          Invoke-WebRequest -Uri $url -OutFile $dest
          $ortRoot = "$env:RUNNER_TEMP\ort"
          Expand-Archive -Path $dest -DestinationPath $ortRoot -Force
          # Single versioned top-level dir inside the zip.
          $inner = (Get-ChildItem -Path $ortRoot -Directory | Select-Object -First 1).FullName
          "ORT_DIR=$inner" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── daulet/tokenizers static library (build-time dep) ─────────────────────
      # darwin/linux: prebuilt libtokenizers.a from the pinned release tag.
      # Asset naming: darwin uses arm64/x86_64, linux uses amd64/arm64.
      - name: Download libtokenizers (Unix prebuilt)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.build.goos }}
          GOARCH: ${{ matrix.build.goarch }}
        run: |
          set -euo pipefail
          case "${GOOS}/${GOARCH}" in
            darwin/arm64) asset="libtokenizers.darwin-arm64.tar.gz" ;;
            darwin/amd64) asset="libtokenizers.darwin-x86_64.tar.gz" ;;
            linux/amd64)  asset="libtokenizers.linux-amd64.tar.gz" ;;
            linux/arm64)  asset="libtokenizers.linux-arm64.tar.gz" ;;
            *) echo "::error::no libtokenizers asset mapping for ${GOOS}/${GOARCH}"; exit 1 ;;
          esac
          url="https://github.com/daulet/tokenizers/releases/download/${TOKENIZERS_VERSION}/${asset}"
          echo "Downloading $url"
          mkdir -p "$RUNNER_TEMP/tok"
          curl -sSfL -o "$RUNNER_TEMP/${asset}" "$url"
          tar -xzf "$RUNNER_TEMP/${asset}" -C "$RUNNER_TEMP/tok"
          test -f "$RUNNER_TEMP/tok/libtokenizers.a" || { echo "::error::libtokenizers.a missing after extract"; ls -la "$RUNNER_TEMP/tok"; exit 1; }
          echo "TOKENIZERS_LIB=$RUNNER_TEMP/tok" >> "$GITHUB_ENV"

      # Windows: no prebuilt lib is published by daulet/tokenizers, so build the
      # tokenizers-ffi crate from Rust source. The plugin's cgo directive is
      #   #cgo windows LDFLAGS: -ltokenizers -lm -lstdc++ -lws2_32 -luserenv
      # which is GNU-ld style (-l<name> -> lib<name>.a, -lstdc++) — so we MUST
      # build with the windows-GNU (MinGW) Rust target, NOT msvc, and rename the
      # crate output (libtokenizers_ffi.a) to libtokenizers.a. cgo on
      # windows-latest uses the bundled mingw-w64 gcc, which matches the gnu ABI.
      - name: Install Rust (Windows, GNU target)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Build libtokenizers from source (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          git clone --branch "${TOKENIZERS_VERSION}" --depth 1 \
            https://github.com/daulet/tokenizers "$RUNNER_TEMP/tokenizers-src"
          cd "$RUNNER_TEMP/tokenizers-src"
          # tokenizers-ffi is a staticlib crate; build it for the GNU ABI so the
          # archive is linkable by cgo's mingw gcc.
          cargo build --release -p tokenizers-ffi --target x86_64-pc-windows-gnu
          mkdir -p "$RUNNER_TEMP/tok"
          # staticlib output for the gnu target is libtokenizers_ffi.a; the cgo
          # directive looks for -ltokenizers => libtokenizers.a.
          cp "target/x86_64-pc-windows-gnu/release/libtokenizers_ffi.a" "$RUNNER_TEMP/tok/libtokenizers.a"
          echo "TOKENIZERS_LIB=$RUNNER_TEMP/tok" >> "$GITHUB_ENV"

      # ── macOS Developer-ID signing setup (sign the staged binary pre-tar) ─────
      - name: Import signing certificate
        id: signing
        if: runner.os == 'macOS'
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID_P12_BASE64" ]; then
            echo "No Developer ID certificate configured — will use ad-hoc signing"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security default-keychain -s "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Store notarization credentials (App Store Connect API key)
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          xcrun notarytool store-credentials "neokapi-notary" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH"
          rm -f "$KEY_PATH"

      # ── build (only) into a staging dir so macOS can sign before tar ──────────
      # On macOS we build the binary first, Developer-ID sign + notarize it, then
      # let the packaging script bundle the (already-signed) binary into the tar.
      # On Linux/Windows the packaging script builds + tars in one shot.
      - name: Build kapi-sat (macOS, pre-sign)
        if: runner.os == 'macOS'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X github.com/neokapi/neokapi/core/version.Version=${VERSION} -X github.com/neokapi/neokapi/core/version.Commit=${GH_SHA::7} -X github.com/neokapi/neokapi/core/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p "$RUNNER_TEMP/prebuilt"
          (cd plugins/sat && GOWORK=off CGO_ENABLED=1 \
            CGO_LDFLAGS="-L${TOKENIZERS_LIB}" \
            go build -tags onnx -trimpath -ldflags "${LDFLAGS}" \
            -o "$RUNNER_TEMP/prebuilt/kapi-sat" ./cmd/kapi-sat)
          echo "SAT_PREBUILT_BIN=$RUNNER_TEMP/prebuilt/kapi-sat" >> "$GITHUB_ENV"

      - name: Sign + notarize kapi-sat binary (macOS)
        if: runner.os == 'macOS'
        env:
          SIGNING_ENABLED: ${{ steps.signing.outputs.enabled }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          BIN="$SAT_PREBUILT_BIN"
          if [ "$SIGNING_ENABLED" = "true" ]; then
            echo "Signing + notarizing kapi-sat with Developer ID"
            # Hardened runtime is required for notarization; the SaT plugin loads
            # the onnxruntime dylib via dlopen, so allow unsigned/dynamic libs.
            codesign --force --timestamp --options runtime \
              --sign "$APPLE_SIGN_IDENTITY" "$BIN"
            # Notarize the standalone binary in a zip; staple is not applicable to
            # a bare Mach-O, but notarization registers it with Apple's service so
            # Gatekeeper accepts it once the tarball is expanded.
            ZIP="$RUNNER_TEMP/kapi-sat-notarize.zip"
            /usr/bin/ditto -c -k "$BIN" "$ZIP"
            xcrun notarytool submit "$ZIP" --keychain-profile neokapi-notary --wait
          else
            echo "No Developer ID — ad-hoc signing (not distributable)"
            codesign --force --sign - "$BIN"
          fi

      - name: Clean up signing keychain
        if: always() && runner.os == 'macOS'
        env:
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      # ── package the tarball ───────────────────────────────────────────────────
      # The packaging script builds the binary unless a pre-built (already-signed)
      # one is provided via SAT_PREBUILT_BIN — see scripts/package-sat-plugin.sh.
      - name: Package kapi-sat tarball
        id: package
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          scripts/package-sat-plugin.sh \
            --version "${VERSION}" \
            --ort-dir "${ORT_DIR}" \
            --tokenizers-lib "${TOKENIZERS_LIB}" \
            --out-dir "$RUNNER_TEMP/sat-out"

      # ── cosign keyless sign + upload ──────────────────────────────────────────
      - name: Cosign sign tarball (keyless)
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="${{ steps.package.outputs.tarball }}"
          cosign sign-blob --yes --bundle "${TARBALL}.sigstore.json" "${TARBALL}"

      - name: Upload tarball + signature to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.tarball }}.sigstore.json

      # Expose the per-platform sha256 as a checksum artifact for the registry
      # step (which runs on a separate runner). One file per leg:
      #   kapi-sat_<ver>_<os>_<arch>.tar.gz <sha256>
      - name: Write checksum artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sat-checksums"
          echo "${{ steps.package.outputs.sha256 }}  ${{ steps.package.outputs.tarball_name }}" \
            > "$RUNNER_TEMP/sat-checksums/${{ matrix.build.goos }}_${{ matrix.build.goarch }}.sha256"

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: sat-checksum-${{ matrix.build.goos }}-${{ matrix.build.goarch }}
          path: ${{ runner.temp }}/sat-checksums/*.sha256
          retention-days: 14

  # Register the new kapi-sat plugin version into neokapi/registry so
  # `kapi plugins install sat` resolves to this build. Mirrors the goreleaser
  # job's "Update manifest plugin registry" step but for --plugin sat across the
  # five supported platforms.
  #
  # PREREQUISITE: neokapi/registry's manifest-plugins.json must already contain a
  # "sat" stub plugin entry (registry-update refuses to create new top-level
  # plugins — it errors "plugin not declared"). Add the stub once, mirroring the
  # existing "bowrain"/"okapi-bridge" entries.
  register-sat-plugin:
    name: Register kapi-sat in plugin registry
    needs: build-sat-plugin
    runs-on: ubuntu-latest
    steps:
      - name: Download SaT checksum artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sat-checksum-*
          path: sat-checksums
          merge-multiple: true

      - name: Update manifest plugin registry (sat)
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          if [ -z "${REGISTRY_TOKEN:-}" ]; then
            echo "REGISTRY_TOKEN not set; skipping registry update"
            exit 0
          fi

          GOBIN=/tmp go install github.com/neokapi/registry/tools/registry-update@main

          # Collect the per-platform shas from the downloaded checksum files
          # (one "<sha>  <tarball-name>" line each).
          declare -A SHAS
          for f in sat-checksums/*.sha256; do
            [ -f "$f" ] || continue
            sum=$(awk '{print $1}' "$f")
            file=$(awk '{print $2}' "$f")
            SHAS[$file]=$sum
          done

          REPO_URL="https://github.com/${REPO}/releases/download/${REF_NAME}"
          CERT_ID="https://github.com/${REPO}/.github/workflows/release.yml@refs/tags/${REF_NAME}"
          declare -a ARGS
          for plat in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64 windows/amd64; do
            os=${plat%/*}
            arch=${plat#*/}
            file="kapi-sat_${VERSION}_${os}_${arch}.tar.gz"
            if [ -n "${SHAS[$file]:-}" ]; then
              ARGS+=(
                "--platform" "$plat"
                "--url" "${REPO_URL}/${file}"
                "--sha256" "${SHAS[$file]}"
                "--signature" "${REPO_URL}/${file}.sigstore.json"
              )
            else
              echo "::warning::no checksum for ${file}; skipping ${plat}"
            fi
          done

          if [ ${#ARGS[@]} -eq 0 ]; then
            echo "::error::no platform artifacts found for sat ${VERSION}"
            exit 1
          fi

          git clone "https://x-access-token:${REGISTRY_TOKEN}@github.com/neokapi/registry.git" /tmp/registry
          /tmp/registry-update \
            --registry /tmp/registry/manifest-plugins.json \
            --plugin sat \
            --version "$VERSION" \
            --channel stable \
            --released "$(date -u +%Y-%m-%d)" \
            --cert-identity "$CERT_ID" \
            --cert-oidc-issuer https://token.actions.githubusercontent.com \
            "${ARGS[@]}"
          cd /tmp/registry
          git config user.email "release-bot@neokapi.dev"
          git config user.name "release-bot"
          git add manifest-plugins.json
          if ! git diff --staged --quiet; then
            git commit -m "Register sat ${VERSION}"
            git push
          fi

  update-casks:
    name: Update Homebrew Casks
    runs-on: ubuntu-latest
    needs: [build-bowrain, build-kapi-desktop]
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMGs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*-macOS-arm64.dmg"

      - name: Compute checksums
        id: checksum
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          echo "BOWRAIN_DMG=$(sha256sum "bowrain-${VERSION}-macOS-arm64.dmg" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "KAPI_DMG=$(sha256sum "kapi-desktop-${VERSION}-macOS-arm64.dmg" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: neokapi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update bowrain cask
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA_BOWRAIN: ${{ steps.checksum.outputs.BOWRAIN_DMG }}
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/bowrain.rb << CASK
          # Use absolute tap path so the require works even when Homebrew loads
          # the cask from its metadata cache during upgrades.
          require "#{Tap.fetch("neokapi", "tap").path}/lib/private_download_strategy"

          cask "bowrain" do
            version "${VERSION}"
            sha256 "${SHA_BOWRAIN}"

            url "https://github.com/neokapi/neokapi/releases/download/v#{version}/bowrain-#{version}-macOS-arm64.dmg",
                using: GitHubPrivateRepositoryReleaseDownloadStrategy
            name "Bowrain"
            desc "AI-native translation editor"
            homepage "https://github.com/neokapi/neokapi"

            depends_on formula: "neokapi/tap/bowrain-cli"

            app "Bowrain.app"

            postflight do
              system_command "/usr/bin/xattr",
                            args: ["-dr", "com.apple.quarantine", "#{appdir}/Bowrain.app"],
                            sudo: false
            end

            caveats <<~EOS
              The bowrain CLI is provided by the bowrain-cli formula (installed
              automatically). Run "bowrain ui" to launch the desktop app.
            EOS

            zap trash: [
              "~/Library/Application Support/Bowrain",
              "~/Library/Preferences/com.wails.bowrain.plist",
              "~/Library/Caches/Bowrain",
            ]
          end
          CASK

      - name: Update kapi cask
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA_KAPI: ${{ steps.checksum.outputs.KAPI_DMG }}
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/kapi.rb << CASK
          # Use absolute tap path so the require works even when Homebrew loads
          # the cask from its metadata cache during upgrades.
          require "#{Tap.fetch("neokapi", "tap").path}/lib/private_download_strategy"

          cask "kapi" do
            version "${VERSION}"
            sha256 "${SHA_KAPI}"

            url "https://github.com/neokapi/neokapi/releases/download/v#{version}/kapi-desktop-#{version}-macOS-arm64.dmg",
                using: GitHubPrivateRepositoryReleaseDownloadStrategy
            name "Kapi"
            desc "Localization toolkit - powered by neokapi"
            homepage "https://github.com/neokapi/neokapi"

            depends_on formula: "neokapi/tap/kapi-cli"

            app "Kapi.app"

            postflight do
              system_command "/usr/bin/xattr",
                            args: ["-dr", "com.apple.quarantine", "#{appdir}/Kapi.app"],
                            sudo: false
            end

            caveats <<~EOS
              The kapi CLI is provided by the kapi-cli formula (installed
              automatically). Run "kapi" for command-line usage.
            EOS

            zap trash: [
              "~/Library/Application Support/Kapi",
              "~/Library/Preferences/io.github.neokapi.kapi-desktop.plist",
              "~/Library/Caches/Kapi",
            ]
          end
          CASK

      - name: Remove old kapi-desktop cask if present
        run: |
          cd homebrew-tap
          rm -f Casks/kapi-desktop.rb

      - name: Commit and push casks
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A Casks/
          git add -A .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update casks and formulas to ${VERSION}" && git push
          fi

  update-actions:
    name: Update GitHub Actions
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump setup-bowrain
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          gh api repos/neokapi/setup-bowrain/contents/action.yml --jq '.content' | \
            base64 -d | sed "s/default: \"latest\"/default: \"${VERSION}\"/" > /tmp/action.yml
          CURRENT_SHA=$(gh api repos/neokapi/setup-bowrain/contents/action.yml --jq '.sha')
          gh api repos/neokapi/setup-bowrain/contents/action.yml \
            -X PUT \
            -f message="chore: bump default version to ${VERSION}" \
            -f content="$(base64 -w0 /tmp/action.yml)" \
            -f sha="${CURRENT_SHA}" || echo "setup-bowrain: no version default to update"

      - name: Bump setup-kapi
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          gh api repos/neokapi/setup-kapi/contents/action.yml --jq '.content' | \
            base64 -d | sed "s/default: \"latest\"/default: \"${VERSION}\"/" > /tmp/action.yml
          CURRENT_SHA=$(gh api repos/neokapi/setup-kapi/contents/action.yml --jq '.sha')
          gh api repos/neokapi/setup-kapi/contents/action.yml \
            -X PUT \
            -f message="chore: bump default version to ${VERSION}" \
            -f content="$(base64 -w0 /tmp/action.yml)" \
            -f sha="${CURRENT_SHA}" || echo "setup-kapi: no version default to update"

      - name: Tag action repos
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          for repo in setup-bowrain setup-kapi bowrain-action kapi-action; do
            MAIN_SHA=$(gh api "repos/neokapi/${repo}/git/ref/heads/main" --jq '.object.sha')
            # Create the version tag
            gh api "repos/neokapi/${repo}/git/refs" \
              -f ref="refs/tags/${TAG}" \
              -f sha="${MAIN_SHA}" 2>/dev/null || \
            gh api "repos/neokapi/${repo}/git/refs/tags/${TAG}" \
              -X PATCH \
              -f sha="${MAIN_SHA}" 2>/dev/null || true
            echo "Tagged ${repo} at ${TAG}"
          done
