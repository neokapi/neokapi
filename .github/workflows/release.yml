name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platform/package-lock.json

      - name: Install workspace dependencies
        working-directory: platform
        run: npm ci

      - name: Build shared UI package
        working-directory: platform/packages/ui
        run: npx tsc

      - name: Run UI unit tests
        working-directory: platform/packages/ui
        run: npm test

      - name: Build SaaS web UI
        working-directory: platform/apps/web
        run: npm run build

      - name: Create Bowrain frontend placeholder
        run: mkdir -p platform/apps/bowrain/frontend/dist && echo placeholder > platform/apps/bowrain/frontend/dist/index.html

      - name: Download modules
        run: |
          cd framework && go mod download && go mod verify
          cd cli && go mod download && go mod verify
          cd ../kapi && go mod download && go mod verify
          cd ../apps/kapi-desktop && go mod download && go mod verify
          cd ../../../platform/core && go mod download && go mod verify
          cd ../cli && go mod download && go mod verify
          cd .. && go mod download && go mod verify

      - name: Reset go.work.sum
        run: git checkout -- go.work.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  docker:
    name: Docker (${{ matrix.image }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: bowrain-server, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bowrain-server, arch: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64 }
          - { image: bowrain-worker, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bowrain-worker, arch: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64 }
          - { image: bowrain-web, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bowrain-web, arch: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64 }
          - { image: bravo-agent, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bravo-sandbox-node, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: bravo-sandbox-python, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
          - { image: persona-agent, arch: amd64, runner: ubuntu-latest, platform: linux/amd64 }
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "VERSION=${GITHUB_REF_NAME#v}"
            echo "COMMIT=${GH_SHA::7}"
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: platform/docker/${{ matrix.image }}/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/neokapi/${{ matrix.image }}:${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            COMMIT=${{ steps.version.outputs.COMMIT }}
            BUILD_DATE=${{ steps.version.outputs.BUILD_DATE }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

  docker-manifest:
    name: Docker Manifests
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform manifests
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          for IMAGE in bowrain-server bowrain-worker bowrain-web; do
            docker buildx imagetools create \
              -t "ghcr.io/neokapi/$IMAGE:$VERSION" \
              -t "ghcr.io/neokapi/$IMAGE:latest" \
              "ghcr.io/neokapi/$IMAGE:$VERSION-amd64" \
              "ghcr.io/neokapi/$IMAGE:$VERSION-arm64"
          done

      - name: Tag bravo images (amd64 only)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          for IMAGE in bravo-agent bravo-sandbox-node bravo-sandbox-python persona-agent; do
            docker buildx imagetools create \
              -t "ghcr.io/neokapi/$IMAGE:$VERSION" \
              -t "ghcr.io/neokapi/$IMAGE:latest" \
              "ghcr.io/neokapi/$IMAGE:$VERSION-amd64"
          done

  docker-keycloak:
    name: Docker (bowrain-keycloak)
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-ui

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Keycloak theme
        run: make -C platform keycloak-theme

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push keycloak image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: platform/docker/keycloak/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bowrain-keycloak:${{ steps.version.outputs.VERSION }}
            ghcr.io/neokapi/bowrain-keycloak:${{ github.sha }}
            ghcr.io/neokapi/bowrain-keycloak:latest
          cache-from: type=gha,scope=bowrain-keycloak
          cache-to: type=gha,mode=max,scope=bowrain-keycloak

  build-bowrain:
    name: Build Bowrain (${{ matrix.build.platform }})
    strategy:
      fail-fast: false
      matrix:
        build:
          - { platform: linux/amd64, os: ubuntu-latest, arch: amd64 }
          - { platform: linux/arm64, os: ubuntu-24.04-arm, arch: arm64 }
          - { platform: windows/amd64, os: windows-latest, arch: amd64 }
          - { platform: windows/arm64, os: windows-latest, arch: arm64 }
          - { platform: darwin/universal, os: macos-latest, arch: universal }
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Compute build metadata
        id: meta
        shell: bash
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "VERSION=${GITHUB_REF_NAME#v}"
            echo "COMMIT=${GH_SHA::7}"
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "LDFLAGS=-w -s -X github.com/neokapi/neokapi/core/version.Version=${GITHUB_REF_NAME#v} -X github.com/neokapi/neokapi/core/version.Commit=${GH_SHA::7} -X github.com/neokapi/neokapi/core/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install workspace dependencies
        working-directory: platform
        run: npm ci

      - name: Build shared UI package
        working-directory: platform/packages/ui
        run: npx tsc

      # Build frontend and assets manually to avoid Wails Taskfile running
      # `npm install` which conflicts with the workspace npm ci above.
      - name: Generate Wails bindings
        working-directory: platform/apps/bowrain
        shell: bash
        env:
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          go mod tidy
          wails3 generate bindings -f "-tags production -trimpath -buildvcs=false -ldflags=\"${BUILD_LDFLAGS}\"" -clean=true
          # shellcheck disable=SC2016
          sed -i.bak 's/= $0\./= store$0./g' frontend/bindings/github.com/neokapi/neokapi/bowrain/apps/bowrain/backend/app.js
          rm -f frontend/bindings/github.com/neokapi/neokapi/bowrain/apps/bowrain/backend/app.js.bak

      - name: Build Bowrain frontend
        working-directory: platform/apps/bowrain/frontend
        run: npm run build

      - name: Generate icons
        working-directory: platform/apps/bowrain/build
        run: wails3 generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico

      - name: Generate Windows resources
        if: runner.os == 'Windows'
        working-directory: platform/apps/bowrain
        shell: bash
        run: wails3 generate syso -arch ${{ matrix.build.arch }} -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_${{ matrix.build.arch }}.syso

      - name: Build Bowrain (Linux)
        if: runner.os == 'Linux'
        working-directory: platform/apps/bowrain
        env:
          GOOS: linux
          CGO_ENABLED: "1"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o bin/Bowrain

      - name: Build Bowrain (Windows)
        if: runner.os == 'Windows'
        working-directory: platform/apps/bowrain
        shell: bash
        env:
          GOOS: windows
          GOARCH: ${{ matrix.build.arch }}
          CGO_ENABLED: "0"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS} -H windowsgui" -o bin/Bowrain.exe
          rm -f ./*.syso

      - name: Build Bowrain (macOS universal)
        if: runner.os == 'macOS'
        working-directory: platform/apps/bowrain
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-mmacosx-version-min=10.15"
          CGO_LDFLAGS: "-mmacosx-version-min=10.15"
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          GOOS=darwin GOARCH=arm64 go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o bin/Bowrain-arm64
          GOOS=darwin GOARCH=amd64 go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o bin/Bowrain-amd64
          lipo -create -output bin/Bowrain bin/Bowrain-amd64 bin/Bowrain-arm64
          rm bin/Bowrain-amd64 bin/Bowrain-arm64

      - name: Create macOS .app bundle
        if: runner.os == 'macOS'
        working-directory: platform/apps/bowrain
        run: |
          mkdir -p bin/Bowrain.app/Contents/MacOS
          mkdir -p bin/Bowrain.app/Contents/Resources
          cp build/darwin/icons.icns bin/Bowrain.app/Contents/Resources
          cp bin/Bowrain bin/Bowrain.app/Contents/MacOS
          cp build/darwin/Info.plist bin/Bowrain.app/Contents

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # macOS: Import Developer ID certificate for code signing
      - name: Import signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "No signing certificate configured — will use ad-hoc signing"
            exit 0
          fi
          # Decode certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Clean up certificate file
          rm /tmp/certificate.p12

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # macOS: Sign with Developer ID or ad-hoc fallback
      - name: Sign macOS app bundle
        if: runner.os == 'macOS'
        working-directory: platform/apps/bowrain
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          if [ -n "$APPLE_SIGN_IDENTITY" ]; then
            echo "Signing with Developer ID: $APPLE_SIGN_IDENTITY"
            codesign --force --deep --options runtime \
              --entitlements build/darwin/entitlements.plist \
              --sign "$APPLE_SIGN_IDENTITY" \
              bin/Bowrain.app
          else
            echo "No APPLE_SIGN_IDENTITY set — using ad-hoc signing"
            codesign --force --deep --sign - bin/Bowrain.app
          fi

      # macOS: Create DMG (output to repo root for upload step)
      - name: Create DMG
        if: runner.os == 'macOS'
        working-directory: platform/apps/bowrain
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p dmg
          cp -R bin/Bowrain.app dmg/
          ln -s /Applications dmg/Applications
          hdiutil create \
            -volname "Bowrain v${VERSION}" \
            -srcfolder dmg \
            -ov \
            -format UDZO \
            "../../../bowrain-${VERSION}-macOS-universal.dmg"

      # macOS: Sign DMG with Developer ID if available
      - name: Sign DMG
        if: runner.os == 'macOS'
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG="bowrain-${VERSION}-macOS-universal.dmg"
          if [ -n "$APPLE_SIGN_IDENTITY" ]; then
            codesign --force --sign "$APPLE_SIGN_IDENTITY" "$DMG"
          fi

      # macOS: Notarize DMG with Apple
      - name: Notarize DMG
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ -z "$APPLE_ID" ]; then
            echo "No APPLE_ID set — skipping notarization"
            exit 0
          fi
          DMG="bowrain-${VERSION}-macOS-universal.dmg"
          echo "Submitting $DMG for notarization..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m
          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG"

      # macOS: Clean up keychain
      - name: Clean up signing keychain
        if: always() && runner.os == 'macOS'
        env:
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Upload DMG to release
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-macOS-universal.dmg"

      # Windows: Create ZIP
      - name: Create ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "platform/apps/bowrain/bin/Bowrain.exe" -DestinationPath "bowrain-${{ steps.version.outputs.VERSION }}-windows-${{ matrix.build.arch }}.zip"

      - name: Upload ZIP to release
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-windows-${{ matrix.build.arch }}.zip"

      # Linux: Create tarball
      - name: Create tarball
        if: runner.os == 'Linux'
        run: |
          tar -czf "bowrain-${{ steps.version.outputs.VERSION }}-linux-${{ matrix.build.arch }}.tar.gz" \
            -C platform/apps/bowrain/bin Bowrain

      - name: Upload tarball to release
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-linux-${{ matrix.build.arch }}.tar.gz"

  build-kapi-desktop:
    name: Build Kapi Desktop (${{ matrix.build.platform }})
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        build:
          - { platform: linux/amd64, os: ubuntu-latest, arch: amd64 }
          - { platform: linux/arm64, os: ubuntu-24.04-arm, arch: arm64 }
          - { platform: windows/amd64, os: windows-latest, arch: amd64 }
          - { platform: windows/arm64, os: windows-latest, arch: arm64 }
          - { platform: darwin/universal, os: macos-latest, arch: universal }
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Compute build metadata
        id: meta
        shell: bash
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "VERSION=${GITHUB_REF_NAME#v}"
            echo "COMMIT=${GH_SHA::7}"
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "LDFLAGS=-w -s -X github.com/neokapi/neokapi/core/version.Version=${GITHUB_REF_NAME#v} -X github.com/neokapi/neokapi/core/version.Commit=${GH_SHA::7} -X github.com/neokapi/neokapi/core/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install shared package dependencies
        run: |
          cd packages/ui && npm install
          cd ../../packages/flow-editor && npm install

      - name: Install Kapi Desktop frontend dependencies
        working-directory: framework/apps/kapi-desktop/frontend
        run: npm install

      - name: Generate Wails bindings
        working-directory: framework/apps/kapi-desktop
        shell: bash
        env:
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          go mod tidy
          wails3 generate bindings -f "-tags production -trimpath -buildvcs=false -ldflags=\"${BUILD_LDFLAGS}\"" -clean=true

      - name: Build Kapi Desktop frontend
        working-directory: framework/apps/kapi-desktop/frontend
        run: npm run build

      - name: Generate icons
        working-directory: framework/apps/kapi-desktop/build
        run: wails3 generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico

      - name: Generate Windows resources
        if: runner.os == 'Windows'
        working-directory: framework/apps/kapi-desktop
        shell: bash
        run: wails3 generate syso -arch ${{ matrix.build.arch }} -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_${{ matrix.build.arch }}.syso

      - name: Build Kapi Desktop (Linux)
        if: runner.os == 'Linux'
        working-directory: framework/apps/kapi-desktop
        env:
          GOOS: linux
          CGO_ENABLED: "1"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o bin/Kapi

      - name: Build Kapi Desktop (Windows)
        if: runner.os == 'Windows'
        working-directory: framework/apps/kapi-desktop
        shell: bash
        env:
          GOOS: windows
          GOARCH: ${{ matrix.build.arch }}
          CGO_ENABLED: "0"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS} -H windowsgui" -o bin/Kapi.exe
          rm -f ./*.syso

      - name: Build Kapi Desktop (macOS universal)
        if: runner.os == 'macOS'
        working-directory: framework/apps/kapi-desktop
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-mmacosx-version-min=10.15"
          CGO_LDFLAGS: "-mmacosx-version-min=10.15"
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          BUILD_LDFLAGS: ${{ steps.meta.outputs.LDFLAGS }}
        run: |
          GOOS=darwin GOARCH=arm64 go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o bin/Kapi-arm64
          GOOS=darwin GOARCH=amd64 go build -tags production -trimpath -buildvcs=false -ldflags="${BUILD_LDFLAGS}" -o bin/Kapi-amd64
          lipo -create -output bin/Kapi bin/Kapi-amd64 bin/Kapi-arm64
          rm bin/Kapi-amd64 bin/Kapi-arm64

      - name: Create macOS .app bundle
        if: runner.os == 'macOS'
        working-directory: framework/apps/kapi-desktop
        run: |
          mkdir -p bin/Kapi.app/Contents/MacOS
          mkdir -p bin/Kapi.app/Contents/Resources
          cp build/darwin/icons.icns bin/Kapi.app/Contents/Resources
          cp bin/Kapi bin/Kapi.app/Contents/MacOS
          cp build/darwin/Info.plist bin/Kapi.app/Contents

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "No signing certificate configured — will use ad-hoc signing"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          rm /tmp/certificate.p12
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign macOS app bundle
        if: runner.os == 'macOS'
        working-directory: framework/apps/kapi-desktop
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          if [ -n "$APPLE_SIGN_IDENTITY" ]; then
            echo "Signing with Developer ID: $APPLE_SIGN_IDENTITY"
            codesign --force --deep --options runtime \
              --entitlements build/darwin/entitlements.plist \
              --sign "$APPLE_SIGN_IDENTITY" \
              bin/Kapi.app
          else
            echo "No APPLE_SIGN_IDENTITY set — using ad-hoc signing"
            codesign --force --deep --sign - bin/Kapi.app
          fi

      - name: Create DMG
        if: runner.os == 'macOS'
        working-directory: framework/apps/kapi-desktop
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p dmg
          cp -R bin/Kapi.app dmg/
          ln -s /Applications dmg/Applications
          hdiutil create \
            -volname "Kapi v${VERSION}" \
            -srcfolder dmg \
            -ov \
            -format UDZO \
            "../../../kapi-desktop-${VERSION}-macOS-universal.dmg"

      - name: Sign DMG
        if: runner.os == 'macOS'
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DMG="kapi-desktop-${VERSION}-macOS-universal.dmg"
          if [ -n "$APPLE_SIGN_IDENTITY" ]; then
            codesign --force --sign "$APPLE_SIGN_IDENTITY" "$DMG"
          fi

      - name: Notarize DMG
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ -z "$APPLE_ID" ]; then
            echo "No APPLE_ID set — skipping notarization"
            exit 0
          fi
          DMG="kapi-desktop-${VERSION}-macOS-universal.dmg"
          echo "Submitting $DMG for notarization..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m
          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG"

      - name: Clean up signing keychain
        if: always() && runner.os == 'macOS'
        env:
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Upload DMG to release
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: "kapi-desktop-${{ steps.version.outputs.VERSION }}-macOS-universal.dmg"

      - name: Create ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "framework/apps/kapi-desktop/bin/Kapi.exe" -DestinationPath "kapi-desktop-${{ steps.version.outputs.VERSION }}-windows-${{ matrix.build.arch }}.zip"

      - name: Upload ZIP to release
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: "kapi-desktop-${{ steps.version.outputs.VERSION }}-windows-${{ matrix.build.arch }}.zip"

      - name: Create tarball
        if: runner.os == 'Linux'
        run: |
          tar -czf "kapi-desktop-${{ steps.version.outputs.VERSION }}-linux-${{ matrix.build.arch }}.tar.gz" \
            -C framework/apps/kapi-desktop/bin Kapi

      - name: Upload tarball to release
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: "kapi-desktop-${{ steps.version.outputs.VERSION }}-linux-${{ matrix.build.arch }}.tar.gz"

  update-casks:
    name: Update Homebrew Casks
    runs-on: ubuntu-latest
    needs: [build-bowrain, build-kapi-desktop]
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMGs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*-macOS-universal.dmg"

      - name: Compute checksums
        id: checksum
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          echo "BOWRAIN_DMG=$(sha256sum bowrain-${VERSION}-macOS-universal.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "KAPI_DMG=$(sha256sum kapi-desktop-${VERSION}-macOS-universal.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: neokapi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update bowrain cask
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA_BOWRAIN: ${{ steps.checksum.outputs.BOWRAIN_DMG }}
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/bowrain.rb << CASK
          # Use absolute tap path so the require works even when Homebrew loads
          # the cask from its metadata cache during upgrades.
          require "#{Tap.fetch("neokapi", "tap").path}/lib/private_download_strategy"

          cask "bowrain" do
            version "${VERSION}"
            sha256 "${SHA_BOWRAIN}"

            url "https://github.com/neokapi/neokapi/releases/download/v#{version}/bowrain-#{version}-macOS-universal.dmg",
                using: GitHubPrivateRepositoryReleaseDownloadStrategy
            name "Bowrain"
            desc "AI-native translation editor"
            homepage "https://github.com/neokapi/neokapi"

            depends_on formula: "neokapi/tap/bowrain-cli"

            app "Bowrain.app"

            postflight do
              system_command "/usr/bin/xattr",
                            args: ["-dr", "com.apple.quarantine", "#{appdir}/Bowrain.app"],
                            sudo: false
            end

            caveats <<~EOS
              The bowrain CLI is provided by the bowrain-cli formula (installed
              automatically). Run "bowrain ui" to launch the desktop app.
            EOS

            zap trash: [
              "~/Library/Application Support/Bowrain",
              "~/Library/Preferences/com.wails.bowrain.plist",
              "~/Library/Caches/Bowrain",
            ]
          end
          CASK

      - name: Update kapi-desktop cask
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA_KAPI: ${{ steps.checksum.outputs.KAPI_DMG }}
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/kapi-desktop.rb << CASK
          # Use absolute tap path so the require works even when Homebrew loads
          # the cask from its metadata cache during upgrades.
          require "#{Tap.fetch("neokapi", "tap").path}/lib/private_download_strategy"

          cask "kapi-desktop" do
            version "${VERSION}"
            sha256 "${SHA_KAPI}"

            url "https://github.com/neokapi/neokapi/releases/download/v#{version}/kapi-desktop-#{version}-macOS-universal.dmg",
                using: GitHubPrivateRepositoryReleaseDownloadStrategy
            name "Kapi"
            desc "Localization toolkit - powered by neokapi"
            homepage "https://github.com/neokapi/neokapi"

            depends_on formula: "neokapi/tap/kapi"

            app "Kapi.app"

            postflight do
              system_command "/usr/bin/xattr",
                            args: ["-dr", "com.apple.quarantine", "#{appdir}/Kapi.app"],
                            sudo: false
            end

            caveats <<~EOS
              The kapi CLI is provided by the kapi formula (installed
              automatically). Run "kapi" for command-line usage.
            EOS

            zap trash: [
              "~/Library/Application Support/Kapi",
              "~/Library/Preferences/io.github.neokapi.kapi-desktop.plist",
              "~/Library/Caches/Kapi",
            ]
          end
          CASK

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/bowrain.rb Casks/kapi-desktop.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update casks to ${VERSION}" && git push
          fi
