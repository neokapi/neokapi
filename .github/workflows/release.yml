name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  build-bowrain-macos:
    name: Build Bowrain (macOS)
    runs-on: macos-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd apps/bowrain/frontend && npm install

      - name: Build frontend
        run: cd apps/bowrain/frontend && npm run build

      - name: Build Bowrain (universal binary)
        run: cd apps/bowrain && wails build -platform darwin/universal -clean

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        run: |
          mkdir -p dmg
          cp -R apps/bowrain/build/bin/Bowrain.app dmg/
          ln -s /Applications dmg/Applications
          hdiutil create \
            -volname "Bowrain v${{ steps.version.outputs.VERSION }}" \
            -srcfolder dmg \
            -ov \
            -format UDZO \
            "bowrain-${{ steps.version.outputs.VERSION }}-macOS-universal.dmg"

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v1
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-macOS-universal.dmg"

  update-homebrew-cask:
    name: Update Homebrew Cask
    runs-on: ubuntu-latest
    needs: build-bowrain-macos
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for DMG asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET="bowrain-${{ steps.version.outputs.VERSION }}-macOS-universal.dmg"
          for i in $(seq 1 30); do
            if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json assets -q ".assets[].name" | grep -q "$ASSET"; then
              echo "Asset found: $ASSET"
              exit 0
            fi
            echo "Waiting for asset ($i/30)..."
            sleep 10
          done
          echo "Timed out waiting for asset"
          exit 1

      - name: Download DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "bowrain-${{ steps.version.outputs.VERSION }}-macOS-universal.dmg"

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(sha256sum "bowrain-${{ steps.version.outputs.VERSION }}-macOS-universal.dmg" | awk '{print $1}')
          echo "SHA256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: gokapi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/bowrain.rb << 'CASK'
          cask "bowrain" do
            version "${{ steps.version.outputs.VERSION }}"
            sha256 "${{ steps.sha.outputs.SHA256 }}"

            url "https://github.com/gokapi/gokapi/releases/download/v#{version}/bowrain-#{version}-macOS-universal.dmg"
            name "Bowrain"
            desc "AI-native translation editor"
            homepage "https://github.com/gokapi/gokapi"

            app "Bowrain.app"
          end
          CASK

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/bowrain.rb
          git commit -m "Update bowrain cask to ${{ steps.version.outputs.VERSION }}"
          git push

  build-bowrain-windows:
    name: Build Bowrain (Windows)
    runs-on: windows-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd apps/bowrain/frontend && npm install

      - name: Build frontend
        run: cd apps/bowrain/frontend && npm run build

      - name: Build Bowrain
        run: cd apps/bowrain && wails build -platform windows/amd64 -clean

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "apps/bowrain/build/bin/Bowrain.exe" -DestinationPath "bowrain-${{ steps.version.outputs.VERSION }}-windows-amd64.zip"

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v1
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-windows-amd64.zip"

  build-bowrain-linux:
    name: Build Bowrain (Linux)
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd apps/bowrain/frontend && npm install

      - name: Build frontend
        run: cd apps/bowrain/frontend && npm run build

      - name: Build Bowrain
        run: cd apps/bowrain && wails build -platform linux/amd64 -clean -tags webkit2_41

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create tarball
        run: |
          tar -czf "bowrain-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz" \
            -C apps/bowrain/build/bin bowrain

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v1
        with:
          files: "bowrain-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz"
