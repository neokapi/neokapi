name: Deploy Server + Worker

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'platform/**'
      - 'bowrain/**'
      - '!bowrain/apps/web/**'
      - '!bowrain/apps/keycloak-theme/**'
      - 'docker/bowrain-server/**'
      - 'docker/bowrain-worker/**'
      - 'go.mod'
      - 'go.sum'
      - 'go.work'

permissions:
  packages: write
  contents: read

jobs:
  image-tag:
    name: Compute Image Tag
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.tag.outputs.value }}
    steps:
      - name: Compute image tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
          GH_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=${GH_SHA}-${INPUT_ENV}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GH_SHA}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build Server Images
    needs: image-tag
    uses: ./.github/workflows/build-server-images.yml
    with:
      image-tag: ${{ needs.image-tag.outputs.value }}

  trigger-deploy:
    name: Trigger Deploy
    needs: [image-tag, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GOKAPI_REGISTRY_TOKEN }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
      IMAGE_TAG: ${{ needs.image-tag.outputs.value }}
    steps:
      - name: Deploy server
        run: |
          gh workflow run deploy-server.yml \
            --repo gokapi/bowrain-infra \
            -f environment="$ENVIRONMENT" \
            -f imageTag="$IMAGE_TAG"

      - name: Deploy worker
        run: |
          gh workflow run deploy-worker.yml \
            --repo gokapi/bowrain-infra \
            -f environment="$ENVIRONMENT" \
            -f imageTag="$IMAGE_TAG"
