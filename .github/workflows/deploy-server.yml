name: Deploy Server + Worker

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]
    paths:
      - "bowrain/**"
      - "!bowrain/apps/web/**"
      - "!bowrain/apps/keycloak-theme/**"
      - "!bowrain/cli/**"

permissions:
  packages: write
  contents: read

jobs:
  image-tag:
    name: Compute Image Tag & Version
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.tag.outputs.value }}
      version: ${{ steps.meta.outputs.version }}
      commit: ${{ steps.meta.outputs.commit }}
      build_date: ${{ steps.meta.outputs.build_date }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute image tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
          GH_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=${GH_SHA}-${INPUT_ENV}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GH_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute build metadata
        id: meta
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "version=$(git describe --tags --always 2>/dev/null || echo dev)"
            echo "commit=${GH_SHA::7}"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build Server Images
    needs: image-tag
    uses: ./.github/workflows/_build-server-images.yml
    with:
      image-tag: ${{ needs.image-tag.outputs.value }}
      version: ${{ needs.image-tag.outputs.version }}
      commit: ${{ needs.image-tag.outputs.commit }}
      build-date: ${{ needs.image-tag.outputs.build_date }}

  build-bravo:
    name: Build Bravo Agent Images
    needs: image-tag
    uses: ./.github/workflows/_build-bravo-images.yml
    with:
      image-tag: ${{ needs.image-tag.outputs.value }}

  trigger-deploy:
    name: Trigger Server Deploy
    needs: [image-tag, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.NEOKAPI_GITHUB_TOKEN }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
      IMAGE_TAG: ${{ needs.image-tag.outputs.value }}
    steps:
      - name: Deploy server
        run: |
          gh workflow run deploy-server.yml \
            --repo neokapi/bowrain-infra \
            -f environment="$ENVIRONMENT" \
            -f imageTag="$IMAGE_TAG"

      - name: Deploy worker
        run: |
          gh workflow run deploy-worker.yml \
            --repo neokapi/bowrain-infra \
            -f environment="$ENVIRONMENT" \
            -f imageTag="$IMAGE_TAG"

  trigger-agent-deploy:
    name: Trigger Agent Deploy
    needs: [image-tag, build-bravo]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.NEOKAPI_GITHUB_TOKEN }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
      IMAGE_TAG: ${{ needs.image-tag.outputs.value }}
    steps:
      - name: Deploy bravo agent
        run: |
          gh workflow run deploy-bravo-agent.yml \
            --repo neokapi/bowrain-infra \
            -f environment="$ENVIRONMENT" \
            -f imageTag="$IMAGE_TAG"
