name: Release PDFium plugin

# Builds, (on tags) signs, and publishes the kapi-pdfium plugin tarball per
# platform. Decoupled from the main kapi release (its own cgo matrix + native
# libpdfium bundling), like release-sat.yml.
#
#   * workflow_dispatch  → build-only dry run across the matrix (no sign/publish).
#                          Use this to validate the platform matrix before tagging.
#   * push tag pdfium-v* → build + sign + publish + register in the registry.
on:
  push:
    tags:
      - "pdfium-v*"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write # cosign keyless OIDC (tag publishes)

env:
  # bblanchon pdfium-binaries release to bundle (shared libs), pinned for
  # reproducible releases. workflow_dispatch dry-runs use this too.
  PDFIUM_RELEASE: chromium/7891

jobs:
  build-pdfium-plugin:
    name: Build kapi-pdfium plugin (${{ matrix.build.platform }})
    strategy:
      fail-fast: false
      matrix:
        # Windows links pdfium.dll directly via GNU ld's -l:pdfium.dll
        # (package-pdfium-plugin.sh) — no MSVC/GNU import-lib mismatch.
        build:
          - { platform: darwin/arm64,  os: macos-latest,     goos: darwin,  goarch: arm64, asset: pdfium-mac-arm64.tgz }
          - { platform: linux/amd64,   os: ubuntu-latest,    goos: linux,   goarch: amd64, asset: pdfium-linux-x64.tgz }
          - { platform: linux/arm64,   os: ubuntu-24.04-arm, goos: linux,   goarch: arm64, asset: pdfium-linux-arm64.tgz }
          - { platform: windows/amd64, os: windows-2025,     goos: windows, goarch: amd64, asset: pdfium-win-x64.tgz }
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # Disable the build cache: cgo bakes the resolved pkg-config flags
          # (PDFium -L/-I paths) into cached objects, so a restored cache from a
          # run with a different pdfium dir poisons the link (stale -L, duplicate
          # -rpath). A release lane wants deterministic, cache-free builds.
          cache: false

      - name: Install pkg-config (Windows)
        if: runner.os == 'Windows'
        run: choco install -y pkgconfiglite

      - name: Extract version
        id: version
        shell: bash
        run: |
          ref="${GITHUB_REF#refs/tags/pdfium-v}"
          if [ "$ref" = "$GITHUB_REF" ]; then ref="0.0.0-dev"; fi
          echo "version=$ref" >> "$GITHUB_OUTPUT"

      - name: Download + extract bblanchon PDFium (shared)
        shell: bash
        run: |
          set -euo pipefail
          if [ "$PDFIUM_RELEASE" = "latest" ]; then
            url="https://github.com/bblanchon/pdfium-binaries/releases/latest/download/${{ matrix.build.asset }}"
          else
            url="https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_RELEASE}/${{ matrix.build.asset }}"
          fi
          echo "downloading $url"
          # Use a repo-relative work dir: on Windows git-bash, an absolute
          # $RUNNER_TEMP ("D:\a\_temp\…") confuses tar (drive letter parsed as a
          # host) and mingw; a relative POSIX path is safe on every platform.
          mkdir -p pdfium-work/pdfium
          curl -sSL "$url" | tar xz -C pdfium-work/pdfium
          ls pdfium-work/pdfium pdfium-work/pdfium/lib pdfium-work/pdfium/bin 2>/dev/null || true

      - name: Build + package kapi-pdfium tarball
        id: package
        shell: bash
        env:
          GOOS: ${{ matrix.build.goos }}
          GOARCH: ${{ matrix.build.goarch }}
        run: |
          scripts/package-pdfium-plugin.sh \
            --version "${{ steps.version.outputs.version }}" \
            --pdfium-dir pdfium-work/pdfium \
            --out-dir pdfium-work/dist

      - name: Install cosign (tarball signing)
        if: startsWith(github.ref, 'refs/tags/pdfium-v')
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign tarball (keyless)
        if: startsWith(github.ref, 'refs/tags/pdfium-v')
        shell: bash
        env:
          TARBALL: ${{ steps.package.outputs.tarball }}
        run: |
          cosign sign-blob --yes --new-bundle-format \
            --bundle "${TARBALL}.sigstore.json" "${TARBALL}"

      - name: Upload tarball (+ signature on tags)
        uses: actions/upload-artifact@v4
        with:
          name: pdfium-tarball-${{ matrix.build.goos }}-${{ matrix.build.goarch }}
          path: |
            pdfium-work/dist/kapi-pdfium_*.tar.gz
            pdfium-work/dist/kapi-pdfium_*.tar.gz.sigstore.json
          if-no-files-found: error

      - name: Write checksum artifact
        if: startsWith(github.ref, 'refs/tags/pdfium-v')
        shell: bash
        env:
          TARBALL: ${{ steps.package.outputs.tarball }}
          SHA: ${{ steps.package.outputs.sha256 }}
        run: |
          mkdir -p checksums
          echo "${SHA}  $(basename "$TARBALL")" > "checksums/$(basename "$TARBALL").sha256"

      - name: Upload checksum artifact
        if: startsWith(github.ref, 'refs/tags/pdfium-v')
        uses: actions/upload-artifact@v4
        with:
          name: pdfium-checksum-${{ matrix.build.goos }}-${{ matrix.build.goarch }}
          path: checksums/*.sha256
          if-no-files-found: error

  publish-pdfium-plugin:
    name: Publish kapi-pdfium release
    if: startsWith(github.ref, 'refs/tags/pdfium-v')
    needs: build-pdfium-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all tarball + signature artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: pdfium-tarball-*
          merge-multiple: true

      # Creates the GitHub release for the tag if it doesn't exist and uploads
      # all tarballs + sigstore bundles (softprops, same as the main release).
      - name: Publish kapi-pdfium release
        uses: softprops/action-gh-release@v3
        with:
          # Plugin has its own tag line (pdfium-v*); it must NOT become the repo's
          # "latest" release, or setup-kapi's version resolver (which reads
          # releases/latest) would pick up the plugin tag instead of the CLI.
          make_latest: false
          files: dist/*
          fail_on_unmatched_files: true

  register-pdfium-plugin:
    name: Register kapi-pdfium in plugin registry
    if: startsWith(github.ref, 'refs/tags/pdfium-v')
    needs: publish-pdfium-plugin
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Download checksum artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pdfium-checksum-*
          path: pdfium-checksums
          merge-multiple: true

      - name: Update plugin registry (pdfium)
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#pdfium-v}"
          if [ -z "${REGISTRY_TOKEN:-}" ]; then
            echo "REGISTRY_TOKEN not set; skipping registry update"
            exit 0
          fi
          GOBIN=/tmp go install github.com/neokapi/registry/tools/registry-update@main

          declare -A SHAS
          for f in pdfium-checksums/*.sha256; do
            [ -f "$f" ] || continue
            SHAS[$(awk '{print $2}' "$f")]=$(awk '{print $1}' "$f")
          done

          REPO_URL="https://github.com/${REPO}/releases/download/${REF_NAME}"
          CERT_ID="https://github.com/${REPO}/.github/workflows/release-pdfium.yml@refs/tags/${REF_NAME}"
          declare -a ARGS
          for plat in darwin/arm64 linux/amd64 linux/arm64 windows/amd64; do
            os=${plat%/*}; arch=${plat#*/}
            file="kapi-pdfium_${VERSION}_${os}_${arch}.tar.gz"
            if [ -n "${SHAS[$file]:-}" ]; then
              ARGS+=("--platform" "$plat" "--url" "${REPO_URL}/${file}" "--sha256" "${SHAS[$file]}" "--signature" "${REPO_URL}/${file}.sigstore.json")
            else
              echo "::warning::no checksum for ${file}; skipping ${plat}"
            fi
          done
          [ ${#ARGS[@]} -gt 0 ] || { echo "::error::no platform artifacts for pdfium ${VERSION}"; exit 1; }

          git clone "https://x-access-token:${REGISTRY_TOKEN}@github.com/neokapi/registry.git" /tmp/registry
          # Requires the pdfium plugin stub to already exist in manifest-plugins.json.
          /tmp/registry-update \
            --registry /tmp/registry/manifest-plugins.json \
            --plugin pdfium --version "$VERSION" --channel stable \
            --released "$(date -u +%Y-%m-%d)" \
            --cert-identity "$CERT_ID" \
            --cert-oidc-issuer https://token.actions.githubusercontent.com \
            "${ARGS[@]}"
          cd /tmp/registry
          git config user.email "release-bot@neokapi.dev"
          git config user.name "release-bot"
          git add manifest-plugins.json
          if ! git diff --staged --quiet; then
            git commit -m "Register pdfium ${VERSION}"
            git push
          fi
