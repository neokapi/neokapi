name: Prune PR Preview

# When a PR closes (merged or not), its preview under /web/prs/<N>/ and
# /storybook/prs/<N>/ is dead weight. Previews now live in Cloudflare R2 (under
# the previews/ prefix, served by the neokapi-pr-previews Worker), not in the
# neokapi.github.io git repo, so teardown is an R2 delete — instant, and it
# actually reclaims the storage (the old git prune only removed files from the
# tip; every binary stayed in history forever and bloated the repo to GB).
#
# This also reclaims the per-PR Actions caches the closed PR's CI runs created.

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number whose preview to prune"
        required: true

permissions:
  contents: read

concurrency:
  group: prune-pr-preview-${{ github.event.pull_request.number || github.event.inputs.pr }}
  cancel-in-progress: false

jobs:
  prune-preview:
    name: Prune R2 preview
    runs-on: ubuntu-latest
    # Fork PRs never got a preview (the deploy needs the R2 secret); only run
    # for same-repo PRs and manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      PR: ${{ github.event.pull_request.number || github.event.inputs.pr }}
    steps:
      - uses: actions/checkout@v7
      - name: Validate PR number
        run: |
          # PR comes from github.event (an integer for pull_request) or an
          # untrusted manual workflow_dispatch input; hard-validate it is purely
          # numeric before it reaches a path/rm.
          case "$PR" in
            ''|*[!0-9]*) echo "::error::PR must be a number, got: '$PR'"; exit 1 ;;
          esac
      - name: Remove preview from R2
        env:
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: bash scripts/prune-pr-preview.sh "$PR"

  # Reclaim the Actions caches a closed PR's CI runs created. PR runs are scoped
  # to refs/pull/<N>/merge; once the PR is closed those build/test caches are
  # dead weight. The repo's cache total runs near GitHub's 10 GB cap, where
  # least-recently-used eviction starts dropping still-useful caches (the shared
  # module cache, main's race-instrumented build cache), so freeing per-PR
  # caches on close keeps the working set healthy. A reopened/next PR rewarms
  # from the most recent same-flavor cache via restore-keys.
  prune-caches:
    name: Prune PR caches
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete caches scoped to the closed PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number || github.event.inputs.pr }}
        run: |
          set -euo pipefail
          # PR is an integer from the pull_request event or an untrusted manual
          # input; hard-validate it is purely numeric before it reaches an API ref.
          case "$PR" in
            ''|*[!0-9]*) echo "::error::PR must be a number, got: '$PR'"; exit 1 ;;
          esac
          ref="refs/pull/${PR}/merge"
          ids=$(gh api --paginate \
            "repos/${REPO}/actions/caches?ref=${ref}&per_page=100" \
            --jq '.actions_caches[].id')
          if [ -z "$ids" ]; then
            echo "::notice::no caches for PR #${PR}"
            exit 0
          fi
          for id in $ids; do
            gh api -X DELETE "repos/${REPO}/actions/caches/${id}" >/dev/null \
              && echo "deleted cache ${id}"
          done
