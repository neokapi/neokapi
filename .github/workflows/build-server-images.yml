name: Build Server Images

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag'
        required: true
        type: string

jobs:
  build:
    name: Build Server & Worker Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/bowrain-server/Dockerfile
          push: true
          tags: |
            ghcr.io/gokapi/bowrain-server:${{ inputs.image-tag }}
            ghcr.io/gokapi/bowrain-server:latest
          cache-from: |
            type=gha,scope=bowrain-server
            type=gha,scope=bowrain-worker
          cache-to: type=gha,mode=max,scope=bowrain-server

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/bowrain-worker/Dockerfile
          push: true
          tags: |
            ghcr.io/gokapi/bowrain-worker:${{ inputs.image-tag }}
            ghcr.io/gokapi/bowrain-worker:latest
          cache-from: |
            type=gha,scope=bowrain-worker
            type=gha,scope=bowrain-server
          cache-to: type=gha,mode=max,scope=bowrain-worker
