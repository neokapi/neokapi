name: Dependabot Go Tidy

on: pull_request

permissions:
  contents: write

jobs:
  tidy:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Tidy all modules
        env:
          GOTOOLCHAIN: local
        run: |
          for dir in . cli kapi apps/kapi-desktop bowrain/core bowrain/cli bowrain; do
            echo "Tidying $dir..."
            (cd "$dir" && go mod tidy)
          done

      - name: Push if changed
        run: |
          if git diff --quiet -- '**go.mod' '**go.sum'; then
            echo "All modules already tidy"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.mod' '*.sum'
          git commit -m "chore: go mod tidy across all modules"
          git push
