name: _Build Server Images

on:
  workflow_call:
    inputs:
      image-tag:
        description: "Image tag"
        required: true
        type: string
      version:
        description: "Version string (e.g. 0.3.0 or v0.3.0-5-gabcdef)"
        required: false
        type: string
        default: "dev"
      commit:
        description: "Git commit short SHA"
        required: false
        type: string
        default: "unknown"
      build-date:
        description: "Build date (ISO 8601)"
        required: false
        type: string
        default: "unknown"

jobs:
  build:
    name: Build Server & Worker Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/bowrain-server/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bowrain-server:${{ inputs.image-tag }}
            ghcr.io/neokapi/bowrain-server:latest
          build-args: |
            VERSION=${{ inputs.version }}
            COMMIT=${{ inputs.commit }}
            BUILD_DATE=${{ inputs.build-date }}
          cache-from: |
            type=gha,scope=bowrain-server
            type=gha,scope=bowrain-worker
          cache-to: type=gha,mode=max,scope=bowrain-server

      - name: Build and push worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/bowrain-worker/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bowrain-worker:${{ inputs.image-tag }}
            ghcr.io/neokapi/bowrain-worker:latest
          build-args: |
            VERSION=${{ inputs.version }}
            COMMIT=${{ inputs.commit }}
            BUILD_DATE=${{ inputs.build-date }}
          cache-from: |
            type=gha,scope=bowrain-worker
            type=gha,scope=bowrain-server
          cache-to: type=gha,mode=max,scope=bowrain-worker
