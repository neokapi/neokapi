name: Security

on:
  schedule:
    - cron: "0 3 * * 1" # Monday 3 AM UTC (exhaustive weekly pass)
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - cli
          - kapi
          - apps/kapi-desktop
          - bowrain/core
          - bowrain/cli
          - bowrain/plugin
          - bowrain/plugin/schema
          - bowrain
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run govulncheck
        run: |
          # Pinned (not @latest) so the scanner version is reproducible and
          # dependabot-trackable rather than drifting between runs.
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          cd ${{ matrix.module }} && govulncheck ./...
