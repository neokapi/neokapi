name: Security

on:
  # govulncheck across every module is too slow to gate each PR/merge, so it runs
  # on a weekly schedule (against main) plus on-demand — not on pull_request or
  # push. A regression surfaces within a week and via manual dispatch before a
  # release, without adding minutes to every merge.
  schedule:
    - cron: "0 3 * * 1" # Monday 3 AM UTC — weekly pass on the default branch
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - cli
          - kapi
          - apps/kapi-desktop
          - bowrain/core
          - bowrain/cli
          - bowrain/plugin
          - bowrain/plugin/schema
          - bowrain
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      # The wails desktop modules (bowrain, apps/kapi-desktop) are cgo and need
      # the GTK/WebKit + ICU dev headers to build; govulncheck compiles the
      # module, so without these it fails to load packages rather than scanning.
      # Harmless for the non-GUI modules in the matrix.
      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libicu-dev pkg-config

      - name: Run govulncheck
        run: |
          # Pinned (not @latest) so the scanner version is reproducible and
          # dependabot-trackable rather than drifting between runs.
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          cd ${{ matrix.module }} && govulncheck ./...
