name: _Build Web Assets

on:
  workflow_call:

jobs:
  build:
    name: Build Web Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-ui

      - name: Build web app
        working-directory: bowrain/apps/web
        env:
          VITE_POSTHOG_KEY: phc_9TMOqaMSUH5wE6xPTeTKjYBBJWVRdzOlUMahZAr7twD
          VITE_POSTHOG_HOST: https://eu.i.posthog.com
        run: vp run build

      - name: Upload web artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: bowrain/apps/web/dist
          retention-days: 7
