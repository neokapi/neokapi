name: Build Web Assets

on:
  workflow_call:

jobs:
  build:
    name: Build Web Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-ui

      - name: Build web app
        working-directory: bowrain/apps/web
        run: npm run build

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: bowrain/apps/web/dist
          retention-days: 7
