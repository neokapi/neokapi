name: Deploy Web

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]
    paths:
      - 'bowrain/apps/web/**'
      - 'packages/ui/**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Web Assets
    uses: ./.github/workflows/build-web.yml

  docker:
    name: Build Web Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/bowrain-web/Dockerfile
          push: true
          tags: |
            ghcr.io/gokapi/bowrain-web:${{ github.sha }}
            ghcr.io/gokapi/bowrain-web:latest
          cache-from: type=gha,scope=bowrain-web
          cache-to: type=gha,mode=max,scope=bowrain-web

  trigger-deploy:
    name: Trigger Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      GH_TOKEN: ${{ secrets.GOKAPI_REGISTRY_TOKEN }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
      RUN_ID: ${{ github.run_id }}
      REPO: ${{ github.repository }}
    steps:
      - name: Deploy web
        run: |
          gh workflow run deploy-web.yml \
            --repo gokapi/bowrain-infra \
            -f environment="$ENVIRONMENT" \
            -f triggerRunId="$RUN_ID" \
            -f triggerRepo="$REPO"
