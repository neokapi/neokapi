name: Deploy Web

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]
    paths:
      - "bowrain/apps/web/**"
      - "bowrain/packages/ui/**"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Web Assets
    uses: ./.github/workflows/_build-web.yml

  docker:
    name: Build Web Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute build metadata
        id: meta
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "version=$(git describe --tags --always 2>/dev/null || echo dev)"
            echo "commit=${GH_SHA::7}"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/bowrain-web/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bowrain-web:${{ github.sha }}
            ghcr.io/neokapi/bowrain-web:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha,scope=bowrain-web
          cache-to: type=gha,mode=max,scope=bowrain-web

  trigger-deploy:
    name: Trigger Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      GH_TOKEN: ${{ secrets.NEOKAPI_GITHUB_TOKEN }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
      RUN_ID: ${{ github.run_id }}
      REPO: ${{ github.repository }}
    steps:
      - name: Deploy web
        run: |
          gh workflow run deploy-web.yml \
            --repo neokapi/bowrain-infra \
            -f environment="$ENVIRONMENT" \
            -f source="$RUN_ID" \
            -f triggerRepo="$REPO"
