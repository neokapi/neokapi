name: Deploy Agent Dashboard

on:
  push:
    branches: [main]
    paths:
      - "bowrain/agentic-testing/dashboard/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: bowrain/agentic-testing/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: bowrain/agentic-testing/dashboard
        run: npm install --frozen-lockfile

      - name: Build
        working-directory: bowrain/agentic-testing/dashboard
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGENTS }}
          action: upload
          app_location: bowrain/agentic-testing/dashboard/dist
          skip_app_build: true
          skip_api_build: true
