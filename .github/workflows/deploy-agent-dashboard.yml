name: Deploy Agent Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'agentic/dashboard/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agentic/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: agentic/dashboard
        run: npm ci

      - name: Build
        working-directory: agentic/dashboard
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGENTS }}
          action: upload
          app_location: agentic/dashboard/dist
          skip_app_build: true
          skip_api_build: true
