name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Fetch documentation assets from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view docs-assets > /dev/null 2>&1; then
            gh release download docs-assets --pattern 'docs-assets.tar.gz' --dir /tmp
            tar xzf /tmp/docs-assets.tar.gz -C website/static
            echo "Fetched docs assets:"
            du -sh website/static/img website/static/video 2>/dev/null || true
          else
            echo "Warning: docs-assets release not found, building without screenshots/recordings"
          fi

      - run: npm ci
        working-directory: website
      - run: npm run build
        working-directory: website
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
