name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - 'platform/docs/**'
      - 'platform/packages/ui/**'
      - 'platform/emails/**'

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            website/package-lock.json
            platform/package-lock.json

      - name: Fetch documentation assets from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view docs-assets > /dev/null 2>&1; then
            if gh release download docs-assets --pattern 'docs-assets.tar.gz' --dir /tmp 2>/dev/null; then
              tar xzf /tmp/docs-assets.tar.gz -C website/static
            fi
            echo "Fetched docs assets:"
            du -sh website/static/img website/static/video 2>/dev/null || true

            # Fetch test comparison data (generated by CI)
            mkdir -p website/static/data
            gh release download docs-assets --pattern 'test-comparison.json' --dir website/static/data 2>/dev/null && \
              echo "Fetched test-comparison.json" || \
              echo "Warning: test-comparison.json not found in docs-assets release"
          else
            echo "Warning: docs-assets release not found, building without screenshots/recordings"
          fi

          # Ensure test-comparison.json exists (stub if not fetched)
          if [ ! -f website/static/data/test-comparison.json ]; then
            mkdir -p website/static/data
            echo '{"generatedAt":"","okapiVersion":"","neokapiVersion":"","filters":[],"summary":{"totalFiltersOkapi":0,"totalFiltersBridge":0,"totalFiltersNative":0,"totalFiltersBoth":0,"totalTestsOkapi":0,"totalTestsBridge":0,"totalTestsNative":0,"coveragePct":0}}' > website/static/data/test-comparison.json
            echo "Created stub test-comparison.json"
          fi

      # Build Docusaurus site
      - run: npm ci
        working-directory: website
      - run: npm run build
        working-directory: website

      # Build Storybook and merge into the site at /storybook
      - run: npm ci
        working-directory: platform
      - name: Build Storybook
        env:
          STORYBOOK_BASE_PATH: /storybook/
        run: npx storybook build -o ../../../website/build/storybook
        working-directory: platform/packages/ui

      # Preserve active PR preview directories from gh-pages
      - name: Checkout gh-pages for PR previews
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-current
        continue-on-error: true

      - name: Preserve PR previews
        run: |
          if [ -d gh-pages-current ]; then
            for dir in gh-pages-current/pr-*/; do
              if [ -d "$dir" ]; then
                cp -r "$dir" website/build/
                echo "Preserved $(basename "$dir")"
              fi
            done
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/build
