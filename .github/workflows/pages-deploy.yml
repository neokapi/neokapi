name: Pages Deploy

# Combines artifacts from multiple build sources into a single deployment
# to the neokapi.github.io org pages repo, under a path-based layout:
#
#   /web/neokapi/            neokapi-web Vite app (production)
#   /web/neokapi/docs/       kapi/framework Docusaurus site (production)
#   /web/bowrain/            bowrain-web Vite app (production)
#   /web/bowrain/docs/       bowrain Docusaurus site (production)
#   /storybook/kapi/         kapi storybook (production)
#   /storybook/bowrain/      bowrain storybook (production)
#   /web/prs/{N}/...         PR previews
#   /storybook/prs/{N}/...   PR previews
#
# Artifact names this workflow looks for:
#   kapi-site, bowrain-site         — Docusaurus build outputs (this repo)
#   kapi-storybook, bowrain-storybook — Storybook build outputs (this repo)
#
# The neokapi-web and bowrain-web Vite apps live in their own private
# sibling repos and deploy themselves directly to neokapi.github.io at
# /web/{neokapi,bowrain}/ using the same PAGES_DEPLOY_KEY. They are not
# part of this workflow's artifact graph.

on:
  workflow_run:
    workflows:
      - "Docs — kapi"
      - "Docs — bowrain"
      - "Storybook"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read # required by actions/download-artifact for cross-workflow runs

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      PAGES_REPO: github.com:neokapi/neokapi.github.io.git
    steps:
      - name: Set up SSH for org pages repo
        env:
          SSH_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "GIT_SSH_COMMAND=ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" >> "$GITHUB_ENV"

      - name: Clone neokapi.github.io
        run: |
          git clone --depth 1 "git@${PAGES_REPO}" pages
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Initialize tree skeleton if missing
        run: |
          mkdir -p pages/web/neokapi pages/web/bowrain pages/web/prs
          mkdir -p pages/storybook/kapi pages/storybook/bowrain pages/storybook/prs

      - name: Download all artifacts from triggering run
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: artifacts

      - name: Determine target paths (production vs PR preview)
        id: target
        env:
          IS_PR: ${{ github.event.workflow_run.event == 'pull_request' }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          if [ "$IS_PR" = "true" ] && [ -n "$PR_NUMBER" ]; then
            {
              echo "kapi_docs_dest=web/prs/${PR_NUMBER}/neokapi/docs"
              echo "bowrain_docs_dest=web/prs/${PR_NUMBER}/bowrain/docs"
              echo "kapi_storybook_dest=storybook/prs/${PR_NUMBER}/kapi"
              echo "bowrain_storybook_dest=storybook/prs/${PR_NUMBER}/bowrain"
              echo "is_pr=true"
              echo "pr_number=${PR_NUMBER}"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "kapi_docs_dest=web/neokapi/docs"
              echo "bowrain_docs_dest=web/bowrain/docs"
              echo "kapi_storybook_dest=storybook/kapi"
              echo "bowrain_storybook_dest=storybook/bowrain"
              echo "is_pr=false"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Slot kapi Docusaurus at /web/neokapi/docs/
        if: ${{ hashFiles('artifacts/kapi-site/**') != '' }}
        env:
          DEST: ${{ steps.target.outputs.kapi_docs_dest }}
        run: |
          rm -rf "pages/${DEST}"
          mkdir -p "pages/${DEST}"
          cp -r artifacts/kapi-site/* "pages/${DEST}/"

      - name: Slot bowrain Docusaurus at /web/bowrain/docs/
        if: ${{ hashFiles('artifacts/bowrain-site/**') != '' }}
        env:
          DEST: ${{ steps.target.outputs.bowrain_docs_dest }}
        run: |
          rm -rf "pages/${DEST}"
          mkdir -p "pages/${DEST}"
          cp -r artifacts/bowrain-site/* "pages/${DEST}/"

      - name: Slot kapi storybook
        if: ${{ hashFiles('artifacts/kapi-storybook/**') != '' }}
        env:
          DEST: ${{ steps.target.outputs.kapi_storybook_dest }}
        run: |
          rm -rf "pages/${DEST}"
          mkdir -p "pages/${DEST}"
          cp -r artifacts/kapi-storybook/* "pages/${DEST}/"

      - name: Slot bowrain storybook
        if: ${{ hashFiles('artifacts/bowrain-storybook/**') != '' }}
        env:
          DEST: ${{ steps.target.outputs.bowrain_storybook_dest }}
        run: |
          rm -rf "pages/${DEST}"
          mkdir -p "pages/${DEST}"
          cp -r artifacts/bowrain-storybook/* "pages/${DEST}/"

      - name: Commit and push
        env:
          IS_PR: ${{ steps.target.outputs.is_pr }}
          PR_NUMBER: ${{ steps.target.outputs.pr_number }}
        working-directory: pages
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          if [ "$IS_PR" = "true" ]; then
            git commit -m "deploy: PR #${PR_NUMBER} preview"
          else
            git commit -m "deploy: production sites"
          fi
          git push origin HEAD:main

      - name: Comment PR preview link
        if: ${{ steps.target.outputs.is_pr == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.target.outputs.pr_number }}
        run: |
          BODY="📚 Preview deployed:
          - neokapi web app: https://neokapi.github.io/web/prs/${PR_NUMBER}/neokapi/
          - neokapi docs: https://neokapi.github.io/web/prs/${PR_NUMBER}/neokapi/docs/
          - bowrain web app: https://neokapi.github.io/web/prs/${PR_NUMBER}/bowrain/
          - bowrain docs: https://neokapi.github.io/web/prs/${PR_NUMBER}/bowrain/docs/
          - kapi storybook: https://neokapi.github.io/storybook/prs/${PR_NUMBER}/kapi/
          - bowrain storybook: https://neokapi.github.io/storybook/prs/${PR_NUMBER}/bowrain/"
          gh pr comment "$PR_NUMBER" --repo "${GITHUB_REPOSITORY}" --body "$BODY"
