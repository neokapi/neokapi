name: Pages Deploy

# Combines artifacts from multiple build sources into a single deployment
# to the neokapi.github.io org pages repo, under a path-based layout:
#
#   /web/neokapi/            neokapi-web Vite app (production)
#   /web/neokapi/docs/       kapi/framework Docusaurus site (production)
#   /web/bowrain/            bowrain-web Vite app (production)
#   /web/bowrain/docs/       bowrain Docusaurus site (production)
#   /storybook/kapi/         kapi storybook (production)
#   /storybook/bowrain/      bowrain storybook (production)
#   /web/prs/{N}/...         PR previews
#   /storybook/prs/{N}/...   PR previews
#
# Artifact names this workflow looks for:
#   kapi-site, bowrain-site           — Docusaurus build outputs
#   kapi-storybook, bowrain-storybook — Storybook build outputs
#   neokapi-web, bowrain-web          — Vite landing app build outputs

on:
  workflow_run:
    workflows:
      - "Docs — kapi"
      - "Docs — bowrain"
      - "Storybook"
      - "Web Landing"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read # required by actions/download-artifact for cross-workflow runs

concurrency:
  # Group per source workflow + branch. A single shared group is wrong here:
  # GitHub keeps only one *pending* run per group and cancels older pending ones,
  # so a queued bowrain-docs deploy gets silently dropped when a kapi-docs deploy
  # queues behind a running one. Per-source groups mean different sources never
  # cancel each other; same-source builds still serialize. cancel-in-progress is
  # false so an in-flight publish always finishes. Cross-source deploys may run
  # concurrently and race on the shared branch — the push step rebase-retries.
  group: pages-deploy-${{ github.event.workflow_run.name || github.event_name }}-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      PAGES_REPO: github.com:neokapi/neokapi.github.io.git
    steps:
      - name: Set up SSH for org pages repo
        env:
          SSH_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "GIT_SSH_COMMAND=ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" >> "$GITHUB_ENV"

      - name: Clone neokapi.github.io
        run: |
          # Depth 50 (not 1) so the push step can rebase onto a concurrent
          # deploy's commit: a shallow depth-1 clone has no merge base, so the
          # rebase-retry below would fail. 50 covers any realistic race window.
          git clone --depth 50 "git@${PAGES_REPO}" pages
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Initialize tree skeleton if missing
        run: |
          mkdir -p pages/web/neokapi pages/web/bowrain pages/web/prs
          mkdir -p pages/storybook/kapi pages/storybook/bowrain pages/storybook/prs

      - name: Determine target paths (production vs PR preview)
        id: target
        env:
          IS_PR: ${{ github.event.workflow_run.event == 'pull_request' }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # github.event.workflow_run.pull_requests is unreliable — it is
          # frequently empty even for same-repo PRs. The build workflow keys its
          # baseUrl off the PR number (/web/prs/<N>/neokapi/docs/), so if we let
          # an empty PR_NUMBER fall through to the production path we deploy a
          # preview build — whose JS points at /web/prs/<N>/... — on top of
          # production, 404-ing every script and blanking the live docs until
          # the next push-to-main deploy. So: production is reachable ONLY when
          # the upstream build was not a PR; for PR builds we resolve the number
          # from the head branch.
          if [ "$IS_PR" = "true" ]; then
            if [ -z "$PR_NUMBER" ] && [ -n "$HEAD_BRANCH" ]; then
              PR_NUMBER="$(gh pr list --head "$HEAD_BRANCH" --state open --json number --jq '.[0].number // empty')"
            fi
            if [ -z "$PR_NUMBER" ]; then
              # No OPEN PR for this head branch. The usual cause is a benign
              # race: the PR was merged/closed between the build finishing and
              # this deploy starting, so a preview is moot (the push-to-main
              # production deploy covers prod). Skip gracefully. Only fail if
              # there is NO PR at all for the branch — then we genuinely cannot
              # classify the build and must not risk clobbering production.
              if [ -n "$HEAD_BRANCH" ] && [ -n "$(gh pr list --head "$HEAD_BRANCH" --state all --json number --jq '.[0].number // empty')" ]; then
                echo "::notice::PR build (head=${HEAD_BRANCH}) has no open PR (already merged/closed); skipping preview deploy."
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "::error::PR build (head=${HEAD_BRANCH}) but could not resolve a PR number; refusing to deploy a preview build to production."
              exit 1
            fi
            {
              echo "kapi_app_dest=web/prs/${PR_NUMBER}/neokapi"
              echo "bowrain_app_dest=web/prs/${PR_NUMBER}/bowrain"
              echo "kapi_docs_dest=web/prs/${PR_NUMBER}/neokapi/docs"
              echo "bowrain_docs_dest=web/prs/${PR_NUMBER}/bowrain/docs"
              echo "kapi_storybook_dest=storybook/prs/${PR_NUMBER}/kapi"
              echo "bowrain_storybook_dest=storybook/prs/${PR_NUMBER}/bowrain"
              echo "is_pr=true"
              echo "pr_number=${PR_NUMBER}"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "kapi_app_dest=web/neokapi"
              echo "bowrain_app_dest=web/bowrain"
              echo "kapi_docs_dest=web/neokapi/docs"
              echo "bowrain_docs_dest=web/bowrain/docs"
              echo "kapi_storybook_dest=storybook/kapi"
              echo "bowrain_storybook_dest=storybook/bowrain"
              echo "is_pr=false"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts from triggering run
        if: ${{ github.event_name == 'workflow_run' && steps.target.outputs.skip != 'true' }}
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: artifacts

      - name: Slot neokapi-web Vite app at /web/neokapi/ root
        if: ${{ steps.target.outputs.skip != 'true' }}
        env:
          DEST: ${{ steps.target.outputs.kapi_app_dest }}
        run: |
          # Presence check in-step (not via hashFiles in `if:` — hashFiles returns
          # empty for download-artifact outputs, which silently skipped every slot).
          [ -d artifacts/neokapi-web ] && [ -n "$(ls -A artifacts/neokapi-web 2>/dev/null)" ] || { echo "no neokapi-web artifact — skipping"; exit 0; }
          # Replace only the app's own files; preserve any docs/ subdir
          # already present from a previous Docs — kapi run.
          mkdir -p "pages/${DEST}"
          (cd "pages/${DEST}" && find . -mindepth 1 -maxdepth 1 ! -name docs -exec rm -rf {} +)
          cp -r artifacts/neokapi-web/* "pages/${DEST}/"

      - name: Slot bowrain-web Vite app at /web/bowrain/ root
        if: ${{ steps.target.outputs.skip != 'true' }}
        env:
          DEST: ${{ steps.target.outputs.bowrain_app_dest }}
        run: |
          [ -d artifacts/bowrain-web ] && [ -n "$(ls -A artifacts/bowrain-web 2>/dev/null)" ] || { echo "no bowrain-web artifact — skipping"; exit 0; }
          mkdir -p "pages/${DEST}"
          (cd "pages/${DEST}" && find . -mindepth 1 -maxdepth 1 ! -name docs -exec rm -rf {} +)
          cp -r artifacts/bowrain-web/* "pages/${DEST}/"

      - name: Slot kapi Docusaurus at /web/neokapi/docs/
        if: ${{ steps.target.outputs.skip != 'true' }}
        env:
          DEST: ${{ steps.target.outputs.kapi_docs_dest }}
        run: |
          [ -d artifacts/kapi-site ] && [ -n "$(ls -A artifacts/kapi-site 2>/dev/null)" ] || { echo "no kapi-site artifact — skipping"; exit 0; }
          rm -rf "pages/${DEST}"
          mkdir -p "pages/${DEST}"
          cp -r artifacts/kapi-site/* "pages/${DEST}/"

      - name: Slot bowrain Docusaurus at /web/bowrain/docs/
        if: ${{ steps.target.outputs.skip != 'true' }}
        env:
          DEST: ${{ steps.target.outputs.bowrain_docs_dest }}
        run: |
          [ -d artifacts/bowrain-site ] && [ -n "$(ls -A artifacts/bowrain-site 2>/dev/null)" ] || { echo "no bowrain-site artifact — skipping"; exit 0; }
          rm -rf "pages/${DEST}"
          mkdir -p "pages/${DEST}"
          cp -r artifacts/bowrain-site/* "pages/${DEST}/"

      - name: Slot kapi storybook
        if: ${{ steps.target.outputs.skip != 'true' }}
        env:
          DEST: ${{ steps.target.outputs.kapi_storybook_dest }}
        run: |
          [ -d artifacts/kapi-storybook ] && [ -n "$(ls -A artifacts/kapi-storybook 2>/dev/null)" ] || { echo "no kapi-storybook artifact — skipping"; exit 0; }
          rm -rf "pages/${DEST}"
          mkdir -p "pages/${DEST}"
          cp -r artifacts/kapi-storybook/* "pages/${DEST}/"

      - name: Slot bowrain storybook
        if: ${{ steps.target.outputs.skip != 'true' }}
        env:
          DEST: ${{ steps.target.outputs.bowrain_storybook_dest }}
        run: |
          [ -d artifacts/bowrain-storybook ] && [ -n "$(ls -A artifacts/bowrain-storybook 2>/dev/null)" ] || { echo "no bowrain-storybook artifact — skipping"; exit 0; }
          rm -rf "pages/${DEST}"
          mkdir -p "pages/${DEST}"
          cp -r artifacts/bowrain-storybook/* "pages/${DEST}/"

      - name: Commit and push
        if: ${{ steps.target.outputs.skip != 'true' }}
        env:
          IS_PR: ${{ steps.target.outputs.is_pr }}
          PR_NUMBER: ${{ steps.target.outputs.pr_number }}
        working-directory: pages
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          if [ "$IS_PR" = "true" ]; then
            git commit -m "deploy: PR #${PR_NUMBER} preview"
          else
            git commit -m "deploy: production sites"
          fi
          # Cross-source deploys (kapi docs / bowrain docs / storybook / web) run
          # in separate concurrency groups and can race on this shared branch.
          # Each writes a disjoint subtree, so rebasing our single commit onto a
          # deploy that landed first is conflict-free; retry a few times before
          # giving up rather than failing the publish.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "pushed on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" = "5" ]; then
              echo "::error::pages push failed after ${attempt} attempts"
              exit 1
            fi
            echo "push rejected (attempt ${attempt}); rebasing onto latest main…"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::pages rebase hit a conflict (overlapping subtree?)"
              exit 1
            fi
            sleep $((attempt * 3))
          done

      - name: Comment PR preview link
        if: ${{ steps.target.outputs.is_pr == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.target.outputs.pr_number }}
        run: |
          MARKER="<!-- pr-preview-links -->"
          BODY="${MARKER}
          📚 Preview deployed:
          - neokapi landing: https://neokapi.github.io/web/prs/${PR_NUMBER}/neokapi/
          - neokapi docs: https://neokapi.github.io/web/prs/${PR_NUMBER}/neokapi/docs/
          - bowrain landing: https://neokapi.github.io/web/prs/${PR_NUMBER}/bowrain/
          - bowrain docs: https://neokapi.github.io/web/prs/${PR_NUMBER}/bowrain/docs/
          - kapi storybook: https://neokapi.github.io/storybook/prs/${PR_NUMBER}/kapi/
          - bowrain storybook: https://neokapi.github.io/storybook/prs/${PR_NUMBER}/bowrain/"
          # Reuse a single sticky comment: find the previous preview comment by
          # its hidden marker and edit it in place; create one only if none exists.
          COMMENT_ID=$(gh api \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -n1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --repo "${GITHUB_REPOSITORY}" --body "$BODY"
          fi
