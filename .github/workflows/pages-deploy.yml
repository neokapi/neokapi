name: Pages Deploy

# Combines artifacts from multiple build sources into deployments under a
# path-based layout. PRODUCTION goes to the neokapi.github.io org Pages repo;
# PR PREVIEWS go to Cloudflare R2 (served by the neokapi-pr-previews Worker),
# NOT into git:
#
#   PRODUCTION (committed to neokapi.github.io)
#     /                        kapi/framework Docusaurus site (SITE ROOT)
#     /web/bowrain/            bowrain-web Vite app
#     /web/bowrain/docs/       bowrain Docusaurus site
#     /storybook/kapi/         kapi storybook
#     /storybook/bowrain/      bowrain storybook
#
#   PR PREVIEWS (synced to R2 previews/ prefix, served at $DOCS_PREVIEW_URL)
#     /web/prs/{N}/...         site/app previews
#     /storybook/prs/{N}/...   storybook previews
#
# Why previews moved off git: every preview deploy committed the full wasm
# (~73 MB) + vision model (~132 MB) + video payload into the Pages repo, which
# grew to multiple GB of history that prune-on-close could not reclaim (it only
# removed files from the tip). R2 has no per-file size limit, an `rm` actually
# frees the storage, and the baked absolute base URLs (/web/prs/<N>/…) resolve
# unchanged from the preview host root — so no build changes are needed.
# See deploy/preview-worker/README.md and scripts/publish-pr-preview.sh.
#
# Artifact names this workflow looks for:
#   kapi-site, bowrain-site           — Docusaurus build outputs
#   kapi-storybook, bowrain-storybook — Storybook build outputs
#   bowrain-web                       — bowrain Vite landing app build output

on:
  workflow_run:
    workflows:
      - "Docs — kapi"
      - "Docs — bowrain"
      - "Storybook"
      - "Web Landing"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read # required by actions/download-artifact for cross-workflow runs

concurrency:
  # Group per source workflow + branch. A single shared group is wrong here:
  # GitHub keeps only one *pending* run per group and cancels older pending ones,
  # so a queued bowrain-docs deploy gets silently dropped when a kapi-docs deploy
  # queues behind a running one. Per-source groups mean different sources never
  # cancel each other; same-source builds still serialize. cancel-in-progress is
  # false so an in-flight publish always finishes. Cross-source production
  # deploys may run concurrently and race on the shared branch — the push step
  # rebase-retries. PR previews write disjoint R2 prefixes and never race.
  group: pages-deploy-${{ github.event.workflow_run.name || github.event_name }}-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      PAGES_REPO: github.com:neokapi/neokapi.github.io.git
    steps:
      # Check out this repo so the PR-preview publish step can run
      # scripts/publish-pr-preview.sh. (The production path clones the org Pages
      # repo into ./pages and works there; this is just for the helper script.)
      - uses: actions/checkout@v7

      - name: Determine target paths (production vs PR preview)
        id: target
        env:
          IS_PR: ${{ github.event.workflow_run.event == 'pull_request' }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # github.event.workflow_run.pull_requests is unreliable — it is
          # frequently empty even for same-repo PRs. The build workflow keys its
          # baseUrl off the PR number (/web/prs/<N>/neokapi/docs/), so if we let
          # an empty PR_NUMBER fall through to the production path we deploy a
          # preview build — whose JS points at /web/prs/<N>/... — on top of
          # production, 404-ing every script and blanking the live docs until
          # the next push-to-main deploy. So: production is reachable ONLY when
          # the upstream build was not a PR; for PR builds we resolve the number
          # from the head branch.
          if [ "$IS_PR" = "true" ]; then
            if [ -z "$PR_NUMBER" ] && [ -n "$HEAD_BRANCH" ]; then
              PR_NUMBER="$(gh pr list --head "$HEAD_BRANCH" --state open --json number --jq '.[0].number // empty')"
            fi
            if [ -z "$PR_NUMBER" ]; then
              # No OPEN PR for this head branch. The usual cause is a benign
              # race: the PR was merged/closed between the build finishing and
              # this deploy starting, so a preview is moot (the push-to-main
              # production deploy covers prod). Skip gracefully. Only fail if
              # there is NO PR at all for the branch — then we genuinely cannot
              # classify the build and must not risk clobbering production.
              if [ -n "$HEAD_BRANCH" ] && [ -n "$(gh pr list --head "$HEAD_BRANCH" --state all --json number --jq '.[0].number // empty')" ]; then
                echo "::notice::PR build (head=${HEAD_BRANCH}) has no open PR (already merged/closed); skipping preview deploy."
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "::error::PR build (head=${HEAD_BRANCH}) but could not resolve a PR number; refusing to deploy a preview build to production."
              exit 1
            fi
            {
              echo "bowrain_app_dest=web/prs/${PR_NUMBER}/bowrain"
              # PR previews keep the legacy /neokapi/docs/ slot (production moves
              # to the /neokapi/ root). docs-kapi.yml builds the preview with a
              # matching base URL; the two must agree or the preview's assets 404.
              echo "kapi_docs_dest=web/prs/${PR_NUMBER}/neokapi/docs"
              echo "bowrain_docs_dest=web/prs/${PR_NUMBER}/bowrain/docs"
              echo "kapi_storybook_dest=storybook/prs/${PR_NUMBER}/kapi"
              echo "bowrain_storybook_dest=storybook/prs/${PR_NUMBER}/bowrain"
              echo "is_pr=true"
              echo "pr_number=${PR_NUMBER}"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "bowrain_app_dest=web/bowrain"
              echo "kapi_docs_dest=."
              echo "bowrain_docs_dest=web/bowrain/docs"
              echo "kapi_storybook_dest=storybook/kapi"
              echo "bowrain_storybook_dest=storybook/bowrain"
              echo "is_pr=false"
            } >> "$GITHUB_OUTPUT"
          fi

      # ---- PRODUCTION ONLY: clone the org Pages repo so disjoint sibling
      # subtrees are preserved across a partial (single-source) deploy. PR
      # previews don't clone — they write only their own subtree to R2.
      - name: Set up SSH for org pages repo
        if: ${{ steps.target.outputs.is_pr == 'false' && steps.target.outputs.skip != 'true' }}
        env:
          SSH_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "GIT_SSH_COMMAND=ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" >> "$GITHUB_ENV"

      - name: Clone neokapi.github.io
        if: ${{ steps.target.outputs.is_pr == 'false' && steps.target.outputs.skip != 'true' }}
        run: |
          # Depth 50 (not 1) so the push step can rebase onto a concurrent
          # deploy's commit: a shallow depth-1 clone has no merge base, so the
          # rebase-retry below would fail. 50 covers any realistic race window.
          git clone --depth 50 "git@${PAGES_REPO}" pages
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Both production (into the clone) and PR previews (into a fresh dir) slot
      # artifacts under pages/<dest>; this just guarantees the dirs exist.
      - name: Initialize tree skeleton
        if: ${{ steps.target.outputs.skip != 'true' }}
        run: |
          mkdir -p pages/web/bowrain pages/web/prs
          mkdir -p pages/storybook/kapi pages/storybook/bowrain pages/storybook/prs

      # Discover which artifacts the triggering run actually produced, so the
      # per-slot downloads below only run for present artifacts — no more scary
      # "Artifact not found" ##[error] lines on a green deploy. Fail-open: if this
      # step is skipped or errors, has_* is empty (≠ 'false') so the download is
      # still attempted (continue-on-error then tolerates a genuine absence).
      - name: Discover artifacts in the triggering run
        id: arts
        if: ${{ github.event_name == 'workflow_run' && steps.target.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          names=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/artifacts" --paginate --jq '.artifacts[].name' | tr '\n' ' ')
          echo "artifacts present in run ${RUN_ID}: ${names}"
          for slot in bowrain-web kapi-site bowrain-site kapi-storybook bowrain-storybook; do
            key="has_${slot//-/_}"
            if printf ' %s ' "${names}" | grep -q " ${slot} "; then
              echo "${key}=true"
            else
              echo "${key}=false"
            fi >> "$GITHUB_OUTPUT"
          done

      # Download each artifact BY NAME into its own dir. Downloading ALL
      # artifacts (no name) with download-artifact@v8 only creates per-artifact
      # subdirs when 2+ match; a SINGLE artifact extracts FLAT into `path`, so
      # the slots' `artifacts/<name>` check false-skipped whenever the triggering
      # run produced exactly one artifact (e.g. "Docs — bowrain" → one
      # `bowrain-site`) → "No changes to deploy" on a green run. A name-scoped
      # download is flat into its own path for any count; continue-on-error
      # tolerates artifacts a given triggering run didn't produce.
      - name: Download bowrain-web artifact
        if: ${{ github.event_name == 'workflow_run' && steps.target.outputs.skip != 'true' && steps.arts.outputs.has_bowrain_web != 'false' }}
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: bowrain-web
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: artifacts/bowrain-web

      - name: Slot bowrain-web Vite app at /web/bowrain/ root
        if: ${{ steps.target.outputs.skip != 'true' }}
        env:
          DEST: ${{ steps.target.outputs.bowrain_app_dest }}
        run: |
          if [ ! -d artifacts/bowrain-web ] || [ -z "$(ls -A artifacts/bowrain-web 2>/dev/null)" ]; then
            echo "no bowrain-web artifact — skipping"; exit 0
          fi
          mkdir -p "pages/${DEST}"
          (cd "pages/${DEST}" && find . -mindepth 1 -maxdepth 1 ! -name docs -exec rm -rf {} +)
          cp -r artifacts/bowrain-web/* "pages/${DEST}/"

      - name: Download kapi-site artifact
        if: ${{ github.event_name == 'workflow_run' && steps.target.outputs.skip != 'true' && steps.arts.outputs.has_kapi_site != 'false' }}
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: kapi-site
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: artifacts/kapi-site

      - name: Slot kapi Docusaurus (production = site root; PR = preview subdir)
        if: ${{ steps.target.outputs.skip != 'true' }}
        env:
          DEST: ${{ steps.target.outputs.kapi_docs_dest }}
        run: |
          if [ ! -d artifacts/kapi-site ] || [ -z "$(ls -A artifacts/kapi-site 2>/dev/null)" ]; then
            echo "no kapi-site artifact — skipping"; exit 0
          fi
          if [ "$DEST" = "." ]; then
            # Production: the neokapi site owns the repo ROOT. Clean every
            # top-level entry EXCEPT the path-mounted sub-apps and repo metadata,
            # then lay the Docusaurus output at the root. Docusaurus emits
            # index.html, assets/, img/, etc. — none collide with the keep-list.
            # (The legacy /web/neokapi/ copy under web/ is intentionally left in
            # place so old deep links keep resolving.)
            (cd pages && find . -mindepth 1 -maxdepth 1 \
              ! -name web ! -name storybook ! -name .git \
              ! -name README.md ! -name CNAME ! -name .nojekyll \
              -exec rm -rf {} +)
            cp -r artifacts/kapi-site/* pages/
            # Legacy (Jekyll) Pages build: a root .nojekyll keeps the Docusaurus
            # output served verbatim. `cp ... /*` skips dotfiles, so guarantee it
            # (also preserved by the clean above so it is never dropped).
            touch pages/.nojekyll
          else
            rm -rf "pages/${DEST}"
            mkdir -p "pages/${DEST}"
            cp -r artifacts/kapi-site/* "pages/${DEST}/"
          fi

      - name: Download bowrain-site artifact
        if: ${{ github.event_name == 'workflow_run' && steps.target.outputs.skip != 'true' && steps.arts.outputs.has_bowrain_site != 'false' }}
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: bowrain-site
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: artifacts/bowrain-site

      - name: Slot bowrain Docusaurus at /web/bowrain/docs/
        if: ${{ steps.target.outputs.skip != 'true' }}
        env:
          DEST: ${{ steps.target.outputs.bowrain_docs_dest }}
        run: |
          if [ ! -d artifacts/bowrain-site ] || [ -z "$(ls -A artifacts/bowrain-site 2>/dev/null)" ]; then
            echo "no bowrain-site artifact — skipping"; exit 0
          fi
          rm -rf "pages/${DEST}"
          mkdir -p "pages/${DEST}"
          cp -r artifacts/bowrain-site/* "pages/${DEST}/"

      - name: Download kapi-storybook artifact
        if: ${{ github.event_name == 'workflow_run' && steps.target.outputs.skip != 'true' && steps.arts.outputs.has_kapi_storybook != 'false' }}
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: kapi-storybook
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: artifacts/kapi-storybook

      - name: Slot kapi storybook
        if: ${{ steps.target.outputs.skip != 'true' }}
        env:
          DEST: ${{ steps.target.outputs.kapi_storybook_dest }}
        run: |
          if [ ! -d artifacts/kapi-storybook ] || [ -z "$(ls -A artifacts/kapi-storybook 2>/dev/null)" ]; then
            echo "no kapi-storybook artifact — skipping"; exit 0
          fi
          rm -rf "pages/${DEST}"
          mkdir -p "pages/${DEST}"
          cp -r artifacts/kapi-storybook/* "pages/${DEST}/"

      - name: Download bowrain-storybook artifact
        if: ${{ github.event_name == 'workflow_run' && steps.target.outputs.skip != 'true' && steps.arts.outputs.has_bowrain_storybook != 'false' }}
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: bowrain-storybook
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: artifacts/bowrain-storybook

      - name: Slot bowrain storybook
        if: ${{ steps.target.outputs.skip != 'true' }}
        env:
          DEST: ${{ steps.target.outputs.bowrain_storybook_dest }}
        run: |
          if [ ! -d artifacts/bowrain-storybook ] || [ -z "$(ls -A artifacts/bowrain-storybook 2>/dev/null)" ]; then
            echo "no bowrain-storybook artifact — skipping"; exit 0
          fi
          rm -rf "pages/${DEST}"
          mkdir -p "pages/${DEST}"
          cp -r artifacts/bowrain-storybook/* "pages/${DEST}/"

      # ---- PRODUCTION publish: commit + push to the org Pages repo.
      - name: Commit and push (production)
        if: ${{ steps.target.outputs.is_pr == 'false' && steps.target.outputs.skip != 'true' }}
        working-directory: pages
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git commit -m "deploy: production sites"
          # Cross-source deploys (kapi docs / bowrain docs / storybook / web) run
          # in separate concurrency groups and can race on this shared branch.
          # Each writes a disjoint subtree, so rebasing our single commit onto a
          # deploy that landed first is conflict-free; retry a few times before
          # giving up rather than failing the publish.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "pushed on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" = "5" ]; then
              echo "::error::pages push failed after ${attempt} attempts"
              exit 1
            fi
            echo "push rejected (attempt ${attempt}); rebasing onto latest main…"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::pages rebase hit a conflict (overlapping subtree?)"
              exit 1
            fi
            sleep $((attempt * 3))
          done

      # ---- PR PREVIEW publish: sync the PR's own subtree to the R2 previews
      # prefix. No git, no per-file size limit, served by neokapi-pr-previews.
      - name: Publish PR preview to R2
        if: ${{ steps.target.outputs.is_pr == 'true' && steps.target.outputs.skip != 'true' }}
        env:
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PR_NUMBER: ${{ steps.target.outputs.pr_number }}
        run: bash scripts/publish-pr-preview.sh "${PR_NUMBER}" pages

      - name: Comment PR preview link
        if: ${{ steps.target.outputs.is_pr == 'true' && steps.target.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.target.outputs.pr_number }}
          # The neokapi-pr-previews Worker origin (repo variable), e.g.
          # https://preview.bowrain.cloud — see deploy/preview-worker/README.md.
          PREVIEW_URL: ${{ vars.DOCS_PREVIEW_URL }}
        run: |
          BASE="${PREVIEW_URL:-https://preview.bowrain.cloud}"
          MARKER="<!-- pr-preview-links -->"
          BODY="${MARKER}
          📚 Preview deployed (served from Cloudflare R2, not committed to git):
          - neokapi site: ${BASE}/web/prs/${PR_NUMBER}/neokapi/docs/
          - bowrain landing: ${BASE}/web/prs/${PR_NUMBER}/bowrain/
          - bowrain docs: ${BASE}/web/prs/${PR_NUMBER}/bowrain/docs/
          - kapi storybook: ${BASE}/storybook/prs/${PR_NUMBER}/kapi/
          - bowrain storybook: ${BASE}/storybook/prs/${PR_NUMBER}/bowrain/"
          # Reuse a single sticky comment: find the previous preview comment by
          # its hidden marker and edit it in place; create one only if none exists.
          COMMENT_ID=$(gh api \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -n1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --repo "${GITHUB_REPOSITORY}" --body "$BODY"
          fi
