name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared UI package
        working-directory: packages/ui
        run: npx tsc

      - name: Run UI unit tests
        working-directory: packages/ui
        run: npm test

      - name: Build SaaS web UI
        working-directory: bowrain/apps/web
        run: npm run build

      - name: Build kapi web UI
        working-directory: bowrain/apps/kapi-web
        run: npm run build

      - name: Download modules
        run: |
          go mod download && go mod verify
          cd platform && go mod download && go mod verify
          cd ../kapi && go mod download && go mod verify
          cd ../bowrain && go mod download && go mod verify

      - name: Create Bowrain frontend placeholder
        run: mkdir -p bowrain/apps/bowrain/frontend/dist && echo placeholder > bowrain/apps/bowrain/frontend/dist/index.html

      - name: Run framework tests
        run: go test -race -coverprofile=framework.out -covermode=atomic ./...

      - name: Run platform tests
        run: cd platform && go test -race -coverprofile=platform.out -covermode=atomic ./...

      - name: Run kapi tests
        run: cd kapi && go test -race -coverprofile=kapi.out -covermode=atomic ./...

      - name: Run bowrain tests
        run: cd bowrain && go test -race -coverprofile=bowrain.out -covermode=atomic $(go list ./... | grep -v '/apps/bowrain')

      - name: Merge coverage
        run: |
          cat framework.out > coverage.out
          tail -n +2 platform/platform.out >> coverage.out
          tail -n +2 kapi/kapi.out >> coverage.out
          tail -n +2 bowrain/bowrain.out >> coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Create web UI placeholders for embed
        run: |
          mkdir -p bowrain/apps/web/dist && echo placeholder > bowrain/apps/web/dist/index.html
          mkdir -p bowrain/apps/kapi-web/dist && echo placeholder > bowrain/apps/kapi-web/dist/index.html

      - name: Lint framework
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          args: --timeout=5m ./...

      - name: Lint platform
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          working-directory: platform
          args: --timeout=5m ./...

      - name: Lint kapi
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          working-directory: kapi
          args: --timeout=5m ./...

      - name: Install Linux dependencies for Wails
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Create Bowrain frontend placeholder
        run: mkdir -p bowrain/apps/bowrain/frontend/dist && echo placeholder > bowrain/apps/bowrain/frontend/dist/index.html

      - name: Lint bowrain
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          working-directory: bowrain
          args: --timeout=5m ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared UI package
        working-directory: packages/ui
        run: npx tsc

      - name: Build SaaS web UI
        working-directory: bowrain/apps/web
        run: npm run build

      - name: Build kapi web UI
        working-directory: bowrain/apps/kapi-web
        run: npm run build

      - name: Build kapi CLI
        run: cd kapi && go build -o ../bin/kapi ./cmd/kapi

      - name: Build bowrain-server
        run: cd bowrain && go build -o ../bin/bowrain-server ./cmd/bowrain-server

      - name: Verify framework module isolation
        run: GOWORK=off go build ./...

      - name: Verify platform module isolation
        run: GOWORK=off bash -c "cd platform && go build ./..."

      - name: Verify kapi module isolation
        run: GOWORK=off bash -c "cd kapi && go build ./..."

      - name: Verify kapi has no heavy deps
        run: |
          cd kapi && GOWORK=off go list -m all | grep -iE 'sqlite|wails|echo|oidc|keyring' && exit 1 || true

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared UI package
        working-directory: packages/ui
        run: npx tsc

      - name: Install Playwright browsers
        working-directory: bowrain/apps/bowrain/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: bowrain/apps/bowrain/frontend
        run: npx playwright test
        timeout-minutes: 15

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: bowrain/apps/bowrain/frontend/playwright-report/
          retention-days: 30

  e2e:
    name: E2E (Docker)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Run e2e tests
        run: bash e2e/run.sh
        timeout-minutes: 10

  check-assets:
    name: Validate Documentation Assets
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if UI files changed
        id: ui_changes
        run: |
          # Check for changes in UI-related files
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '^(packages/ui/|bowrain/apps/web/|bowrain/apps/kapi-web/|bowrain/apps/bowrain/frontend/)'; then
            echo "ui_changed=true" >> $GITHUB_OUTPUT
          else
            echo "ui_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if assets were regenerated
        if: steps.ui_changes.outputs.ui_changed == 'true'
        run: |
          # Check if screenshot/recording files were modified
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '^website/static/(img|video)/'; then
            echo "✓ UI changed and documentation assets were regenerated"
            exit 0
          else
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⚠️  UI files changed but screenshots/recordings not updated"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "UI-related files were modified, but documentation assets in"
            echo "website/static/img/ and website/static/video/ were not regenerated."
            echo ""
            echo "Please regenerate assets locally:"
            echo "  make docs-assets"
            echo ""
            echo "Or trigger the automated workflow:"
            echo "  Actions → Screenshots & Recordings → Run workflow"
            echo ""
            echo "Then commit the updated assets to this PR."
            echo ""
            exit 1
          fi

      - name: Check asset files exist
        run: |
          # Verify core asset directories exist and are not empty
          dirs=(
            "website/static/img/bowrain/dark"
            "website/static/img/bowrain/light"
            "website/static/video/bowrain/dark"
            "website/static/video/bowrain/light"
            "website/static/video/cli"
          )

          missing=0
          for dir in "${dirs[@]}"; do
            if [ ! -d "$dir" ] || [ -z "$(ls -A "$dir" 2>/dev/null)" ]; then
              echo "⚠️  Missing or empty: $dir"
              missing=$((missing + 1))
            fi
          done

          if [ $missing -gt 0 ]; then
            echo ""
            echo "Some documentation asset directories are missing or empty."
            echo "Run: make docs-assets"
            exit 1
          else
            echo "✓ All documentation asset directories present"
          fi
