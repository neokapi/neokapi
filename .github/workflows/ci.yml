name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  packages: read

jobs:
  # ── Detect which modules changed ──────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      framework: ${{ github.event_name == 'push' || steps.filter.outputs.framework }}
      cli: ${{ github.event_name == 'push' || steps.filter.outputs.cli }}
      platform: ${{ github.event_name == 'push' || steps.filter.outputs.platform }}
      kapi: ${{ github.event_name == 'push' || steps.filter.outputs.kapi }}
      bowrain_cli: ${{ github.event_name == 'push' || steps.filter.outputs.bowrain_cli }}
      bowrain: ${{ github.event_name == 'push' || steps.filter.outputs.bowrain }}
      frontend: ${{ github.event_name == 'push' || steps.filter.outputs.frontend }}
      kapi_desktop: ${{ github.event_name == 'push' || steps.filter.outputs.kapi_desktop }}
      bowrain_desktop: ${{ github.event_name == 'push' || steps.filter.outputs.bowrain_desktop }}
      kapi_react: ${{ github.event_name == 'push' || steps.filter.outputs.kapi_react }}
      workflows: ${{ github.event_name == 'push' || steps.filter.outputs.workflows }}
      any_go: ${{ github.event_name == 'push' || steps.filter.outputs.framework || steps.filter.outputs.cli || steps.filter.outputs.platform || steps.filter.outputs.kapi || steps.filter.outputs.bowrain_cli || steps.filter.outputs.bowrain }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")

          check_paths() {
            local label="$1"; shift
            for pattern in "$@"; do
              # Support negation patterns (prefixed with !)
              if [[ "$pattern" == !* ]]; then continue; fi
              if echo "$CHANGED" | grep -qE "$pattern"; then
                echo "${label}=true" >> "$GITHUB_OUTPUT"
                return
              fi
            done
            echo "${label}=false" >> "$GITHUB_OUTPUT"
          }

          check_paths framework '^core/' '^go\.(mod|sum)$' '^go\.work' '^\.github/workflows/ci\.yml$'
          check_paths cli       '^cli/'
          check_paths platform  '^bowrain/core/'
          # kapi: anything under kapi/
          if echo "$CHANGED" | grep -E '^kapi/' | grep -q .; then
            echo "kapi=true" >> "$GITHUB_OUTPUT"
          else
            echo "kapi=false" >> "$GITHUB_OUTPUT"
          fi
          check_paths bowrain_cli '^bowrain/cli/'
          # bowrain: anything under bowrain/ except frontend app dirs, packages/, bowrain/core/, bowrain/cli/, docker/, and deploy/
          if echo "$CHANGED" | grep -E '^bowrain/' | grep -vE '^bowrain/(apps/(web|bowrain/frontend|keycloak-theme)|packages/|core/|cli/|docker/|deploy/)' | grep -q .; then
            echo "bowrain=true" >> "$GITHUB_OUTPUT"
          else
            echo "bowrain=false" >> "$GITHUB_OUTPUT"
          fi
          check_paths frontend  '^bowrain/apps/(web|bowrain/frontend)/' '^bowrain/packages/ui/'
          check_paths kapi_desktop '^apps/kapi-desktop/' '^packages/(ui|flow-editor)/'
          check_paths bowrain_desktop '^bowrain/apps/bowrain/' '^bowrain/packages/ui/'
          check_paths kapi_react '^packages/kapi-(format|react)/'
          check_paths workflows '^\.github/workflows/'

  # ── Frontend checks & builds ─────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-ui

      - name: Check shared UI (oxlint + oxfmt)
        working-directory: bowrain/packages/ui
        run: vp check

      - name: Run UI unit tests
        working-directory: bowrain/packages/ui
        run: vp test

      - name: Check web app (oxlint + oxfmt)
        working-directory: bowrain/apps/web
        run: vp check

      - name: Run web unit tests
        working-directory: bowrain/apps/web
        run: vp test

      - name: Build SaaS web UI
        working-directory: bowrain/apps/web
        run: vp build

      - name: Check Bowrain frontend (oxlint + oxfmt)
        working-directory: bowrain/apps/bowrain/frontend
        run: vp check

  # ── Kapi Desktop frontend ───────────────────────────────────────────────
  kapi-desktop:
    name: Kapi Desktop
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.kapi_desktop == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-ui

      - name: Build kapi-react (vite.config imports from dist)
        working-directory: packages/kapi-react
        run: npm run build

      - name: Run flow-editor tests
        working-directory: packages/flow-editor
        run: vp test

      - name: Run Kapi Desktop frontend tests
        working-directory: apps/kapi-desktop/frontend
        run: vp test

      - name: Build Kapi Storybook
        working-directory: storybook
        run: vpx storybook build -o storybook-static

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Install Wails system dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Run Kapi Desktop Go backend tests
        run: make kapi-desktop-test

  # ── Bowrain Desktop (Wails app: frontend vitest + Go backend) ────────────
  bowrain-desktop:
    name: Bowrain Desktop
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.bowrain_desktop == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-ui

      - name: Run Bowrain Desktop frontend tests
        working-directory: bowrain/apps/bowrain/frontend
        run: vp test

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      # The Wails app backend links the GTK/WebKit runtime on Linux; these dev
      # packages also pull in libicu-dev that the framework's cgo build needs.
      - name: Install Wails system dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Run Bowrain Desktop Go backend tests
        run: make bowrain-desktop-test

  # ── Kapi React (TS extractor + schema) ──────────────────────────────────
  kapi-react:
    name: Kapi React
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.kapi_react == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-ui

      - name: Typecheck kapi-format
        working-directory: packages/kapi-format
        run: vp run typecheck

      - name: Validate kapi-format golden fixtures
        working-directory: packages/kapi-format
        run: vp run validate

      - name: Test kapi-format
        working-directory: packages/kapi-format
        run: vp run test

      - name: Typecheck kapi-react
        working-directory: packages/kapi-react
        run: vp run typecheck

      - name: Test kapi-react
        working-directory: packages/kapi-react
        run: vp run test

      - name: Build kapi-react
        working-directory: packages/kapi-react
        run: npm run build

  # ── Go tests (parallel per module) ────────────────────────────────────────
  test-framework:
    name: Test (framework, Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true'
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26.0", "stable"]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run framework tests
        id: run-tests
        run: make test-framework
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in test-results-framework.json -out junit-framework.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Framework Tests (Go ${{ matrix.go-version }})
          path: junit-framework.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always() && matrix.go-version == '1.26.0'
        with:
          name: coverage-framework
          path: coverage/framework.out

      - name: Upload native test results
        uses: actions/upload-artifact@v7
        if: always() && matrix.go-version == '1.26.0'
        with:
          name: test-results-native
          path: test-results-framework.json
          retention-days: 1

  test-platform:
    name: Test (platform)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.platform == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run platform tests
        id: run-tests
        run: make test-platform
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in bowrain/test-results-platform.json -out junit-platform.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Platform Tests
          path: junit-platform.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-platform
          path: coverage/platform.out
          retention-days: 1

  test-cli:
    name: Test (cli)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.cli == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run cli tests
        id: run-tests
        run: make test-cli
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in test-results-cli.json -out junit-cli.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: CLI Tests
          path: junit-cli.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-cli
          path: coverage/cli.out
          retention-days: 1

  test-kapi:
    name: Test (kapi)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.kapi == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run kapi tests
        id: run-tests
        run: make test-kapi
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in test-results-kapi.json -out junit-kapi.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Kapi Tests
          path: junit-kapi.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-kapi
          path: coverage/kapi.out
          retention-days: 1

  test-bowrain-cli:
    name: Test (Bowrain CLI)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.platform == 'true' || needs.changes.outputs.bowrain_cli == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run Bowrain CLI tests
        id: run-tests
        run: make test-bowrain-cli
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in bowrain/test-results-bowrain-cli.json -out junit-bowrain-cli.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Bowrain CLI Tests
          path: junit-bowrain-cli.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-bowrain-cli
          path: coverage/bowrain-cli.out
          retention-days: 1

  test-bowrain:
    name: Test (bowrain)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.platform == 'true' || needs.changes.outputs.bowrain == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run bowrain tests
        id: run-tests
        run: make test-bowrain
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in test-results-bowrain.json -out junit-bowrain.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Bowrain Tests
          path: junit-bowrain.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-bowrain
          path: coverage/bowrain.out
          retention-days: 1

  # ── Merge coverage from all test jobs ─────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test-framework, test-cli, test-platform, test-kapi, test-bowrain-cli, test-bowrain]
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v6

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Merge coverage
        run: |
          # Start with framework coverage (has the header line)
          if [ -f framework.out ]; then
            cp framework.out coverage.out
          else
            echo "mode: atomic" > coverage.out
          fi
          # Append remaining files (skip header line)
          for f in cli.out platform.out kapi.out bowrain-cli.out bowrain.out; do
            if [ -f "$f" ]; then
              tail -n +2 "$f" >> coverage.out
            fi
          done

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint-framework:
    name: Lint (framework)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.kapi == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Download modules
        run: |
          go mod download
          cd cli && go mod download
          cd ../kapi && go mod download

      - name: Lint framework
        uses: golangci/golangci-lint-action@v9
        with:
          install-mode: binary
          verify: false
          version: v2.9.0
          working-directory: .
          # Full lint on PRs too: the GitHub patch API the action uses for
          # only-new-issues filtering 406s on diffs over 20000 lines (large
          # generated artifacts / lockfile churn). Push to main already lints
          # in full and is the clean gate, so PRs lint identically.
          only-new-issues: false
          args: --timeout=5m ./...

      - name: Lint cli
        uses: golangci/golangci-lint-action@v9
        with:
          install-mode: binary
          verify: false
          version: v2.9.0
          working-directory: cli
          # Full lint on PRs too: the GitHub patch API the action uses for
          # only-new-issues filtering 406s on diffs over 20000 lines (large
          # generated artifacts / lockfile churn). Push to main already lints
          # in full and is the clean gate, so PRs lint identically.
          only-new-issues: false
          args: --timeout=5m ./...

      - name: Lint kapi
        uses: golangci/golangci-lint-action@v9
        with:
          install-mode: binary
          verify: false
          version: v2.9.0
          working-directory: kapi
          # Full lint on PRs too: the GitHub patch API the action uses for
          # only-new-issues filtering 406s on diffs over 20000 lines (large
          # generated artifacts / lockfile churn). Push to main already lints
          # in full and is the clean gate, so PRs lint identically.
          only-new-issues: false
          args: --timeout=5m ./...

  lint-platform:
    name: Lint (platform)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.platform == 'true' || needs.changes.outputs.bowrain_cli == 'true' || needs.changes.outputs.bowrain == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Create embed placeholders
        run: |
          mkdir -p bowrain/apps/web/dist && echo placeholder > bowrain/apps/web/dist/index.html

      - name: Download modules
        run: |
          cd bowrain/core && go mod download
          cd ../../bowrain && go mod download

      - name: Lint platform
        uses: golangci/golangci-lint-action@v9
        with:
          install-mode: binary
          verify: false
          version: v2.9.0
          working-directory: bowrain/core
          # Full lint on PRs too: the GitHub patch API the action uses for
          # only-new-issues filtering 406s on diffs over 20000 lines (large
          # generated artifacts / lockfile churn). Push to main already lints
          # in full and is the clean gate, so PRs lint identically.
          only-new-issues: false
          args: --timeout=5m ./...

      - name: Lint Bowrain CLI
        uses: golangci/golangci-lint-action@v9
        with:
          install-mode: binary
          verify: false
          version: v2.9.0
          working-directory: bowrain/cli
          # Full lint on PRs too: the GitHub patch API the action uses for
          # only-new-issues filtering 406s on diffs over 20000 lines (large
          # generated artifacts / lockfile churn). Push to main already lints
          # in full and is the clean gate, so PRs lint identically.
          only-new-issues: false
          args: --timeout=5m ./...

      - name: Install Linux dependencies for Wails
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Create Bowrain frontend placeholder
        run: mkdir -p bowrain/apps/bowrain/frontend/dist && echo placeholder > bowrain/apps/bowrain/frontend/dist/index.html

      - name: Lint bowrain
        uses: golangci/golangci-lint-action@v9
        with:
          install-mode: binary
          verify: false
          version: v2.9.0
          working-directory: bowrain
          # Full lint on PRs too: the GitHub patch API the action uses for
          # only-new-issues filtering 406s on diffs over 20000 lines (large
          # generated artifacts / lockfile churn). Push to main already lints
          # in full and is the clean gate, so PRs lint identically.
          only-new-issues: false
          args: --timeout=5m ./...

  # ── GitHub Actions Lint ──────────────────────────────────────────────────
  gha-lint:
    name: Actions Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Install actionlint
        run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Lint workflow files
        run: ./actionlint

  # ── go mod tidy drift check ──────────────────────────────────────────────
  tidy-check:
    name: Tidy Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_go == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Check go.mod tidiness
        run: |
          for dir in . cli kapi apps/kapi-desktop bowrain/core bowrain/cli bowrain; do
            echo "Checking $dir..."
            (cd "$dir" && go mod tidy)
          done
          if ! git diff --exit-code -- '**go.mod' '**go.sum'; then
            echo "::error::go.mod/go.sum files are not tidy. Run 'make deps' locally."
            exit 1
          fi

  # ── Build (runs in parallel with test/lint) ───────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_go == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Create embed placeholders
        run: |
          mkdir -p bowrain/apps/web/dist && echo placeholder > bowrain/apps/web/dist/index.html
          mkdir -p apps/kapi-desktop/frontend/dist && echo placeholder > apps/kapi-desktop/frontend/dist/index.html

      - name: Build kapi CLI
        run: cd kapi && go build -o ../bin/kapi ./cmd/kapi

      - name: Build kapi-bowrain plugin binary
        run: cd bowrain/cli && go build -o ../../bin/kapi-bowrain ./cmd/kapi-bowrain

      - name: Build bowrain-server
        run: cd bowrain && go build -o ../bin/bowrain-server ./cmd/bowrain-server

      - name: Verify framework module isolation
        run: GOWORK=off bash -c "go build ./..."

      - name: Verify cli module isolation
        run: GOWORK=off bash -c "cd cli && go build ./..."

      - name: Verify platform module isolation
        run: GOWORK=off bash -c "cd bowrain/core && go build ./..."

      - name: Verify kapi module isolation
        run: GOWORK=off bash -c "cd kapi && go build ./..."

      - name: Verify Bowrain CLI module isolation
        run: GOWORK=off bash -c "cd bowrain/cli && go build ./..."

      - name: Verify kapi has no platform dep
        run: |
          if cd kapi && GOWORK=off go list -m all | grep -q 'neokapi/platform'; then
            echo "kapi should not depend on platform"
            exit 1
          fi

      - name: Verify bowrain has no cli dep
        run: |
          if cd bowrain && GOWORK=off go list -m all | grep -q 'neokapi/cli'; then
            echo "bowrain should not depend on cli"
            exit 1
          fi

      - name: Verify kapi has no heavy deps
        run: |
          # wails / labstack-echo / keycloak are bowrain-side deps that
          # must not leak into kapi. coreos/go-oidc / aws-sdk's ssooidc
          # transitively reach kapi via sigstore-go (used for cosign
          # signature verification of plugin tarballs); those are legit.
          if cd kapi && GOWORK=off go list -m all | grep -iE 'wails|labstack/echo|keycloak'; then
            exit 1
          fi

