name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - name: Create frontend stub for embed directive
        run: mkdir -p apps/bowrain/frontend/dist && touch apps/bowrain/frontend/dist/.gitkeep

      - name: Download modules
        run: go mod download && go mod verify

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v apps/bowrain)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - name: Create frontend stub for embed directive
        run: mkdir -p apps/bowrain/frontend/dist && touch apps/bowrain/frontend/dist/.gitkeep

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          install-mode: goinstall
          version: latest
          args: --timeout=5m ./ai/... ./cmd/... ./connectors/... ./core/... ./examples/... ./formats/... ./internal/... ./lib/... ./plugin/...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - name: Create frontend stub for embed directive
        run: mkdir -p apps/bowrain/frontend/dist && touch apps/bowrain/frontend/dist/.gitkeep

      - name: Build all packages
        run: go build -v $(go list ./... | grep -v apps/bowrain)

      - name: Build kapi CLI
        run: go build -o bin/kapi ./cmd/kapi

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bowrain/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/bowrain/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/bowrain/frontend/playwright-report/
          retention-days: 30
