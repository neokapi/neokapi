name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR; never cancel a push to main (each
# main commit's run is the canonical record and must complete).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  checks: write
  packages: read

jobs:
  # ── Detect which modules changed ──────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      framework: ${{ github.event_name == 'push' || steps.filter.outputs.framework }}
      cli: ${{ github.event_name == 'push' || steps.filter.outputs.cli }}
      platform: ${{ github.event_name == 'push' || steps.filter.outputs.platform }}
      kapi: ${{ github.event_name == 'push' || steps.filter.outputs.kapi }}
      bowrain_cli: ${{ github.event_name == 'push' || steps.filter.outputs.bowrain_cli }}
      bowrain_plugin: ${{ github.event_name == 'push' || steps.filter.outputs.bowrain_plugin }}
      bowrain: ${{ github.event_name == 'push' || steps.filter.outputs.bowrain }}
      frontend: ${{ github.event_name == 'push' || steps.filter.outputs.frontend }}
      kapi_desktop: ${{ github.event_name == 'push' || steps.filter.outputs.kapi_desktop }}
      bowrain_desktop: ${{ github.event_name == 'push' || steps.filter.outputs.bowrain_desktop }}
      kapi_react: ${{ github.event_name == 'push' || steps.filter.outputs.kapi_react }}
      workflows: ${{ github.event_name == 'push' || steps.filter.outputs.workflows }}
      any_go: ${{ github.event_name == 'push' || steps.filter.outputs.framework || steps.filter.outputs.cli || steps.filter.outputs.platform || steps.filter.outputs.kapi || steps.filter.outputs.bowrain_cli || steps.filter.outputs.bowrain_plugin || steps.filter.outputs.bowrain }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")

          check_paths() {
            local label="$1"; shift
            for pattern in "$@"; do
              # Support negation patterns (prefixed with !)
              if [[ "$pattern" == !* ]]; then continue; fi
              if echo "$CHANGED" | grep -qE "$pattern"; then
                echo "${label}=true" >> "$GITHUB_OUTPUT"
                return
              fi
            done
            echo "${label}=false" >> "$GITHUB_OUTPUT"
          }

          check_paths framework '^core/' '^go\.(mod|sum)$' '^go\.work' '^\.github/workflows/ci\.yml$'
          check_paths cli       '^cli/'
          check_paths platform  '^bowrain/core/'
          # kapi: anything under kapi/
          if echo "$CHANGED" | grep -E '^kapi/' | grep -q .; then
            echo "kapi=true" >> "$GITHUB_OUTPUT"
          else
            echo "kapi=false" >> "$GITHUB_OUTPUT"
          fi
          check_paths bowrain_cli '^bowrain/cli/'
          check_paths bowrain_plugin '^bowrain/plugin/'
          # bowrain: anything under bowrain/ except frontend app dirs, packages/, bowrain/core/, bowrain/cli/, docker/, and deploy/
          if echo "$CHANGED" | grep -E '^bowrain/' | grep -vE '^bowrain/(apps/(web|bowrain/frontend|keycloak-theme|ctrl|pulse)|packages/|emails/|core/|cli/|docker/|deploy/)' | grep -q .; then
            echo "bowrain=true" >> "$GITHUB_OUTPUT"
          else
            echo "bowrain=false" >> "$GITHUB_OUTPUT"
          fi
          check_paths frontend  '^bowrain/apps/(web|bowrain/frontend|ctrl|pulse|keycloak-theme)/' '^bowrain/packages/ui/' '^bowrain/emails/'
          check_paths kapi_desktop '^apps/kapi-desktop/' '^packages/(ui|flow-editor)/'
          check_paths bowrain_desktop '^bowrain/apps/bowrain/' '^bowrain/packages/ui/'
          check_paths kapi_react '^packages/kapi-(format|react)/'
          check_paths workflows '^\.github/workflows/'

  # ── Frontend checks & builds ─────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-ui

      # Job body lives in `make ci-frontend` (single source of truth, runnable
      # locally). See the "CI job bodies (thin-CI)" section of the Makefile.
      - name: Check + test + build the bowrain web frontends
        run: make ci-frontend

  # ── Kapi Desktop frontend ───────────────────────────────────────────────
  kapi-desktop:
    name: Kapi Desktop
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.kapi_desktop == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-ui

      # Job body lives in `make ci-kapi-desktop-frontend` (single source of
      # truth, runnable locally). The Go backend test stays a separate step
      # below because it needs the Go + Wails toolchain set up in the workflow.
      - name: Frontend checks, tests, and Storybook build
        run: make ci-kapi-desktop-frontend

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Install Wails system dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libicu-dev pkg-config

      - name: Run Kapi Desktop Go backend tests
        run: make kapi-desktop-test

      # Regenerate the pseudo-translation catalog from source and fail on drift.
      # A stale catalog leaks raw {=mN} element markers into the pseudo/translated
      # UI (the runtime now degrades to source, but a stale catalog still ships
      # wrong/old translations), so keep it in lockstep with the UI strings.
      - name: Kapi Desktop l10n catalog is fresh
        run: make kapi-desktop-l10n-verify

  # ── Bowrain Desktop (Wails app: frontend vitest + Go backend) ────────────
  bowrain-desktop:
    name: Bowrain Desktop
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.bowrain_desktop == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-ui

      # Job body lives in `make ci-bowrain-desktop-frontend`. The Go backend
      # test stays a separate step below (needs the Go + Wails toolchain).
      - name: Frontend tests
        run: make ci-bowrain-desktop-frontend

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      # The Wails app backend links the GTK/WebKit runtime on Linux; these dev
      # packages also pull in libicu-dev that the framework's cgo build needs.
      - name: Install Wails system dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libicu-dev pkg-config

      - name: Run Bowrain Desktop Go backend tests
        run: make bowrain-desktop-test

  # ── Kapi React (TS extractor + schema) ──────────────────────────────────
  kapi-react:
    name: Kapi React
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.kapi_react == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-ui

      # Job body lives in `make ci-kapi-react` (single source of truth).
      - name: Typecheck + validate + test + build kapi-format and kapi-react
        run: make ci-kapi-react

  # ── Go tests (parallel per module) ────────────────────────────────────────
  test-framework:
    name: Test (framework, Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true'
    strategy:
      fail-fast: false
      matrix:
        # Pinned Go only. The forward-compat `stable` canary moved to the
        # nightly workflow (nightly.yml) — it was a push-only leg whose
        # coverage/artifacts were discarded anyway, so keeping it out of the
        # per-commit path removes a whole test leg (and its build cache) from
        # both PR and push.
        go-version: ["1.26.0"]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules
        with:
          go-version: ${{ matrix.go-version }}

      # xmllint enforces the DocLang XSD conformance test (core/formats/doclang);
      # without it that test self-skips. Tiny package; keeps the schema gate real.
      - name: Install xmllint (DocLang XSD conformance)
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Run framework tests
        id: run-tests
        run: make test-framework
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        uses: ./.github/actions/go-junit-report
        with:
          in: test-results-framework.json
          out: junit-framework.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Framework Tests (Go ${{ matrix.go-version }})
          path: junit-framework.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      # Coverage is produced only on the full gate (push/nightly); PR fast runs
      # build without -coverprofile so Go can cache unchanged packages.
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always() && github.event_name == 'push'
        with:
          name: coverage-framework
          path: coverage/framework.out

      - name: Upload native test results
        uses: actions/upload-artifact@v7
        if: always() && matrix.go-version == '1.26.0'
        with:
          name: test-results-native
          path: test-results-framework.json
          retention-days: 1

  test-platform:
    name: Test (platform)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.platform == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Run platform tests
        id: run-tests
        run: make test-platform
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        uses: ./.github/actions/go-junit-report
        with:
          in: bowrain/test-results-platform.json
          out: junit-platform.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Platform Tests
          path: junit-platform.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always() && github.event_name == 'push'
        with:
          name: coverage-platform
          path: coverage/platform.out
          retention-days: 1

  test-cli:
    name: Test (cli)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.cli == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Run cli tests
        id: run-tests
        run: make test-cli
        continue-on-error: true

      - name: Show cli test failures
        if: steps.run-tests.outcome == 'failure'
        run: bash scripts/print-go-test-failures.sh test-results-cli.json

      - name: Convert to JUnit XML
        if: always()
        uses: ./.github/actions/go-junit-report
        with:
          in: test-results-cli.json
          out: junit-cli.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: CLI Tests
          path: junit-cli.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always() && github.event_name == 'push'
        with:
          name: coverage-cli
          path: coverage/cli.out
          retention-days: 1

  test-kapi:
    name: Test (kapi)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.kapi == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Run kapi tests
        id: run-tests
        run: make test-kapi
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        uses: ./.github/actions/go-junit-report
        with:
          in: test-results-kapi.json
          out: junit-kapi.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Kapi Tests
          path: junit-kapi.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always() && github.event_name == 'push'
        with:
          name: coverage-kapi
          path: coverage/kapi.out
          retention-days: 1

  test-bowrain-cli:
    name: Test (Bowrain CLI)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.platform == 'true' || needs.changes.outputs.bowrain_cli == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Run Bowrain CLI tests
        id: run-tests
        run: make test-bowrain-cli
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        uses: ./.github/actions/go-junit-report
        with:
          in: bowrain/test-results-bowrain-cli.json
          out: junit-bowrain-cli.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Bowrain CLI Tests
          path: junit-bowrain-cli.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always() && github.event_name == 'push'
        with:
          name: coverage-bowrain-cli
          path: coverage/bowrain-cli.out
          retention-days: 1

  test-bowrain-plugin:
    name: Test (Bowrain Plugin)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.platform == 'true' || needs.changes.outputs.bowrain_cli == 'true' || needs.changes.outputs.bowrain_plugin == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      # The shared setup action does not cover the plugin modules (separate
      # go.mod, not reachable from any other ./...); download them here.
      - name: Download plugin modules
        run: |
          cd bowrain/plugin && go mod download && go mod verify
          cd schema && go mod download && go mod verify

      - name: Run Bowrain Plugin tests
        id: run-tests
        run: make test-bowrain-plugin
        continue-on-error: true

      - name: Convert plugin tests to JUnit XML
        if: always()
        uses: ./.github/actions/go-junit-report
        with:
          in: bowrain/test-results-bowrain-plugin.json
          out: junit-bowrain-plugin.xml

      - name: Convert plugin schema tests to JUnit XML
        if: always()
        uses: ./.github/actions/go-junit-report
        with:
          in: bowrain/test-results-bowrain-plugin-schema.json
          out: junit-bowrain-plugin-schema.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Bowrain Plugin Tests
          path: junit-bowrain-plugin.xml,junit-bowrain-plugin-schema.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always() && github.event_name == 'push'
        with:
          name: coverage-bowrain-plugin
          path: |
            coverage/bowrain-plugin.out
            coverage/bowrain-plugin-schema.out
          retention-days: 1

  test-bowrain:
    name: Test (bowrain)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.platform == 'true' || needs.changes.outputs.bowrain == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Run bowrain tests
        id: run-tests
        run: make test-bowrain
        continue-on-error: true

      # The suite pipes `go test -json` to a file, so failing test names never
      # reach the step log. Surface them (and the relevant output) on failure so
      # a red bowrain run is debuggable without re-running locally.
      - name: Show failed bowrain tests
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "::group::Failed tests"
          jq -r 'select(.Action=="fail" and .Test!=null) | "\(.Package)\t\(.Test)"' test-results-bowrain.json | sort -u || true
          echo "::endgroup::"
          echo "::group::Failure output"
          jq -r 'select(.Action=="output") | .Output' test-results-bowrain.json \
            | grep -aE "panic:|DATA RACE|Error Trace|Error:|FAIL|expected|actual|connection refused|cannot|no such|context deadline|\.go:[0-9]+:" | head -200 || true
          echo "::endgroup::"

      - name: Upload bowrain test JSON (on failure)
        if: steps.run-tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: test-results-bowrain
          path: test-results-bowrain.json
          retention-days: 3

      - name: Convert to JUnit XML
        if: always()
        uses: ./.github/actions/go-junit-report
        with:
          in: test-results-bowrain.json
          out: junit-bowrain.xml

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Bowrain Tests
          path: junit-bowrain.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always() && github.event_name == 'push'
        with:
          name: coverage-bowrain
          path: coverage/bowrain.out
          retention-days: 1

  # ── Merge coverage from all test jobs ─────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test-framework, test-cli, test-platform, test-kapi, test-bowrain-cli, test-bowrain-plugin, test-bowrain]
    # Coverage is collected and pushed to Codecov on the full gate only. PR fast
    # runs skip -coverprofile (it disables Go's test cache), so there is nothing
    # to merge — and uploading near-empty coverage would spam Codecov PR comments.
    if: always() && !cancelled() && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Merge coverage
        run: |
          # Start with framework coverage (has the header line)
          if [ -f framework.out ]; then
            cp framework.out coverage.out
          else
            echo "mode: atomic" > coverage.out
          fi
          # Append remaining files (skip header line)
          for f in cli.out platform.out kapi.out bowrain-cli.out bowrain-plugin.out bowrain-plugin-schema.out bowrain.out; do
            if [ -f "$f" ]; then
              tail -n +2 "$f" >> coverage.out
            fi
          done

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint-framework:
    name: Lint (framework)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.framework == 'true' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.kapi == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      # The .golangci.yml build-tags include fts5, so golangci-lint must compile
      # the cgo ICU tokenizer / FTS5 path; that needs libicu-dev + pkg-config
      # (mirroring the test jobs). Without it those files are silently skipped.
      - name: Install cgo deps (ICU)
        run: sudo apt-get update && sudo apt-get install -y libicu-dev pkg-config

      - name: Download modules
        run: |
          go mod download
          cd cli && go mod download
          cd ../kapi && go mod download

      - name: Lint framework
        uses: ./.github/actions/golangci
        with:
          working-directory: .

      - name: Lint cli
        uses: ./.github/actions/golangci
        with:
          working-directory: cli

      - name: Lint kapi
        uses: ./.github/actions/golangci
        with:
          working-directory: kapi

  lint-platform:
    name: Lint (platform)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.platform == 'true' || needs.changes.outputs.bowrain_cli == 'true' || needs.changes.outputs.bowrain == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Create embed placeholders
        run: |
          mkdir -p bowrain/apps/web/dist && echo placeholder > bowrain/apps/web/dist/index.html
          mkdir -p bowrain/apps/bowrain/frontend/dist && echo placeholder > bowrain/apps/bowrain/frontend/dist/index.html

      - name: Download modules
        run: |
          cd bowrain/core && go mod download
          cd ../../bowrain && go mod download

      - name: Lint platform
        uses: ./.github/actions/golangci
        with:
          working-directory: bowrain/core

      - name: Lint Bowrain CLI
        uses: ./.github/actions/golangci
        with:
          working-directory: bowrain/cli

      - name: Install Linux dependencies for Wails
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libicu-dev pkg-config

      - name: Lint bowrain
        uses: ./.github/actions/golangci
        with:
          working-directory: bowrain

  # ── GitHub Actions Lint ──────────────────────────────────────────────────
  gha-lint:
    name: Actions Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Install actionlint
        run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/v1.7.10/scripts/download-actionlint.bash) 1.7.10

      - name: Lint workflow files
        run: ./actionlint

  # ── go mod tidy drift check ──────────────────────────────────────────────
  tidy-check:
    name: Tidy Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_go == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules
        with:
          cache-flavor: plain

      # Job body lives in `make ci-tidy` (single source of truth).
      - name: Check go.mod tidiness
        run: make ci-tidy

  # ── Build (runs in parallel with test/lint) ───────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_go == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules
        with:
          cache-flavor: plain

      # Job body lives in `make ci-build` (single source of truth, runnable
      # locally): builds all three binaries with bare `go build` (no fts5,
      # matching this job's historical behavior) and asserts the GOWORK=off
      # module-isolation boundaries. wails / labstack-echo / keycloak are
      # bowrain-side deps that must not leak into kapi; coreos/go-oidc and
      # aws-sdk's ssooidc reach kapi legitimately via sigstore-go (cosign
      # signature verification of plugin tarballs).
      - name: Build binaries + verify module isolation
        run: make ci-build

