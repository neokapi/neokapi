name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Detect which modules changed ──────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      framework: ${{ github.event_name == 'push' || steps.filter.outputs.framework }}
      platform: ${{ github.event_name == 'push' || steps.filter.outputs.platform }}
      kapi: ${{ github.event_name == 'push' || steps.filter.outputs.kapi }}
      bowrain: ${{ github.event_name == 'push' || steps.filter.outputs.bowrain }}
      frontend: ${{ github.event_name == 'push' || steps.filter.outputs.frontend }}
      any_go: ${{ github.event_name == 'push' || steps.filter.outputs.framework || steps.filter.outputs.platform || steps.filter.outputs.kapi || steps.filter.outputs.bowrain }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")

          check_paths() {
            local label="$1"; shift
            for pattern in "$@"; do
              # Support negation patterns (prefixed with !)
              if [[ "$pattern" == !* ]]; then continue; fi
              if echo "$CHANGED" | grep -qE "$pattern"; then
                echo "${label}=true" >> "$GITHUB_OUTPUT"
                return
              fi
            done
            echo "${label}=false" >> "$GITHUB_OUTPUT"
          }

          check_paths framework '^core/' '^go\.(mod|sum|work)$' '^\.github/workflows/ci\.yml$'
          check_paths platform  '^platform/'
          check_paths kapi      '^kapi/'
          # bowrain: anything under bowrain/ except the frontend app dirs
          if echo "$CHANGED" | grep -E '^bowrain/' | grep -vE '^bowrain/apps/(web|kapi-web|bowrain/frontend)/' | grep -q .; then
            echo "bowrain=true" >> "$GITHUB_OUTPUT"
          else
            echo "bowrain=false" >> "$GITHUB_OUTPUT"
          fi
          check_paths frontend  '^packages/ui/' '^bowrain/apps/web/' '^bowrain/apps/kapi-web/' '^bowrain/apps/bowrain/frontend/'

  # ── Frontend builds ───────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.any_go == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-ui

      - name: Run UI unit tests
        working-directory: packages/ui
        run: npm test

      - name: Build SaaS web UI
        working-directory: bowrain/apps/web
        run: npm run build

      - name: Build kapi web UI
        working-directory: bowrain/apps/kapi-web
        run: npm run build

  # ── Go tests (parallel per module) ────────────────────────────────────────
  test-framework:
    name: Test (framework)
    runs-on: ubuntu-latest
    needs: [changes, frontend]
    if: always() && !cancelled() && needs.changes.outputs.framework == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Run framework tests
        run: go test -race -coverprofile=framework.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-framework
          path: framework.out
          retention-days: 1

  test-platform:
    name: Test (platform)
    runs-on: ubuntu-latest
    needs: [changes, frontend]
    if: always() && !cancelled() && (needs.changes.outputs.framework == 'true' || needs.changes.outputs.platform == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Run platform tests
        run: cd platform && go test -race -coverprofile=platform.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-platform
          path: platform/platform.out
          retention-days: 1

  test-kapi:
    name: Test (kapi)
    runs-on: ubuntu-latest
    needs: [changes, frontend]
    if: always() && !cancelled() && (needs.changes.outputs.framework == 'true' || needs.changes.outputs.platform == 'true' || needs.changes.outputs.kapi == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Run kapi tests
        run: cd kapi && go test -race -coverprofile=kapi.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-kapi
          path: kapi/kapi.out
          retention-days: 1

  test-bowrain:
    name: Test (bowrain)
    runs-on: ubuntu-latest
    needs: [changes, frontend]
    if: always() && !cancelled() && (needs.changes.outputs.framework == 'true' || needs.changes.outputs.platform == 'true' || needs.changes.outputs.bowrain == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Run bowrain tests
        run: cd bowrain && go test -race -coverprofile=bowrain.out -covermode=atomic $(go list ./... | grep -v '/apps/bowrain')

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-bowrain
          path: bowrain/bowrain.out
          retention-days: 1

  # ── Merge coverage from all test jobs ─────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test-framework, test-platform, test-kapi, test-bowrain]
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Merge coverage
        run: |
          # Start with framework coverage (has the header line)
          if [ -f framework.out ]; then
            cp framework.out coverage.out
          else
            echo "mode: atomic" > coverage.out
          fi
          # Append remaining files (skip header line)
          for f in platform.out kapi.out bowrain.out; do
            if [ -f "$f" ]; then
              tail -n +2 "$f" >> coverage.out
            fi
          done

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_go == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Create embed placeholders
        run: |
          mkdir -p bowrain/apps/web/dist && echo placeholder > bowrain/apps/web/dist/index.html
          mkdir -p bowrain/apps/kapi-web/dist && echo placeholder > bowrain/apps/kapi-web/dist/index.html

      - name: Lint framework
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          args: --timeout=5m ./...

      - name: Lint platform
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          working-directory: platform
          args: --timeout=5m ./...

      - name: Lint kapi
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          working-directory: kapi
          args: --timeout=5m ./...

      - name: Install Linux dependencies for Wails
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Create Bowrain frontend placeholder
        run: mkdir -p bowrain/apps/bowrain/frontend/dist && echo placeholder > bowrain/apps/bowrain/frontend/dist/index.html

      - name: Lint bowrain
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          working-directory: bowrain
          args: --timeout=5m ./...

  # ── Build (runs in parallel with test/lint) ───────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_go == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-ui
      - uses: ./.github/actions/setup-go-modules

      - name: Build SaaS web UI
        working-directory: bowrain/apps/web
        run: npm run build

      - name: Build kapi web UI
        working-directory: bowrain/apps/kapi-web
        run: npm run build

      - name: Build kapi CLI
        run: cd kapi && go build -o ../bin/kapi ./cmd/kapi

      - name: Build brain CLI
        run: cd bowrain && go build -o ../bin/brain ./cmd/brain

      - name: Build bowrain-server
        run: cd bowrain && go build -o ../bin/bowrain-server ./cmd/bowrain-server

      - name: Verify framework module isolation
        run: GOWORK=off go build ./...

      - name: Verify platform module isolation
        run: GOWORK=off bash -c "cd platform && go build ./..."

      - name: Verify kapi module isolation
        run: GOWORK=off bash -c "cd kapi && go build ./..."

      - name: Verify kapi has no heavy deps
        run: |
          cd kapi && GOWORK=off go list -m all | grep -iE 'sqlite|wails|echo|oidc|keyring' && exit 1 || true

  # ── Bridge filter integration tests ──────────────────────────────────────
  test-bridge-filters:
    name: Test (bridge filters)
    runs-on: ubuntu-latest
    needs: [changes, frontend]
    if: always() && !cancelled() && needs.changes.outputs.framework == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache okapi-bridge JAR
        uses: actions/cache@v4
        with:
          path: ~/.cache/gokapi/bridge/
          key: okapi-bridge-v2.0.0-okapi1.48.0-2

      - name: Fetch okapi-bridge JAR
        run: |
          bash scripts/fetch-okapi-bridge.sh
          echo "GOKAPI_BRIDGE_JAR=$HOME/.cache/gokapi/bridge/v2.0.0-okapi1.48.0/okapi-bridge.jar" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GOKAPI_REGISTRY_TOKEN }}

      - name: Cache okapi test data
        uses: actions/cache@v4
        with:
          path: okapi-testdata/
          key: okapi-testdata-1.48.0-v2

      - name: Fetch okapi test data
        run: bash scripts/fetch-okapi-testdata.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run bridge filter integration tests
        run: go test -race -tags=integration -count=1 -v ./core/plugin/bridge/filters/...
        timeout-minutes: 15

  # ── Playwright E2E ────────────────────────────────────────────────────────
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-ui

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: bowrain/apps/bowrain/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: bowrain/apps/bowrain/frontend
        run: npx playwright test
        timeout-minutes: 15

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: bowrain/apps/bowrain/frontend/playwright-report/
          retention-days: 30

  # ── E2E (Docker) ──────────────────────────────────────────────────────────
  e2e:
    name: E2E (Docker)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-ui
      - uses: ./.github/actions/setup-go-modules

      - name: Build SaaS web UI
        working-directory: bowrain/apps/web
        run: npm run build

      - name: Build Keycloak theme
        run: make keycloak-theme

      - name: Start e2e stack (Docker + bowrain-server)
        run: bash e2e/setup.sh
        timeout-minutes: 5

      - name: Run Go e2e tests
        run: go test -tags=e2e -count=1 -v ./e2e/
        timeout-minutes: 5

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: bowrain/apps/web
        run: npx playwright install --with-deps chromium

      - name: Run web app E2E tests
        working-directory: bowrain/apps/web
        run: npx playwright test --config playwright.e2e.config.ts
        timeout-minutes: 5

      - name: Tear down e2e stack
        if: always()
        run: bash e2e/teardown.sh
