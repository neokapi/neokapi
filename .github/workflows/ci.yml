name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  # ── Detect which modules changed ──────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      framework: ${{ github.event_name == 'push' || steps.filter.outputs.framework }}
      cli: ${{ github.event_name == 'push' || steps.filter.outputs.cli }}
      platform: ${{ github.event_name == 'push' || steps.filter.outputs.platform }}
      kapi: ${{ github.event_name == 'push' || steps.filter.outputs.kapi }}
      bowrain_cli: ${{ github.event_name == 'push' || steps.filter.outputs.bowrain_cli }}
      bowrain: ${{ github.event_name == 'push' || steps.filter.outputs.bowrain }}
      frontend: ${{ github.event_name == 'push' || steps.filter.outputs.frontend }}
      workflows: ${{ github.event_name == 'push' || steps.filter.outputs.workflows }}
      any_go: ${{ github.event_name == 'push' || steps.filter.outputs.framework || steps.filter.outputs.cli || steps.filter.outputs.platform || steps.filter.outputs.kapi || steps.filter.outputs.bowrain_cli || steps.filter.outputs.bowrain }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")

          check_paths() {
            local label="$1"; shift
            for pattern in "$@"; do
              # Support negation patterns (prefixed with !)
              if [[ "$pattern" == !* ]]; then continue; fi
              if echo "$CHANGED" | grep -qE "$pattern"; then
                echo "${label}=true" >> "$GITHUB_OUTPUT"
                return
              fi
            done
            echo "${label}=false" >> "$GITHUB_OUTPUT"
          }

          check_paths framework '^framework/core/' '^framework/go\.(mod|sum)$' '^go\.work' '^\.github/workflows/ci\.yml$'
          check_paths cli       '^framework/cli/'
          check_paths platform  '^platform/core/'
          # kapi: anything under framework/kapi/
          if echo "$CHANGED" | grep -E '^framework/kapi/' | grep -q .; then
            echo "kapi=true" >> "$GITHUB_OUTPUT"
          else
            echo "kapi=false" >> "$GITHUB_OUTPUT"
          fi
          check_paths bowrain_cli '^platform/cli/'
          # bowrain: anything under platform/ except the frontend app dirs
          if echo "$CHANGED" | grep -E '^platform/' | grep -vE '^platform/apps/(web|bowrain/frontend)/' | grep -q .; then
            echo "bowrain=true" >> "$GITHUB_OUTPUT"
          else
            echo "bowrain=false" >> "$GITHUB_OUTPUT"
          fi
          check_paths frontend  '^platform/apps/(web|bowrain/frontend)/' '^platform/packages/ui/'
          check_paths workflows '^\.github/workflows/'

  # ── Frontend builds ───────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.any_go == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-ui

      - name: Run UI unit tests
        working-directory: platform/packages/ui
        run: npm test

      - name: Build SaaS web UI
        working-directory: platform/apps/web
        run: npm run build

  # ── Go tests (parallel per module) ────────────────────────────────────────
  test-framework:
    name: Test (framework)
    runs-on: ubuntu-latest
    needs: [changes, frontend]
    if: always() && !cancelled() && needs.changes.outputs.framework == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run framework tests
        id: run-tests
        working-directory: framework
        run: go test -race -coverprofile=framework.out -covermode=atomic -json ./... > test-results-framework.json 2>&1
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in framework/test-results-framework.json -out junit-framework.xml

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Framework Tests
          path: junit-framework.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-framework
          path: framework/framework.out

      - name: Upload native test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-native
          path: framework/test-results-framework.json
          retention-days: 1

  test-platform:
    name: Test (platform)
    runs-on: ubuntu-latest
    needs: [changes, frontend]
    if: always() && !cancelled() && (needs.changes.outputs.framework == 'true' || needs.changes.outputs.platform == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run platform tests
        id: run-tests
        run: cd platform/core && go test -race -coverprofile=platform.out -covermode=atomic -json ./... > ../test-results-platform.json 2>&1
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in platform/test-results-platform.json -out junit-platform.xml

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Platform Tests
          path: junit-platform.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-platform
          path: platform/core/platform.out
          retention-days: 1

  test-cli:
    name: Test (cli)
    runs-on: ubuntu-latest
    needs: [changes, frontend]
    if: always() && !cancelled() && (needs.changes.outputs.framework == 'true' || needs.changes.outputs.cli == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run cli tests
        id: run-tests
        run: cd framework/cli && go test -race -coverprofile=cli.out -covermode=atomic -json ./... > ../test-results-cli.json 2>&1
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in framework/test-results-cli.json -out junit-cli.xml

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: CLI Tests
          path: junit-cli.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-cli
          path: framework/cli/cli.out
          retention-days: 1

  test-kapi:
    name: Test (kapi)
    runs-on: ubuntu-latest
    needs: [changes, frontend]
    if: always() && !cancelled() && (needs.changes.outputs.framework == 'true' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.kapi == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run kapi tests
        id: run-tests
        run: cd framework/kapi && go test -race -coverprofile=kapi.out -covermode=atomic -json ./... > ../test-results-kapi.json 2>&1
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in framework/test-results-kapi.json -out junit-kapi.xml

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Kapi Tests
          path: junit-kapi.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-kapi
          path: framework/kapi/kapi.out
          retention-days: 1

  test-bowrain-cli:
    name: Test (Bowrain CLI)
    runs-on: ubuntu-latest
    needs: [changes, frontend]
    if: always() && !cancelled() && (needs.changes.outputs.framework == 'true' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.platform == 'true' || needs.changes.outputs.bowrain_cli == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run Bowrain CLI tests
        id: run-tests
        run: cd platform/cli && go test -race -coverprofile=bowrain-cli.out -covermode=atomic -json ./... > ../test-results-bowrain-cli.json 2>&1
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in platform/test-results-bowrain-cli.json -out junit-bowrain-cli.xml

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Bowrain CLI Tests
          path: junit-bowrain-cli.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-bowrain-cli
          path: platform/cli/bowrain-cli.out
          retention-days: 1

  test-bowrain:
    name: Test (bowrain)
    runs-on: ubuntu-latest
    needs: [changes, frontend]
    if: always() && !cancelled() && (needs.changes.outputs.framework == 'true' || needs.changes.outputs.platform == 'true' || needs.changes.outputs.bowrain == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run bowrain tests
        id: run-tests
        run: |
          cd platform
          # shellcheck disable=SC2046
          go test -race -coverprofile=bowrain.out -covermode=atomic -json $(go list ./... | grep -v '/apps/bowrain') > ../test-results-bowrain.json 2>&1
        continue-on-error: true

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in test-results-bowrain.json -out junit-bowrain.xml

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Bowrain Tests
          path: junit-bowrain.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-bowrain
          path: platform/bowrain.out
          retention-days: 1

  # ── Merge coverage from all test jobs ─────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test-framework, test-cli, test-platform, test-kapi, test-bowrain-cli, test-bowrain]
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Merge coverage
        run: |
          # Start with framework coverage (has the header line)
          if [ -f framework.out ]; then
            cp framework.out coverage.out
          else
            echo "mode: atomic" > coverage.out
          fi
          # Append remaining files (skip header line)
          for f in cli.out platform.out kapi.out bowrain-cli.out bowrain.out; do
            if [ -f "$f" ]; then
              tail -n +2 "$f" >> coverage.out
            fi
          done

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_go == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Create embed placeholders
        run: |
          mkdir -p platform/apps/web/dist && echo placeholder > platform/apps/web/dist/index.html

      - name: Lint framework
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          working-directory: framework
          args: --timeout=5m ./...

      - name: Lint cli
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          working-directory: framework/cli
          args: --timeout=5m ./...

      - name: Lint platform
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          working-directory: platform/core
          args: --timeout=5m ./...

      - name: Lint kapi
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          working-directory: framework/kapi
          args: --timeout=5m ./...

      - name: Lint Bowrain CLI
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          working-directory: platform/cli
          args: --timeout=5m ./...

      - name: Install Linux dependencies for Wails
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Create Bowrain frontend placeholder
        run: mkdir -p platform/apps/bowrain/frontend/dist && echo placeholder > platform/apps/bowrain/frontend/dist/index.html

      - name: Lint bowrain
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          version: latest
          working-directory: platform
          args: --timeout=5m ./...

  # ── GitHub Actions Lint ──────────────────────────────────────────────────
  gha-lint:
    name: Actions Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Lint workflow files
        run: ./actionlint

  # ── Build (runs in parallel with test/lint) ───────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_go == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-ui
      - uses: ./.github/actions/setup-go-modules

      - name: Build SaaS web UI
        working-directory: platform/apps/web
        run: npm run build

      - name: Build kapi CLI
        run: cd framework/kapi && go build -o ../../bin/kapi ./cmd/kapi

      - name: Build Bowrain CLI
        run: cd platform/cli && go build -o ../../bin/bowrain ./cmd/bowrain

      - name: Build bowrain-server
        run: cd platform && go build -o ../bin/bowrain-server ./cmd/bowrain-server

      - name: Verify framework module isolation
        run: GOWORK=off bash -c "cd framework && go build ./..."

      - name: Verify cli module isolation
        run: GOWORK=off bash -c "cd framework/cli && go build ./..."

      - name: Verify platform module isolation
        run: GOWORK=off bash -c "cd platform/core && go build ./..."

      - name: Verify kapi module isolation
        run: GOWORK=off bash -c "cd framework/kapi && go build ./..."

      - name: Verify Bowrain CLI module isolation
        run: GOWORK=off bash -c "cd platform/cli && go build ./..."

      - name: Verify kapi has no platform dep
        run: |
          if cd framework/kapi && GOWORK=off go list -m all | grep -q 'neokapi/platform'; then
            echo "kapi should not depend on platform"
            exit 1
          fi

      - name: Verify bowrain has no cli dep
        run: |
          if cd platform && GOWORK=off go list -m all | grep -q 'neokapi/cli'; then
            echo "bowrain should not depend on cli"
            exit 1
          fi

      - name: Verify kapi has no heavy deps
        run: |
          if cd framework/kapi && GOWORK=off go list -m all | grep -iE 'wails|echo|oidc|keyring'; then
            exit 1
          fi

  # ── Bridge filter integration tests ──────────────────────────────────────
  test-bridge-filters:
    name: Test (bridge filters)
    runs-on: ubuntu-latest
    needs: [changes, frontend]
    if: always() && !cancelled() && needs.changes.outputs.framework == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify JDK
        run: java -version

      - name: Cache okapi-bridge JAR
        uses: actions/cache@v4
        with:
          path: ~/.cache/neokapi/bridge/
          key: okapi-bridge-v2.14.0-okapi1.48.0

      - name: Fetch okapi-bridge JAR
        run: |
          bash scripts/fetch-okapi-bridge.sh
          echo "NEOKAPI_BRIDGE_JAR=$HOME/.cache/neokapi/bridge/v2.14.0-okapi1.48.0/okapi-bridge.jar" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.NEOKAPI_GITHUB_TOKEN }}

      - name: Cache okapi test data
        uses: actions/cache@v4
        with:
          path: okapi-testdata/
          key: okapi-testdata-1.48.0-v2

      - name: Fetch okapi test data
        run: bash scripts/fetch-okapi-testdata.sh
        env:
          GITHUB_TOKEN: ${{ secrets.NEOKAPI_GITHUB_TOKEN }}

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Start shared bridge JVM pool
        run: |
          eval "$(bash scripts/start-bridge-pool.sh 4)"
          echo "NEOKAPI_BRIDGE_ADDRS=$NEOKAPI_BRIDGE_ADDRS" >> "$GITHUB_ENV"
          echo "BRIDGE_PIDS=$BRIDGE_PIDS" >> "$GITHUB_ENV"
          echo "Started 4 bridge JVMs: $NEOKAPI_BRIDGE_ADDRS"

      - name: Run bridge filter integration tests
        id: run-tests
        working-directory: framework
        run: go test -race -p 1 -tags=integration -count=1 -json ./core/plugin/bridge/filters/... 2>&1 | bash ../scripts/go-test-progress.sh > ../test-results-bridge.json
        continue-on-error: true
        timeout-minutes: 30

      - name: Stop bridge JVM pool
        if: always()
        run: |
          for pid in $BRIDGE_PIDS; do
            kill "$pid" 2>/dev/null || true
          done

      - name: Convert to JUnit XML
        if: always()
        run: go-junit-report -in test-results-bridge.json -out junit-bridge.xml

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Bridge Filter Tests
          path: junit-bridge.xml
          reporter: java-junit

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

      - name: Upload bridge test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-bridge
          path: test-results-bridge.json
          retention-days: 1

  # ── Update test comparison dashboard ────────────────────────────────────
  test-comparison:
    name: Test Comparison
    runs-on: ubuntu-latest
    needs: [test-framework, test-bridge-filters]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true

      - name: Fetch Okapi Surefire data
        run: bash scripts/fetch-okapi-surefire.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Generate test comparison
        run: |
          mkdir -p website/static/data
          go run ./scripts/testcompare \
            -okapi-dir okapi-surefire/1.48.0-v1 \
            -gotest-bridge-json test-results-bridge.json \
            -gotest-native-json test-results-framework.json \
            -bridge-src framework/core/plugin/bridge/filters \
            -native-src framework/core/formats \
            -go-commit ${{ github.sha }} \
            -okapi-tag v1.48.0 \
            -out website/static/data/test-comparison.json

      - name: Upload to docs-assets release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Upload test-comparison.json to the docs-assets release
          # (delete old asset first if it exists)
          gh release upload docs-assets \
            website/static/data/test-comparison.json \
            --clobber 2>/dev/null || \
          gh release create docs-assets \
            website/static/data/test-comparison.json \
            --title "Documentation Assets" \
            --notes "Auto-generated documentation assets (screenshots, recordings, test data)"

      - name: Trigger docs deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docs.yml
