name: _Build Keycloak Image

on:
  workflow_call:
    inputs:
      image-tag:
        description: "Image tag"
        required: true
        type: string

jobs:
  build:
    name: Build Keycloak Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-ui

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Keycloak theme
        run: make -C bowrain keycloak-theme

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push keycloak image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/keycloak/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bowrain-keycloak:${{ inputs.image-tag }}
            ghcr.io/neokapi/bowrain-keycloak:latest
          cache-from: type=gha,scope=bowrain-keycloak
          cache-to: type=gha,mode=max,scope=bowrain-keycloak
