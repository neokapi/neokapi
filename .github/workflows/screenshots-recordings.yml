name: Screenshots & Recordings

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: 'External server URL (e.g. https://staging.bowrain.cloud). Leave blank to use local Docker stack.'
        required: false
        default: ''
      server_token:
        description: 'Pre-authenticated JWT token. Leave blank to run device auth flow.'
        required: false
        default: ''
  schedule:
    # Nightly at 2 AM UTC
    - cron: '0 2 * * *'
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Needed to create/update releases
  actions: write   # Needed to trigger docs redeploy workflow
  packages: read   # Needed to pull Docker images from GHCR

jobs:
  # ── Bowrain Screenshots & Recordings (headless binary on Linux) ──────────────
  bowrain-assets:
    name: Bowrain Assets (${{ matrix.theme }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        theme: [dark, light]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: platform/package-lock.json

      - name: Install GTK/WebKit dev packages (needed for Wails CGO)
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install workspace dependencies
        working-directory: platform
        run: npm ci

      - name: Build shared UI package
        working-directory: platform/packages/ui
        run: npx tsc

      - name: Generate Wails bindings
        working-directory: platform/apps/bowrain
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.73
          wails3 generate bindings -f '-tags server' -clean=true
          # shellcheck disable=SC2016
          sed -i 's/= $0\./= store$0./g' frontend/bindings/github.com/neokapi/neokapi/bowrain/apps/bowrain/backend/app.js

      - name: Build frontend
        working-directory: platform/apps/bowrain/frontend
        run: npm run build

      - name: Build headless binary
        working-directory: platform/apps/bowrain
        run: go build -tags server -o ../../../bin/bowrain-headless .

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: platform/apps/bowrain/frontend
        run: npx playwright install --with-deps chromium

      - name: Generate screenshots
        working-directory: platform/apps/bowrain/frontend
        run: npx playwright test e2e/screenshots.spec.ts -g "\[${{ matrix.theme }}\]"
        env:
          WAILS_SERVER_MODE: "true"

      - name: Generate recordings
        working-directory: platform/apps/bowrain/frontend
        run: npx playwright test --config=playwright.recordings.config.ts -g "\[${{ matrix.theme }}\]"
        timeout-minutes: 30
        env:
          FORCE_RECORDINGS: "true"
          WAILS_SERVER_MODE: "true"

      - name: Copy recordings to static assets
        working-directory: platform/apps/bowrain/frontend
        run: THEME=${{ matrix.theme }} bash scripts/copy-recordings.sh

      - name: Upload Bowrain assets
        uses: actions/upload-artifact@v4
        with:
          name: bowrain-assets-${{ matrix.theme }}
          path: |
            website/static/img/platform/${{ matrix.theme }}/
            website/static/video/platform/${{ matrix.theme }}/
          retention-days: 30

  # ── Web App Screenshots & Recordings (build from source + local server) ──────
  web-app-assets:
    name: Web App Assets (${{ matrix.theme }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        theme: [dark, light]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: platform/package-lock.json

      - name: Install workspace dependencies
        working-directory: platform
        run: npm ci

      - name: Build shared UI package
        working-directory: platform/packages/ui
        run: npx tsc

      - name: Build web UI
        working-directory: platform/apps/web
        run: npm run build

      - name: Build bowrain-server
        if: ${{ inputs.server_url == '' }}
        run: cd platform && go build -o ../bin/bowrain-server ./cmd/bowrain-server

      - name: Build Keycloak theme
        if: ${{ inputs.server_url == '' }}
        run: make -C platform keycloak-theme

      - name: Start dependencies (Keycloak + Mailpit + NATS)
        if: ${{ inputs.server_url == '' }}
        run: docker compose -f platform/compose.yaml up -d --wait

      - name: Start bowrain-server
        if: ${{ inputs.server_url == '' }}
        run: |
          BOWRAIN_JWT_SECRET=dev-secret-change-in-production \
          BOWRAIN_OIDC_ISSUER_URL=http://localhost:8180/realms/bowrain \
          BOWRAIN_OIDC_CLIENT_ID=bowrain \
          BOWRAIN_OIDC_CLIENT_SECRET=bowrain-secret \
          BOWRAIN_SMTP_HOST=localhost:1025 \
          BOWRAIN_SMTP_FROM=noreply@bowrain.cloud \
          BOWRAIN_STORE=bowrain-ci.db \
          BOWRAIN_GRPC_PORT=9080 \
          BOWRAIN_WEB_UI_DIR=platform/apps/web/dist \
          BOWRAIN_NATS_URL=nats://localhost:4222 \
          bin/bowrain-server &
          echo $! > .bowrain-server.pid

      - name: Wait for server readiness
        if: ${{ inputs.server_url == '' }}
        run: |
          for i in {1..30}; do
            READY_JSON=$(curl -sf http://localhost:8080/api/v1/ready 2>/dev/null) && {
              STATUS=$(echo "$READY_JSON" | jq -r '.status')
              if [ "$STATUS" = "ready" ] || [ "$STATUS" = "degraded" ]; then
                echo "Server is $STATUS"
                AI_STATUS=$(echo "$READY_JSON" | jq -r '.components.ai.status')
                echo "AI_AVAILABLE=$( [ "$AI_STATUS" = "up" ] && echo true || echo false )" >> "$GITHUB_ENV"
                echo "$READY_JSON" | jq .
                exit 0
              fi
              echo "Server status: $STATUS (waiting...)"
            }
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to become ready"
          exit 1

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright
        working-directory: platform/apps/web
        run: npx playwright install --with-deps chromium

      - name: Generate screenshots
        working-directory: platform/apps/web
        run: npx playwright test --config playwright.config.ts -g "\[${{ matrix.theme }}\]"
        env:
          BOWRAIN_SERVER_URL: ${{ inputs.server_url || 'http://localhost:8080' }}
          BOWRAIN_TOKEN: ${{ inputs.server_token }}

      - name: Generate recordings
        working-directory: platform/apps/web
        run: npx playwright test --config playwright.recordings.config.ts -g "\[${{ matrix.theme }}\]"
        timeout-minutes: 30
        env:
          FORCE_RECORDINGS: "true"
          BOWRAIN_SERVER_URL: ${{ inputs.server_url || 'http://localhost:8080' }}
          BOWRAIN_TOKEN: ${{ inputs.server_token }}

      - name: Copy recordings to static assets
        working-directory: platform/apps/web
        run: THEME=${{ matrix.theme }} bash scripts/copy-recordings.sh

      - name: Upload web app assets
        uses: actions/upload-artifact@v4
        with:
          name: web-app-assets-${{ matrix.theme }}
          path: |
            website/static/img/web-app/${{ matrix.theme }}/
            website/static/video/web-app/${{ matrix.theme }}/
          retention-days: 30

      - name: Shutdown server and dependencies
        if: ${{ always() && inputs.server_url == '' }}
        run: |
          if [ -f .bowrain-server.pid ]; then
            kill "$(cat .bowrain-server.pid)" 2>/dev/null || true
            rm -f .bowrain-server.pid
          fi
          docker compose -f platform/compose.yaml down -v

  # ── Kapi CLI Recordings (VHS, standalone) ────────────────────────────────────
  kapi-recordings:
    name: Kapi Recordings (VHS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build kapi CLI
        run: make build

      - name: Install VHS
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/microsoft-prod.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd xvfb
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.9.0/vhs_0.9.0_Linux_x86_64.tar.gz | \
            sudo tar -xz -C /tmp
          sudo mv /tmp/vhs_0.9.0_Linux_x86_64/vhs /usr/local/bin/vhs
          sudo chmod +x /usr/local/bin/vhs

      - name: Generate kapi recordings
        timeout-minutes: 15
        working-directory: website/tapes
        run: |
          export PATH="$PWD/../../bin:$PATH"

          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          export DISPLAY=:99

          bash generate.sh

      - name: Upload kapi assets
        uses: actions/upload-artifact@v4
        with:
          name: kapi-assets
          path: website/static/video/kapi/
          retention-days: 30

  # ── Bowrain CLI Recordings (VHS, needs server) ──────────────────────────────
  bowrain-cli-recordings:
    name: Bowrain CLI Recordings (VHS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build kapi + Bowrain CLIs
        run: make build build-bowrain-cli

      - name: Install VHS
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/microsoft-prod.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd xvfb
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.9.0/vhs_0.9.0_Linux_x86_64.tar.gz | \
            sudo tar -xz -C /tmp
          sudo mv /tmp/vhs_0.9.0_Linux_x86_64/vhs /usr/local/bin/vhs
          sudo chmod +x /usr/local/bin/vhs

      - name: Login to GHCR
        if: ${{ inputs.server_url == '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start full stack (pre-built Docker images)
        if: ${{ inputs.server_url == '' }}
        run: docker compose -f platform/e2e/compose.yaml up -d --wait

      - name: Generate Bowrain CLI recordings
        timeout-minutes: 30
        working-directory: platform/e2e/tapes
        run: |
          export PATH="$PWD/../../../bin:$PATH"

          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          export DISPLAY=:99

          bash generate.sh
        env:
          BOWRAIN_SERVER_URL: ${{ inputs.server_url || 'http://localhost:8080' }}
          BOWRAIN_TOKEN: ${{ inputs.server_token }}

      - name: Shutdown
        if: ${{ always() && inputs.server_url == '' }}
        run: docker compose -f platform/e2e/compose.yaml down -v

      - name: Upload Bowrain CLI assets
        uses: actions/upload-artifact@v4
        with:
          name: bowrain-cli-assets
          path: website/static/video/bowrain-cli/
          retention-days: 30

  # ── Render Polished Videos (Remotion) ─────────────────────────────────────────
  render-videos:
    name: Render Polished Videos
    runs-on: ubuntu-latest
    needs: [bowrain-assets, web-app-assets, kapi-recordings, bowrain-cli-recordings]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download all raw recording artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw-recordings
          merge-multiple: false

      - name: Assemble raw recordings for Remotion
        run: |
          mkdir -p website/static/video/bowrain website/static/video/web-app website/static/video/kapi website/static/video/bowrain-cli

          for theme in dark light; do
            if [ -d "raw-recordings/bowrain-assets-${theme}/video/platform/${theme}" ]; then
              cp -r "raw-recordings/bowrain-assets-${theme}/video/platform/${theme}" "website/static/video/platform/"
            fi
          done

          for theme in dark light; do
            if [ -d "raw-recordings/web-app-assets-${theme}/video/web-app/${theme}" ]; then
              cp -r "raw-recordings/web-app-assets-${theme}/video/web-app/${theme}" "website/static/video/web-app/"
            fi
          done

          if [ -d "raw-recordings/kapi-assets" ]; then
            cp raw-recordings/kapi-assets/* website/static/video/kapi/ 2>/dev/null || true
          fi

          if [ -d "raw-recordings/bowrain-cli-assets" ]; then
            cp raw-recordings/bowrain-cli-assets/* website/static/video/bowrain-cli/ 2>/dev/null || true
          fi

          echo "Raw recordings assembled:"
          find website/static/video -name "*.webm" | wc -l

      - name: Install Remotion dependencies
        working-directory: website/videos
        run: npm ci

      - name: Set up raw recording symlinks
        working-directory: website/videos
        run: npx tsx setup-raw.ts

      - name: Install ffmpeg
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/microsoft-prod.list 2>/dev/null || true
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Render polished videos
        working-directory: website/videos
        run: npx tsx render.ts
        timeout-minutes: 30

      - name: Upload polished videos
        uses: actions/upload-artifact@v4
        with:
          name: polished-videos
          path: website/videos/output/
          retention-days: 30

  # ── Publish Assets to Release ────────────────────────────────────────────────
  publish-assets:
    name: Publish Assets to Release
    runs-on: ubuntu-latest
    needs: [bowrain-assets, web-app-assets, kapi-recordings, bowrain-cli-recordings, render-videos]
    steps:
      - uses: actions/checkout@v4

      - name: Download Bowrain assets
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/bowrain
          pattern: bowrain-assets-*
          merge-multiple: true

      - name: Download Web App assets
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/web-app
          pattern: web-app-assets-*
          merge-multiple: true

      - name: Download Kapi assets
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/kapi
          name: kapi-assets

      - name: Download Bowrain CLI assets
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/bowrain-cli
          name: bowrain-cli-assets

      - name: Download polished videos
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/polished
          name: polished-videos

      - name: Assemble tarball
        run: |
          mkdir -p assembled/img assembled/video

          # Bowrain screenshots + recordings
          cp -r downloaded-assets/platform/img/bowrain assembled/img/ 2>/dev/null || true
          cp -r downloaded-assets/platform/video/bowrain assembled/video/ 2>/dev/null || true

          # Web app screenshots + recordings
          cp -r downloaded-assets/web-app/img/web-app assembled/img/ 2>/dev/null || true
          cp -r downloaded-assets/web-app/video/web-app assembled/video/ 2>/dev/null || true

          # Kapi CLI recordings
          mkdir -p assembled/video/kapi
          cp downloaded-assets/kapi/* assembled/video/kapi/ 2>/dev/null || true

          # Bowrain CLI recordings
          mkdir -p assembled/video/bowrain-cli
          cp downloaded-assets/bowrain-cli/* assembled/video/bowrain-cli/ 2>/dev/null || true

          # Polished videos (Remotion)
          mkdir -p assembled/video/polished
          cp downloaded-assets/polished/*.mp4 assembled/video/polished/ 2>/dev/null || true

          echo "## Asset sizes:"
          du -sh assembled/img assembled/video
          echo "Total:"
          du -sh assembled

          cd assembled
          tar czf ../docs-assets.tar.gz .

          ls -lh ../docs-assets.tar.gz

      - name: Upload to docs-assets release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release if it doesn't exist
          if ! gh release view docs-assets > /dev/null 2>&1; then
            gh release create docs-assets \
              --title "Documentation Assets" \
              --notes "Auto-generated screenshots, recordings, and CLI demos for the documentation site. Updated by CI on every run." \
              --latest=false
          fi

          # Upload tarball (overwrite existing)
          gh release upload docs-assets docs-assets.tar.gz --clobber

      - name: Trigger docs redeploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy Docs" --ref main
