name: Screenshots & Recordings

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Server URL. Default: https://dev.bowrain.cloud'
        required: false
        default: ''
  schedule:
    # Nightly at 2 AM UTC
    - cron: '0 2 * * *'
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Needed to create/update releases
  actions: write   # Needed to trigger docs redeploy workflow
  packages: read   # Needed to pull Docker images from GHCR

env:
  # Default to dev environment for nightly/scheduled runs.
  SERVER_URL: ${{ inputs.server_url || 'https://dev.bowrain.cloud' }}

jobs:
  # ── Bowrain Screenshots & Recordings (headless binary on Linux) ──────────────
  bowrain-assets:
    name: Bowrain Assets (${{ matrix.theme }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        theme: [dark, light]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - uses: ./.github/actions/setup-node-ui

      - name: Build shared UI package
        working-directory: platform/packages/ui
        run: vpx tsc

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: platform/apps/bowrain/frontend
        run: vpx playwright install --with-deps chromium

      # Desktop screenshots use the Vite dev server with mock backend.
      # No headless binary or Wails bindings needed — mock mode handles
      # all data locally. The web app screenshots against dev cover the
      # same UI components with real server data.
      - name: Generate screenshots
        working-directory: platform/apps/bowrain/frontend
        run: vpx playwright test e2e/screenshots.spec.ts -g "\[${{ matrix.theme }}\]"

      - name: Generate recordings
        working-directory: platform/apps/bowrain/frontend
        run: vpx playwright test --config=playwright.recordings.config.ts -g "\[${{ matrix.theme }}\]"
        timeout-minutes: 30
        env:
          FORCE_RECORDINGS: "true"

      - name: Copy recordings to static assets
        working-directory: platform/apps/bowrain/frontend
        run: THEME=${{ matrix.theme }} bash scripts/copy-recordings.sh

      - name: Upload Bowrain assets
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-assets-${{ matrix.theme }}
          path: |
            website/static/img/bowrain/${{ matrix.theme }}/
            website/static/video/bowrain/${{ matrix.theme }}/
          retention-days: 30

  # ── Web App Screenshots & Recordings (against live server) ──────────────────
  web-app-assets:
    name: Web App Assets (${{ matrix.theme }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        theme: [dark, light]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-ui

      - name: Obtain auth token
        id: auth
        run: |
          BOWRAIN_TOKEN=$(bash platform/scripts/device-auth.sh "$SERVER_URL")
          echo "BOWRAIN_TOKEN=$BOWRAIN_TOKEN" >> "$GITHUB_ENV"

      - name: Build shared UI package
        working-directory: platform/packages/ui
        run: vpx tsc

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright
        working-directory: platform/apps/web
        run: vpx playwright install --with-deps chromium

      - name: Generate screenshots
        working-directory: platform/apps/web
        run: vpx playwright test --config playwright.config.ts -g "\[${{ matrix.theme }}\]"
        env:
          BOWRAIN_SERVER_URL: ${{ env.SERVER_URL }}
          BOWRAIN_TOKEN: ${{ env.BOWRAIN_TOKEN }}

      - name: Generate recordings
        working-directory: platform/apps/web
        run: vpx playwright test --config playwright.recordings.config.ts -g "\[${{ matrix.theme }}\]"
        timeout-minutes: 30
        env:
          FORCE_RECORDINGS: "true"
          BOWRAIN_SERVER_URL: ${{ env.SERVER_URL }}
          BOWRAIN_TOKEN: ${{ env.BOWRAIN_TOKEN }}

      - name: Copy recordings to static assets
        working-directory: platform/apps/web
        run: THEME=${{ matrix.theme }} bash scripts/copy-recordings.sh

      - name: Upload web app assets
        uses: actions/upload-artifact@v7
        with:
          name: web-app-assets-${{ matrix.theme }}
          path: |
            website/static/img/web-app/${{ matrix.theme }}/
            website/static/video/web-app/${{ matrix.theme }}/
          retention-days: 30

  # ── Kapi CLI Recordings (VHS, standalone) ────────────────────────────────────
  kapi-recordings:
    name: Kapi Recordings (VHS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Build kapi CLI
        run: make build

      - name: Install VHS
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/microsoft-prod.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd xvfb
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.9.0/vhs_0.9.0_Linux_x86_64.tar.gz | \
            sudo tar -xz -C /tmp
          sudo mv /tmp/vhs_0.9.0_Linux_x86_64/vhs /usr/local/bin/vhs
          sudo chmod +x /usr/local/bin/vhs

      - name: Generate kapi recordings
        timeout-minutes: 15
        working-directory: website/tapes
        run: |
          export PATH="$PWD/../../bin:$PATH"

          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          export DISPLAY=:99

          bash generate.sh

      - name: Upload kapi assets
        uses: actions/upload-artifact@v7
        with:
          name: kapi-assets
          path: website/static/video/kapi/
          retention-days: 30

  # ── Bowrain CLI Recordings (VHS, against live server) ──────────────────────
  bowrain-cli-recordings:
    name: Bowrain CLI Recordings (VHS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Build kapi + Bowrain CLIs
        run: make build build-bowrain-cli

      - name: Install VHS
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/microsoft-prod.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd xvfb
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.9.0/vhs_0.9.0_Linux_x86_64.tar.gz | \
            sudo tar -xz -C /tmp
          sudo mv /tmp/vhs_0.9.0_Linux_x86_64/vhs /usr/local/bin/vhs
          sudo chmod +x /usr/local/bin/vhs

      - name: Obtain auth token
        run: |
          BOWRAIN_TOKEN=$(bash platform/scripts/device-auth.sh "$SERVER_URL")
          echo "BOWRAIN_TOKEN=$BOWRAIN_TOKEN" >> "$GITHUB_ENV"

      - name: Generate Bowrain CLI recordings
        timeout-minutes: 30
        working-directory: platform/e2e/tapes
        run: |
          export PATH="$PWD/../../../bin:$PATH"

          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          export DISPLAY=:99

          bash generate.sh
        env:
          BOWRAIN_SERVER_URL: ${{ env.SERVER_URL }}
          BOWRAIN_TOKEN: ${{ env.BOWRAIN_TOKEN }}

      - name: Upload Bowrain CLI assets
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-cli-assets
          path: website/static/video/bowrain-cli/
          retention-days: 30

  # ── Render Polished Videos (Remotion) ─────────────────────────────────────────
  render-videos:
    name: Render Polished Videos
    runs-on: ubuntu-latest
    needs: [bowrain-assets, web-app-assets, kapi-recordings, bowrain-cli-recordings]
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Download all raw recording artifacts
        uses: actions/download-artifact@v8
        with:
          path: raw-recordings
          merge-multiple: false

      - name: Assemble raw recordings for Remotion
        run: |
          mkdir -p website/static/video/bowrain website/static/video/web-app website/static/video/kapi website/static/video/bowrain-cli

          for theme in dark light; do
            if [ -d "raw-recordings/bowrain-assets-${theme}/video/bowrain/${theme}" ]; then
              cp -r "raw-recordings/bowrain-assets-${theme}/video/bowrain/${theme}" "website/static/video/bowrain/"
            fi
          done

          for theme in dark light; do
            if [ -d "raw-recordings/web-app-assets-${theme}/video/web-app/${theme}" ]; then
              cp -r "raw-recordings/web-app-assets-${theme}/video/web-app/${theme}" "website/static/video/web-app/"
            fi
          done

          if [ -d "raw-recordings/kapi-assets" ]; then
            cp raw-recordings/kapi-assets/* website/static/video/kapi/ 2>/dev/null || true
          fi

          if [ -d "raw-recordings/bowrain-cli-assets" ]; then
            cp raw-recordings/bowrain-cli-assets/* website/static/video/bowrain-cli/ 2>/dev/null || true
          fi

          echo "Raw recordings assembled:"
          find website/static/video -name "*.webm" | wc -l

      - name: Install Remotion dependencies
        working-directory: website/videos
        run: vp install --frozen-lockfile

      - name: Set up raw recording symlinks
        working-directory: website/videos
        run: vpx tsx setup-raw.ts

      - name: Install ffmpeg
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/microsoft-prod.list 2>/dev/null || true
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Render polished videos
        working-directory: website/videos
        run: vpx tsx render.ts
        timeout-minutes: 30

      - name: Upload polished videos
        uses: actions/upload-artifact@v7
        with:
          name: polished-videos
          path: website/videos/output/
          retention-days: 30

  # ── Publish Assets to Release ────────────────────────────────────────────────
  publish-assets:
    name: Publish Assets to Release
    runs-on: ubuntu-latest
    needs: [bowrain-assets, web-app-assets, kapi-recordings, bowrain-cli-recordings, render-videos]
    steps:
      - uses: actions/checkout@v6

      - name: Download Bowrain assets
        uses: actions/download-artifact@v8
        with:
          path: downloaded-assets/bowrain
          pattern: bowrain-assets-*
          merge-multiple: true

      - name: Download Web App assets
        uses: actions/download-artifact@v8
        with:
          path: downloaded-assets/web-app
          pattern: web-app-assets-*
          merge-multiple: true

      - name: Download Kapi assets
        uses: actions/download-artifact@v8
        with:
          path: downloaded-assets/kapi
          name: kapi-assets

      - name: Download Bowrain CLI assets
        uses: actions/download-artifact@v8
        with:
          path: downloaded-assets/bowrain-cli
          name: bowrain-cli-assets

      - name: Download polished videos
        uses: actions/download-artifact@v8
        with:
          path: downloaded-assets/polished
          name: polished-videos

      - name: Assemble tarball
        run: |
          mkdir -p assembled/img assembled/video

          # Bowrain screenshots + recordings
          cp -r downloaded-assets/bowrain/img/bowrain assembled/img/ 2>/dev/null || true
          cp -r downloaded-assets/bowrain/video/bowrain assembled/video/ 2>/dev/null || true

          # Web app screenshots + recordings
          cp -r downloaded-assets/web-app/img/web-app assembled/img/ 2>/dev/null || true
          cp -r downloaded-assets/web-app/video/web-app assembled/video/ 2>/dev/null || true

          # Kapi CLI recordings
          mkdir -p assembled/video/kapi
          cp downloaded-assets/kapi/* assembled/video/kapi/ 2>/dev/null || true

          # Bowrain CLI recordings
          mkdir -p assembled/video/bowrain-cli
          cp downloaded-assets/bowrain-cli/* assembled/video/bowrain-cli/ 2>/dev/null || true

          # Polished videos (Remotion)
          mkdir -p assembled/video/polished
          cp downloaded-assets/polished/*.mp4 assembled/video/polished/ 2>/dev/null || true

          echo "## Asset sizes:"
          du -sh assembled/img assembled/video
          echo "Total:"
          du -sh assembled

          cd assembled
          tar czf ../docs-assets.tar.gz .

          ls -lh ../docs-assets.tar.gz

      - name: Upload to docs-assets release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release if it doesn't exist
          if ! gh release view docs-assets > /dev/null 2>&1; then
            gh release create docs-assets \
              --title "Documentation Assets" \
              --notes "Auto-generated screenshots, recordings, and CLI demos for the documentation site. Updated by CI on every run." \
              --latest=false
          fi

          # Upload tarball (overwrite existing)
          gh release upload docs-assets docs-assets.tar.gz --clobber

      - name: Trigger docs redeploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy Docs" --ref main
