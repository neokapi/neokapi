name: Screenshots & Recordings

on:
  workflow_dispatch:
  schedule:
    # Nightly at 2 AM UTC
    - cron: '0 2 * * *'
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Needed to create/update releases

jobs:
  # ── Bowrain Screenshots & Recordings (self-contained) ───────────────────────
  bowrain-assets:
    name: Bowrain Assets (${{ matrix.theme }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        theme: [dark, light]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared UI package
        working-directory: packages/ui
        run: npx tsc

      - name: Install Playwright browsers
        working-directory: bowrain/apps/bowrain/frontend
        run: npx playwright install --with-deps chromium

      - name: Generate screenshots
        working-directory: bowrain/apps/bowrain/frontend
        run: npx playwright test e2e/screenshots.spec.ts -g "\[${{ matrix.theme }}\]"

      - name: Generate recordings
        working-directory: bowrain/apps/bowrain/frontend
        run: npx playwright test --config=playwright.recordings.config.ts -g "\[${{ matrix.theme }}\]"
        timeout-minutes: 30  # Recordings are slow due to human-like typing
        env:
          FORCE_RECORDINGS: "true"  # Override CI skip for dedicated recordings workflow

      - name: Copy recordings to static assets
        working-directory: bowrain/apps/bowrain/frontend
        run: THEME=${{ matrix.theme }} bash scripts/copy-recordings.sh

      - name: Upload Bowrain assets
        uses: actions/upload-artifact@v4
        with:
          name: bowrain-assets-${{ matrix.theme }}
          path: |
            website/static/img/bowrain/${{ matrix.theme }}/
            website/static/video/bowrain/${{ matrix.theme }}/
          retention-days: 30

  # ── Web App Screenshots & Recordings (needs Keycloak + local server) ────────
  web-app-assets:
    name: Web App Assets (${{ matrix.theme }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        theme: [dark, light]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared UI package
        working-directory: packages/ui
        run: npx tsc

      - name: Build web UI
        working-directory: bowrain/apps/web
        run: npm run build

      - name: Build bowrain-server
        run: cd bowrain && go build -o ../bin/bowrain-server ./cmd/bowrain-server

      - name: Build Keycloak theme
        run: make keycloak-theme

      - name: Start dependencies (Keycloak + Mailpit)
        run: docker compose up -d --wait

      - name: Start bowrain-server
        run: |
          BOWRAIN_JWT_SECRET=dev-secret-change-in-production \
          BOWRAIN_OIDC_ISSUER_URL=http://localhost:8180/realms/bowrain \
          BOWRAIN_OIDC_CLIENT_ID=bowrain \
          BOWRAIN_OIDC_CLIENT_SECRET=bowrain-secret \
          BOWRAIN_SMTP_HOST=localhost:1025 \
          BOWRAIN_SMTP_FROM=noreply@bowrain.cloud \
          BOWRAIN_STORE=bowrain-ci.db \
          BOWRAIN_GRPC_PORT=9080 \
          bin/bowrain-server &
          echo $! > .bowrain-server.pid

      - name: Wait for server health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/api/v1/health; then
              echo "Server is healthy"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to become healthy"
          exit 1

      - name: Install Playwright
        working-directory: bowrain/apps/web
        run: npx playwright install --with-deps chromium

      - name: Generate screenshots
        working-directory: bowrain/apps/web
        run: npx playwright test --config playwright.config.ts -g "\[${{ matrix.theme }}\]"

      - name: Generate recordings
        working-directory: bowrain/apps/web
        run: npx playwright test --config playwright.recordings.config.ts -g "\[${{ matrix.theme }}\]"
        timeout-minutes: 30
        env:
          FORCE_RECORDINGS: "true"

      - name: Copy recordings to static assets
        working-directory: bowrain/apps/web
        run: THEME=${{ matrix.theme }} bash scripts/copy-recordings.sh

      - name: Upload web app assets
        uses: actions/upload-artifact@v4
        with:
          name: web-app-assets-${{ matrix.theme }}
          path: |
            website/static/img/web-app/${{ matrix.theme }}/
            website/static/video/web-app/${{ matrix.theme }}/
          retention-days: 30

      - name: Shutdown server and dependencies
        if: always()
        run: |
          if [ -f .bowrain-server.pid ]; then
            kill "$(cat .bowrain-server.pid)" 2>/dev/null || true
            rm -f .bowrain-server.pid
          fi
          docker compose down -v

  # ── CLI Recordings (VHS) ────────────────────────────────────────────────────
  cli-recordings:
    name: CLI Recordings (VHS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build kapi CLI and bowrain-server
        run: |
          npm ci
          cd packages/ui && npx tsc
          cd ../../bowrain/apps/kapi-web && npm run build
          cd ../web && npm run build
          cd ../../.. && make build
          cd bowrain && go build -o ../bin/bowrain-server ./cmd/bowrain-server

      # Install VHS and its dependencies (ttyd is required for terminal rendering)
      - name: Install VHS
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.9.0/vhs_0.9.0_Linux_x86_64.tar.gz | \
            sudo tar -xz -C /tmp
          sudo mv /tmp/vhs_0.9.0_Linux_x86_64/vhs /usr/local/bin/vhs
          sudo chmod +x /usr/local/bin/vhs

      # VHS needs Xvfb for headless rendering
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Build Keycloak theme
        run: make keycloak-theme

      - name: Start dependencies (Keycloak + Mailpit)
        run: docker compose up -d --wait

      - name: Start bowrain-server
        run: |
          BOWRAIN_JWT_SECRET=dev-secret-change-in-production \
          BOWRAIN_OIDC_ISSUER_URL=http://localhost:8180/realms/bowrain \
          BOWRAIN_OIDC_CLIENT_ID=bowrain \
          BOWRAIN_OIDC_CLIENT_SECRET=bowrain-secret \
          BOWRAIN_SMTP_HOST=localhost:1025 \
          BOWRAIN_SMTP_FROM=noreply@bowrain.cloud \
          BOWRAIN_STORE=bowrain-ci.db \
          BOWRAIN_GRPC_PORT=9080 \
          bin/bowrain-server &
          echo $! > .bowrain-server.pid

      - name: Wait for server health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/api/v1/health; then
              echo "Server is healthy"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to become healthy"
          exit 1

      - name: Generate CLI recordings with VHS
        timeout-minutes: 30
        working-directory: website/tapes
        run: |
          export PATH="$PWD/../../bin:$PATH"
          export KAPI_SERVER_URL=http://localhost:8080

          # Start virtual display for VHS
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          export DISPLAY=:99

          bash generate.sh

      - name: Shutdown server and dependencies
        if: always()
        run: |
          if [ -f .bowrain-server.pid ]; then
            kill "$(cat .bowrain-server.pid)" 2>/dev/null || true
            rm -f .bowrain-server.pid
          fi
          docker compose down -v

      - name: Upload CLI assets
        uses: actions/upload-artifact@v4
        with:
          name: cli-assets
          path: website/static/video/cli/
          retention-days: 30

  # ── Publish Assets to Release ──────────────────────────────────────────────
  publish-assets:
    name: Publish Assets to Release
    runs-on: ubuntu-latest
    needs: [bowrain-assets, web-app-assets, cli-recordings]
    steps:
      - uses: actions/checkout@v4

      - name: Download Bowrain assets
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/bowrain
          pattern: bowrain-assets-*
          merge-multiple: true

      - name: Download Web App assets
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/web-app
          pattern: web-app-assets-*
          merge-multiple: true

      - name: Download CLI assets
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/cli
          name: cli-assets

      - name: Assemble tarball
        run: |
          mkdir -p assembled/img assembled/video

          # Bowrain screenshots + recordings
          cp -r downloaded-assets/bowrain/img/bowrain assembled/img/ 2>/dev/null || true
          cp -r downloaded-assets/bowrain/video/bowrain assembled/video/ 2>/dev/null || true

          # Web app screenshots + recordings
          cp -r downloaded-assets/web-app/img/web-app assembled/img/ 2>/dev/null || true
          cp -r downloaded-assets/web-app/video/web-app assembled/video/ 2>/dev/null || true

          # CLI recordings
          mkdir -p assembled/video/cli
          cp downloaded-assets/cli/* assembled/video/cli/ 2>/dev/null || true

          echo "## Asset sizes:"
          du -sh assembled/img assembled/video
          echo "Total:"
          du -sh assembled

          cd assembled
          tar czf ../docs-assets.tar.gz .

          ls -lh ../docs-assets.tar.gz

      - name: Upload to docs-assets release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release if it doesn't exist
          if ! gh release view docs-assets > /dev/null 2>&1; then
            gh release create docs-assets \
              --title "Documentation Assets" \
              --notes "Auto-generated screenshots, recordings, and CLI demos for the documentation site. Updated by CI on every run." \
              --latest=false
          fi

          # Upload tarball (overwrite existing)
          gh release upload docs-assets docs-assets.tar.gz --clobber

      - name: Trigger docs redeploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy Docs" --ref main
