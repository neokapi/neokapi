name: Screenshots & Recordings

on:
  workflow_dispatch:
  schedule:
    # Nightly at 2 AM UTC
    - cron: '0 2 * * *'
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Needed to create/update releases
  actions: write   # Needed to trigger docs redeploy workflow
  packages: read   # Needed to pull Docker images from GHCR

jobs:
  # ── Bowrain Screenshots & Recordings (headless binary, cross-platform) ───────
  bowrain-assets:
    name: Bowrain Assets (${{ matrix.os }}/${{ matrix.theme }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        theme: [dark, light]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared UI package
        working-directory: packages/ui
        run: npx tsc

      - name: Build frontend
        working-directory: bowrain/apps/bowrain/frontend
        run: npm run build

      - name: Build headless binary
        working-directory: bowrain/apps/bowrain
        run: go build -tags server -o ../../../bin/bowrain-headless .

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: bowrain/apps/bowrain/frontend
        run: npx playwright install --with-deps chromium

      - name: Generate screenshots
        working-directory: bowrain/apps/bowrain/frontend
        run: npx playwright test e2e/screenshots.spec.ts -g "\[${{ matrix.theme }}\]"
        env:
          WAILS_SERVER_MODE: "true"

      - name: Generate recordings
        working-directory: bowrain/apps/bowrain/frontend
        run: npx playwright test --config=playwright.recordings.config.ts -g "\[${{ matrix.theme }}\]"
        timeout-minutes: 30
        env:
          FORCE_RECORDINGS: "true"
          WAILS_SERVER_MODE: "true"

      - name: Copy recordings to static assets
        working-directory: bowrain/apps/bowrain/frontend
        run: THEME=${{ matrix.theme }} bash scripts/copy-recordings.sh

      - name: Upload Bowrain assets
        uses: actions/upload-artifact@v4
        with:
          name: bowrain-assets-${{ matrix.os }}-${{ matrix.theme }}
          path: |
            website/static/img/bowrain/${{ matrix.theme }}/
            website/static/video/bowrain/${{ matrix.theme }}/
          retention-days: 30

  # ── Web App Screenshots & Recordings (build from source + local server) ──────
  web-app-assets:
    name: Web App Assets (${{ matrix.theme }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        theme: [dark, light]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared UI package
        working-directory: packages/ui
        run: npx tsc

      - name: Build web UI
        working-directory: bowrain/apps/web
        run: npm run build

      - name: Build bowrain-server
        run: cd bowrain && go build -o ../bin/bowrain-server ./cmd/bowrain-server

      - name: Build Keycloak theme
        run: make keycloak-theme

      - name: Start dependencies (Keycloak + Mailpit + NATS)
        run: docker compose -f compose.yaml up -d --wait

      - name: Start bowrain-server
        run: |
          BOWRAIN_JWT_SECRET=dev-secret-change-in-production \
          BOWRAIN_OIDC_ISSUER_URL=http://localhost:8180/realms/bowrain \
          BOWRAIN_OIDC_CLIENT_ID=bowrain \
          BOWRAIN_OIDC_CLIENT_SECRET=bowrain-secret \
          BOWRAIN_SMTP_HOST=localhost:1025 \
          BOWRAIN_SMTP_FROM=noreply@bowrain.cloud \
          BOWRAIN_STORE=bowrain-ci.db \
          BOWRAIN_GRPC_PORT=9080 \
          BOWRAIN_WEB_UI_DIR=bowrain/apps/web/dist \
          BOWRAIN_NATS_URL=nats://localhost:4222 \
          bin/bowrain-server &
          echo $! > .bowrain-server.pid

      - name: Wait for server health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/api/v1/health; then
              echo "Server is healthy"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to become healthy"
          exit 1

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright
        working-directory: bowrain/apps/web
        run: npx playwright install --with-deps chromium

      - name: Generate screenshots
        working-directory: bowrain/apps/web
        run: npx playwright test --config playwright.config.ts -g "\[${{ matrix.theme }}\]"

      - name: Generate recordings
        working-directory: bowrain/apps/web
        run: npx playwright test --config playwright.recordings.config.ts -g "\[${{ matrix.theme }}\]"
        timeout-minutes: 30
        env:
          FORCE_RECORDINGS: "true"

      - name: Copy recordings to static assets
        working-directory: bowrain/apps/web
        run: THEME=${{ matrix.theme }} bash scripts/copy-recordings.sh

      - name: Upload web app assets
        uses: actions/upload-artifact@v4
        with:
          name: web-app-assets-${{ matrix.theme }}
          path: |
            website/static/img/web-app/${{ matrix.theme }}/
            website/static/video/web-app/${{ matrix.theme }}/
          retention-days: 30

      - name: Shutdown server and dependencies
        if: always()
        run: |
          if [ -f .bowrain-server.pid ]; then
            kill "$(cat .bowrain-server.pid)" 2>/dev/null || true
            rm -f .bowrain-server.pid
          fi
          docker compose -f compose.yaml down -v

  # ── Kapi CLI Recordings (VHS, standalone) ────────────────────────────────────
  kapi-recordings:
    name: Kapi Recordings (VHS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build kapi CLI
        run: make build

      - name: Install VHS
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.9.0/vhs_0.9.0_Linux_x86_64.tar.gz | \
            sudo tar -xz -C /tmp
          sudo mv /tmp/vhs_0.9.0_Linux_x86_64/vhs /usr/local/bin/vhs
          sudo chmod +x /usr/local/bin/vhs

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Generate kapi recordings
        timeout-minutes: 15
        working-directory: website/tapes
        run: |
          export PATH="$PWD/../../bin:$PATH"

          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          export DISPLAY=:99

          bash generate.sh

      - name: Upload kapi assets
        uses: actions/upload-artifact@v4
        with:
          name: kapi-assets
          path: website/static/video/kapi/
          retention-days: 30

  # ── Brain CLI Recordings (VHS, needs server) ─────────────────────────────────
  brain-recordings:
    name: Brain Recordings (VHS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build kapi + brain CLIs
        run: make build build-brain

      - name: Install VHS
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.9.0/vhs_0.9.0_Linux_x86_64.tar.gz | \
            sudo tar -xz -C /tmp
          sudo mv /tmp/vhs_0.9.0_Linux_x86_64/vhs /usr/local/bin/vhs
          sudo chmod +x /usr/local/bin/vhs

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start full stack (pre-built Docker images)
        run: docker compose -f e2e/compose.yaml up -d --wait

      - name: Generate brain recordings
        timeout-minutes: 30
        working-directory: bowrain/e2e/tapes
        run: |
          export PATH="$PWD/../../../bin:$PATH"
          export KAPI_SERVER_URL=http://localhost:8080

          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          export DISPLAY=:99

          bash generate.sh

      - name: Shutdown
        if: always()
        run: docker compose -f e2e/compose.yaml down -v

      - name: Upload brain assets
        uses: actions/upload-artifact@v4
        with:
          name: brain-assets
          path: website/static/video/brain/
          retention-days: 30

  # ── Render Polished Videos (Remotion) ─────────────────────────────────────────
  render-videos:
    name: Render Polished Videos
    runs-on: ubuntu-latest
    needs: [bowrain-assets, web-app-assets, kapi-recordings, brain-recordings]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download all raw recording artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw-recordings
          merge-multiple: false

      - name: Assemble raw recordings for Remotion
        run: |
          mkdir -p website/static/video/bowrain website/static/video/web-app website/static/video/kapi website/static/video/brain

          for theme in dark light; do
            if [ -d "raw-recordings/bowrain-assets-ubuntu-latest-${theme}/video/bowrain/${theme}" ]; then
              cp -r "raw-recordings/bowrain-assets-ubuntu-latest-${theme}/video/bowrain/${theme}" "website/static/video/bowrain/"
            fi
          done

          for theme in dark light; do
            if [ -d "raw-recordings/web-app-assets-${theme}/video/web-app/${theme}" ]; then
              cp -r "raw-recordings/web-app-assets-${theme}/video/web-app/${theme}" "website/static/video/web-app/"
            fi
          done

          if [ -d "raw-recordings/kapi-assets" ]; then
            cp raw-recordings/kapi-assets/* website/static/video/kapi/ 2>/dev/null || true
          fi

          if [ -d "raw-recordings/brain-assets" ]; then
            cp raw-recordings/brain-assets/* website/static/video/brain/ 2>/dev/null || true
          fi

          echo "Raw recordings assembled:"
          find website/static/video -name "*.webm" | wc -l

      - name: Install Remotion dependencies
        working-directory: website/videos
        run: npm ci

      - name: Set up raw recording symlinks
        working-directory: website/videos
        run: npx tsx setup-raw.ts

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Render polished videos
        working-directory: website/videos
        run: npx tsx render.ts
        timeout-minutes: 30

      - name: Upload polished videos
        uses: actions/upload-artifact@v4
        with:
          name: polished-videos
          path: website/videos/output/
          retention-days: 30

  # ── Publish Assets to Release ────────────────────────────────────────────────
  publish-assets:
    name: Publish Assets to Release
    runs-on: ubuntu-latest
    needs: [bowrain-assets, web-app-assets, kapi-recordings, brain-recordings, render-videos]
    steps:
      - uses: actions/checkout@v4

      - name: Download Bowrain assets (Linux canonical)
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/bowrain
          pattern: bowrain-assets-ubuntu-latest-*
          merge-multiple: true

      - name: Download Web App assets
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/web-app
          pattern: web-app-assets-*
          merge-multiple: true

      - name: Download Kapi assets
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/kapi
          name: kapi-assets

      - name: Download Brain assets
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/brain
          name: brain-assets

      - name: Download polished videos
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets/polished
          name: polished-videos

      - name: Assemble tarball
        run: |
          mkdir -p assembled/img assembled/video

          # Bowrain screenshots + recordings
          cp -r downloaded-assets/bowrain/img/bowrain assembled/img/ 2>/dev/null || true
          cp -r downloaded-assets/bowrain/video/bowrain assembled/video/ 2>/dev/null || true

          # Web app screenshots + recordings
          cp -r downloaded-assets/web-app/img/web-app assembled/img/ 2>/dev/null || true
          cp -r downloaded-assets/web-app/video/web-app assembled/video/ 2>/dev/null || true

          # Kapi CLI recordings
          mkdir -p assembled/video/kapi
          cp downloaded-assets/kapi/* assembled/video/kapi/ 2>/dev/null || true

          # Brain CLI recordings
          mkdir -p assembled/video/brain
          cp downloaded-assets/brain/* assembled/video/brain/ 2>/dev/null || true

          # Polished videos (Remotion)
          mkdir -p assembled/video/polished
          cp downloaded-assets/polished/*.mp4 assembled/video/polished/ 2>/dev/null || true

          echo "## Asset sizes:"
          du -sh assembled/img assembled/video
          echo "Total:"
          du -sh assembled

          cd assembled
          tar czf ../docs-assets.tar.gz .

          ls -lh ../docs-assets.tar.gz

      - name: Upload to docs-assets release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release if it doesn't exist
          if ! gh release view docs-assets > /dev/null 2>&1; then
            gh release create docs-assets \
              --title "Documentation Assets" \
              --notes "Auto-generated screenshots, recordings, and CLI demos for the documentation site. Updated by CI on every run." \
              --latest=false
          fi

          # Upload tarball (overwrite existing)
          gh release upload docs-assets docs-assets.tar.gz --clobber

      - name: Trigger docs redeploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy Docs" --ref main
