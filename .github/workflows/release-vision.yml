name: Release Vision plugin

# The kapi-vision OCR plugin releases independently of the neokapi CLI, on its
# own `vision-v*` tag (e.g. `vision-v0.1.0` -> kapi-vision 0.1.0), like the SaT
# and PDFium plugins. It is a cgo binary (-tags onnx) that loads the onnxruntime
# SHARED library at runtime; the tarball is self-contained — it bundles the
# onnxruntime shared lib at lib/<name> AND the PP-OCRv5 model assets at models/
# beside the binary, where the plugin's resolvers find them with no env config.
on:
  push:
    tags:
      - "vision-v*"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write # cosign keyless OIDC (tag publishes)

env:
  # onnxruntime 1.25.0 matches yalue/onnxruntime_go v1.30.1 (ORT_API_VERSION 25),
  # the same pin as kapi-sat/kapi-check. Keep in lockstep with plugins/vision/go.mod.
  ONNXRUNTIME_VERSION: "1.25.0"
  # PP-OCRv5 mobile model assets, mirrored on this neokapi release for
  # reproducible, CI-reachable downloads (see plugins/vision/internal/models).
  VISION_MODELS_TAG: "vision-models-v1"

jobs:
  build-vision-plugin:
    name: Build kapi-vision plugin (${{ matrix.build.platform }})
    strategy:
      fail-fast: false
      matrix:
        build:
          - { platform: darwin/arm64, os: macos-latest, goos: darwin, goarch: arm64 }
          - { platform: linux/amd64, os: ubuntu-latest, goos: linux, goarch: amd64 }
          - { platform: linux/arm64, os: ubuntu-24.04-arm, goos: linux, goarch: arm64 }
          - { platform: windows/amd64, os: windows-2025, goos: windows, goarch: amd64 }
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Install cosign (tarball signing)
        if: startsWith(github.ref, 'refs/tags/vision-v')
        uses: sigstore/cosign-installer@v3

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/vision-v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#vision-v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      # ── onnxruntime shared library (runtime dep; bundled into the tarball) ────
      - name: Download onnxruntime (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.build.goos }}
          GOARCH: ${{ matrix.build.goarch }}
        run: |
          set -euo pipefail
          case "${GOOS}/${GOARCH}" in
            darwin/arm64) asset="onnxruntime-osx-arm64-${ONNXRUNTIME_VERSION}.tgz" ;;
            linux/amd64)  asset="onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz" ;;
            linux/arm64)  asset="onnxruntime-linux-aarch64-${ONNXRUNTIME_VERSION}.tgz" ;;
            *) echo "::error::no onnxruntime asset mapping for ${GOOS}/${GOARCH}"; exit 1 ;;
          esac
          url="https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/${asset}"
          echo "Downloading $url"
          mkdir -p "$RUNNER_TEMP/ort"
          curl -sSfL -o "$RUNNER_TEMP/${asset}" "$url"
          tar -xzf "$RUNNER_TEMP/${asset}" -C "$RUNNER_TEMP/ort"
          ort_root="$(find "$RUNNER_TEMP/ort" -maxdepth 1 -mindepth 1 -type d | head -n1)"
          echo "ORT_DIR=${ort_root}" >> "$GITHUB_ENV"

      - name: Download onnxruntime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "onnxruntime-win-x64-$env:ONNXRUNTIME_VERSION.zip"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$env:ONNXRUNTIME_VERSION/$asset"
          Write-Host "Downloading $url"
          $dest = "$env:RUNNER_TEMP\$asset"
          Invoke-WebRequest -Uri $url -OutFile $dest
          $ortRoot = "$env:RUNNER_TEMP\ort"
          Expand-Archive -Path $dest -DestinationPath $ortRoot -Force
          $inner = (Get-ChildItem -Path $ortRoot -Directory | Select-Object -First 1).FullName
          "ORT_DIR=$inner" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── PP-OCRv5 model assets (bundled into the tarball) ──────────────────────
      - name: Download model assets
        shell: bash
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/models"
          base="https://github.com/${REPO}/releases/download/${VISION_MODELS_TAG}"
          for f in ppocrv5_det.onnx ppocrv5_rec.onnx ppocrv5_dict.txt; do
            curl -sSfL -o "$RUNNER_TEMP/models/$f" "$base/$f"
          done
          echo "MODELS_DIR=$RUNNER_TEMP/models" >> "$GITHUB_ENV"

      # ── macOS Developer-ID signing (sign the staged binary pre-tar) ───────────
      - name: Import signing certificate
        id: signing
        if: runner.os == 'macOS'
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID_P12_BASE64" ]; then
            echo "No Developer ID certificate configured — will use ad-hoc signing"
            echo "enabled=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security default-keychain -s "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Store notarization credentials (App Store Connect API key)
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          xcrun notarytool store-credentials "neokapi-notary" \
            --key "$KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH"
          rm -f "$KEY_PATH"

      - name: Build kapi-vision (macOS, pre-sign)
        if: runner.os == 'macOS'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X github.com/neokapi/neokapi/core/version.Version=${VERSION} -X github.com/neokapi/neokapi/core/version.Commit=${GH_SHA::7} -X github.com/neokapi/neokapi/core/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p "$RUNNER_TEMP/prebuilt"
          (cd plugins/vision && GOWORK=off CGO_ENABLED=1 \
            go build -tags onnx -trimpath -ldflags "${LDFLAGS}" \
            -o "$RUNNER_TEMP/prebuilt/kapi-vision" ./cmd/kapi-vision)
          echo "VISION_PREBUILT_BIN=$RUNNER_TEMP/prebuilt/kapi-vision" >> "$GITHUB_ENV"

      - name: Sign + notarize kapi-vision binary (macOS)
        if: runner.os == 'macOS'
        env:
          SIGNING_ENABLED: ${{ steps.signing.outputs.enabled }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          BIN="$VISION_PREBUILT_BIN"
          if [ "$SIGNING_ENABLED" = "true" ]; then
            codesign --force --timestamp --options runtime --sign "$APPLE_SIGN_IDENTITY" "$BIN"
            ZIP="$RUNNER_TEMP/kapi-vision-notarize.zip"
            /usr/bin/ditto -c -k "$BIN" "$ZIP"
            xcrun notarytool submit "$ZIP" --keychain-profile neokapi-notary --wait
          else
            codesign --force --sign - "$BIN"
          fi

      - name: Clean up signing keychain
        if: always() && runner.os == 'macOS'
        env:
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      # ── package the self-contained tarball ────────────────────────────────────
      - name: Package kapi-vision tarball
        id: package
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          scripts/package-vision-plugin.sh \
            --version "${VERSION}" \
            --ort-dir "${ORT_DIR}" \
            --models-dir "${MODELS_DIR}" \
            --out-dir "$RUNNER_TEMP/vision-out"

      - name: Cosign sign tarball (keyless)
        if: startsWith(github.ref, 'refs/tags/vision-v')
        shell: bash
        env:
          TARBALL: ${{ steps.package.outputs.tarball }}
        run: |
          set -euo pipefail
          cosign sign-blob --yes --new-bundle-format \
            --bundle "${TARBALL}.sigstore.json" "${TARBALL}"

      - name: Upload tarball + signature artifact
        uses: actions/upload-artifact@v7
        with:
          name: vision-tarball-${{ matrix.build.goos }}-${{ matrix.build.goarch }}
          path: |
            ${{ runner.temp }}/vision-out/*.tar.gz
            ${{ runner.temp }}/vision-out/*.tar.gz.sigstore.json
          if-no-files-found: error
          retention-days: 14

      - name: Write checksum artifact
        shell: bash
        env:
          VISION_SHA256: ${{ steps.package.outputs.sha256 }}
          VISION_TARBALL_NAME: ${{ steps.package.outputs.tarball_name }}
          LEG_GOOS: ${{ matrix.build.goos }}
          LEG_GOARCH: ${{ matrix.build.goarch }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/vision-checksums"
          echo "${VISION_SHA256}  ${VISION_TARBALL_NAME}" \
            > "$RUNNER_TEMP/vision-checksums/${LEG_GOOS}_${LEG_GOARCH}.sha256"

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v7
        with:
          name: vision-checksum-${{ matrix.build.goos }}-${{ matrix.build.goarch }}
          path: ${{ runner.temp }}/vision-checksums/*.sha256
          retention-days: 14

  publish-vision-release:
    name: Publish kapi-vision release
    if: startsWith(github.ref, 'refs/tags/vision-v')
    needs: build-vision-plugin
    runs-on: ubuntu-latest
    steps:
      - name: Download all tarball + signature artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: vision-tarball-*
          path: vision-release
          merge-multiple: true
      - name: Upload all assets to the release
        uses: softprops/action-gh-release@v3
        with:
          make_latest: false # own tag line; must not steal the CLI's "latest"
          files: |
            vision-release/*.tar.gz
            vision-release/*.tar.gz.sigstore.json

  register-vision-plugin:
    name: Register kapi-vision in plugin registry
    if: startsWith(github.ref, 'refs/tags/vision-v')
    needs: publish-vision-release
    runs-on: ubuntu-latest
    steps:
      - name: Download vision checksum artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: vision-checksum-*
          path: vision-checksums
          merge-multiple: true
      - name: Update manifest plugin registry (vision)
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#vision-v}"
          if [ -z "${REGISTRY_TOKEN:-}" ]; then
            echo "REGISTRY_TOKEN not set; skipping registry update"; exit 0
          fi
          GOBIN=/tmp go install github.com/neokapi/registry/tools/registry-update@main
          declare -A SHAS
          for f in vision-checksums/*.sha256; do
            [ -f "$f" ] || continue
            SHAS[$(awk '{print $2}' "$f")]=$(awk '{print $1}' "$f")
          done
          REPO_URL="https://github.com/${REPO}/releases/download/${REF_NAME}"
          CERT_ID="https://github.com/${REPO}/.github/workflows/release-vision.yml@refs/tags/${REF_NAME}"
          declare -a ARGS
          for plat in darwin/arm64 linux/amd64 linux/arm64 windows/amd64; do
            os=${plat%/*}; arch=${plat#*/}
            file="kapi-vision_${VERSION}_${os}_${arch}.tar.gz"
            if [ -n "${SHAS[$file]:-}" ]; then
              ARGS+=("--platform" "$plat" "--url" "${REPO_URL}/${file}" "--sha256" "${SHAS[$file]}" "--signature" "${REPO_URL}/${file}.sigstore.json")
            else
              echo "::warning::no checksum for ${file}; skipping ${plat}"
            fi
          done
          [ ${#ARGS[@]} -gt 0 ] || { echo "::error::no platform artifacts for vision ${VERSION}"; exit 1; }
          git clone "https://x-access-token:${REGISTRY_TOKEN}@github.com/neokapi/registry.git" /tmp/registry
          # Requires the vision plugin stub to already exist in manifest-plugins.json.
          /tmp/registry-update \
            --registry /tmp/registry/manifest-plugins.json \
            --plugin vision --version "$VERSION" --channel stable \
            --released "$(date -u +%Y-%m-%d)" \
            --cert-identity "$CERT_ID" \
            --cert-oidc-issuer https://token.actions.githubusercontent.com \
            "${ARGS[@]}"
          cd /tmp/registry
          git config user.email "release-bot@neokapi.dev"
          git config user.name "release-bot"
          git add manifest-plugins.json
          if ! git diff --staged --quiet; then
            git commit -m "Register vision ${VERSION}"
            git push
          fi
