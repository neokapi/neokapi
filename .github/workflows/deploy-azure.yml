name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]
    paths:
      - 'bowrain/**'
      - 'core/**'
      - 'platform/**'
      - 'deploy/**'
      - 'docker/**'

permissions:
  id-token: write
  contents: read

env:
  AZURE_REGION: weu
  AZURE_RESOURCE_GROUP_DEV: rg-bowrain-d-weu
  AZURE_RESOURCE_GROUP_PROD: rg-bowrain-p-weu

jobs:
  # Step 1: Deploy core infrastructure (identity, networking, databases, caches, ACR)
  deploy-core:
    name: Deploy Core Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      rg-name: ${{ steps.rg.outputs.name }}
      env-abbr: ${{ steps.rg.outputs.env-abbr }}
      image-tag: ${{ steps.tag.outputs.value }}
      managed-identity-id: ${{ steps.core-out.outputs.managed-identity-id }}
      acr-login-server: ${{ steps.core-out.outputs.acr-login-server }}
      container-app-env-id: ${{ steps.core-out.outputs.container-app-env-id }}
      postgres-fqdn: ${{ steps.core-out.outputs.postgres-fqdn }}
      redis-hostname: ${{ steps.core-out.outputs.redis-hostname }}
      service-bus-connection-string: ${{ steps.core-out.outputs.service-bus-connection-string }}
      key-vault-uri: ${{ steps.core-out.outputs.key-vault-uri }}
      storage-account-name: ${{ steps.core-out.outputs.storage-account-name }}
      web-hostname: ${{ steps.core-out.outputs.web-hostname }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
          GH_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=${GH_SHA}-${INPUT_ENV}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GH_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set resource group
        id: rg
        env:
          DEPLOY_ENV: ${{ github.event.inputs.environment || 'dev' }}
          RG_DEV: ${{ env.AZURE_RESOURCE_GROUP_DEV }}
          RG_PROD: ${{ env.AZURE_RESOURCE_GROUP_PROD }}
        run: |
          if [ "$DEPLOY_ENV" = "prod" ]; then
            echo "name=${RG_PROD}" >> "$GITHUB_OUTPUT"
            echo "env-abbr=p" >> "$GITHUB_OUTPUT"
          else
            echo "name=${RG_DEV}" >> "$GITHUB_OUTPUT"
            echo "env-abbr=d" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy core infrastructure
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: create
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ steps.rg.outputs.name }}
          template-file: deploy/azure/core.bicep
          parameters-file: deploy/azure/parameters/core-${{ env.ENVIRONMENT }}.bicepparam
          parameters: >
            {
              "postgresAdminLogin": "${{ secrets.POSTGRES_ADMIN_LOGIN }}",
              "postgresAdminPassword": "${{ secrets.POSTGRES_ADMIN_PASSWORD }}",
              "jwtSecret": "${{ secrets.JWT_SECRET }}",
              "oidcClientSecret": "${{ secrets.OIDC_CLIENT_SECRET }}"
            }
          outputs-to: CORE_OUTPUTS

      - name: Export core outputs
        id: core-out
        run: |
          SB_CONN=$(echo "$CORE_OUTPUTS" | jq -r '.serviceBusConnectionString.value')
          echo "::add-mask::${SB_CONN}"
          {
            echo "managed-identity-id=$(echo "$CORE_OUTPUTS" | jq -r '.managedIdentityId.value')"
            echo "acr-login-server=$(echo "$CORE_OUTPUTS" | jq -r '.acrLoginServer.value')"
            echo "container-app-env-id=$(echo "$CORE_OUTPUTS" | jq -r '.containerAppEnvId.value')"
            echo "postgres-fqdn=$(echo "$CORE_OUTPUTS" | jq -r '.postgresFqdn.value')"
            echo "redis-hostname=$(echo "$CORE_OUTPUTS" | jq -r '.redisHostname.value')"
            echo "service-bus-connection-string=${SB_CONN}"
            echo "key-vault-uri=$(echo "$CORE_OUTPUTS" | jq -r '.keyVaultUri.value')"
            echo "storage-account-name=$(echo "$CORE_OUTPUTS" | jq -r '.storageAccountName.value')"
            echo "web-hostname=$(echo "$CORE_OUTPUTS" | jq -r '.webHostname.value')"
          } >> "$GITHUB_OUTPUT"

  # Step 2: Build and push container images (ACR now exists from core)
  build:
    name: Build Images
    needs: deploy-core
    uses: ./.github/workflows/build-images.yml
    with:
      environment: ${{ github.event.inputs.environment || 'dev' }}
      image-tag: ${{ needs.deploy-core.outputs.image-tag }}
    secrets: inherit

  # Step 3: Deploy apps layer (Container Apps + DNS) with the newly built images
  deploy-apps:
    name: Deploy Apps
    runs-on: ubuntu-latest
    needs: [deploy-core, build]
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy apps
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: create
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ needs.deploy-core.outputs.rg-name }}
          template-file: deploy/azure/apps.bicep
          parameters-file: deploy/azure/parameters/apps-${{ env.ENVIRONMENT }}.bicepparam
          parameters: >
            {
              "imageTag": "${{ needs.deploy-core.outputs.image-tag }}",
              "postgresAdminLogin": "${{ secrets.POSTGRES_ADMIN_LOGIN }}",
              "postgresAdminPassword": "${{ secrets.POSTGRES_ADMIN_PASSWORD }}",
              "keycloakAdminPassword": "${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}",
              "storageWebHostname": "${{ needs.deploy-core.outputs.web-hostname }}",
              "storageAccountName": "${{ needs.deploy-core.outputs.storage-account-name }}",
              "managedIdentityId": "${{ needs.deploy-core.outputs.managed-identity-id }}",
              "acrLoginServer": "${{ needs.deploy-core.outputs.acr-login-server }}",
              "containerAppEnvId": "${{ needs.deploy-core.outputs.container-app-env-id }}",
              "postgresFqdn": "${{ needs.deploy-core.outputs.postgres-fqdn }}",
              "redisHostname": "${{ needs.deploy-core.outputs.redis-hostname }}",
              "serviceBusConnectionString": "${{ needs.deploy-core.outputs.service-bus-connection-string }}",
              "keyVaultUri": "${{ needs.deploy-core.outputs.key-vault-uri }}"
            }

      - name: Upload web assets to Storage
        env:
          ACR_LOGIN_SERVER: ${{ needs.deploy-core.outputs.acr-login-server }}
          IMAGE_TAG: ${{ needs.deploy-core.outputs.image-tag }}
          STORAGE_ACCOUNT: ${{ needs.deploy-core.outputs.storage-account-name }}
        run: |
          az acr login --name "${ACR_LOGIN_SERVER%%.*}"
          CONTAINER_ID=$(docker create "${ACR_LOGIN_SERVER}/bowrain-web:${IMAGE_TAG}")
          docker cp "${CONTAINER_ID}:/usr/share/nginx/html" ./web-dist
          docker rm "${CONTAINER_ID}"
          # shellcheck disable=SC2016
          az storage blob upload-batch \
            --source ./web-dist \
            --destination '$web' \
            --account-name "$STORAGE_ACCOUNT" \
            --auth-mode login \
            --overwrite
