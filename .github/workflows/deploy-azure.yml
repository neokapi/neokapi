name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]
    paths:
      - 'bowrain/**'
      - 'core/**'
      - 'platform/**'
      - 'deploy/**'
      - 'docker/**'

permissions:
  id-token: write
  contents: read

env:
  AZURE_REGION: weu
  AZURE_RESOURCE_GROUP_DEV: rg-bowrain-d-weu
  AZURE_RESOURCE_GROUP_PROD: rg-bowrain-p-weu

jobs:
  build:
    name: Build Images
    uses: ./.github/workflows/build-images.yml
    with:
      environment: ${{ github.event.inputs.environment || 'dev' }}
      image-tag: ${{ github.event_name == 'workflow_dispatch' && format('{0}-{1}', github.sha, github.event.inputs.environment) || github.sha }}
    secrets: inherit

  deploy:
    name: Deploy Infrastructure & App
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set resource group
        id: rg
        env:
          DEPLOY_ENV: ${{ github.event.inputs.environment || 'dev' }}
          RG_DEV: ${{ env.AZURE_RESOURCE_GROUP_DEV }}
          RG_PROD: ${{ env.AZURE_RESOURCE_GROUP_PROD }}
        run: |
          if [ "$DEPLOY_ENV" = "prod" ]; then
            echo "name=${RG_PROD}" >> "$GITHUB_OUTPUT"
            echo "env-abbr=p" >> "$GITHUB_OUTPUT"
          else
            echo "name=${RG_DEV}" >> "$GITHUB_OUTPUT"
            echo "env-abbr=d" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Bicep
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: create
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ steps.rg.outputs.name }}
          template-file: deploy/azure/main.bicep
          parameters-file: deploy/azure/parameters/${{ env.ENVIRONMENT }}.bicepparam
          parameters: >
            {
              "imageTag": "${{ needs.build.outputs.image-tag }}",
              "postgresAdminLogin": "${{ secrets.POSTGRES_ADMIN_LOGIN }}",
              "postgresAdminPassword": "${{ secrets.POSTGRES_ADMIN_PASSWORD }}",
              "jwtSecret": "${{ secrets.JWT_SECRET }}",
              "oidcClientSecret": "${{ secrets.OIDC_CLIENT_SECRET }}",
              "keycloakAdminPassword": "${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}"
            }

      - name: Update API container revision
        env:
          RG: ${{ steps.rg.outputs.name }}
          APP_NAME: ca-bowrain-api-${{ steps.rg.outputs.env-abbr }}-${{ env.AZURE_REGION }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --image "$IMAGE_TAG"

      - name: Update Worker container revision
        env:
          RG: ${{ steps.rg.outputs.name }}
          APP_NAME: ca-bowrain-worker-${{ steps.rg.outputs.env-abbr }}-${{ env.AZURE_REGION }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --image "$IMAGE_TAG"

      - name: Update Keycloak container revision
        env:
          RG: ${{ steps.rg.outputs.name }}
          APP_NAME: ca-bowrain-keycloak-${{ steps.rg.outputs.env-abbr }}-${{ env.AZURE_REGION }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --image "$IMAGE_TAG"
