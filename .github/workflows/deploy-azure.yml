name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]
    paths:
      - 'bowrain/**'
      - 'core/**'
      - 'platform/**'
      - 'deploy/**'
      - 'docker/**'
      - 'packages/ui/**'
      - 'go.mod'
      - 'go.sum'
      - 'go.work'

permissions:
  id-token: write
  contents: read

env:
  AZURE_REGION: weu
  AZURE_RESOURCE_GROUP_DEV: rg-bowrain-d-weu
  AZURE_RESOURCE_GROUP_PROD: rg-bowrain-p-weu

jobs:
  # ── Step 1: Detect which components changed ────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.infra }}
      web: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.web }}
      server: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.server }}
      keycloak: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.keycloak }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            infra:
              - 'deploy/azure/**'
            web:
              - 'bowrain/apps/web/**'
              - 'packages/ui/**'
              - 'docker/bowrain-web/**'
            server:
              - 'core/**'
              - 'platform/**'
              - 'bowrain/**'
              - '!bowrain/apps/web/**'
              - '!bowrain/apps/keycloak-theme/**'
              - 'docker/bowrain-base/**'
              - 'docker/bowrain-server/**'
              - 'docker/bowrain-worker/**'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
            keycloak:
              - 'bowrain/apps/keycloak-theme/**'
              - 'docker/keycloak/**'

  # ── Step 2: Look up shared resources; conditionally deploy core infra ──────
  infra:
    name: Infrastructure
    needs: detect-changes
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      rg-name: ${{ steps.rg.outputs.name }}
      image-tag: ${{ steps.tag.outputs.value }}
      acr-login-server: ${{ steps.acr.outputs.login-server }}
      acr-name: ${{ steps.acr.outputs.name }}
      storage-account-name: ${{ steps.storage.outputs.name }}
      managed-identity-id: ${{ steps.core-out.outputs.managed-identity-id }}
      container-app-env-id: ${{ steps.core-out.outputs.container-app-env-id }}
      postgres-fqdn: ${{ steps.core-out.outputs.postgres-fqdn }}
      redis-hostname: ${{ steps.core-out.outputs.redis-hostname }}
      service-bus-connection-string: ${{ steps.core-out.outputs.service-bus-connection-string }}
      key-vault-uri: ${{ steps.core-out.outputs.key-vault-uri }}
      web-hostname: ${{ steps.core-out.outputs.web-hostname }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
          GH_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=${GH_SHA}-${INPUT_ENV}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GH_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set resource group
        id: rg
        env:
          DEPLOY_ENV: ${{ github.event.inputs.environment || 'dev' }}
          RG_DEV: ${{ env.AZURE_RESOURCE_GROUP_DEV }}
          RG_PROD: ${{ env.AZURE_RESOURCE_GROUP_PROD }}
        run: |
          if [ "$DEPLOY_ENV" = "prod" ]; then
            echo "name=${RG_PROD}" >> "$GITHUB_OUTPUT"
            echo "env-abbr=p" >> "$GITHUB_OUTPUT"
          else
            echo "name=${RG_DEV}" >> "$GITHUB_OUTPUT"
            echo "env-abbr=d" >> "$GITHUB_OUTPUT"
          fi

      - name: Look up ACR
        id: acr
        env:
          RG: ${{ steps.rg.outputs.name }}
        run: |
          ACR_NAME=$(az acr list --resource-group "$RG" --query "[0].name" -o tsv)
          LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          echo "name=${ACR_NAME}" >> "$GITHUB_OUTPUT"
          echo "login-server=${LOGIN_SERVER}" >> "$GITHUB_OUTPUT"

      - name: Look up Storage account
        id: storage
        env:
          RG: ${{ steps.rg.outputs.name }}
        run: |
          STORAGE_NAME=$(az storage account list --resource-group "$RG" --query "[0].name" -o tsv)
          echo "name=${STORAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Deploy core infrastructure
        if: >-
          needs.detect-changes.outputs.infra == 'true' ||
          needs.detect-changes.outputs.server == 'true' ||
          needs.detect-changes.outputs.keycloak == 'true'
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: create
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ steps.rg.outputs.name }}
          template-file: deploy/azure/core.bicep
          parameters-file: deploy/azure/parameters/core-${{ env.ENVIRONMENT }}.bicepparam
          parameters: >
            {
              "postgresAdminLogin": "${{ secrets.POSTGRES_ADMIN_LOGIN }}",
              "postgresAdminPassword": "${{ secrets.POSTGRES_ADMIN_PASSWORD }}",
              "jwtSecret": "${{ secrets.JWT_SECRET }}",
              "oidcClientSecret": "${{ secrets.OIDC_CLIENT_SECRET }}"
            }
          outputs-to: CORE_OUTPUTS

      - name: Export core outputs
        id: core-out
        if: >-
          needs.detect-changes.outputs.infra == 'true' ||
          needs.detect-changes.outputs.server == 'true' ||
          needs.detect-changes.outputs.keycloak == 'true'
        run: |
          SB_CONN=$(echo "$CORE_OUTPUTS" | jq -r '.serviceBusConnectionString.value')
          echo "::add-mask::${SB_CONN}"
          {
            echo "managed-identity-id=$(echo "$CORE_OUTPUTS" | jq -r '.managedIdentityId.value')"
            echo "container-app-env-id=$(echo "$CORE_OUTPUTS" | jq -r '.containerAppEnvId.value')"
            echo "postgres-fqdn=$(echo "$CORE_OUTPUTS" | jq -r '.postgresFqdn.value')"
            echo "redis-hostname=$(echo "$CORE_OUTPUTS" | jq -r '.redisHostname.value')"
            echo "service-bus-connection-string=${SB_CONN}"
            echo "key-vault-uri=$(echo "$CORE_OUTPUTS" | jq -r '.keyVaultUri.value')"
            echo "web-hostname=$(echo "$CORE_OUTPUTS" | jq -r '.webHostname.value')"
          } >> "$GITHUB_OUTPUT"

  # ── Step 3: Build images (conditional, parallel) ───────────────────────────
  build-web:
    name: Build Web Image
    needs: [detect-changes, infra]
    if: needs.detect-changes.outputs.web == 'true'
    uses: ./.github/workflows/build-web-image.yml
    with:
      image-tag: ${{ needs.infra.outputs.image-tag }}
      acr-login-server: ${{ needs.infra.outputs.acr-login-server }}
      acr-name: ${{ needs.infra.outputs.acr-name }}
    secrets: inherit

  build-server:
    name: Build Server Images
    needs: [detect-changes, infra]
    if: >-
      needs.detect-changes.outputs.server == 'true' ||
      needs.detect-changes.outputs.keycloak == 'true'
    uses: ./.github/workflows/build-server-images.yml
    with:
      image-tag: ${{ needs.infra.outputs.image-tag }}
      acr-login-server: ${{ needs.infra.outputs.acr-login-server }}
      acr-name: ${{ needs.infra.outputs.acr-name }}
    secrets: inherit

  build-keycloak:
    name: Build Keycloak Image
    needs: [detect-changes, infra]
    if: >-
      needs.detect-changes.outputs.server == 'true' ||
      needs.detect-changes.outputs.keycloak == 'true'
    uses: ./.github/workflows/build-keycloak-image.yml
    with:
      image-tag: ${{ needs.infra.outputs.image-tag }}
      acr-login-server: ${{ needs.infra.outputs.acr-login-server }}
      acr-name: ${{ needs.infra.outputs.acr-name }}
    secrets: inherit

  # ── Step 4a: Deploy Container Apps (server + keycloak changes) ─────────────
  deploy-apps:
    name: Deploy Apps
    needs: [infra, build-server, build-keycloak]
    if: >-
      !cancelled() &&
      needs.infra.result == 'success' &&
      (needs.build-server.result == 'success' || needs.build-keycloak.result == 'success')
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy apps
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: create
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ needs.infra.outputs.rg-name }}
          template-file: deploy/azure/apps.bicep
          parameters-file: deploy/azure/parameters/apps-${{ env.ENVIRONMENT }}.bicepparam
          parameters: >
            {
              "imageTag": "${{ needs.infra.outputs.image-tag }}",
              "postgresAdminLogin": "${{ secrets.POSTGRES_ADMIN_LOGIN }}",
              "postgresAdminPassword": "${{ secrets.POSTGRES_ADMIN_PASSWORD }}",
              "keycloakAdminPassword": "${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}",
              "storageWebHostname": "${{ needs.infra.outputs.web-hostname }}",
              "storageAccountName": "${{ needs.infra.outputs.storage-account-name }}",
              "managedIdentityId": "${{ needs.infra.outputs.managed-identity-id }}",
              "acrLoginServer": "${{ needs.infra.outputs.acr-login-server }}",
              "containerAppEnvId": "${{ needs.infra.outputs.container-app-env-id }}",
              "postgresFqdn": "${{ needs.infra.outputs.postgres-fqdn }}",
              "redisHostname": "${{ needs.infra.outputs.redis-hostname }}",
              "serviceBusConnectionString": "${{ needs.infra.outputs.service-bus-connection-string }}",
              "keyVaultUri": "${{ needs.infra.outputs.key-vault-uri }}"
            }

  # ── Step 4b: Deploy web assets to Storage (web-only changes) ───────────────
  deploy-web:
    name: Deploy Web
    needs: [infra, build-web]
    if: >-
      !cancelled() &&
      needs.infra.result == 'success' &&
      needs.build-web.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload web assets to Storage
        env:
          ACR_LOGIN_SERVER: ${{ needs.infra.outputs.acr-login-server }}
          ACR_NAME: ${{ needs.infra.outputs.acr-name }}
          IMAGE_TAG: ${{ needs.infra.outputs.image-tag }}
          STORAGE_ACCOUNT: ${{ needs.infra.outputs.storage-account-name }}
        run: |
          az acr login --name "$ACR_NAME"
          CONTAINER_ID=$(docker create "${ACR_LOGIN_SERVER}/bowrain-web:${IMAGE_TAG}")
          docker cp "${CONTAINER_ID}:/usr/share/nginx/html" ./web-dist
          docker rm "${CONTAINER_ID}"
          # shellcheck disable=SC2016
          az storage blob upload-batch \
            --source ./web-dist \
            --destination '$web' \
            --account-name "$STORAGE_ACCOUNT" \
            --auth-mode login \
            --overwrite
