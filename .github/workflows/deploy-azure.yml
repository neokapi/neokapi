name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]
    paths:
      - 'bowrain/**'
      - 'core/**'
      - 'platform/**'
      - 'deploy/**'
      - 'docker/**'

permissions:
  id-token: write
  contents: read

env:
  AZURE_REGION: weu
  AZURE_RESOURCE_GROUP_DEV: rg-bowrain-d-weu
  AZURE_RESOURCE_GROUP_PROD: rg-bowrain-p-weu

jobs:
  # Step 1: Deploy infrastructure via Bicep (creates ACR, databases, etc.)
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      rg-name: ${{ steps.rg.outputs.name }}
      env-abbr: ${{ steps.rg.outputs.env-abbr }}
      image-tag: ${{ steps.tag.outputs.value }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
          GH_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=${GH_SHA}-${INPUT_ENV}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GH_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set resource group
        id: rg
        env:
          DEPLOY_ENV: ${{ github.event.inputs.environment || 'dev' }}
          RG_DEV: ${{ env.AZURE_RESOURCE_GROUP_DEV }}
          RG_PROD: ${{ env.AZURE_RESOURCE_GROUP_PROD }}
        run: |
          if [ "$DEPLOY_ENV" = "prod" ]; then
            echo "name=${RG_PROD}" >> "$GITHUB_OUTPUT"
            echo "env-abbr=p" >> "$GITHUB_OUTPUT"
          else
            echo "name=${RG_DEV}" >> "$GITHUB_OUTPUT"
            echo "env-abbr=d" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Bicep
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: create
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ steps.rg.outputs.name }}
          template-file: deploy/azure/main.bicep
          parameters-file: deploy/azure/parameters/${{ env.ENVIRONMENT }}.bicepparam
          parameters: >
            {
              "imageTag": "${{ steps.tag.outputs.value }}",
              "postgresAdminLogin": "${{ secrets.POSTGRES_ADMIN_LOGIN }}",
              "postgresAdminPassword": "${{ secrets.POSTGRES_ADMIN_PASSWORD }}",
              "jwtSecret": "${{ secrets.JWT_SECRET }}",
              "oidcClientSecret": "${{ secrets.OIDC_CLIENT_SECRET }}",
              "keycloakAdminPassword": "${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}"
            }

  # Step 2: Build and push container images (ACR now exists from Bicep)
  build:
    name: Build Images
    needs: deploy-infra
    uses: ./.github/workflows/build-images.yml
    with:
      environment: ${{ github.event.inputs.environment || 'dev' }}
      image-tag: ${{ needs.deploy-infra.outputs.image-tag }}
    secrets: inherit

  # Step 3: Update container app revisions with new images
  update-apps:
    name: Update Container Apps
    runs-on: ubuntu-latest
    needs: [deploy-infra, build]
    env:
      AZURE_REGION: weu
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update API container revision
        env:
          RG: ${{ needs.deploy-infra.outputs.rg-name }}
          APP_NAME: ca-bowrain-api-${{ needs.deploy-infra.outputs.env-abbr }}-weu
          ACR_LOGIN_SERVER: ${{ needs.build.outputs.acr-login-server }}
          IMAGE_TAG: ${{ needs.deploy-infra.outputs.image-tag }}
        run: |
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --image "${ACR_LOGIN_SERVER}/bowrain-server:${IMAGE_TAG}"

      - name: Update Worker container revision
        env:
          RG: ${{ needs.deploy-infra.outputs.rg-name }}
          APP_NAME: ca-bowrain-worker-${{ needs.deploy-infra.outputs.env-abbr }}-weu
          ACR_LOGIN_SERVER: ${{ needs.build.outputs.acr-login-server }}
          IMAGE_TAG: ${{ needs.deploy-infra.outputs.image-tag }}
        run: |
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --image "${ACR_LOGIN_SERVER}/bowrain-worker:${IMAGE_TAG}"

      - name: Update Keycloak container revision
        env:
          RG: ${{ needs.deploy-infra.outputs.rg-name }}
          APP_NAME: ca-bowrain-keycloak-${{ needs.deploy-infra.outputs.env-abbr }}-weu
          ACR_LOGIN_SERVER: ${{ needs.build.outputs.acr-login-server }}
          IMAGE_TAG: ${{ needs.deploy-infra.outputs.image-tag }}
        run: |
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --image "${ACR_LOGIN_SERVER}/bowrain-keycloak:${IMAGE_TAG}"
