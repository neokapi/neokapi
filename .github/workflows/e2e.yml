name: E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # Nightly at 2 AM UTC
  # Intentionally not on push/PR: the e2e suites (CLI e2e + Playwright) are heavy
  # and run nightly. Use workflow_dispatch to trigger on demand for a branch.

permissions:
  contents: read
  packages: write

jobs:
  # ── Kapi CLI E2E (no Docker, no external services) ────────────────────────
  kapi-e2e:
    name: Kapi CLI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules

      - name: Run kapi CLI e2e tests
        working-directory: .
        run: go test -tags=e2e -count=1 -v ./kapi/e2e/
        timeout-minutes: 5

  # ── Bowrain frontend Playwright E2E (self-contained, mock backend) ───────
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-ui

      # The Playwright dev WebServer bundles @neokapi/ui, which imports
      # @neokapi/kapi-react/runtime (a built ./dist subpath export). Build it
      # first so the WebServer's vite build resolves the import.
      - name: Build @neokapi/kapi-react
        working-directory: packages/kapi-react
        run: vp run build

      # Bindings are committed and already patched (sed fix for $0. bug).
      # Do NOT regenerate with wails3 — it would overwrite the fixed files.

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        working-directory: bowrain/apps/bowrain/frontend
        run: vpx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: bowrain/apps/bowrain/frontend
        run: vpx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: bowrain/apps/bowrain/frontend/playwright-report/
          retention-days: 30

  # ── Build Docker images (prerequisites for Docker E2E) ───────────────────
  build-images:
    name: Build E2E Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-ui

      - name: Compute image tag
        id: meta
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "tag=${GH_SHA}"
            echo "version=$(git describe --tags --always 2>/dev/null || echo dev)"
            echo "commit=${GH_SHA::7}"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/bowrain-server/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bowrain-server:${{ steps.meta.outputs.tag }}
            ghcr.io/neokapi/bowrain-server:e2e
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha,scope=bowrain-server
          cache-to: type=gha,mode=max,scope=bowrain-server

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/bowrain-web/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bowrain-web:${{ steps.meta.outputs.tag }}
            ghcr.io/neokapi/bowrain-web:e2e
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha,scope=bowrain-web
          cache-to: type=gha,mode=max,scope=bowrain-web

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # The keycloak theme bundles @neokapi/ui → @neokapi/kapi-react/runtime
      # (dist-only export); build kapi-react first so its vite build resolves it.
      - name: Build @neokapi/kapi-react
        working-directory: packages/kapi-react
        run: vp run build

      - name: Build Keycloak theme
        run: make -C bowrain keycloak-theme

      - name: Build and push keycloak image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/keycloak/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bowrain-keycloak:${{ steps.meta.outputs.tag }}
            ghcr.io/neokapi/bowrain-keycloak:e2e
          cache-from: type=gha,scope=bowrain-keycloak
          cache-to: type=gha,mode=max,scope=bowrain-keycloak

  # ── Bowrain server Docker stack E2E ────────────────────────────────────────
  bowrain-e2e:
    name: Bowrain E2E (Docker)
    runs-on: ubuntu-latest
    needs: build-images
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go-modules
      - uses: ./.github/actions/setup-node-ui

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start E2E stack
        env:
          IMAGE_TAG: e2e
        run: |
          export BOWRAIN_SERVER_IMAGE=ghcr.io/neokapi/bowrain-server:e2e
          export BOWRAIN_WEB_IMAGE=ghcr.io/neokapi/bowrain-web:e2e
          export BOWRAIN_KEYCLOAK_IMAGE=ghcr.io/neokapi/bowrain-keycloak:e2e
          docker compose -f bowrain/e2e/server/compose.yaml up -d --wait
        timeout-minutes: 5

      - name: Run Bowrain server E2E tests
        run: go test -tags=e2e -count=1 -v ./bowrain/e2e/server/
        timeout-minutes: 5

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        working-directory: bowrain/apps/web
        run: vpx playwright install --with-deps chromium

      - name: Run web app E2E tests
        working-directory: bowrain/apps/web
        run: vpx playwright test --config playwright.e2e.config.ts
        timeout-minutes: 5

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f bowrain/e2e/server/compose.yaml down -v
