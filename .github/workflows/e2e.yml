name: E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # Nightly at 2 AM UTC
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  # ── Kapi CLI E2E (no Docker, no external services) ────────────────────────
  kapi-e2e:
    name: Kapi CLI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules

      - name: Run kapi CLI e2e tests
        working-directory: framework
        run: go test -tags=e2e -count=1 -v ./kapi/e2e/
        timeout-minutes: 5

  # ── Bowrain frontend Playwright E2E (self-contained, mock backend) ───────
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-ui

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Generate Wails bindings
        working-directory: platform/apps/bowrain
        run: wails3 generate bindings -clean=true

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: platform/apps/bowrain/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: platform/apps/bowrain/frontend
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: platform/apps/bowrain/frontend/playwright-report/
          retention-days: 30

  # ── Bowrain server Docker stack E2E ────────────────────────────────────────
  bowrain-e2e:
    name: Bowrain E2E (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules
      - uses: ./.github/actions/setup-node-ui

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start E2E stack
        run: docker compose -f platform/e2e/server/compose.yaml up -d --wait
        timeout-minutes: 5

      - name: Run Bowrain server E2E tests
        run: go test -tags=e2e -count=1 -v ./platform/e2e/server/
        timeout-minutes: 5

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: platform/apps/web
        run: npx playwright install --with-deps chromium

      - name: Run web app E2E tests
        working-directory: platform/apps/web
        run: npx playwright test --config playwright.e2e.config.ts
        timeout-minutes: 5

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f platform/e2e/server/compose.yaml down -v
