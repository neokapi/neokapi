name: E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # Nightly at 2 AM UTC
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  # ── Bowrain frontend Playwright E2E (self-contained, mock backend) ───────
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-ui

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: bowrain/apps/bowrain/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: bowrain/apps/bowrain/frontend
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: bowrain/apps/bowrain/frontend/playwright-report/
          retention-days: 30

  # ── Full Docker stack E2E ────────────────────────────────────────────────
  e2e:
    name: E2E (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go-modules
      - uses: ./.github/actions/setup-node-ui

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start E2E stack
        run: docker compose -f e2e/compose.yaml up -d --wait
        timeout-minutes: 5

      - name: Run Go E2E tests
        run: go test -tags=e2e -count=1 -v ./e2e/
        timeout-minutes: 5

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: bowrain/apps/web
        run: npx playwright install --with-deps chromium

      - name: Run web app E2E tests
        working-directory: bowrain/apps/web
        run: npx playwright test --config playwright.e2e.config.ts
        timeout-minutes: 5

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f e2e/compose.yaml down -v
