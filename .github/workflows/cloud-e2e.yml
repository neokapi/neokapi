name: Cloud E2E

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy Server + Worker"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: "30 2 * * *" # Nightly at 2:30 AM UTC (after Docker E2E at 2:00)

permissions:
  contents: read
  id-token: write # OIDC for Azure login

jobs:
  cloud-e2e:
    name: Cloud E2E (dev)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on successful deploys or manual/scheduled triggers.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: platform/e2e/cloud
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: platform/e2e/cloud
        run: npx playwright install --with-deps chromium

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Keycloak credentials
        id: kc
        run: |
          KC_PASS=$(az keyvault secret show \
            --vault-name kv-bowrain-dev \
            --name keycloak-admin-password \
            --query value -o tsv)
          echo "::add-mask::$KC_PASS"
          echo "admin_password=$KC_PASS" >> "$GITHUB_OUTPUT"

          KC_FQDN=$(az containerapp show \
            --name ca-bowrain-dev-keycloak \
            --resource-group rg-bowrain-d-sdc \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          echo "admin_url=https://$KC_FQDN" >> "$GITHUB_OUTPUT"

      - name: Run cloud E2E tests
        working-directory: platform/e2e/cloud
        env:
          BOWRAIN_URL: https://dev.bowrain.cloud
          KEYCLOAK_ADMIN_URL: ${{ steps.kc.outputs.admin_url }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ steps.kc.outputs.admin_password }}
        run: npx playwright test --reporter=list
        timeout-minutes: 5

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: cloud-e2e-results
          path: platform/e2e/cloud/test-results/
          retention-days: 7
