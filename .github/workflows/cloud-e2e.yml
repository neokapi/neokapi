name: Cloud E2E

on:
  workflow_dispatch:
  # workflow_run:
  #   workflows: ["Deploy Server + Worker"]
  #   types: [completed]
  #   branches: [main]
  # schedule:
  #   - cron: "30 2 * * *" # Nightly at 2:30 AM UTC (after Docker E2E at 2:00)

permissions:
  contents: read

jobs:
  cloud-e2e:
    name: Cloud E2E (dev)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on successful deploys or manual/scheduled triggers.
    # if: >-
    #   github.event_name != 'workflow_run' ||
    #   github.event.workflow_run.conclusion == 'success'
    environment: dev
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: platform/e2e/cloud
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: platform/e2e/cloud
        run: npx playwright install --with-deps chromium

      - name: Run cloud E2E tests
        working-directory: platform/e2e/cloud
        env:
          BOWRAIN_URL: https://dev.bowrain.cloud
          KEYCLOAK_ADMIN_URL: https://ca-bowrain-dev-keycloak.icyplant-d6bbb1d6.swedencentral.azurecontainerapps.io
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.DEV_KEYCLOAK_ADMIN_PASSWORD }}
        run: npx playwright test --reporter=list
        timeout-minutes: 5

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: cloud-e2e-results
          path: platform/e2e/cloud/test-results/
          retention-days: 7
