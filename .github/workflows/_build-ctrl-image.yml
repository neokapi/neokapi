name: _Build Ctrl Image

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag'
        required: true
        type: string

jobs:
  build:
    name: Build Ctrl Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ctrl image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: platform/docker/bowrain-ctrl/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/bowrain-ctrl:${{ inputs.image-tag }}
            ghcr.io/neokapi/bowrain-ctrl:latest
          cache-from: type=gha,scope=bowrain-ctrl
          cache-to: type=gha,mode=max,scope=bowrain-ctrl
