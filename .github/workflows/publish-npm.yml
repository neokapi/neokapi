name: Publish npm packages

# Publishes the public @neokapi npm packages via npm Trusted Publishers (OIDC) —
# no NPM_TOKEN. Each package's trusted-publisher config on npmjs.com must point
# at THIS workflow file (publish-npm.yml) in neokapi/neokapi.
#
# Versions come from each package.json; a guard skips any version already on npm,
# so re-runs are safe. Bump the version in package.json to publish a new release.
#
# Two ways to release (both run the same idempotent publish):
#   - Push a scoped tag, mirroring the binary releases (`v*`) and the sat plugin
#     (`sat-v*`): `kapi-react-vX.Y.Z` or `kapi-format-vX.Y.Z`. The tag version is
#     verified against that package's package.json so a tag can't drift from what
#     ships. Example: `git tag kapi-react-v1.0.1 && git push origin kapi-react-v1.0.1`.
#   - Run the workflow manually (workflow_dispatch) as a fallback / re-run.
#
# First publish of a brand-new package must be bootstrapped once (npm login +
# npm publish locally), because a trusted publisher is configured on an existing
# package's settings page. Subsequent releases run here, tokenless.

on:
  push:
    tags:
      - "kapi-react-v*"
      - "kapi-format-v*"
  workflow_dispatch: {}

permissions:
  id-token: write # required: lets npm exchange the GitHub OIDC token
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Install vp + vpx, mirroring the setup-node-ui composite the rest of CI
      # uses. The kapi-format / kapi-react build.mjs shell out to `vpx` (e.g.
      # `vpx tsc`), so it must be on PATH for the build step below.
      - uses: voidzero-dev/setup-vp@v1
        with:
          version: "0.1.23"
          node-version: "24"
          cache: true

      # setup-node with registry-url is applied last so npm's registry/OIDC
      # config is the final node setup in effect for the publish step.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC) needs npm >= 11.5.1.
      - name: Ensure recent npm
        run: |
          npm install -g npm@latest
          npm --version

      # On a tag push, verify the tag's version matches the package's
      # package.json so a release tag can never drift from what actually ships.
      # GITHUB_REF_NAME is a built-in env var (the tag name) — safe to read in
      # shell, not template-interpolated. The idempotent publish steps below
      # still skip anything already on npm.
      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          ref="$GITHUB_REF_NAME"
          case "$ref" in
            kapi-react-v*)  pkg=packages/kapi-react;  expected="${ref#kapi-react-v}" ;;
            kapi-format-v*) pkg=packages/kapi-format; expected="${ref#kapi-format-v}" ;;
            *) echo "::error::unrecognized release tag '$ref'"; exit 1 ;;
          esac
          actual="$(node -p "require('./$pkg/package.json').version")"
          if [ "$actual" != "$expected" ]; then
            echo "::error::tag '$ref' expects $pkg version '$expected' but package.json is '$actual'"
            exit 1
          fi
          echo "OK: tag '$ref' matches $pkg@$actual"

      - name: Install workspace dependencies
        run: |
          corepack enable
          corepack pnpm install --frozen-lockfile

      # kapi-react consumes @neokapi/kapi-format; build the dependency first.
      - name: Build packages
        run: |
          pnpm --filter @neokapi/kapi-format run build
          pnpm --filter @neokapi/kapi-react run build

      # Publish in dependency order. Skip a package whose current version is
      # already on npm so re-running the workflow is idempotent.
      #
      # The publish (and the existence check that gates it) stay on `npm`, with a
      # SCOPE-specific registry override (`--@neokapi:registry=...`). The repo
      # root .npmrc maps the @neokapi scope to GitHub Packages for installs, and
      # a scope registry takes precedence over a plain `--registry`, so the check
      # must use the same `--@neokapi:registry` the publish uses or it queries the
      # wrong registry and tries to republish an existing version. The publish
      # itself also has to be npm (not pnpm): npm's OIDC trusted-publishing token
      # exchange is only implemented by the npm CLI (pnpm#9812). Build/install use
      # pnpm. The guard keeps re-runs idempotent.
      - name: Publish @neokapi/kapi-format
        working-directory: packages/kapi-format
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@neokapi/kapi-format@${VER}" version --@neokapi:registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "@neokapi/kapi-format@${VER} already published — skipping"
          else
            npm publish --provenance --access public --@neokapi:registry=https://registry.npmjs.org/
          fi

      - name: Publish @neokapi/kapi-react
        working-directory: packages/kapi-react
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@neokapi/kapi-react@${VER}" version --@neokapi:registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "@neokapi/kapi-react@${VER} already published — skipping"
          else
            npm publish --provenance --access public --@neokapi:registry=https://registry.npmjs.org/
          fi
