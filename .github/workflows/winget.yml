name: Publish to WinGet

# Dispatch-only ON PURPOSE. The signed Windows installer is added to the
# (already published) release by scripts/publish-windows-signed.sh *after* CI
# publishes macOS/Linux — so winget must run after that step, not on the
# release event (the signed asset isn't on the release yet at CI publish time).
# The publish script triggers this with:  gh workflow run winget.yml -f tag=<tag>
#
# Updates two winget packages from one release:
#   • Neokapi.KapiCli — the CLI (moniker `kapi`), from the portable kapi-cli_*.zip
#   • Neokapi.Kapi    — the Kapi desktop app, from the NSIS *-setup.exe
# The bare "Kapi" name belongs to the desktop on every channel, mirroring the
# Homebrew split (formula kapi-cli / cask kapi).
#
# One-time prerequisites:
#   • The neokapi org forks microsoft/winget-pkgs → neokapi/winget-pkgs. The
#     action submits PRs from that org fork (see fork-user: neokapi below).
#   • WINGET_TOKEN repo secret — a CLASSIC PAT with `public_repo` scope, owned by
#     a neokapi org member with write access to neokapi/winget-pkgs (fine-grained
#     PATs are not supported by the action).
#   • Each package must already exist in winget-pkgs. Bootstrap once (CLI first):
#       KOMAC_FORK_OWNER=neokapi komac new Neokapi.KapiCli   # portable, nested kapi.exe
#       KOMAC_FORK_OWNER=neokapi komac new Neokapi.Kapi      # nullsoft *-setup.exe
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to winget (e.g. v1.2.3)"
        required: true

jobs:
  publish:
    name: Submit ${{ matrix.identifier }} to winget-pkgs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # CLI — the signed portable zips (kapi-cli_<ver>_windows_<arch>.zip).
          # The "kapi-cli_" prefix + underscores exclude the kapi-bowrain and
          # kapi-<ver> (desktop) assets.
          - identifier: Neokapi.KapiCli
            installers-regex: '^kapi-cli_.*_windows_.*\.zip$'
          # Desktop app — the signed NSIS installers (kapi-<ver>-windows-<arch>-setup.exe).
          # kapi-[0-9] matches the desktop but not kapi-cli_/kapi-bowrain_.
          - identifier: Neokapi.Kapi
            installers-regex: '^kapi-[0-9].*-windows-.*-setup\.exe$'
    steps:
      - name: Derive package version (strip leading v)
        id: ver
        env:
          TAG: ${{ inputs.tag }}
        run: echo "num=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Publish to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: ${{ matrix.identifier }}
          version: ${{ steps.ver.outputs.num }}
          release-tag: ${{ inputs.tag }}
          installers-regex: ${{ matrix.installers-regex }}
          # Submit the PR from the neokapi org fork of winget-pkgs (maps to
          # KOMAC_FORK_OWNER), not the token owner's personal fork.
          fork-user: neokapi
          token: ${{ secrets.WINGET_TOKEN }}
