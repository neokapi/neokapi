name: Storybook

# Builds the kapi and bowrain Storybook static sites and uploads them as
# artifacts. Deployment is handled by pages-deploy.yml, which slots them
# under the org pages tree at:
#   /storybook/{kapi,bowrain}/         (production)
#   /storybook/prs/{N}/{kapi,bowrain}/ (PR previews)

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "bowrain/packages/ui/**"
      - "bowrain/storybook/**"
      - "bowrain/emails/src/**/*.stories.*"
      - "bowrain/apps/keycloak-theme/src/**/*.stories.*"
      - "bowrain/apps/web/src/auth/**/*.stories.*"
      - "bowrain/apps/bowrain/frontend/src/**/*.stories.*"
      - "apps/kapi-desktop/frontend/src/**/*.stories.*"
      - "storybook/**"
      - "packages/ui/**"
      - "packages/flow-editor/**"
      - "packages/concept-ui/**"
      - "packages/kapi-lab/**"
      - "packages/docs-shared/**"
      - "packages/storybook-config/**"
      - ".github/workflows/storybook-preview.yml"
  push:
    branches: [main]
    paths:
      - "bowrain/packages/ui/**"
      - "bowrain/storybook/**"
      - "bowrain/emails/src/**/*.stories.*"
      - "bowrain/apps/keycloak-theme/src/**/*.stories.*"
      - "bowrain/apps/web/src/auth/**/*.stories.*"
      - "bowrain/apps/bowrain/frontend/src/**/*.stories.*"
      - "apps/kapi-desktop/frontend/src/**/*.stories.*"
      - "storybook/**"
      - "packages/ui/**"
      - "packages/flow-editor/**"
      - "packages/concept-ui/**"
      - "packages/kapi-lab/**"
      - "packages/docs-shared/**"
      - "packages/storybook-config/**"
      - ".github/workflows/storybook-preview.yml"

# Cancel superseded PR runs; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-ui

      - name: Build kapi-react (storybook-config imports from dist)
        working-directory: packages/kapi-react
        run: vp run build

      - name: Determine base paths
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            {
              echo "kapi_base=/storybook/prs/${PR_NUMBER}/kapi/"
              echo "bowrain_base=/storybook/prs/${PR_NUMBER}/bowrain/"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "kapi_base=/storybook/kapi/"
              echo "bowrain_base=/storybook/bowrain/"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build Bowrain Storybook
        working-directory: bowrain/storybook
        env:
          STORYBOOK_BASE_PATH: ${{ steps.base.outputs.bowrain_base }}
        run: vpx storybook build -o storybook-static

      - name: Build Kapi Storybook
        working-directory: storybook
        env:
          STORYBOOK_BASE_PATH: ${{ steps.base.outputs.kapi_base }}
        run: vpx storybook build -o storybook-static

      - name: Upload bowrain storybook artifact
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-storybook
          path: bowrain/storybook/storybook-static
          retention-days: 7

      - name: Upload kapi storybook artifact
        uses: actions/upload-artifact@v7
        with:
          name: kapi-storybook
          path: storybook/storybook-static
          retention-days: 7
