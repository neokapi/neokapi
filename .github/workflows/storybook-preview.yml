name: Storybook

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "platform/packages/ui/**"
      - "platform/emails/src/**/*.stories.*"
      - "framework/apps/kapi-desktop/frontend/**"
      - "packages/ui/**"
      - "packages/flow-editor/**"
      - ".github/workflows/storybook-preview.yml"
  push:
    branches: [main]
    paths:
      - "platform/packages/ui/**"
      - "platform/emails/src/**/*.stories.*"
      - "framework/apps/kapi-desktop/frontend/**"
      - "packages/ui/**"
      - "packages/flow-editor/**"
      - ".github/workflows/storybook-preview.yml"

permissions:
  contents: read
  pull-requests: write

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  # Publish production Storybook on push to main.
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-ui

      - name: Build Bowrain Storybook
        working-directory: platform/packages/ui
        env:
          STORYBOOK_BASE_PATH: /bowrain/storybook/
        run: npx storybook build -o storybook-static

      - name: Install flow-editor dependencies
        working-directory: packages/flow-editor
        run: npm install

      - name: Install framework workspace dependencies
        working-directory: framework
        run: npm install

      - name: Build Kapi Storybook
        working-directory: framework/apps/kapi-desktop/frontend
        env:
          STORYBOOK_BASE_PATH: /kapi/storybook/
        run: npx storybook build -o storybook-static

      - name: Deploy to GitHub Pages
        env:
          SSH_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          git clone --depth 1 git@github.com:neokapi/neokapi.github.io.git /tmp/pages

          # Deploy Bowrain Storybook
          BOWRAIN_DIR="bowrain/storybook"
          find "/tmp/pages/${BOWRAIN_DIR}" -maxdepth 1 -not -name 'pr-*' -not -name storybook -delete 2>/dev/null || true
          mkdir -p "/tmp/pages/${BOWRAIN_DIR}"
          cp -r platform/packages/ui/storybook-static/* "/tmp/pages/${BOWRAIN_DIR}/"

          # Deploy Kapi Storybook
          KAPI_DIR="kapi/storybook"
          find "/tmp/pages/${KAPI_DIR}" -maxdepth 1 -not -name 'pr-*' -not -name storybook -delete 2>/dev/null || true
          mkdir -p "/tmp/pages/${KAPI_DIR}"
          cp -r framework/apps/kapi-desktop/frontend/storybook-static/* "/tmp/pages/${KAPI_DIR}/"

          cd /tmp/pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy Storybooks from main (${GITHUB_SHA::8})"
          git push origin main

  # Deploy per-PR Storybook preview.
  deploy:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-ui

      - name: Build Bowrain Storybook
        working-directory: platform/packages/ui
        env:
          STORYBOOK_BASE_PATH: /bowrain/storybook/pr-${{ github.event.pull_request.number }}/
        run: npx storybook build -o storybook-static

      - name: Install flow-editor dependencies
        working-directory: packages/flow-editor
        run: npm install

      - name: Install framework workspace dependencies
        working-directory: framework
        run: npm install

      - name: Build Kapi Storybook
        working-directory: framework/apps/kapi-desktop/frontend
        env:
          STORYBOOK_BASE_PATH: /kapi/storybook/pr-${{ github.event.pull_request.number }}/
        run: npx storybook build -o storybook-static

      - name: Deploy to GitHub Pages
        env:
          SSH_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          git clone --depth 1 git@github.com:neokapi/neokapi.github.io.git /tmp/pages

          # Deploy Bowrain Storybook preview
          BOWRAIN_DIR="bowrain/storybook/pr-${PR_NUMBER}"
          rm -rf "/tmp/pages/${BOWRAIN_DIR}"
          mkdir -p "/tmp/pages/${BOWRAIN_DIR}"
          cp -r platform/packages/ui/storybook-static/* "/tmp/pages/${BOWRAIN_DIR}/"

          # Deploy Kapi Storybook preview
          KAPI_DIR="kapi/storybook/pr-${PR_NUMBER}"
          rm -rf "/tmp/pages/${KAPI_DIR}"
          mkdir -p "/tmp/pages/${KAPI_DIR}"
          cp -r framework/apps/kapi-desktop/frontend/storybook-static/* "/tmp/pages/${KAPI_DIR}/"

          cd /tmp/pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy Storybook previews for PR #${PR_NUMBER}"
          git push origin main

      - name: Comment PR with preview links
        uses: actions/github-script@v8
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const bowrainUrl = `https://neokapi.github.io/bowrain/storybook/pr-${prNum}/`;
            const kapiUrl = `https://neokapi.github.io/kapi/storybook/pr-${prNum}/`;
            const marker = '<!-- storybook-preview -->';
            const body = `${marker}\n📖 **Storybook previews:**\n- Bowrain: ${bowrainUrl}\n- Kapi: ${kapiUrl}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview from GitHub Pages
        env:
          SSH_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          git clone --depth 1 git@github.com:neokapi/neokapi.github.io.git /tmp/pages

          BOWRAIN_DIR="bowrain/storybook/pr-${PR_NUMBER}"
          KAPI_DIR="kapi/storybook/pr-${PR_NUMBER}"

          rm -rf "/tmp/pages/${BOWRAIN_DIR}" "/tmp/pages/${KAPI_DIR}"

          cd /tmp/pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "Nothing to clean up" && exit 0
          git commit -m "Remove Storybook previews for PR #${PR_NUMBER}"
          git push origin main
