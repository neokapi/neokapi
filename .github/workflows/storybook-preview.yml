name: Storybook

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "platform/packages/ui/**"
      - "platform/emails/src/**/*.stories.*"
      - ".github/workflows/storybook-preview.yml"
  push:
    branches: [main]
    paths:
      - "platform/packages/ui/**"
      - "platform/emails/src/**/*.stories.*"
      - ".github/workflows/storybook-preview.yml"

permissions:
  contents: read
  pull-requests: write

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  # Publish production Storybook on push to main.
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-ui

      - name: Build Storybook
        working-directory: platform/packages/ui
        env:
          STORYBOOK_BASE_PATH: /bowrain/storybook/
        run: npx storybook build -o storybook-static

      - name: Deploy to GitHub Pages
        env:
          SSH_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          DEPLOY_DIR="bowrain/storybook"

          mkdir -p ~/.ssh
          echo "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          git clone --depth 1 git@github.com:neokapi/neokapi.github.io.git /tmp/pages

          # Remove existing storybook root but preserve pr-* subdirectories.
          find "/tmp/pages/${DEPLOY_DIR}" -maxdepth 1 -not -name 'pr-*' -not -name storybook -delete 2>/dev/null || true
          mkdir -p "/tmp/pages/${DEPLOY_DIR}"
          cp -r platform/packages/ui/storybook-static/* "/tmp/pages/${DEPLOY_DIR}/"

          cd /tmp/pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy Storybook from main (${GITHUB_SHA::8})"
          git push origin main

  # Deploy per-PR Storybook preview.
  deploy:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-ui

      - name: Build Storybook
        working-directory: platform/packages/ui
        env:
          STORYBOOK_BASE_PATH: /bowrain/storybook/pr-${{ github.event.pull_request.number }}/
        run: npx storybook build -o storybook-static

      - name: Deploy to GitHub Pages
        env:
          SSH_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          DEPLOY_DIR="bowrain/storybook/pr-${PR_NUMBER}"

          mkdir -p ~/.ssh
          echo "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          git clone --depth 1 git@github.com:neokapi/neokapi.github.io.git /tmp/pages

          rm -rf "/tmp/pages/${DEPLOY_DIR}"
          mkdir -p "/tmp/pages/${DEPLOY_DIR}"
          cp -r platform/packages/ui/storybook-static/* "/tmp/pages/${DEPLOY_DIR}/"

          cd /tmp/pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy Storybook preview for PR #${PR_NUMBER}"
          git push origin main

      - name: Comment PR with preview link
        uses: actions/github-script@v8
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const url = `https://neokapi.github.io/bowrain/storybook/pr-${prNum}/`;
            const marker = '<!-- storybook-preview -->';
            const body = `${marker}\n📖 **Storybook preview:** ${url}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview from GitHub Pages
        env:
          SSH_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          DEPLOY_DIR="bowrain/storybook/pr-${PR_NUMBER}"

          mkdir -p ~/.ssh
          echo "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          git clone --depth 1 git@github.com:neokapi/neokapi.github.io.git /tmp/pages

          if [ -d "/tmp/pages/${DEPLOY_DIR}" ]; then
            rm -rf "/tmp/pages/${DEPLOY_DIR}"
            cd /tmp/pages
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git diff --staged --quiet && echo "Nothing to clean up" && exit 0
            git commit -m "Remove Storybook preview for PR #${PR_NUMBER}"
            git push origin main
          fi
