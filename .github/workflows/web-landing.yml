name: Web Landing

# Builds the bowrain-web-landing Vite app and uploads it as an artifact. Pages
# Deploy picks it up and slots it at /web/bowrain/ on neokapi.github.io.
#
# (The neokapi landing was retired: the neokapi Docusaurus site is now the
# product landing page at /web/neokapi/, built by the "Docs — kapi" workflow.)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "bowrain/web/landing/**"
      - ".github/workflows/web-landing.yml"
  push:
    branches: [main]
    paths:
      - "bowrain/web/landing/**"
      - ".github/workflows/web-landing.yml"

# Cancel superseded PR runs; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v7

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: vp install

      - name: Determine VITE_BASE per environment
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "bowrain_base=/web/prs/${PR_NUMBER}/bowrain/" >> "$GITHUB_OUTPUT"
          else
            echo "bowrain_base=/web/bowrain/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build bowrain-web-landing
        working-directory: bowrain/web/landing
        env:
          VITE_BASE: ${{ steps.base.outputs.bowrain_base }}
        run: vp run build

      - name: Upload bowrain-web artifact
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-web
          path: bowrain/web/landing/dist
          retention-days: 7
