name: Web Landing

# Builds the neokapi-web-landing and bowrain-web-landing Vite apps and
# uploads them as artifacts. Pages Deploy picks them up and slots them at
# /web/{neokapi,bowrain}/ on neokapi.github.io.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "web/landing/**"
      - "bowrain/web/landing/**"
      - ".github/workflows/web-landing.yml"
  push:
    branches: [main]
    paths:
      - "web/landing/**"
      - "bowrain/web/landing/**"
      - ".github/workflows/web-landing.yml"

# Cancel superseded PR runs; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: vp install

      - name: Determine VITE_BASE per environment
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            {
              echo "neokapi_base=/web/prs/${PR_NUMBER}/neokapi/"
              echo "bowrain_base=/web/prs/${PR_NUMBER}/bowrain/"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "neokapi_base=/web/neokapi/"
              echo "bowrain_base=/web/bowrain/"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build neokapi-web-landing
        working-directory: web/landing
        env:
          VITE_BASE: ${{ steps.base.outputs.neokapi_base }}
        run: vp run build

      - name: Build bowrain-web-landing
        working-directory: bowrain/web/landing
        env:
          VITE_BASE: ${{ steps.base.outputs.bowrain_base }}
        run: vp run build

      - name: Upload neokapi-web artifact
        uses: actions/upload-artifact@v7
        with:
          name: neokapi-web
          path: web/landing/dist
          retention-days: 7

      - name: Upload bowrain-web artifact
        uses: actions/upload-artifact@v7
        with:
          name: bowrain-web
          path: bowrain/web/landing/dist
          retention-days: 7
