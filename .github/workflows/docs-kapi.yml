name: Docs — kapi

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-kapi.yml"
  pull_request:
    paths:
      - "website/**"
      - "packages/docs-shared/**"
      - ".github/workflows/docs-kapi.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: vp install

      - name: Fetch last-known-good docs assets (kapi only)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view docs-assets > /dev/null 2>&1; then
            if gh release download docs-assets --pattern 'docs-assets.tar.gz' --dir /tmp 2>/dev/null; then
              # Extract only kapi-relevant assets to avoid leaking bowrain content
              # into the kapi site. Other assets are owned by docs-bowrain.yml.
              mkdir -p website/static
              tar xzf /tmp/docs-assets.tar.gz -C website/static --wildcards \
                'img/kapi*' 'video/kapi*' 2>/dev/null || true
            fi
          fi

          # Stub test-comparison.json until walkthrough engine emits it
          mkdir -p website/static/data
          if [ ! -f website/static/data/test-comparison.json ]; then
            echo '{"generatedAt":"","okapiVersion":"","neokapiVersion":"","filters":[],"summary":{"totalFiltersOkapi":0,"totalFiltersBridge":0,"totalFiltersNative":0,"totalFiltersBoth":0,"totalTestsOkapi":0,"totalTestsBridge":0,"totalTestsNative":0,"coveragePct":0}}' > website/static/data/test-comparison.json
          fi

      - name: Build kapi Docusaurus site
        run: vp run build
        working-directory: website

      - name: Upload kapi site artifact
        uses: actions/upload-artifact@v7
        with:
          name: kapi-site
          path: website/build
          retention-days: 7
