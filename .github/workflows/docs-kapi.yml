name: Docs — kapi

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/docs/**"
      - "packages/docs-shared/**"
      - "packages/reference-data/**"
      - ".github/workflows/docs-kapi.yml"
  pull_request:
    paths:
      - "web/docs/**"
      - "packages/docs-shared/**"
      - "packages/reference-data/**"
      - ".github/workflows/docs-kapi.yml"

permissions:
  contents: read

jobs:
  record-scenes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true

      # The kapi binary is only needed to drive the VHS terminal recordings,
      # which we skip on PRs (see below) — so skip building it there too.
      - name: Build kapi binary
        if: github.event_name != 'pull_request'
        run: make build

      - name: Build playground wasm
        run: make web-wasm-demo

      - name: Build CLI playground wasm
        run: make web-wasm-cli

      - name: Upload playground wasm
        uses: actions/upload-artifact@v7
        with:
          name: kapi-wasm
          path: web/docs/static/wasm
          retention-days: 7

      # Terminal scene recording (VHS) takes ~10 min. Skip it on PRs so docs
      # previews build fast; it still runs on push to main / workflow_dispatch
      # so the published docs videos stay fresh.
      - name: Install VHS + Xvfb
        if: github.event_name != 'pull_request'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg ttyd xvfb
          curl -L "https://github.com/charmbracelet/vhs/releases/download/v0.9.0/vhs_0.9.0_amd64.deb" -o /tmp/vhs.deb
          sudo dpkg -i /tmp/vhs.deb

      - name: Record terminal scenes
        if: github.event_name != 'pull_request'
        env:
          DISPLAY: ":99"
        run: |
          export PATH="$PWD/bin:$PATH"
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          if [ -d web/docs/scenes ]; then
            for scene_dir in web/docs/scenes/*/; do
              for tape in "$scene_dir"*.tape; do
                [ -f "$tape" ] || continue
                echo "Recording $tape"
                (cd "$scene_dir" && timeout 180 vhs "$(basename "$tape")") || echo "::warning::tape $tape failed"
              done
            done
          fi

      - name: Stage recorded assets under static/video/kapi/
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p web/docs/static/video/kapi
          if [ -d web/docs/scenes ]; then
            for webm in web/docs/scenes/*/*.webm; do
              [ -f "$webm" ] || continue
              cp "$webm" "web/docs/static/video/kapi/$(basename "$webm")"
            done
          fi

      - name: Upload recorded scenes
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: kapi-scenes
          path: web/docs/static/video/kapi
          retention-days: 7

  build:
    needs: record-scenes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: vp install

      # Scenes are only recorded/uploaded off-PR (see record-scenes); skip the
      # download on PRs where the artifact doesn't exist.
      - name: Download recorded scenes
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@v8
        with:
          name: kapi-scenes
          path: web/docs/static/video/kapi

      # The Claude explainer videos are rendered by the harness (not VHS scene
      # tapes), so they are not in the kapi-scenes artifact. They are published
      # to the docs-assets release; stage them here or they 404 on the live site.
      - name: Stage explainer videos from docs-assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p web/docs/static/video/kapi
          if gh release download docs-assets -p docs-assets.tar.gz -D /tmp/da 2>/dev/null; then
            tar xzf /tmp/da/docs-assets.tar.gz -C /tmp/da
            for f in /tmp/da/video/kapi/claude-*.webm /tmp/da/video/kapi/claude-*.jpg; do
              [ -f "$f" ] && cp "$f" "web/docs/static/video/kapi/$(basename "$f")"
            done
            echo "Staged explainer videos: $(ls web/docs/static/video/kapi/claude-* 2>/dev/null | wc -l) files"
          else
            echo "::warning::docs-assets release unavailable; Claude explainer videos will be missing"
          fi

      - name: Download playground wasm
        uses: actions/download-artifact@v8
        with:
          name: kapi-wasm
          path: web/docs/static/wasm

      - name: Stub test-comparison.json
        # CI's test-comparison job uploads the real artifact; this stub keeps
        # the build green when the artifact isn't available (e.g. on PRs that
        # don't touch the bridge tests).
        run: |
          mkdir -p web/docs/static/data
          if [ ! -f web/docs/static/data/test-comparison.json ]; then
            echo '{"generatedAt":"","okapiVersion":"","neokapiVersion":"","filters":[],"summary":{"totalFiltersOkapi":0,"totalFiltersBridge":0,"totalFiltersNative":0,"totalFiltersBoth":0,"totalTestsOkapi":0,"totalTestsBridge":0,"totalTestsNative":0,"coveragePct":0}}' > web/docs/static/data/test-comparison.json
          fi

      # website/ is a standalone Docusaurus app (not in the npm workspace,
      # by design — see PR #425). Install its deps locally and invoke the
      # build script via npm directly so vp doesn't try to resolve a
      # non-existent `neokapi-docs#build` workspace task.
      - name: Install kapi docs site dependencies
        run: npm install --no-audit --no-fund
        working-directory: web/docs

      - name: Determine base URL (production vs PR preview)
        id: base
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
            echo "docs_base=/web/prs/${PR_NUMBER}/neokapi/docs/" >> "$GITHUB_OUTPUT"
          else
            echo "docs_base=/web/neokapi/docs/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build kapi Docusaurus site
        run: npm run build
        working-directory: web/docs
        env:
          DOCS_BASE_URL: ${{ steps.base.outputs.docs_base }}

      - name: Upload kapi site artifact
        uses: actions/upload-artifact@v7
        with:
          name: kapi-site
          path: web/docs/build
          retention-days: 7
