name: Docs — kapi

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "packages/docs-shared/**"
      - "packages/reference-data/**"
      # The docs site bundles these packages (the Lab + KLF Lab/Tests + the
      # playground), so a change to them must rebuild and redeploy the site.
      - "packages/kapi-lab/**"
      - "packages/kapi-format/**"
      - "packages/kapi-playground/**"
      - ".github/workflows/docs-kapi.yml"
  pull_request:
    paths:
      - "web/**"
      - "packages/docs-shared/**"
      - "packages/reference-data/**"
      - "packages/kapi-lab/**"
      - "packages/kapi-format/**"
      - "packages/kapi-playground/**"
      - ".github/workflows/docs-kapi.yml"

# Cancel superseded PR runs; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true

      - name: Build playground wasm
        run: make web-wasm-demo

      - name: Build CLI playground wasm
        run: make web-wasm-cli

      - name: Upload playground wasm
        uses: actions/upload-artifact@v7
        with:
          name: kapi-wasm
          path: web/static/wasm
          retention-days: 7

  build:
    needs: build-wasm
    runs-on: ubuntu-latest
    # CDN_URL is the R2 origin to serve large assets (wasm, vision models,
    # videos) from (the DOCS_CDN_URL repo variable). Empty → assets stay
    # same-origin. It is now ON for push AND same-repo PRs: previews are served
    # from R2 (not committed to git), so referencing the shared assets from the
    # CDN keeps each preview tiny — only the PR's own wasm is published (by sha).
    # FORK PRs keep it empty: they can't read the R2 publish secret and never get
    # a deployed preview anyway, so they build same-origin (assets simply absent).
    env:
      CDN_URL: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && vars.DOCS_CDN_URL || '' }}
    steps:
      - uses: actions/checkout@v6

      # The neokapi docs site is downstream-clean by contract: zero bowrain
      # references in user-facing pages/landing, no bowrain video assets staged
      # here. Fails fast before the (slow) build.
      - name: Guard — neokapi docs must stay bowrain-clean
        run: ./scripts/check-docs-bowrain-clean.sh

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: vp install

      # @neokapi/{ui,flow-editor} (consumed by kapi-lab and the docs site)
      # import `@neokapi/kapi-react/runtime`, a built ./dist subpath export.
      # Build kapi-react so it resolves for both the lab tests and the docs
      # build below (mirrors ci-kapi-desktop-frontend / ci-frontend).
      - name: Build @neokapi/kapi-react
        run: vp run build
        working-directory: packages/kapi-react

      # The lab package has no other CI home (ci.yml's filters cover the
      # bowrain frontends and packages/ui|flow-editor via the desktop job);
      # its unit tests run here, where every kapi-lab change already lands.
      - name: Lab package checks and tests
        working-directory: packages/kapi-lab
        run: |
          vp check --no-fmt
          vp test -- --run

      # Videos and vision models are served from the CDN (R2) for push and
      # same-repo PRs — referenced by URL, never staged into the artifact. The
      # docs-assets release is retired: videos are published to R2 from the
      # desktop (make publish-cdn-videos), vision models via
      # make publish-cdn-vision-models (from the pinned vision-models-v1 release).
      # Local dev / fork builds (CDN off) stage same-origin on demand with
      # `make fetch-vision-models`; fork PRs never deploy a preview.

      - name: Download playground wasm
        uses: actions/download-artifact@v8
        with:
          name: kapi-wasm
          path: web/static/wasm

      # Stage @embedpdf/pdfium's wasm next to the kapi wasm so the /lab/pdf
      # browser PDF reader can fetch it (else it 404s on /wasm/pdfium.wasm). The
      # build-wasm job is Go-only with no node_modules, so this runs here where
      # `vp install` above populated @embedpdf/pdfium — no CDN, pinned dep.
      - name: Stage PDFium wasm (browser PDF)
        run: make web-pdfium-wasm

      # When serving from the CDN: sync the freshly built wasm (kapi-cli + pdfium
      # + wasm_exec.js, versioned by commit sha) to R2, then drop it from the
      # site artifact so GitHub Pages stays small. The site is built below
      # pointing at /kapi/wasm/<sha>/ on the CDN (DOCS_CDN_VERSION).
      - name: Publish wasm to R2 + slim artifact
        if: ${{ env.CDN_URL != '' }}
        env:
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_VERSION: ${{ github.sha }}
        run: |
          bash scripts/publish-cdn-assets.sh wasm
          rm -rf web/static/wasm

      - name: Stub test-comparison.json
        # CI's test-comparison job uploads the real artifact; this stub keeps
        # the build green when the artifact isn't available (e.g. on PRs that
        # don't touch the bridge tests).
        run: |
          mkdir -p web/static/data
          if [ ! -f web/static/data/test-comparison.json ]; then
            echo '{"generatedAt":"","okapiVersion":"","neokapiVersion":"","filters":[],"summary":{"totalFiltersOkapi":0,"totalFiltersBridge":0,"totalFiltersNative":0,"totalFiltersBoth":0,"totalTestsOkapi":0,"totalTestsBridge":0,"totalTestsNative":0,"coveragePct":0}}' > web/static/data/test-comparison.json
          fi

      # Regenerate the reference dataset WITH okapi-bridge so the deployed Format
      # Reference includes the bridge filters (the committed dataset is built-in
      # + in-repo plugins only — reproducible — and never carries the bridge,
      # which lives in a separate repo). okapi-bridge's release tarball ships the
      # runtime plugin without schemas; the gen-refs-shaped dist/plugin (manifest
      # + per-format schemas) is produced by its pure-bash transform from
      # committed schemagen data, so no Java build is needed. Best-effort: a
      # failure leaves the deployed reference built-in + plugin only.
      - name: Set up Go (reference dataset)
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true
      - name: Stage okapi-bridge reference data
        run: |
          set -uo pipefail
          if ! git clone --depth 1 https://github.com/neokapi/okapi-bridge.git /tmp/okapi-bridge; then
            echo "::warning::okapi-bridge clone failed; deployed reference omits bridge formats"
            exit 0
          fi
          V="$(for d in /tmp/okapi-bridge/okapi-releases/[0-9]*/; do basename "$d"; done | sort -V | tail -1)"
          ( cd /tmp/okapi-bridge && bash scripts/transform-to-plugin.sh "$V" "$V" ) || {
            echo "::warning::okapi-bridge transform failed; deployed reference omits bridge formats"
            exit 0
          }
          make generate-reference-docs BRIDGE_PLUGIN=/tmp/okapi-bridge/dist/plugin || {
            echo "::warning::gen-refs with bridge failed; deployed reference omits bridge formats"
            exit 0
          }

      # web is a pnpm workspace member; its deps (and the @neokapi/*
      # workspace packages it consumes) are installed by the `vp install` above.
      - name: Determine base URL (production vs PR preview)
        id: base
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Production serves the docs at the SITE ROOT ("/") of
          # neokapi.github.io (the docs home is the product landing page). PR
          # previews keep the /web/prs/<N>/neokapi/docs/ slot, because the deploy
          # step (pages-deploy.yml) runs as a workflow_run from the DEFAULT
          # branch and slots PR docs there — the build base must match that slot
          # or the preview's assets 404. The two paths are each internally
          # consistent.
          if [ "${{ github.event_name }}" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
            echo "docs_base=/web/prs/${PR_NUMBER}/neokapi/docs/" >> "$GITHUB_OUTPUT"
          else
            echo "docs_base=/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build kapi Docusaurus site
        run: vp run build
        working-directory: web
        env:
          DOCS_BASE_URL: ${{ steps.base.outputs.docs_base }}
          # Empty CDN_URL → assets resolve same-origin (unchanged). Set → wasm
          # (versioned by sha), vision models, and videos load from the CDN.
          DOCS_CDN_URL: ${{ env.CDN_URL }}
          DOCS_CDN_VERSION: ${{ github.sha }}

      - name: Upload kapi site artifact
        uses: actions/upload-artifact@v7
        with:
          name: kapi-site
          path: web/build
          retention-days: 7
