name: Docs — kapi

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/docs/**"
      - "packages/docs-shared/**"
      - "packages/reference-data/**"
      # The docs site bundles these packages (the Lab + KLF Lab/Tests + the
      # playground), so a change to them must rebuild and redeploy the site.
      - "packages/kapi-lab/**"
      - "packages/kapi-format/**"
      - "packages/kapi-playground/**"
      - ".github/workflows/docs-kapi.yml"
  pull_request:
    paths:
      - "web/docs/**"
      - "packages/docs-shared/**"
      - "packages/reference-data/**"
      - "packages/kapi-lab/**"
      - "packages/kapi-format/**"
      - "packages/kapi-playground/**"
      - ".github/workflows/docs-kapi.yml"

# Cancel superseded PR runs; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true

      - name: Build playground wasm
        run: make web-wasm-demo

      - name: Build CLI playground wasm
        run: make web-wasm-cli

      - name: Upload playground wasm
        uses: actions/upload-artifact@v7
        with:
          name: kapi-wasm
          path: web/docs/static/wasm
          retention-days: 7

  build:
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # The neokapi docs site is downstream-clean by contract: zero bowrain
      # references in user-facing pages/landing, no bowrain video assets staged
      # here. Fails fast before the (slow) build.
      - name: Guard — neokapi docs must stay bowrain-clean
        run: ./scripts/check-docs-bowrain-clean.sh

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: vp install

      # The lab package has no other CI home (ci.yml's filters cover the
      # bowrain frontends and packages/ui|flow-editor via the desktop job);
      # its unit tests run here, where every kapi-lab change already lands.
      - name: Lab package checks and tests
        run: |
          pnpm --filter @neokapi/kapi-lab exec vp check --no-fmt
          pnpm --filter @neokapi/kapi-lab exec vp test -- --run

      # All docs videos are produced by the harness on the desktop (make
      # harness-videos / harness-videos-staged) and published to the docs-assets
      # release (make publish-docs-assets). CI never records; it stages them here.
      - name: Stage docs videos from docs-assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p web/docs/static/video
          if gh release download docs-assets -p docs-assets.tar.gz -D /tmp/da 2>/dev/null; then
            tar xzf /tmp/da/docs-assets.tar.gz -C /tmp/da
            [ -d /tmp/da/video ] && cp -R /tmp/da/video/. web/docs/static/video/
            echo "Staged docs videos: $(find web/docs/static/video -name '*.webm' 2>/dev/null | wc -l) webm"
          else
            echo "::warning::docs-assets release unavailable; docs videos will be missing"
          fi

      - name: Download playground wasm
        uses: actions/download-artifact@v8
        with:
          name: kapi-wasm
          path: web/docs/static/wasm

      - name: Stub test-comparison.json
        # CI's test-comparison job uploads the real artifact; this stub keeps
        # the build green when the artifact isn't available (e.g. on PRs that
        # don't touch the bridge tests).
        run: |
          mkdir -p web/docs/static/data
          if [ ! -f web/docs/static/data/test-comparison.json ]; then
            echo '{"generatedAt":"","okapiVersion":"","neokapiVersion":"","filters":[],"summary":{"totalFiltersOkapi":0,"totalFiltersBridge":0,"totalFiltersNative":0,"totalFiltersBoth":0,"totalTestsOkapi":0,"totalTestsBridge":0,"totalTestsNative":0,"coveragePct":0}}' > web/docs/static/data/test-comparison.json
          fi

      # web/docs is a pnpm workspace member; its deps (and the @neokapi/*
      # workspace packages it consumes) are installed by the `vp install` above.
      - name: Determine base URL (production vs PR preview)
        id: base
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
            echo "docs_base=/web/prs/${PR_NUMBER}/neokapi/docs/" >> "$GITHUB_OUTPUT"
          else
            echo "docs_base=/web/neokapi/docs/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build kapi Docusaurus site
        run: vp run build
        working-directory: web/docs
        env:
          DOCS_BASE_URL: ${{ steps.base.outputs.docs_base }}

      - name: Upload kapi site artifact
        uses: actions/upload-artifact@v7
        with:
          name: kapi-site
          path: web/docs/build
          retention-days: 7
