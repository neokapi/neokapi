name: _Build Persona Agent Image

on:
  workflow_call:
    inputs:
      image-tag:
        description: "Image tag"
        required: true
        type: string

jobs:
  build:
    name: Build Persona Agent Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push persona-agent image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bowrain/docker/persona-agent/Dockerfile
          push: true
          tags: |
            ghcr.io/neokapi/persona-agent:${{ inputs.image-tag }}
            ghcr.io/neokapi/persona-agent:latest
          cache-from: type=gha,scope=persona-agent
          cache-to: type=gha,mode=max,scope=persona-agent
