name: Reference Data — Drift Gate

# CI gate: the committed reference dataset under packages/reference-data/data
# must match what `make generate-reference-docs` produces from the current
# source. A tool/format whose schema, description, or doc sidecar changed
# without regenerating the dataset fails this job before it can ship stale
# docs to the website /tools and /formats pages.
#
# The okapi-bridge plugin is not present in this repo's CI (it lives in a
# separate repo), so the gate compares only the built-in subset of each
# dataset — the part wholly controlled by this repo's Go source and the
# authored sidecars under scripts/gen-refs/nativedocs. The okapi entries are
# only validated when BRIDGE_PLUGIN points at a populated plugin dir.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "core/**/*.go"
      - "providers/**/*.go"
      - "sievepen/**/*.go"
      - "termbase/**/*.go"
      - "core/i18n/builtins/metadata.json"
      - "scripts/gen-refs/**"
      - "scripts/gen-contract-types/**"
      - "packages/reference-data/data/**"
      - "packages/contract-types/src/contract.gen.ts"
      - "cli/**/*.go"
      - "cli/i18n/**"
      - "l10n/**"
      - "docs/internals/format-ops-ledger.json"
      - "core/formats/support.yaml"
      - "core/formats/constructs.yaml"
      - "core/formats/integrations.yaml"
      - "scripts/format-ops/**"
      - "web/scripts/gen-reference-pages.ts"
      - "web/src/components/reference/slugs.ts"
      - "web/docs/reference/**"
      - ".github/workflows/reference-data-drift.yml"
  pull_request:
    paths:
      - "core/**/*.go"
      - "providers/**/*.go"
      - "sievepen/**/*.go"
      - "termbase/**/*.go"
      - "core/i18n/builtins/metadata.json"
      - "scripts/gen-refs/**"
      - "scripts/gen-contract-types/**"
      - "packages/reference-data/data/**"
      - "packages/contract-types/src/contract.gen.ts"
      - "cli/**/*.go"
      - "cli/i18n/**"
      - "l10n/**"
      - "docs/internals/format-ops-ledger.json"
      - "core/formats/support.yaml"
      - "core/formats/constructs.yaml"
      - "core/formats/integrations.yaml"
      - "scripts/format-ops/**"
      - "web/scripts/gen-reference-pages.ts"
      - "web/src/components/reference/slugs.ts"
      - "web/docs/reference/**"
      - ".github/workflows/reference-data-drift.yml"

# Cancel superseded PR runs; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  drift:
    name: Reference dataset is fresh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-go-modules

      - name: Check reference dataset for drift
        run: make check-reference-docs

      - name: Check shared TS contract types for drift
        run: make check-contract-types

      - name: Validate format-ops ledger
        run: node scripts/format-ops/validate-ledger.mjs

      - name: Validate support tiers
        run: node scripts/format-ops/check-support-gates.mjs

      # Hard gate: the Go vocabulary packs (core/model/vocabularies/*.json) and
      # their verbatim TS copies (packages/*/src/vocabularies/) must not drift.
      - name: Vocabulary pack drift
        run: node scripts/format-ops/check-vocab-packs.mjs

      # The committed static per-entry reference pages under web/docs/reference
      # are generated from the dataset above (plus the slug helper). Regenerate
      # them and fail if a committed page is stale — gen-reference-pages.ts needs
      # only the @neokapi/reference-data package resolvable, so vp install
      # suffices (no kapi-react/wasm build).
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: vp install

      - name: Static reference pages are fresh
        run: |
          make generate-reference-pages
          git diff --exit-code -- web/docs/reference

  l10n-drift:
    name: l10n catalogs are fresh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-go-modules

      - name: Install libicu (kapi fts5 build dependency)
        run: sudo apt-get update && sudo apt-get install -y libicu-dev pkg-config

      # Regenerate the builtin metadata inventory, the CLI command inventory,
      # and the embedded MO catalogs from the committed l10n/ seeds, and fail
      # on any drift. Seeds are native .klftm/.klftb (deterministic,
      # identity-preserving), so this is byte-stable.
      - name: Check l10n catalogs for drift
        run: make l10n-verify
