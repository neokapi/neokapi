version: '3'

info:
  companyName: "gokapi"
  productName: "Bowrain"
  productIdentifier: "io.github.gokapi.bowrain"
  description: "Localization Workbench - powered by gokapi"
  copyright: "(c) 2025, gokapi"
  comments: "AI-native translation editor"
  version: "0.1.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary
