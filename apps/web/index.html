<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gokapi</title>
    <style>
      :root, [data-theme="dark"] {
        --bg-primary: #0d1117;
        --bg-secondary: #161b22;
        --bg-tertiary: #21262d;
        --bg-rail: #0d1117;
        --text-primary: #f0f6fc;
        --text-secondary: #8b949e;
        --border: #30363d;
        --accent: #58a6ff;
        --accent-hover: #79b8ff;
        --success: #22c55e;
        --warning: #f59e0b;
        --error: #ef4444;
        --overlay-bg: rgba(0,0,0,0.6);
        --btn-primary-bg: #238636;
        --btn-primary-hover: #2ea043;
        --input-bg: #0d1117;
      }
      [data-theme="light"] {
        --bg-primary: #ffffff;
        --bg-secondary: #f6f8fa;
        --bg-tertiary: #eaeef2;
        --bg-rail: #f0f2f5;
        --text-primary: #1f2328;
        --text-secondary: #656d76;
        --border: #d0d7de;
        --accent: #0969da;
        --accent-hover: #0550ae;
        --success: #1a7f37;
        --warning: #bf8700;
        --error: #cf222e;
        --overlay-bg: rgba(0,0,0,0.3);
        --btn-primary-bg: #1f883d;
        --btn-primary-hover: #1a7f37;
        --input-bg: #ffffff;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
