# Traefik v3 dynamic configuration.
#
# Routes host-running services (bowrain-server, Vite dev server) and
# configures TLS with mkcert-generated wildcard certificates.
#
# gRPC and HTTP are multiplexed on the same port by bowrain-server,
# so all traffic is routed through the standard HTTP routers.

http:
  routers:
    # API requests → bowrain-server on host:8080
    bowrain-api:
      rule: "Host(`bowrain.mymac`) && PathPrefix(`/api`)"
      service: bowrain
      tls: {}
      priority: 100

    # gRPC requests → bowrain-server on host:8080 (via h2c)
    # gRPC paths follow /<package>.<service>/<method> convention.
    bowrain-grpc:
      rule: "Host(`bowrain.mymac`) && PathPrefix(`/neokapi.`)"
      service: bowrain
      tls: {}
      priority: 100

    # Everything else → Vite dev server on host:5173
    bowrain-app:
      rule: "Host(`bowrain.mymac`)"
      service: bowrain-app
      tls: {}
      priority: 90

    # Traefik dashboard
    traefik-dashboard:
      rule: "Host(`traefik.bowrain.mymac`)"
      service: api@internal
      tls: {}

  services:
    # h2c:// tells Traefik to use cleartext HTTP/2 for the backend,
    # which is required for gRPC and works fine for regular HTTP too.
    bowrain:
      loadBalancer:
        servers:
          - url: "h2c://host.docker.internal:8080"

    bowrain-app:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5173"

tls:
  certificates:
    - certFile: /etc/certs/wildcard.pem
      keyFile: /etc/certs/wildcard-key.pem
