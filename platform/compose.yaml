# Development dependencies: Keycloak OIDC + Mailpit SMTP
#
# The bowrain-server and Vite dev server run locally — not in Docker.
#
# Local dev (Traefik + TLS):
#   docker compose up -d --wait         # auto-loads compose.override.yaml
#   make dev-server                     # bowrain-server on :8080
#   make dev-web                        # Vite dev server on :5173
#   → https://bowrain.mymac             # web app via Traefik
#   → https://auth.bowrain.mymac        # Keycloak via Traefik
#   → https://mail.bowrain.mymac        # Mailpit via Traefik
#
# CI (plain HTTP, no Traefik):
#   docker compose -f compose.yaml up -d --wait   # skips override
#   → Keycloak at http://localhost:8180
#   → Mailpit at http://localhost:8025

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev --import-realm
    environment:
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      OIDC_CLIENT_SECRET: bowrain-secret
    volumes:
      - ./docker/keycloak/realm.json:/opt/keycloak/data/import/realm.json
      - ./platform/apps/keycloak-theme/dist_keycloak/keycloak-theme-for-kc-all-other-versions.jar:/opt/keycloak/providers/keycloak-theme.jar
      - ./docker/keycloak/apple-identity-provider.jar:/opt/keycloak/providers/apple-identity-provider.jar
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 15

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bowrain
      POSTGRES_PASSWORD: bowrain
      POSTGRES_DB: bowrain_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bowrain -d bowrain_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  nats-data:
  postgres-data:
