// editor_service.proto - EditorService gRPC definitions for Bowrain Server.
// Provides workspace-scoped editor operations for collaborative translation.

syntax = "proto3";

package neokapi.server.v1;

option go_package = "github.com/neokapi/neokapi/bowrain/proto/v1;serverv1";

import "google/protobuf/empty.proto";

// EditorService provides workspace-scoped translator-facing operations via gRPC.
// Auth via gRPC metadata: "authorization: Bearer <jwt-token>".
service EditorService {
  // --- Auth & workspace ---
  rpc GetCurrentUser(GetCurrentUserRequest) returns (UserResponse);
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);

  // --- Projects (workspace-scoped, read-only for desktop) ---
  rpc ListEditorProjects(ListEditorProjectsRequest) returns (ListEditorProjectsResponse);
  rpc GetEditorProject(GetEditorProjectRequest) returns (EditorProjectResponse);

  // --- Streams ---
  rpc ListStreams(ListStreamsRequest) returns (ListStreamsResponse);
  rpc CreateStream(CreateStreamRequest) returns (StreamInfoResponse);
  rpc GetStreamInfo(GetStreamInfoRequest) returns (StreamInfoResponse);
  rpc ArchiveStream(ArchiveStreamRequest) returns (google.protobuf.Empty);
  rpc MergeStream(MergeStreamRequest) returns (MergeStreamResponse);
  rpc DiffStream(DiffStreamRequest) returns (DiffStreamResponse);

  // --- Blocks (stream-scoped) ---
  rpc GetBlocks(GetBlocksRequest) returns (GetBlocksResponse);
  rpc UpdateBlockTarget(UpdateBlockTargetRequest) returns (google.protobuf.Empty);
  rpc ReviewBlock(ReviewBlockRequest) returns (google.protobuf.Empty);

  // --- Context lookups (per-block, stream-scoped) ---
  rpc LookupTMForBlock(TMLookupRequest) returns (TMLookupResponse);
  rpc LookupTermsForBlock(TermLookupRequest) returns (TermLookupResponse);

  // --- TM CRUD ---
  rpc GetTMEntries(TMEntriesRequest) returns (TMEntriesResponse);
  rpc GetTMCount(TMCountRequest) returns (TMCountResponse);
  rpc AddTMEntry(AddTMEntryRequest) returns (TMEntryResponse);
  rpc UpdateTMEntry(UpdateTMEntryRequest) returns (google.protobuf.Empty);
  rpc DeleteTMEntry(DeleteTMEntryRequest) returns (google.protobuf.Empty);

  // --- Terminology CRUD ---
  rpc GetTerms(TermsRequest) returns (TermsResponse);
  rpc GetTermCount(TermCountRequest) returns (TermCountResponse);
  rpc AddConcept(AddConceptRequest) returns (ConceptResponse);
  rpc UpdateConcept(UpdateConceptRequest) returns (google.protobuf.Empty);
  rpc DeleteConcept(DeleteConceptRequest) returns (google.protobuf.Empty);
  rpc ImportTermsCSV(ImportTermsCSVRequest) returns (ImportCountResponse);
  rpc ImportTermsJSON(ImportTermsJSONRequest) returns (ImportCountResponse);
  rpc ExportTermsJSON(ExportTermsJSONRequest) returns (ExportTermsJSONResponse);

  // --- AI provider configuration (admin-facing, server-managed) ---
  rpc ListProviderConfigs(ListProviderConfigsRequest) returns (ListProviderConfigsResponse);
  rpc SaveProviderConfig(SaveProviderConfigRPC) returns (ProviderConfigInfo);
  rpc DeleteProviderConfig(DeleteProviderConfigRequest) returns (google.protobuf.Empty);
  rpc TestProviderConfig(TestProviderConfigRPC) returns (google.protobuf.Empty);

  // --- Presence (stream-scoped) ---
  rpc UpdatePresence(UpdatePresenceRequest) returns (google.protobuf.Empty);

  // --- Real-time collaboration (stream-scoped) ---
  rpc WatchProject(WatchProjectRequest) returns (stream ProjectEvent);
}

// --- User & workspace messages ---

message GetCurrentUserRequest {}

message UserResponse {
  string id = 1;
  string email = 2;
  string name = 3;
  string avatar_url = 4;
}

message ListWorkspacesRequest {}

message WorkspaceInfo {
  string id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  string logo_url = 5;
  string role = 6;  // user's role in this workspace
}

message ListWorkspacesResponse {
  repeated WorkspaceInfo workspaces = 1;
}

// --- Project messages ---

message ListEditorProjectsRequest {
  string workspace_slug = 1;
}

message EditorProjectInfo {
  string id = 1;
  string name = 2;
  string source_locale = 3;
  repeated string target_locales = 4;
  repeated EditorProjectItem items = 5;
  string created_at = 6;
  string modified_at = 7;
  repeated StreamInfo streams = 8;        // available streams
  string active_stream = 9;               // currently selected stream
}

message EditorProjectItem {
  string name = 1;
  string format = 2;
  string type = 3;
  int64 size = 4;
  int32 block_count = 5;
  int32 word_count = 6;
}

message ListEditorProjectsResponse {
  repeated EditorProjectInfo projects = 1;
}

message GetEditorProjectRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string stream = 3;                      // stream to query (empty = "main")
}

message EditorProjectResponse {
  EditorProjectInfo project = 1;
}

// --- Stream messages ---

message StreamInfo {
  string name = 1;
  string parent = 2;
  int64 base_cursor = 3;
  bool archived = 4;
  string visibility = 5;    // "public", "private", "shared"
  string description = 6;
  string created_at = 7;
  string created_by = 8;
  repeated string shared_with = 9;
}

message ListStreamsRequest {
  string workspace_slug = 1;
  string project_id = 2;
  bool include_archived = 3;
}

message ListStreamsResponse {
  repeated StreamInfo streams = 1;
}

message CreateStreamRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string name = 3;
  string parent = 4;        // branch from this stream (default: "main")
  string visibility = 5;    // "public", "private", "shared"
  string description = 6;
}

message StreamInfoResponse {
  StreamInfo stream = 1;
}

message GetStreamInfoRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string stream = 3;
}

message ArchiveStreamRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string stream = 3;
}

message MergeStreamRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string stream = 3;
  bool dry_run = 4;
}

message MergeStreamResponse {
  int32 merged_blocks = 1;
  int32 added_blocks = 2;
  int32 modified_blocks = 3;
  int32 removed_blocks = 4;
}

message DiffStreamRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string stream = 3;
}

message BlockChangeInfo {
  string block_id = 1;
  string change_type = 2;    // "added", "modified", "removed"
  string old_hash = 3;
  string new_hash = 4;
}

message DiffStreamResponse {
  string stream_name = 1;
  string parent_name = 2;
  repeated BlockChangeInfo changes = 3;
}

// --- Block messages (stream-scoped) ---

message SpanInfo {
  string span_type = 1;      // "opening", "closing", "placeholder"
  string type = 2;            // Semantic type from vocabulary (e.g., "fmt:bold")
  string id = 3;
  string data = 4;            // Original markup (e.g., "<b>")
  string sub_type = 5;        // Format-specific refinement (e.g., "html:b")
  string display_text = 6;    // Human-readable label (e.g., "[B]")
  string equiv_text = 7;      // Plain text equivalent (e.g., "\n" for breaks)
  bool deletable = 8;
  bool cloneable = 9;
  bool can_reorder = 10;
}

message BlockInfo {
  string id = 1;
  string source = 2;
  string source_coded = 3;
  repeated SpanInfo source_spans = 4;
  map<string, string> targets = 5;
  map<string, string> targets_coded = 6;
  bool translatable = 7;
  bool has_spans = 8;
  map<string, string> properties = 9;
}

message GetBlocksRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string item_name = 3;
  string stream = 4;                      // stream scope (empty = "main")
}

message GetBlocksResponse {
  repeated BlockInfo blocks = 1;
}

message UpdateBlockTargetRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string block_id = 3;
  string target_locale = 4;
  string text = 5;          // plain text (no spans)
  string coded_text = 6;    // coded text with PUA markers (optional)
  repeated SpanInfo spans = 7;  // spans for coded text (optional)
  string stream = 8;            // stream scope (empty = "main")
}

message ReviewBlockRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string item_name = 3;
  string block_id = 4;
  string target_locale = 5;
  bool reviewed = 6;  // true = mark reviewed, false = unmark
  string stream = 7;  // stream scope (empty = "main")
}

// --- TM lookup messages (stream-scoped) ---

message TMLookupRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string block_id = 3;
  string target_locale = 4;
  string stream = 5;  // lookup uses full parent chain inheritance
}

message TMLookupMatch {
  string source = 1;
  string target = 2;
  double score = 3;
  string match_type = 4;
  string stream = 5;  // which stream this match came from
}

message TMLookupResponse {
  repeated TMLookupMatch matches = 1;
}

// --- Term lookup messages (stream-scoped) ---

message TermLookupRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string block_id = 3;
  string target_locale = 4;
  string stream = 5;  // lookup uses full parent chain inheritance
}

message BlockTermMatch {
  string source_term = 1;
  repeated string target_terms = 2;
  string domain = 3;
  string status = 4;
  int32 start = 5;
  int32 end = 6;
  string stream = 7;  // which stream this term came from
}

message TermLookupResponse {
  repeated BlockTermMatch matches = 1;
}

// --- TM CRUD messages ---

message TMEntriesRequest {
  string workspace_slug = 1;
  string query = 2;
  string source_locale = 3;
  string target_locale = 4;
  int32 offset = 5;
  int32 limit = 6;
  string stream = 7;  // filter by stream (empty = all)
}

message TMEntryInfo {
  string id = 1;
  string source = 2;
  string target = 3;
  string source_locale = 4;
  string target_locale = 5;
  string updated_at = 6;
  string stream = 7;  // which stream this entry belongs to
}

message TMEntriesResponse {
  repeated TMEntryInfo entries = 1;
  int32 total_count = 2;
}

message TMCountRequest {
  string workspace_slug = 1;
  string stream = 2;
}

message TMCountResponse {
  int32 count = 1;
}

message AddTMEntryRequest {
  string workspace_slug = 1;
  string source = 2;
  string target = 3;
  string source_locale = 4;
  string target_locale = 5;
  string project_id = 6;
  string stream = 7;  // entry scoped to stream
}

message TMEntryResponse {
  TMEntryInfo entry = 1;
}

message UpdateTMEntryRequest {
  string workspace_slug = 1;
  string entry_id = 2;
  string source = 3;
  string target = 4;
  string source_locale = 5;
  string target_locale = 6;
}

message DeleteTMEntryRequest {
  string workspace_slug = 1;
  string entry_id = 2;
}

// --- Terminology CRUD messages ---

message TermInfo {
  string text = 1;
  string locale = 2;
  string status = 3;
  string part_of_speech = 4;
  string gender = 5;
  string note = 6;
}

message ConceptInfo {
  string id = 1;
  string domain = 2;
  string definition = 3;
  repeated TermInfo terms = 4;
  map<string, string> properties = 5;
  string created_at = 6;
  string updated_at = 7;
  string stream = 8;  // which stream this concept belongs to
}

message TermsRequest {
  string workspace_slug = 1;
  string query = 2;
  string source_locale = 3;
  string target_locale = 4;
  int32 offset = 5;
  int32 limit = 6;
  string stream = 7;  // filter by stream (empty = all)
}

message TermsResponse {
  repeated ConceptInfo concepts = 1;
  int32 total_count = 2;
}

message TermCountRequest {
  string workspace_slug = 1;
  string stream = 2;
}

message TermCountResponse {
  int32 count = 1;
}

message AddConceptRequest {
  string workspace_slug = 1;
  string domain = 2;
  string definition = 3;
  repeated TermInfo terms = 4;
  string project_id = 5;
  string stream = 6;  // concept scoped to stream
}

message ConceptResponse {
  ConceptInfo concept = 1;
}

message UpdateConceptRequest {
  string workspace_slug = 1;
  string concept_id = 2;
  string domain = 3;
  string definition = 4;
  repeated TermInfo terms = 5;
  string project_id = 6;
  string stream = 7;
}

message DeleteConceptRequest {
  string workspace_slug = 1;
  string concept_id = 2;
}

message ImportTermsCSVRequest {
  string workspace_slug = 1;
  string csv_content = 2;
  string source_locale = 3;
  string target_locale = 4;
  string domain = 5;
  bool has_header = 6;
  string stream = 7;
}

message ImportTermsJSONRequest {
  string workspace_slug = 1;
  string json_content = 2;
  string stream = 3;
}

message ImportCountResponse {
  int32 imported = 1;
}

message ExportTermsJSONRequest {
  string workspace_slug = 1;
  string name = 2;
  string stream = 3;
}

message ExportTermsJSONResponse {
  string json_content = 1;
}

// --- AI provider config messages ---

message ProviderConfigInfo {
  string id = 1;
  string name = 2;
  string provider_type = 3;
  string model = 4;
  string base_url = 5;
}

message ListProviderConfigsRequest {
  string workspace_slug = 1;
}

message ListProviderConfigsResponse {
  repeated ProviderConfigInfo configs = 1;
}

message SaveProviderConfigRPC {
  string workspace_slug = 1;
  string id = 2;
  string name = 3;
  string provider_type = 4;
  string model = 5;
  string base_url = 6;
  string api_key = 7;  // stored server-side, never returned
}

message DeleteProviderConfigRequest {
  string workspace_slug = 1;
  string id = 2;
}

message TestProviderConfigRPC {
  string workspace_slug = 1;
  string id = 2;
  string name = 3;
  string provider_type = 4;
  string model = 5;
  string base_url = 6;
  string api_key = 7;
}

// --- Presence messages (stream-scoped) ---

message UpdatePresenceRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string item_name = 3;  // which item the user is viewing (empty = project level)
  string block_id = 4;   // which block the user is editing (empty = just viewing)
  string stream = 5;     // which stream the user is in (empty = "main")
}

message PresenceInfo {
  string user_id = 1;
  string user_name = 2;
  string avatar_url = 3;
  string item_name = 4;
  string block_id = 5;
  string stream = 6;     // which stream the user is in
}

// --- Streaming event messages (stream-scoped) ---

message WatchProjectRequest {
  string workspace_slug = 1;
  string project_id = 2;
  string stream = 3;     // watch events for this stream (empty = "main")
}

message ProjectEvent {
  oneof event {
    BlockChangeEvent block_change = 1;
    PresenceChangeEvent presence_change = 2;
  }
}

message BlockChangeEvent {
  string block_id = 1;
  string item_name = 2;
  string change_type = 3;  // "created", "updated", "deleted"
  string changed_by = 4;   // user name
  string stream = 5;       // which stream this change is in
}

message PresenceChangeEvent {
  string change_type = 1;  // "joined", "moved", "left"
  PresenceInfo user = 2;
}
