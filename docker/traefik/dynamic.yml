# Traefik v3 dynamic configuration.
#
# Routes host-running services (bowrain-server, Vite dev server) and
# configures TLS with mkcert-generated wildcard certificates.

http:
  routers:
    # API requests → bowrain-server on host:8080
    bowrain-api:
      rule: "Host(`bowrain.mymac`) && PathPrefix(`/api`)"
      service: bowrain-api
      tls: {}
      priority: 100

    # Everything else → Vite dev server on host:5173
    bowrain-app:
      rule: "Host(`bowrain.mymac`)"
      service: bowrain-app
      tls: {}
      priority: 90

    # Traefik dashboard
    traefik-dashboard:
      rule: "Host(`traefik.bowrain.mymac`)"
      service: api@internal
      tls: {}

  services:
    bowrain-api:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8080"

    bowrain-app:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5173"

# TCP passthrough for gRPC — Traefik forwards the encrypted TCP stream
# directly to bowrain-server's gRPC port, which handles TLS natively.
# This avoids double TLS termination and supports HTTP/2 (required by gRPC).
tcp:
  routers:
    bowrain-grpc:
      entryPoints:
        - grpc
      rule: "HostSNI(`bowrain.mymac`)"
      service: bowrain-grpc
      tls:
        passthrough: true

  services:
    bowrain-grpc:
      loadBalancer:
        servers:
          - address: "host.docker.internal:9080"

tls:
  certificates:
    - certFile: /etc/certs/wildcard.pem
      keyFile: /etc/certs/wildcard-key.pem
