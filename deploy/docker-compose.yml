# Development docker-compose for gokapi with Dex OIDC provider.
#
# Usage:
#   cd deploy && docker-compose up
#
# This starts:
#   - Dex OIDC provider on http://localhost:5556
#   - gokapi-server on http://localhost:8080
#
# To test CLI auth:
#   kapi auth login --server http://localhost:8080

services:
  dex:
    image: dexidp/dex:latest
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml
      - dex-data:/var/dex
    ports:
      - "5556:5556"
    command: ["dex", "serve", "/etc/dex/config.yaml"]

  gokapi:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GOKAPI_JWT_SECRET=dev-secret-change-in-production
      - GOKAPI_DEX_ISSUER_URL=http://dex:5556/dex
      - GOKAPI_DEX_CLIENT_ID=gokapi
      - GOKAPI_DEX_CLIENT_SECRET=gokapi-secret
      - GOKAPI_STORE=/data/gokapi.db
    volumes:
      - gokapi-data:/data
    depends_on:
      - dex

volumes:
  dex-data:
  gokapi-data:
