# Dex OIDC provider configuration for gokapi development.
# See https://dexidp.io/docs/ for full configuration reference.
#
# Start with: docker-compose up dex
# Or standalone: dex serve deploy/dex/config.yaml

issuer: http://localhost:5556/dex

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

oauth2:
  # Enable RFC 8628 device authorization grant for CLI auth (kapi auth login)
  deviceRequests:
    enabled: true

staticClients:
  - id: gokapi
    name: gokapi
    secret: gokapi-secret
    redirectURIs:
      - http://localhost:8080/api/v1/auth/callback

# Connectors define how users authenticate with Dex.
# For development, use the mock callback connector.
# For production, replace with LDAP, GitHub, Google, SAML, etc.
connectors:
  - type: mockCallback
    id: mock
    name: "Login with Email"
