# E2E test stack: Keycloak + Mailpit + bowrain-server
# Used by e2e tests and VHS tape recordings.
#
# Usage:
#   cd e2e && docker compose up -d
#   go test -tags=e2e ./e2e/
#   cd e2e && docker compose down -v

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev --import-realm
    environment:
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 15

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  bowrain:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - BOWRAIN_JWT_SECRET=e2e-test-secret
      - BOWRAIN_OIDC_ISSUER_URL=http://keycloak:8080/realms/bowrain
      - BOWRAIN_OIDC_PUBLIC_URL=http://localhost:8180/realms/bowrain
      - BOWRAIN_OIDC_CLIENT_ID=bowrain
      - BOWRAIN_OIDC_CLIENT_SECRET=bowrain-secret
      - BOWRAIN_STORE=/data/bowrain.db
      - BOWRAIN_SMTP_HOST=mailpit:1025
      - BOWRAIN_SMTP_FROM=noreply@bowrain.cloud
    volumes:
      - bowrain-data:/data
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  bowrain-data:
