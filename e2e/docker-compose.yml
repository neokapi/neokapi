# E2E test stack: Dex + gokapi-server
# Used by e2e tests and VHS tape recordings.
#
# Usage:
#   cd e2e && docker compose up -d
#   go test -tags=e2e ./e2e/
#   cd e2e && docker compose down -v

services:
  dex:
    image: dexidp/dex:latest
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml
      - dex-data:/var/dex
    ports:
      - "5556:5556"
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5556/dex/.well-known/openid-configuration"]
      interval: 5s
      timeout: 3s
      retries: 10

  gokapi:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GOKAPI_JWT_SECRET=e2e-test-secret
      - GOKAPI_DEX_ISSUER_URL=http://dex:5556/dex
      - GOKAPI_DEX_CLIENT_ID=gokapi
      - GOKAPI_DEX_CLIENT_SECRET=gokapi-secret
      - GOKAPI_STORE=/data/gokapi.db
    volumes:
      - gokapi-data:/data
    depends_on:
      dex:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dex-data:
  gokapi-data:
