# Native reference doc for the built-in `google-translate` tool.
# Schema source: core/mt/tools/translate.go (MTTranslateConfig), provider providers/mt/google.go.
displayName: Google Translate
description: Translate block content using Google Translate.
overview: |
  The **Google Translate** tool translates untranslated block content with the
  Google Cloud Translation API. The provider is fixed by the tool name, so there
  is no provider field. A target language is required and a Google API key must
  be supplied (resolved from the OS keychain by the CLI, or set inline); a Google
  Cloud project ID may also be provided.

  Blocks that carry inline codes are round-tripped through semantic HTML so the
  API preserves the tags natively, then reconstructed from the response. With a
  session cache, targets already translated in a previous run are reused, so
  repeat runs skip blocks that are already done. When constructed without
  credentials the tool falls back to an offline demo provider so it remains
  listable and runnable for illustration.
parameters:
  apiKey:
    description: Google Cloud API key.
    help: |
      The Google Cloud Translation API key. Required to call the real API;
      without it the tool falls back to the offline demo provider. Resolved from
      the OS keychain by the CLI credential preprocessor, or set inline.
    values: "string"
  projectId:
    description: Google Cloud project ID.
    help: The optional Google Cloud project ID associated with the API key.
    values: "string"
  subscriptionKey:
    description: Not used by Google Translate.
    help: Part of the shared MT credential schema; consumed only by the Microsoft Translator tool.
  region:
    description: Not used by Google Translate.
    help: Part of the shared MT credential schema; consumed only by the Microsoft Translator tool.
  email:
    description: Not used by Google Translate.
    help: Part of the shared MT credential schema; consumed only by the MyMemory tool.
limitations:
  - Requires a target language and a Google API key; without a key the tool runs the offline demo provider, not Google Translate.
  - Google makes a network round-trip per block; cost and latency scale with content volume.
  - The provider is fixed to Google Translate by the tool name and cannot be changed through configuration.
processingNotes:
  - Operates on translatable blocks with non-empty source; other parts pass through unchanged.
  - Blocks with inline codes round-trip through semantic HTML so tags survive translation.
  - With a session cache, already-translated targets are reused and fresh translations are cached.
examples:
  - title: Translate with Google
    description: Translate untranslated blocks using a Google Cloud API key.
    config: |
      apiKey: your-google-key
      projectId: my-gcp-project
