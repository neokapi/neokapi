# .skills/format-ops/artifacts.yaml — machine-readable artifact map.
# Single source for format-ops.md §7: when this file and the §7 table
# disagree, this file wins and the run preamble flags the drift.
# Consumed by scripts/due.mjs and scripts/format-ops/validate-ledger.mjs.
#
# Fields:
#   id               stable artifact id
#   path             repo-root-relative (a "*" path is a per-format glob)
#   freshness_field  JSON field carrying the artifact's own timestamp (null = none)
#   owner            ritual id (or "maintainer" / "all") that writes it
#   glob             true = per-format glob; path check counts matches instead
#   fetch_on_demand  true = gitignored fetch-time artifact; absence is a note,
#                    never a path-drift finding
#   bootstrap        true = created by bootstrap (format-ops.md §9); absence is
#                    reported as bootstrap-pending path drift
#   notes            free text
#
# Keep values comment-free: the due.mjs parser is a deliberate YAML subset
# (flat list items, scalar values, no inline comments after values).

artifacts:
  - id: rubric
    path: docs/internals/format-maturity.md
    freshness_field: null
    owner: process-health
    notes: maintainer + process-health approved edits; also carries the generated maturity-report snapshot block
  - id: ops-doc
    path: docs/internals/format-ops.md
    freshness_field: null
    owner: process-health
    notes: maintainer + process-health approved edits
  - id: spec-case-design
    path: docs/internals/format-spec-cases.md
    freshness_field: null
    owner: process-health
    bootstrap: true
    notes: maintainer + process-health
  - id: research-base
    path: docs/internals/research/format-ops
    freshness_field: null
    owner: maintainer
    notes: frozen at adoption; superseded by ritual outputs, never edited
  - id: runbook-skill
    path: .skills/format-ops
    freshness_field: null
    owner: process-health
    notes: SKILL.md + scripts/due.mjs + artifacts.yaml + references + benchmarks; benchmark-gated edits only
  - id: ops-ledger
