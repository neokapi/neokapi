  - { id: xlsx-consistency-b2b,         kind: brand,     asset_type: xlsx,       loop_stage: consistency-check,    domain: b2b,            reader: native, signal: high, status: planned }
  - { id: json-multilingual-techdocs,  kind: translate, asset_type: json,       loop_stage: multilingual-publish, domain: technical-docs, reader: native, signal: high, status: planned }
  - { id: po-multilingual-support,      kind: translate, asset_type: po,         loop_stage: multilingual-publish, domain: customer-support, reader: native, signal: high, status: planned }
  - { id: md-governancegate-techdocs,   kind: brand,     asset_type: markdown,   loop_stage: governance-gate,      domain: technical-docs, reader: native, signal: high, status: planned }
  - { id: html-brandrewrite-marketing,  kind: brand,     asset_type: html,       loop_stage: brand-rewrite,        domain: marketing,      reader: native, signal: high, status: planned }
  - { id: subtitles-multilingual-marketing, kind: translate, asset_type: srt,    loop_stage: multilingual-publish, domain: marketing,      reader: native, signal: medium, status: planned }
