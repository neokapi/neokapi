# Demo campaign ledger — the (asset × loop-stage × domain) matrix as data.
# Each cell shows AI output WITH vs WITHOUT kapi. The coordinator owns writes to
# this file; agents build only their own web/demos/{id}/ directory and
# report their delta. See CONTRACT.md.
#
# status: planned | claimed | in-progress | verified | done | blocked
demos:
  - id: brand-rewrite-marketing
    kind: brand
    asset_type: markdown
    loop_stage: brand-rewrite
    domain: marketing
    reader: native
    signal: high
    status: done
    delta: 25            # brand compliance 70 → 95

  - id: formats-native-vs-okapi
    kind: formats
    asset_type: html
    loop_stage: multilingual-publish
    domain: technical-docs
    reader: both
    signal: high
    status: done
    note: both readers round-trip the asset and localize all visible text (18 words each, including the button/anchor labels). Normalized native↔okapi parity is the cli/parity suite.

  # ── Planned cells (fan out one agent per row) ──────────────────────────────
