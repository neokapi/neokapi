name: Bowrain Sync

on:
  push:
    branches: [main]
    paths:
      - 'i18n/en/**'
      - 'docs/**'
      - 'blog/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gokapi/setup-bowrain@v1
        with:
          token: ${{ secrets.GOKAPI_REGISTRY_TOKEN }}
          auth-token: ${{ secrets.BOWRAIN_AUTH_TOKEN }}
          server: https://dev.bowrain.cloud

      - name: Sync translations
        run: bowrain sync --timeout 10m

      - name: Commit translations
        run: |
          git config user.name "Bowrain Bot"
          git config user.email "bot@bowrain.cloud"
          git add i18n/
          if git diff --cached --quiet; then
            echo "No translation changes"
          else
            git commit -m "chore: update translations via bowrain sync"
            git push
          fi
