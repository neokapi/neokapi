# Java Properties format specification.
#
# Single-variant filter — no variants block. Inputs are inline text
# snippets (input_xml field carries raw bytes for any text format) or
# upstream test files referenced as okapi:filters/properties/.../...
# which the runner skips cleanly when the okapi-testdata corpus isn't
# fetched.
#
# Config keys use the Okapi parameter names (extractOnlyMatchingKey,
# useKeyCondition, keyCondition, extraComments, commentsAreNotes,
# escapeExtendedChars, useJavaEscapes, convertLFandTab, idLikeResname,
# useLd, localizeOutside) — the same names the bridge composite schema
# exposes. The native Config.ApplyMap accepts each of these directly.
#
# Inline-code detection (useCodeFinder / codeFinderRules) is exercised
# through the message-placeholder feature but is NOT declared as a
# spec.config key. The bridge composite schema represents it as a
# nested $defs block (`inlineCodes.enabled`, `inlineCodes.rules`) whose
# leaf names (`enabled`, `rules`) are too ambiguous to stand alone in
# the flat config surface this spec advertises.

format: okf_properties
mime_type: text/x-java-properties

# Parity-runner config (#852). The filter-level parity runner
# (cli/parity/formats) sources the tikal reference corner from here rather
# than a hand-maintained Go table.
tikal:
  ext: .properties
  config: okf_properties
description: |
  Java Properties files (.properties). Each logical line is an entry
  of the form `key=value`, `key:value`, or `key value` (whitespace
  separator). Lines starting with `#` or `!` are comments; an entry's
  trailing comments attach as translator notes. Backslash at end of
  line continues the value onto the next physical line. Values may
  embed `\uXXXX`, `\n`, `\t`, `\r`, `\\` escape sequences.

config:
  # ── Extraction filtering (extraction.* in bridge schema) ──────────
  - key: useKeyCondition
    type: boolean
    default: false
    description: |
      Enable key-based extraction filtering. When false, every entry
      is extracted; when true, the keyCondition regex selects which
      entries are extracted (gated by extractOnlyMatchingKey).
    okapi_param: useKeyCondition

  - key: extractOnlyMatchingKey
    type: boolean
    default: true
    description: |
      Direction of the keyCondition filter. When true (default),
      ONLY entries whose keys match are extracted. When false,
      matching keys are EXCLUDED. No effect unless useKeyCondition
      is true.
    okapi_param: extractOnlyMatchingKey

  - key: keyCondition
    type: string
    default: ".*text.*"
    description: |
      Regex evaluated against each property key. Combined with
      extractOnlyMatchingKey to include or exclude matching entries.
    okapi_param: keyCondition

  - key: extraComments
    type: boolean
    default: false
    description: |
      Recognize semicolon (`;`) and double-slash (`//`) comment
      styles in addition to the standard `#` and `!` markers.
    okapi_param: extraComments

  # ── Comment / note handling ───────────────────────────────────────
  - key: commentsAreNotes
    type: boolean
    default: true
    description: |
      Treat preceding comments as translator notes attached to the
      following entry. When false, comments stay in the skeleton
      only.
    okapi_param: commentsAreNotes

  # ── Output formatting ─────────────────────────────────────────────
  - key: escapeExtendedChars
    type: boolean
    default: true
    description: |
      On write, encode non-ASCII characters as `\uXXXX`. Default on
      to keep output ISO-8859-1 safe. Reader-side this flag has no
      effect — it shapes the writer's output only.
    okapi_param: escapeExtendedChars

  - key: useJavaEscapes
    type: boolean
    default: false
    description: |
      Decode the additional Java property escape sequences
      `\:`, `\=`, `\#`, `\!` in values. Default off — the Okapi
      filter only enables this when explicitly configured.
    okapi_param: useJavaEscapes

features:
  # ── Basic key/value extraction ────────────────────────────────────
  - id: key_value_extraction
    name: Key/value entry extraction
    description: |
      Each `key=value` (or `key:value`, or `key value`) line yields
      one translatable Block. The key becomes the Block's name; the
      value its source text.
    spec_refs:
      - "Java SE Properties spec — Properties.load (https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Properties.html)"
    examples:
      - name: single_entry
        origin: "authored: minimal Java Properties key=value entry"
        input_xml: "Key1=Text1\n"
        block_count: 1
        first_block_text: "Text1"
      - name: multiple_entries
        origin: "authored: two entries with intervening comment"
        input_xml: "Key1=Text1\n# Comment\nKey2=Text2\n"
        block_count: 2
        block_texts:
          - "Text1"
          - "Text2"
    okapi_refs:
      - PropertiesFilterTest#testEntry
      - PropertiesFilterTest#testStartDocument
      - PropertiesFilterTest#testIdGeneration_defaultConfig
    native_refs:
      - properties.TestReadSimple
      - properties.TestReadMultipleEntries

  # ── Separator variations (=, :, space) ────────────────────────────
  - id: separator_variants
    name: Multiple key/value separators
    description: |
      Java Properties accepts three separator forms between key and
      value: `=`, `:`, and unescaped whitespace. All produce the same
      Block; the chosen separator is preserved in skeleton.
    spec_refs:
      - "Java SE Properties spec — three separator forms (=, :, whitespace) (https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Properties.html)"
    examples:
      - name: equals
        origin: "authored: `=` separator"
        input_xml: "key1=value1"
        block_count: 1
        first_block_text: "value1"
      - name: colon
        origin: "authored: `:` separator"
        input_xml: "key2:value2"
        block_count: 1
        first_block_text: "value2"
      - name: space
        origin: "authored: bare-space separator"
        input_xml: "key3 value3"
        block_count: 1
        first_block_text: "value3"
    okapi_refs:
      - PropertiesFilterTest#testKeySpecial
      - PropertiesFilterTest#testSpecialCharsInKey
    native_refs:
      - properties.TestReadColonSeparator
      - properties.TestReadSpaceSeparator
      - properties.TestReadMixedFormats

  # ── Continuation lines ────────────────────────────────────────────
  - id: continuation_lines
    name: Backslash line continuation
    description: |
      A trailing backslash splices the next physical line into the
      same logical entry. Leading whitespace on the continuation
      line is stripped before joining, per the Java spec. Multiple
      backslash continuations chain into one logical value.
    spec_refs:
      - "Java SE Properties spec — backslash line continuation (https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Properties.html)"
    examples:
      - name: two_lines
        origin: "authored: simple two-line continuation with leading whitespace strip"
        input_xml: "Key1=Text1\nKey2=Text2 \\\nSecond line"
        block_count: 2
        block_texts:
          - "Text1"
          - "Text2 Second line"
      - name: many_lines_indented
        origin: "authored: chained continuations across mixed-whitespace lines"
        input_xml: "key8 = Text 8 \\\n  originally on \\\n\tseveral li\\\n   nes."
        block_count: 1
        first_block_text: "Text 8 originally on several lines."
    okapi_refs:
      - PropertiesFilterTest#testSplicedEntry
    native_refs:
      - properties.TestReadContinuationLine
      - properties.TestReadContinuationMultipleLines

  # ── Comments and notes ────────────────────────────────────────────
  - id: comment_handling
    name: Standard comment markers and notes
    description: |
      Lines starting with `#` or `!` are comments. With
      commentsAreNotes=true (default) a comment immediately
      preceding an entry attaches as that entry's translator note;
      otherwise the comment lives only in the skeleton. A blank
      line resets the pending note.
    spec_refs:
      - "Java SE Properties spec — `#` and `!` comment markers (https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Properties.html)"
    examples:
      - name: hash_then_entry
        origin: "authored: # comment preceding key=value"
        input_xml: "# This is a comment\nkey=value\n"
        block_count: 1
        first_block_text: "value"
      - name: bang_then_entry
        origin: "authored: ! comment preceding key=value"
        input_xml: "! Also a comment\nkey=value\n"
        block_count: 1
        first_block_text: "value"
    okapi_refs:
      - PropertiesFilterTest#testEntry
    native_refs:
      - properties.TestReadComments
      - properties.TestReadExclamationComment

  # ── Extra comment markers (extraComments) ─────────────────────────
  - id: extra_comment_markers
    name: Optional `;` and `//` comment markers
    description: |
      With extraComments=true the reader also recognizes lines
      starting with `;` or `//` as comments. Default off — these
      lines parse as ordinary entries (with `;` or `/` as part of
      the key).
    # `;` / `//` markers are an Okapi-side extension; the Java spec
    # only recognises `#` and `!` — no spec_refs.
    examples:
      - name: semicolon_off_treated_as_entry
        origin: "authored: `;` line under default extraComments=false (parses as entry)"
        input_xml: "; not a comment\nkey=value\n"
        # extraComments=false (default): `;` is part of the key, so
        # the line parses as an entry whose value is "not a comment".
        block_count: 2
        block_texts:
          - "not a comment"
          - "value"
      - name: semicolon_on_skipped
        origin: "authored: same `;` line with extraComments=true opt-in"
        input_xml: "; this is a comment\nkey=value\n"
        config:
          extraComments: true
        block_count: 1
        first_block_text: "value"
    okapi_refs:
      - PropertiesFilterTest#testEntry
    native_refs:
      - properties.TestReadComments

  # ── Unicode \u escape decoding ────────────────────────────────────
  - id: unicode_escape_decoding
    name: Decode \\uXXXX escape sequences
    description: |
      `\uXXXX` sequences in property values decode to the actual
      character before extraction. The Block's source text carries
      the decoded character, not the escape sequence.
    spec_refs:
      - "Java SE Properties spec — \\uXXXX Unicode escapes (https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Properties.html)"
    examples:
      - name: a_tilde
        origin: "authored: single \\u00E3 escape decoding to ã"
        input_xml: "Key1=Text with \\u00E3"
        block_count: 1
        first_block_text: "Text with ã"
      - name: ascii_hello
        origin: "authored: every char of \"Hello\" via \\uXXXX escapes"
        input_xml: "greeting=\\u0048\\u0065\\u006C\\u006C\\u006F"
        block_count: 1
        first_block_text: "Hello"
    okapi_refs:
      - PropertiesFilterTest#testEscapes
    native_refs:
      - properties.TestReadUnicodeEscapes
      - properties.TestReadJapaneseUnicodeEscapes

  # ── Backslash escapes in values (\n \t \r \\) ─────────────────────
  - id: backslash_escape_decoding
    name: Decode \\n \\t \\r \\\\ escape sequences
    description: |
      Standard Java property escapes `\n`, `\t`, `\r`, `\\` in
      values decode to their literal characters. Unknown escapes
      (e.g. `\w`) are kept verbatim. Controlled by convertLFandTab
      for `\n` / `\t`; the others are always decoded.
    spec_refs:
      - "Java SE Properties spec — \\t \\n \\r \\\\ special escapes (https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Properties.html)"
    examples:
      - name: mixed_escapes
        origin: "authored: value containing every supported backslash escape"
        input_xml: "Key1:Text1\\n=lf, \\t=tab, \\w=w, \\r=cr, \\\\=bs\n"
        expected_fail: |
          bridge bug — Okapi PropertiesFilter loses the literal `\r`
          escape (returns empty in its place) and double-escapes the
          trailing `\\`, producing "Text1\n=lf, \t=tab, \\w=w, =cr,
          \\\\=bs". Native correctly decodes per Java property spec
          to "Text1\n=lf, \t=tab, \\w=w, \r=cr, \\=bs". Tracked
          separately as a bridge escape-decoding bug.
        block_count: 1
        first_block_text: "Text1\n=lf, \t=tab, \\w=w, \r=cr, \\=bs"
    okapi_refs:
      - PropertiesFilterTest#testSpecialChars
      - PropertiesFilterTest#testSpecialCharsOutput
    native_refs:
      - properties.TestReadJapaneseUnicodeEscapes

  # ── Java extra escapes (\: \= \# \!) ──────────────────────────────
  - id: java_extra_escapes
    name: "Decode Java property escapes (\\: \\= \\# \\!)"
    description: |
      With useJavaEscapes=true, the additional Java property escape
      sequences `\:`, `\=`, `\#`, `\!` in values are decoded to
      their literal characters. Default off — by default these stay
      escaped in the extracted text.
    spec_refs:
      - "Java SE Properties spec — escaped key terminators \\: \\= (https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Properties.html)"
    examples:
      - name: default_off_keeps_escapes
        origin: "authored: value with every \\: \\= \\# \\! escape, useJavaEscapes off"
        input_xml: "key1=Listen\\: here's the \\#1 thing to remember\\: a \\!\\= b \\\\ c"
        expected_fail: |
          bridge bug — with useJavaEscapes off, Okapi PropertiesFilter
          keeps the `\\` doubled instead of decoding it once, yielding
          "...a \\!\\= b \\\\ c". Native (and the Java property spec)
          treats `\\` as always-decoded to a single backslash regardless
          of the useJavaEscapes flag. Tracked separately as a bridge
          escape-decoding bug.
        block_count: 1
        first_block_text: "Listen\\: here's the \\#1 thing to remember\\: a \\!\\= b \\ c"
      - name: enabled_decodes_escapes
        origin: "authored: same value with useJavaEscapes=true (escapes decoded)"
        input_xml: "key1=Listen\\: here's the \\#1 thing to remember\\: a \\!\\= b \\\\ c"
        config:
          useJavaEscapes: true
        block_count: 1
        first_block_text: "Listen: here's the #1 thing to remember: a != b \\ c"
    okapi_refs:
      - PropertiesFilterTest#testJavaEscapeChars
    native_refs:
      - properties.TestRead_JavaEscapeChars

  # ── Key-condition filtering ───────────────────────────────────────
  - id: key_condition_filtering
    name: Extract / exclude entries by key regex
    description: |
      With useKeyCondition=true, entries are filtered by a regex
      matched against their keys. extractOnlyMatchingKey selects
      direction: true keeps matching entries; false drops them.
      Mirrors the upstream Test02 / Test03 fprm configurations.
    # Key-condition filtering is an Okapi-side extraction policy,
    # not part of the Java Properties format spec — no spec_refs.
    config:
      useKeyCondition: true
      keyCondition: ".*text.*"
    examples:
      - name: extract_matching_only
        origin: "okapi-fixture: PropertiesFilterTest#testDoubleExtraction (Test02 fprm shape)"
        input_xml: "text100\tText for text100\nkey101\tText for key101 (no extraction)\ntextkey102 Text for textkey102\n"
        config:
          extractOnlyMatchingKey: true
        block_count: 2
        block_texts:
          - "Text for text100"
          - "Text for textkey102"
      - name: exclude_matching
        origin: "okapi-fixture: PropertiesFilterTest#testDoubleExtraction (Test03 fprm shape)"
        input_xml: "text100\tText for text100 (no extraction)\nkey101\tText for key101\ntextkey102 Text for textkey102 (no extraction)\n"
        config:
          extractOnlyMatchingKey: false
        block_count: 1
        first_block_text: "Text for key101"
    okapi_refs:
      - PropertiesFilterTest#testDoubleExtraction
    native_refs:
      - properties.TestReadMultipleEntries

  # ── Message placeholders pass through as text ─────────────────────
  - id: message_placeholders
    name: Message placeholders in values
    description: |
      `{n}` style message placeholders in property values are part
      of the source text. Upstream Okapi (with default code-finder
      rules enabled) tags them as inline codes; the native reader
      keeps them as plain text under default config. The block's
      source text is identical in both cases — only the inline-code
      annotation differs.
    # `{n}` placeholders are an ICU MessageFormat convention layered
    # on Properties values; the Java Properties spec itself has no
    # placeholder syntax — no spec_refs.
    examples:
      - name: numbered_placeholders
        origin: "authored: value with `{1}...{2}` MessageFormat-style placeholders"
        input_xml: "Key1={1}Text1{2}"
        expected_fail: |
          bridge default config treats `{n}` placeholders as inline
          codes (Okapi's default code-finder rules tag them and strip
          them from the source text), yielding "Text1". Native passes
          them through as plain text. Both legitimate; spec asserts
          native behavior. Could also be reconciled by disabling
          code-finder in the bridge config.
        block_count: 1
        first_block_text: "{1}Text1{2}"
      - name: escaped_placeholders
        origin: "authored: value with escaped braces `\\{...\\}` (unknown-escape passthrough)"
        input_xml: "Key1=before \\{1\\} after"
        block_count: 1
        # Native reader leaves `\{` as `\{` (unknown escape) and
        # likewise for `\}` — both round-trip verbatim in source text.
        first_block_text: "before \\{1\\} after"
    okapi_refs:
      - PropertiesFilterTest#testMessagePlaceholders
      - PropertiesFilterTest#testMessagePlaceholdersEscaped
    native_refs:
      - properties.TestRead_MessagePlaceholders
      - properties.TestRead_MessagePlaceholdersEscaped

  # ── Localization directives (#_skip / #_text / …) ─────────────────
  - id: directives_localization
    name: Localization directives in comments
    description: |
      Special comment markers `#_skip`, `#_text`, `#_bskip` /
      `#_eskip`, `#_btext` / `#_etext` toggle extraction of the
      entries that follow. The native reader honors these by default,
      matching Okapi (LocalizationDirectives.reset() enables useLD):
      single-entry `#_skip` / `#_text` affect exactly the next entry,
      while block `#_bskip` / `#_btext` push a scope closed by the
      matching `#_eskip` / `#_etext`.
    # Localization directives are an Okapi-side extraction policy
    # using comment syntax; not part of the Java Properties spec.
    examples:
      - name: skip_single_entry
        origin: "okapi-fixture: PropertiesFilterTest#testLocDirectives_Skip"
        input_xml: "#_skip\nKey1:Text1\nKey2:Text2"
        # Key1 skipped by the single-entry #_skip; only Text2 extracted.
        block_count: 1
        first_block_text: "Text2"
      - name: bskip_blocks_extraction
        origin: "okapi-fixture: PropertiesFilterTest#testLocDirectives_Group"
        input_xml: "#_bskip\nKey1:Text1\n#_text\nKey2:Text2\nKey2:Text3"
        # #_bskip opens a skip block; #_text overrides for exactly the
        # next entry (Text2); Text3 falls back to the skip block.
        block_count: 1
        first_block_text: "Text2"
    okapi_refs:
      - PropertiesFilterTest#testLocDirectives_Skip
      - PropertiesFilterTest#testLocDirectives_Group

  # ── CR-only line endings (Mac classic) ────────────────────────────
  - id: cr_only_line_endings
    name: Carriage-return-only line endings
    description: |
      Java Properties accepts `\r` alone as a line terminator. The
      native reader's physical-line scanner (readPhysicalLine)
      recognises LF, CR and CRLF as line terminators — matching upstream
      Okapi's PropertiesFilter, which reads lines via
      BufferedReader.readLine(). A bare-CR-separated pair therefore
      yields one entry per line and round-trips byte-for-byte.
    spec_refs:
      - "Java SE Properties spec — line terminators (LF / CR / CRLF) (https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/Properties.html)"
    examples:
      - name: cr_terminated_pair
        origin: "authored: two key=value lines separated by bare \\r"
        input_xml: "Key1=Text1\rKey2=Text2\r"
        block_count: 2
        block_texts:
          - "Text1"
          - "Text2"
    okapi_refs:
      - PropertiesFilterTest#testLineBreaks_CR
