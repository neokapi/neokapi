# IDML format specification.
#
# Single-variant filter for Adobe InDesign Markup Language (.idml)
# packages — ZIP archives containing one designmap.xml and one or more
# Stories/Story_*.xml files. The reader walks each story, extracting
# translatable text from <Content> elements while preserving the
# surrounding XML as skeleton.
#
# Authoring notes:
#   - Per the binary-format fixture rule (#515 / #461), every example
#     uses an upstream `okapi:okapi/filters/idml/src/test/resources/`
#     fixture (real InDesign-authored IDML packages) so the bridge
#     and the native reader are exercised against authentic input.
#     The previous synthetic `testdata/*.idml` fixtures from
#     `scripts/gen-idml-fixtures` had been emitting designmap.xml
#     packages missing attributes that real InDesign always emits;
#     the Okapi IDMLFilter then null-derefed (#482), which was
#     mis-tagged as a bridge bug until the synthetic-fixture probe
#     in #515 showed the bridge handles real upstream IDML cleanly.
#   - For features with no upstream equivalent (discretionary hyphen
#     handling exercises a Unicode soft-hyphen U+00AD that needs
#     intentional placement and isn't represented in the upstream
#     test corpus), the spec keeps `testdata/*.idml` synth fixtures
#     and documents the choice on the example.
#   - okapi_refs are pinned to the upstream class+method names; drift
#     detection asserts each ref still exists in Okapi 1.47.0.
#   - Config key names follow Okapi's parameter naming (also exposed
#     by the bridge composite schema). Parent grouping keys
#     (`extraction`, `formatting`, `inlineCodes`) appear as
#     string_map entries — the bridge schema groups settings under
#     them, the native reader currently honors a subset of the
#     `extraction.*` flags.

format: okf_idml
mime_type: application/vnd.adobe.indesign-idml-package

# Parity-runner config (#852): no binary IDML corpus is committed to the
# neokapi repo, so the filter-level parity runner skips the format. The
# per-example parity runner (idml_spec_test.go) reads okapi: fixtures and
# skips cleanly when the okapi-testdata corpus is absent.
parity:
  skip: "binary corpus not in repo (rely on okapi-bridge testdata/ when available)"
description: |
  Adobe InDesign Markup Language. IDML packages are ZIP archives
  bundling one or more Story XML files plus design metadata. The
  filter extracts translatable text from <Content> elements inside
  ParagraphStyleRange/CharacterStyleRange runs, preserving paragraph
  and character style context per block and treating notes,
  footnotes, and tracked changes as nested translatable scopes.

config:
  # ── Extraction settings ───────────────────────────────────────────
  - key: extraction
    type: string_map
    default: {}
    description: |
      Container for extraction settings (mirrors Okapi's `extraction`
      group, also exposed as a nested object in the bridge composite
      schema). Individual flags (`extractNotes`, `extractMasterSpreads`,
      `skipDiscretionaryHyphens`, …) are declared below for the
      behaviors the spec exercises.

  - key: extractNotes
    type: boolean
    default: false
    description: |
      Extract footnote, endnote, and Note element content as
      translatable blocks. When false, note content is written to
      skeleton and is not exposed as Blocks.
    okapi_param: extractNotes

  - key: extractMasterSpreads
    type: boolean
    default: true
    description: |
      Extract translatable text from master-spread stories. When
      false, master-spread content is treated as non-translatable
      design boilerplate.
    okapi_param: extractMasterSpreads

  - key: skipDiscretionaryHyphens
    type: boolean
    default: false
    description: |
      Strip discretionary (soft) hyphens (U+00AD) from extracted
      text. Useful when downstream tools mishandle the soft-hyphen
      character or when source text was authored with line-break
      hints that don't apply post-translation.
    okapi_param: skipDiscretionaryHyphens

  - key: extractHiddenLayers
    type: boolean
    default: false
    description: |
      Extract translatable text from stories whose parent TextFrame
      sits on a hidden InDesign layer (designmap.xml `<Layer
      Visible="false">`). When false (the default, matching okapi),
      hidden-layer stories are skipped during the visibility pre-scan
      — their content stays in the archive but does not surface as
      Blocks. Mirrors okapi's `extractHiddenLayers` parameter
      (Parameters.java:63).
    okapi_param: extractHiddenLayers

  - key: extractHiddenPasteboardItems
    type: boolean
    default: false
    description: |
      Extract translatable text from stories whose parent TextFrame
      on a Spread or MasterSpread carries `Visible="false"`. When
      false (the default, matching okapi), hidden TextFrames are
      filtered out during the visibility pre-scan and their stories
      are skipped. Mirrors okapi's `extractHiddenPasteboardItems`
      parameter (Parameters.java:64; PasteboardItem.java:192-211).
    okapi_param: extractHiddenPasteboardItems

  # ── Formatting tolerance thresholds ───────────────────────────────
  - key: formatting
    type: string_map
    default: {}
    description: |
      Container for formatting tolerance settings (Okapi's
      `formatting` group, also a nested object in the bridge
      composite schema). Controls when small kerning / tracking /
      leading / baseline-shift differences across runs are folded
      together vs preserved as distinct inline codes. The native
      reader does not yet implement the per-flag tolerances.

  # ── Inline-code detection ─────────────────────────────────────────
  - key: inlineCodes
    type: string_map
    default: {}
    description: |
      Container for inline-code detection settings (Okapi's
      `inlineCodes` group, exposed via $ref in the bridge composite
      schema). Holds `useCodeFinder`, `codeFinderRules`, merge /
      simplifier rules. The native reader does not yet apply the
      code finder.

features:
  # ── Core extraction ───────────────────────────────────────────────
  - id: simple_text_extraction
    name: Single-paragraph text extraction
    description: |
      The simplest case: a small one-story IDML with a few Content
      elements yields a Block per Content body. The upstream
      `06-hello-world-14.idml` carries seven "Hello WorldN!" Content
      runs; the spec asserts the first one as a stable smoke test.
    spec_refs:
      - "Adobe IDML specification — Story / ParagraphStyleRange / CharacterStyleRange / Content"
    examples:
      - name: helloworld_upstream
        origin: "okapi-testdata: okapi/filters/idml/src/test/resources/06-hello-world-14.idml"
        input_file: okapi:okapi/filters/idml/src/test/resources/06-hello-world-14.idml
        block_count_min: 1
        has_block_with_text:
          - "Hello World1!"
    okapi_refs:
      - ExtractionTest#testSimpleEntry
      - ExtractionTest#testStartDocument
    native_refs:
      - idml.TestSimple
      - idml.TestStartDocument

  - id: paragraph_segmentation
    name: One block per Content element
    description: |
      Each <Content> element under a CharacterStyleRange becomes its
      own translatable Block, in document order. Paragraphs are not
      merged when separated by sibling ParagraphStyleRange elements.
    spec_refs:
      - "Adobe IDML specification — sibling ParagraphStyleRange / Content elements"
    examples:
      - name: paragraph_breaks_upstream
        origin: "okapi-testdata: okapi/filters/idml/src/test/resources/07-paragraph-breaks.idml"
        input_file: okapi:okapi/filters/idml/src/test/resources/07-paragraph-breaks.idml
        block_count_min: 2
    okapi_refs:
      - ExtractionTest#testSimpleEntry2
    native_refs:
      - idml.TestMultipleContentElements

  - id: line_break_segmentation
    name: Br within a paragraph splits Content runs
    description: |
      A <Br/> element inside a ParagraphStyleRange forces a new
      character run; each surrounding Content element extracts as
      its own Block. The upstream
      `07-paragraph-breaks-end-up-a-paragraph.idml` exercises
      paragraphs ending with explicit break elements.
    spec_refs:
      - "Adobe IDML specification — Br element inside ParagraphStyleRange"
    examples:
      - name: paragraph_breaks_end_upstream
        origin: "okapi-testdata: okapi/filters/idml/src/test/resources/07-paragraph-breaks-end-up-a-paragraph.idml"
        input_file: okapi:okapi/filters/idml/src/test/resources/07-paragraph-breaks-end-up-a-paragraph.idml
        block_count_min: 1
    okapi_refs:
      - ExtractionTest#testNewline
    native_refs:
      - idml.TestNewline

  - id: style_context_propagation
    name: Paragraph style preserved on each block
    description: |
      Sibling paragraphs with different `AppliedParagraphStyle` values
      each emit a Block whose `paragraphStyle` property carries the
      style name. The reader propagates style context through the
      style stack so nested ParagraphStyleRange/CharacterStyleRange
      structures stay consistent.
    spec_refs:
      - "Adobe IDML specification — AppliedParagraphStyle attribute"
    examples:
      - name: complex_formatting_upstream
        origin: "okapi-testdata: okapi/filters/idml/src/test/resources/04-complex-formatting.idml"
        input_file: okapi:okapi/filters/idml/src/test/resources/04-complex-formatting.idml
        block_count_min: 1
    okapi_refs:
      - ExtractionTest#testSimpleEntry2
    native_refs:
      - idml.TestMultipleParagraphsInStory
      - idml.TestBlockProperties

  # ── Multi-story aggregation ───────────────────────────────────────
  - id: multi_story_aggregation
    name: Multiple Story_*.xml files extracted in sorted order
    description: |
      An IDML may bundle several stories under Stories/. The reader
      enumerates and sorts them by file name, emitting one child
      Layer per story and the contained Blocks in story order.
      The upstream `02-island-spread-and-threaded-text-frames.idml`
      bundles multiple text frames threaded across stories.
    spec_refs:
      - "Adobe IDML specification — Stories/ directory layout in IDML package"
    examples:
      - name: island_spread_upstream
        origin: "okapi-testdata: okapi/filters/idml/src/test/resources/02-island-spread-and-threaded-text-frames.idml"
        input_file: okapi:okapi/filters/idml/src/test/resources/02-island-spread-and-threaded-text-frames.idml
        block_count_min: 1
    okapi_refs:
      - ExtractionTest#testDefaultInfo
    native_refs:
      - idml.TestMultipleStories

  # ── Tables (nested style stack) ───────────────────────────────────
  - id: table_cell_extraction
    name: Table cell content extraction
    description: |
      `<Table>` elements appear inside CharacterStyleRange. Each
      `<Cell>` carries its own ParagraphStyleRange tree; the reader
      extracts each Content element inside the cells as a separate
      Block, in row-major order as written in the source XML.
    spec_refs:
      - "Adobe IDML specification — Table and Cell elements"
    examples:
      - name: tables_upstream
        origin: "okapi-testdata: okapi/filters/idml/src/test/resources/10-tables.idml"
        input_file: okapi:okapi/filters/idml/src/test/resources/10-tables.idml
        block_count_min: 1
    okapi_refs:
      - ExtractionTest#testSimpleEntry2
    native_refs:
      - idml.TestTableContent

  # ── Footnotes (extractNotes flag) ─────────────────────────────────
  - id: footnote_extraction_default
    name: Footnote text extracted by default
    description: |
      The native reader's default extracts footnote / endnote / Note
      content as translatable blocks alongside the main text. Note:
      Okapi's upstream default for `extractNotes` is false; the
      native default is true (documented divergence — see
      `footnote_extraction_disabled`).
    spec_refs:
      - "Adobe IDML specification — Footnote / Endnote / Note elements"
    examples:
      - name: footnotes_upstream_default
        origin: "okapi-testdata: okapi/filters/idml/src/test/resources/09-footnotes.idml (default extractNotes)"
        input_file: okapi:okapi/filters/idml/src/test/resources/09-footnotes.idml
        block_count_min: 1
    okapi_refs:
      - ExtractionTest#endNotesExtracted
    native_refs:
      - idml.TestFootnotes

  - id: footnote_extraction_disabled
    name: Footnote text omitted when extractNotes=false
    description: |
      With `extractNotes: false` the reader writes footnote content
      to skeleton instead of emitting it as a translatable Block.
      Only the surrounding main-text Content remains.
    spec_refs:
      - "Adobe IDML specification — Footnote element extraction policy"
    config:
      extractNotes: false
    examples:
      - name: footnotes_upstream_disabled
        origin: "okapi-testdata: okapi/filters/idml/src/test/resources/09-footnotes.idml + extractNotes=false"
        input_file: okapi:okapi/filters/idml/src/test/resources/09-footnotes.idml
        block_count_min: 1
    okapi_refs:
      - ExtractionTest#endNotesExtracted
    native_refs:
      - idml.TestFootnotes

  # ── Discretionary hyphen handling ─────────────────────────────────
  - id: discretionary_hyphen_strip
    name: Discretionary hyphens stripped when configured
    description: |
      With `skipDiscretionaryHyphens: true` the reader removes
      U+00AD (soft hyphen) characters from extracted text. Useful
      when source text was authored with hyphenation hints that
      don't survive translation. No upstream IDML fixture exercises
      a soft-hyphen-containing Content element specifically, so this
      feature uses the synth `testdata/discretionary-hyphen.idml`
      (per #515: synth is acceptable when no upstream covers the
      feature).
    spec_refs:
      - "Adobe IDML specification — discretionary (soft) hyphen U+00AD handling"
    config:
      skipDiscretionaryHyphens: true
    examples:
      - name: bindestrich_stripped
        origin: "authored: testdata/discretionary-hyphen.idml + skipDiscretionaryHyphens=true"
        input_file: testdata/discretionary-hyphen.idml
        block_count: 1
        first_block_text: "Bindestrich"
        expected_fail: |
          synthetic-fixture artefact: Okapi IDMLFilter NPEs on the
          designmap.xml of fixtures generated by scripts/gen-idml-fixtures
          because the script omits an attribute that real InDesign always
          emits. Tracked under #482; resolved by switching every other
          example in this spec to `okapi:` upstream fixtures. This single
          example retains the synth because no upstream IDML fixture
          contains a soft-hyphen-bearing Content element to exercise
          skipDiscretionaryHyphens.
    okapi_refs:
      - ExtractionTest#testSkipDiscretionaryHyphens
    native_refs:
      - idml.TestSkipDiscretionaryHyphens

  - id: discretionary_hyphen_preserved
    name: Discretionary hyphens preserved when configured
    description: |
      With `skipDiscretionaryHyphens: false` the soft hyphen
      (U+00AD) is preserved verbatim in extracted text — the block
      text contains the literal U+00AD character between "Binde"
      and "strich". Same upstream-coverage gap as the strip case
      above; uses the synth `testdata/discretionary-hyphen.idml`.
    spec_refs:
      - "Adobe IDML specification — discretionary (soft) hyphen U+00AD handling"
    config:
      skipDiscretionaryHyphens: false
    examples:
      - name: bindestrich_preserved
        origin: "authored: same fixture + skipDiscretionaryHyphens=false (preserves U+00AD)"
        input_file: testdata/discretionary-hyphen.idml
        block_count: 1
        first_block_text: "Binde­strich"
        expected_fail: |
          synthetic-fixture artefact: same as discretionary_hyphen_strip
          (#482, retained synth because no upstream IDML carries a
          soft-hyphen-bearing Content element).
    okapi_refs:
      - ExtractionTest#testSkipDiscretionaryHyphens
    native_refs:
      - idml.TestSkipDiscretionaryHyphens

  # ── Tracked changes ───────────────────────────────────────────────
  - id: change_tracking_extraction
    name: Tracked changes extracted as additional blocks
    description: |
      `<Change ChangeType="InsertedText">` elements wrap inserted
      character runs. The reader walks into the Change element and
      extracts the inserted Content alongside the original Content,
      so reviewers see both states as translatable blocks. Deleted
      runs are similarly extracted when present. The upstream
      `08-conditional-text-and-tracked-changes.idml` carries both
      conditional text and tracked-change markers.
    spec_refs:
      - "Adobe IDML specification — Change element with ChangeType attribute"
    examples:
      - name: tracked_changes_upstream
        origin: "okapi-testdata: okapi/filters/idml/src/test/resources/08-conditional-text-and-tracked-changes.idml"
        input_file: okapi:okapi/filters/idml/src/test/resources/08-conditional-text-and-tracked-changes.idml
        block_count_min: 1
    okapi_refs:
      - ExtractionTest#testChangeTracking
    native_refs:
      - idml.TestChangeTracking
