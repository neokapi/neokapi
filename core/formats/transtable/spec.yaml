# TransTable format specification.
#
# `okf_transtable` per Okapi (TransTableFilter) is a tab-separated
# round-trip exchange table written by Okapi's GenericFilterWriter when
# the user picks "Translation Table" output. Inputs follow a strict
# shape:
#
#   Line 1 (header): TransTableV1\t<src-locale>\t<trg-locale>
#   Line N (data):   "okpCtx:tu=<id>"\t"<source>"[\t"<target>"]
#                    or with optional segment suffix:
#                    "okpCtx:tu=<id>:s=<seg-id>"\t"<source>"[\t"<target>"]
#
# Each non-empty line either declares a new text unit or appends a
# segment to the current text unit (matched by `tu=<id>`). Quotes
# surrounding cells are optional; `\t` and `\n` inside cells are
# unescaped on read. Whitespace-only lines are skipped. The single
# parameter `allowSegments` toggles whether segment ids are honored.
#
# ── Native vs bridge divergence (#453) ─────────────────────────────────
# The native Go reader at core/formats/transtable/ implements a
# completely different and much simpler format: a generic key/value
# table where each line is `<key>\t<value>`, lines starting with `#` are
# comments, and there is no header row, no segment grouping, no locale
# columns, and no quote handling. The native reader's blocks carry the
# key as both ID and Name and the value as the source text — there is
# no target column, and source/target locales are taken from the
# RawDocument rather than from a header line.
#
# The two implementations therefore parse different documents. The
# spec below describes the upstream Okapi TransTable v1 contract (since
# `format:` is the okapi-bridge filter id and the bridge enforces this
# contract) and every example is tagged `expected_fail` against the
# native side — the native reader cannot satisfy the upstream contract
# without being rewritten as a TransTable v1 reader (or recategorised
# under a different format id). Tracked in #453 as a documented
# divergence; this spec replaces the prior parity-formats SKIP marker
# with per-feature, per-example dashboard rows.
#
# Authoring notes:
#   - Inputs are inline `input_xml:` snippets (the field name is
#     historical — it carries raw bytes for any text format).
#   - okapi_refs target the upstream `TransTableFilterTest#methodName`
#     entries that exercise each feature.
#   - native_refs link to the existing Go tests so the docs site can
#     surface the native implementation alongside the contract — even
#     though those tests verify a different format.
#   - The single config key `allowSegments` is recorded for drift
#     parity against the bridge composite schema even though the
#     bridge `formats/okf_transtable/schema.json` currently exposes an
#     empty properties block (the upstream Java field
#     Parameters.ALLOWSEGMENTS is wired but not flattened by the
#     schemagen pass yet). The native reader rejects all config keys.

format: okf_transtable
mime_type: text/x-transtable
description: |
  Okapi TransTable v1 — a tab-separated bilingual exchange table
  written by Okapi's GenericFilterWriter for the "Translation Table"
  output configuration. The first line is a header declaring the
  signature (`TransTableV1`) and the source/target locales; each
  subsequent line is a `okpCtx:tu=<id>` crumb followed by a source
  cell and an optional target cell, with optional `:s=<seg-id>`
  segment suffixes that group multiple lines into one segmented text
  unit.

config:
  - key: allowSegments
    type: boolean
    default: true
    description: |
      Honor the `:s=<seg-id>` segment suffix on the crumb id. When
      true, lines sharing the same `tu=<id>` are merged into one
      segmented text unit. When false, every line is its own text
      unit regardless of any `:s=<seg-id>` suffix. Recorded for
      drift parity with the upstream Parameters class
      (`Parameters.ALLOWSEGMENTS`); the bridge composite schema does
      not flatten this key today, so the bridge runner uses its
      default. The native reader does not recognise this parameter
      (its `Config.ApplyMap` rejects every key).
    okapi_param: allowSegments

features:
  # ── Header parsing ────────────────────────────────────────────────────
  - id: header_signature
    name: TransTableV1 header line
    description: |
      The first non-empty line declares the signature `TransTableV1`
      and the source/target locales as three tab-separated cells.
      Quotes around cells are optional; the upstream reader strips
      them as part of unescape. A missing or malformed header aborts
      the read with `OkapiIOException("Invalid signature ...")`.
    examples:
      - name: bare_header_then_one_entry
        description: |
          Minimal valid input: header without quotes, one source-only
          row. The reader yields exactly one text unit whose source
          equals the unquoted source cell.
        input_xml: |
          TransTableV1	en	fr
          "okpCtx:tu=1"	"source"
        block_count: 1
        first_block_text: "source"
        expected_fail: |
          Native reader treats the header line `TransTableV1\ten\tfr`
          as a key/value entry (key=`TransTableV1`, value=`en\tfr`)
          and the data row as another entry (key=`"okpCtx:tu=1"`,
          value=`"source"`), yielding two blocks instead of one.
          Native implements a generic key/value table; the upstream
          TransTable v1 contract is not represented in the Go
          reader — see #453.
      - name: quoted_header_quoted_id
        description: |
          Same shape with all cells quoted — quotes are part of the
          upstream unescape pass and do not change extraction.
        input_xml: |
          "TransTableV1"	"en"	"fr"
          okpCtx:tu=1	source
        block_count: 1
        first_block_text: "source"
        expected_fail: |
          Native reader does not parse the header; it emits the
          quoted header line as a key/value entry. See #453.
    okapi_refs:
      - TransTableFilterTest#testStartDocument
      - TransTableFilterTest#testMinimalInput
      - TransTableFilterTest#testQuotesInput
    native_refs:
      - transtable.TestReadLayerStartEnd

  # ── Bilingual extraction ──────────────────────────────────────────────
  - id: bilingual_pair
    name: Source + target columns yield bilingual text unit
    description: |
      A data row with three cells (`crumb`, `source`, `target`)
      becomes one bilingual text unit. The source cell populates the
      source locale declared in the header; the target cell populates
      the target locale.
    examples:
      - name: source_target_pair
        input_xml: |
          TransTableV1	en	fr
          "okpCtx:tu=1"	"source"	"target"
        block_count: 1
        first_block_text: "source"
        expected_fail: |
          Native reader ignores the header and parses the data row
          as a single key/value entry — the key column becomes
          block.Name (`"okpCtx:tu=1"`) and everything after the first
          tab becomes source text (`"source"\t"target"`). The target
          column is not promoted into the target locale. See #453.
    okapi_refs:
      - TransTableFilterTest#testMinimalSourceTarget
    native_refs:
      - transtable.TestRoundTripWithTargetLocale

  # ── Source-only entry (untranslated) ──────────────────────────────────
  - id: source_only_entry
    name: Source-only data row leaves target empty
    description: |
      A row with only two cells (`crumb`, `source`) yields a text
      unit with no target — the row is untranslated. The text unit's
      source equals the source cell.
    examples:
      - name: source_no_target
        input_xml: |
          TransTableV1	en	fr
          "okpCtx:tu=1"	"source"
        block_count: 1
        first_block_text: "source"
        expected_fail: |
          Native reader parses the data row as a key/value entry
          and additionally emits the header as a separate entry —
          producing two blocks instead of one. See #453.
    okapi_refs:
      - TransTableFilterTest#testMinimalInput
    native_refs:
      - transtable.TestSimplePair

  # ── Multiple entries ──────────────────────────────────────────────────
  - id: multiple_entries
    name: Multiple text units in document order
    description: |
      Each distinct `tu=<id>` introduces a new text unit. Without a
      `:s=<seg-id>` suffix every row is its own text unit. Block
      ordering follows document order and the text unit's id is the
      `<id>` portion of the crumb.
    examples:
      - name: two_unsegmented
        input_xml: |
          "TransTableV1"	"en"	"fr"
          okpCtx:tu=1:s=0	source1
          okpCtx:tu=2	source2
        block_count: 2
        block_texts:
          - "source1"
          - "source2"
        expected_fail: |
          Native reader emits the header as a key/value entry and
          the two data rows as two more entries (keys
          `okpCtx:tu=1:s=0` and `okpCtx:tu=2`), yielding three
          blocks with sources `"en\tfr"`, `source1`, and `source2`.
          See #453.
    okapi_refs:
      - TransTableFilterTest#testUnSegmented
    native_refs:
      - transtable.TestMultiplePairs

  # ── Segment grouping ──────────────────────────────────────────────────
  - id: segmented_text_unit
    name: Segment suffix groups rows into one text unit
    description: |
      Rows that share the same `tu=<id>` and carry a `:s=<seg-id>`
      suffix are merged into one segmented text unit — the source
      text is the concatenation of each segment's source cell, in
      document order. A row without a `:s=<seg-id>` suffix
      terminates the current group and starts a new text unit.
    examples:
      - name: three_segments_into_one_tu
        description: |
          tu=2 owns three segments (s=0, s=1, s=2). The merged
          source is the concatenation of each segment's source.
        input_xml: |
          "TransTableV1"	"en"	"fr"
          okpCtx:tu=1:s=0	source1
          okpCtx:tu=2:s=0	src2-seg0
          okpCtx:tu=2:s=1	src2-seg1
          okpCtx:tu=2:s=2	src2-seg2
          okpCtx:tu=3:s=ZZZ	src3-segZZZ
          okpCtx:tu=4	src4-seg0
        block_count: 4
        block_texts:
          - "source1"
          - "src2-seg0src2-seg1src2-seg2"
          - "src3-segZZZ"
          - "src4-seg0"
        expected_fail: |
          Native reader does not honour segment crumbs; every data
          row is its own key/value entry and the header adds a
          fifth. The block_count and block_texts therefore disagree
          with the upstream segment-grouping contract. See #453.
    okapi_refs:
      - TransTableFilterTest#testSegmented
      - TransTableFilterTest#testSegmentedWithTarget
    native_refs:
      - transtable.TestMultiplePairs

  # ── Whitespace-only lines ─────────────────────────────────────────────
  - id: whitespace_lines_skipped
    name: Whitespace-only lines are skipped
    description: |
      Lines whose `trim()` is empty are skipped silently — they do
      not break a segment group, they do not terminate the current
      text unit, they do not produce a Data part. They behave like
      they were never present in the source.
    examples:
      - name: blank_lines_inside_segments
        description: |
          Three blank/whitespace lines split tu=2's segments — they
          are absorbed silently, the segment group still merges into
          one text unit per the upstream `testSegmentedWithTarget`
          contract.
        input_xml: |
          "TransTableV1"	"en"	"fr"
          okpCtx:tu=1:s=0	source1	target1
          okpCtx:tu=2:s=0	src2-seg0



          okpCtx:tu=2:s=1	src2-seg1	trg2-seg1
          okpCtx:tu=2:s=2	src2-seg2
          okpCtx:tu=3:s=ZZZ	src3-segZZZ
          okpCtx:tu=4	src4-seg0	trg4-seg0
        block_count: 4
        block_texts:
          - "source1"
          - "src2-seg0src2-seg1src2-seg2"
          - "src3-segZZZ"
          - "src4-seg0"
        expected_fail: |
          Native reader emits each blank/whitespace line as a Data
          part rather than skipping it, and parses every data row
          as its own key/value entry — diverging from the upstream
          segment-grouping and whitespace-skip behavior. See #453.
    okapi_refs:
      - TransTableFilterTest#testSegmentedWithTarget
    native_refs:
      - transtable.TestEmptyLine
      - transtable.TestWhitespaceHandling
