# TransTable format specification.
#
# `okf_transtable` per Okapi (TransTableFilter) is a tab-separated
# round-trip exchange table written by Okapi's GenericFilterWriter when
# the user picks "Translation Table" output. Inputs follow a strict
# shape:
#
#   Line 1 (header): TransTableV1\t<src-locale>\t<trg-locale>
#   Line N (data):   "okpCtx:tu=<id>"\t"<source>"[\t"<target>"]
#                    or with optional segment suffix:
#                    "okpCtx:tu=<id>:s=<seg-id>"\t"<source>"[\t"<target>"]
#
# Each non-empty line either declares a new text unit or appends a
# segment to the current text unit (matched by `tu=<id>`). Quotes
# surrounding cells are optional; `\t` and `\n` inside cells are
# unescaped on read. Whitespace-only lines are skipped. The single
# parameter `allowSegments` toggles whether segment ids are honored.
#
# Fixture sourcing (per #515): bilingual examples reference the upstream
# Okapi fixture `okapi/filters/transtable/src/test/resources/test01.xml.txt`
# via `input_file: okapi:...`. The native runner skips cleanly when the
# corpus isn't fetched. Inline `input_xml:` snippets are still used for
# narrowly-scoped contract examples that the upstream fixture doesn't
# cover (segment grouping, whitespace handling, allowSegments off).

format: okf_transtable
mime_type: text/x-transtable

# Parity-runner config (#852): native and Okapi agree the file parses but
# disagree on which segments are translatable; the filter-level parity
# runner skips the format. Documented gap: #453.
parity:
  skip: "documented divergence — see #453"
description: |
  Okapi TransTable v1 — a tab-separated bilingual exchange table
  written by Okapi's GenericFilterWriter for the "Translation Table"
  output configuration. The first line is a header declaring the
  signature (`TransTableV1`) and the source/target locales; each
  subsequent line is a `okpCtx:tu=<id>` crumb followed by a source
  cell and an optional target cell, with optional `:s=<seg-id>`
  segment suffixes that group multiple lines into one segmented text
  unit.

config:
  - key: allowSegments
    type: boolean
    default: true
    description: |
      Honor the `:s=<seg-id>` segment suffix on the crumb id. When
      true, lines sharing the same `tu=<id>` are merged into one
      segmented text unit. When false, every line is its own text
      unit regardless of any `:s=<seg-id>` suffix.
    okapi_param: allowSegments

features:
  # ── Header parsing ────────────────────────────────────────────────────
  - id: header_signature
    name: TransTableV1 header line
    description: |
      The first non-empty line declares the signature `TransTableV1`
      and the source/target locales as three tab-separated cells.
      Quotes around cells are optional; the upstream reader strips
      them as part of unescape. A missing or malformed header aborts
      the read with `OkapiIOException("Invalid signature ...")`.
    spec_refs:
      - "Okapi TransTableFilter (TransTableV1 signature; format defined by upstream Java filter, no public spec)"
    examples:
      - name: bare_header_then_one_entry
        description: |
          Minimal valid input: header without quotes, one source-only
          row. The reader yields exactly one text unit whose source
          equals the unquoted source cell.
        origin: "authored: minimal TransTableV1 header (unquoted) + one source-only data row"
        input_xml: |
          TransTableV1	en	fr
          "okpCtx:tu=1"	"source"
        block_count: 1
        first_block_text: "source"
      - name: quoted_header_quoted_id
        description: |
          Same shape with all cells quoted — quotes are part of the
          upstream unescape pass and do not change extraction.
        origin: "authored: TransTableV1 header with all cells quoted; data crumb unquoted"
        input_xml: |
          "TransTableV1"	"en"	"fr"
          okpCtx:tu=1	source
        block_count: 1
        first_block_text: "source"
    okapi_refs:
      - TransTableFilterTest#testStartDocument
      - TransTableFilterTest#testMinimalInput
      - TransTableFilterTest#testQuotesInput
    native_refs:
      - transtable.TestReadLayerStartEnd

  # ── Bilingual extraction ──────────────────────────────────────────────
  - id: bilingual_pair
    name: Source + target columns yield bilingual text unit
    description: |
      A data row with three cells (`crumb`, `source`, `target`)
      becomes one bilingual text unit. The source cell populates the
      source locale declared in the header; the target cell populates
      the target locale.
    spec_refs:
      - "Okapi TransTableFilter (bilingual three-cell row; format defined by upstream Java filter, no public spec)"
    examples:
      - name: source_target_pair
        origin: "authored: minimal bilingual data row with source + target cells"
        input_xml: |
          TransTableV1	en	fr
          "okpCtx:tu=1"	"source"	"target"
        block_count: 1
        first_block_text: "source"
    okapi_refs:
      - TransTableFilterTest#testMinimalSourceTarget
    native_refs:
      - transtable.TestBilingualPair

  # ── Source-only entry (untranslated) ──────────────────────────────────
  - id: source_only_entry
    name: Source-only data row leaves target empty
    description: |
      A row with only two cells (`crumb`, `source`) yields a text
      unit with no target — the row is untranslated. The text unit's
      source equals the source cell.
    examples:
      - name: source_no_target
        origin: "authored: data row with only crumb + source cells (no target)"
        input_xml: |
          TransTableV1	en	fr
          "okpCtx:tu=1"	"source"
        block_count: 1
        first_block_text: "source"
      - name: upstream_test01_six_records
        description: |
          Upstream Okapi fixture `test01.xml.txt`: header + six
          source-only records (each with an empty third cell). The
          reader yields six text units; the first source equals
          `"Text of the first record"`.
        origin: "okapi-fixture: TransTableFilterTest input file `test01.xml.txt`"
        input_file: okapi:okapi/filters/transtable/src/test/resources/test01.xml.txt
        block_count: 6
        first_block_text: "Text of the first record"
        block_texts:
          - "Text of the first record"
          - "Description of the first record"
          - "  Path:"
          - "Path of the file to process"
          - "Text of the third record"
          - "Description of the first record"
    okapi_refs:
      - TransTableFilterTest#testMinimalInput
    native_refs:
      - transtable.TestSourceOnlyEntry
      - transtable.TestReadOkapiTest01Fixture

  # ── Multiple entries ──────────────────────────────────────────────────
  - id: multiple_entries
    name: Multiple text units in document order
    description: |
      Each distinct `tu=<id>` introduces a new text unit. Without a
      `:s=<seg-id>` suffix every row is its own text unit. Block
      ordering follows document order and the text unit's id is the
      `<id>` portion of the crumb.
    examples:
      - name: two_unsegmented
        origin: "authored: two data rows with distinct tu=ids to verify per-row text-unit emission"
        input_xml: |
          "TransTableV1"	"en"	"fr"
          okpCtx:tu=1:s=0	source1
          okpCtx:tu=2	source2
        block_count: 2
        block_texts:
          - "source1"
          - "source2"
    okapi_refs:
      - TransTableFilterTest#testUnSegmented
    native_refs:
      - transtable.TestMultipleEntries

  # ── Segment grouping ──────────────────────────────────────────────────
  - id: segmented_text_unit
    name: Segment suffix groups rows into one text unit
    description: |
      Rows that share the same `tu=<id>` and carry a `:s=<seg-id>`
      suffix are merged into one segmented text unit — the source
      text is the concatenation of each segment's source cell, in
      document order. A row without a `:s=<seg-id>` suffix
      terminates the current group and starts a new text unit.
    spec_refs:
      - "Okapi TransTableFilter (allowSegments parameter / :s=<seg-id> suffix grouping; format defined by upstream Java filter)"
    examples:
      - name: three_segments_into_one_tu
        description: |
          tu=2 owns three segments (s=0, s=1, s=2). The merged
          source is the concatenation of each segment's source.
        origin: "authored: tu=2 with three :s=N segments to verify intra-tu concatenation"
        input_xml: |
          "TransTableV1"	"en"	"fr"
          okpCtx:tu=1:s=0	source1
          okpCtx:tu=2:s=0	src2-seg0
          okpCtx:tu=2:s=1	src2-seg1
          okpCtx:tu=2:s=2	src2-seg2
          okpCtx:tu=3:s=ZZZ	src3-segZZZ
          okpCtx:tu=4	src4-seg0
        block_count: 4
        block_texts:
          - "source1"
          - "src2-seg0src2-seg1src2-seg2"
          - "src3-segZZZ"
          - "src4-seg0"
    okapi_refs:
      - TransTableFilterTest#testSegmented
      - TransTableFilterTest#testSegmentedWithTarget
    native_refs:
      - transtable.TestSegmentedTextUnit

  # ── Whitespace-only lines ─────────────────────────────────────────────
  - id: whitespace_lines_skipped
    name: Whitespace-only lines are skipped
    description: |
      Lines whose `trim()` is empty are skipped silently — they do
      not break a segment group, they do not terminate the current
      text unit, they do not produce a Data part. They behave like
      they were never present in the source.
    examples:
      - name: blank_lines_inside_segments
        description: |
          Three blank/whitespace lines split tu=2's segments — they
          are absorbed silently, the segment group still merges into
          one text unit per the upstream `testSegmentedWithTarget`
          contract.
        origin: "authored: segment group interrupted by blank lines to verify silent skip without breaking the group"
        input_xml: |
          "TransTableV1"	"en"	"fr"
          okpCtx:tu=1:s=0	source1	target1
          okpCtx:tu=2:s=0	src2-seg0



          okpCtx:tu=2:s=1	src2-seg1	trg2-seg1
          okpCtx:tu=2:s=2	src2-seg2
          okpCtx:tu=3:s=ZZZ	src3-segZZZ
          okpCtx:tu=4	src4-seg0	trg4-seg0
        block_count: 4
        block_texts:
          - "source1"
          - "src2-seg0src2-seg1src2-seg2"
          - "src3-segZZZ"
          - "src4-seg0"
    okapi_refs:
      - TransTableFilterTest#testSegmentedWithTarget
    native_refs:
      - transtable.TestWhitespaceLinesSkipped
