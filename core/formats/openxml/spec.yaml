# OpenXML format specification.
#
# One spec for the openxml filter family (docx/xlsx/pptx). Features and
# config keys carry an applies_to list to scope to specific variants
# where relevant; everything else applies to all three.
#
# Authoring notes:
#   - input_file values resolve relative to this directory (testdata/…)
#     unless prefixed with `okapi:` which resolves under the locally
#     fetched okapi-testdata/ tree (skips cleanly when not present).
#   - okapi_refs are pinned to the upstream class+method names. Drift
#     detection asserts each ref still exists in the bridge's pinned
#     Okapi version.
#   - This is a SEED spec — features here are illustrative coverage of
#     the variant model and assertion vocabulary, not a complete
#     description of openxml. Expand iteratively, validating on real
#     parity runs.

format: okf_openxml
mime_type: application/vnd.openxmlformats-officedocument

# Parity-runner config (#852): no binary OpenXML corpus is committed to
# the neokapi repo, so the filter-level parity runner skips the format.
parity:
  skip: "binary corpus not in repo (rely on okapi-bridge testdata/ when available)"
description: |
  Microsoft Office Open XML formats — Word documents (.docx),
  Excel workbooks (.xlsx), and PowerPoint presentations (.pptx). One
  filter handles all three because they share a common ZIP+XML
  container; the reader auto-detects the variant from the package
  contents.

variants:
  - id: docx
    name: Word document
    extension: .docx
    mime_type: application/vnd.openxmlformats-officedocument.wordprocessingml.document
  - id: xlsx
    name: Excel workbook
    extension: .xlsx
    mime_type: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
  - id: pptx
    name: PowerPoint presentation
    extension: .pptx
    mime_type: application/vnd.openxmlformats-officedocument.presentationml.presentation

config:
  # ── Common (all variants) ─────────────────────────────────────────
  - key: translateDocProperties
    type: boolean
    default: true
    description: Extract document properties from docProps/core.xml (title, subject, keywords).
    okapi_param: bExtractDocumentProperties

  - key: translateHeadersFooters
    type: boolean
    default: true
    description: Extract text from headers and footers.
    applies_to: [docx]
    okapi_param: bExtractHeadersFooters

  - key: translateHiddenText
    type: boolean
    default: false
    description: Extract text marked with the vanish run property.
    applies_to: [docx]
    okapi_param: bExtractHidden

  - key: translateComments
    type: boolean
    default: false
    description: Extract review comments.
    applies_to: [docx, xlsx]
    okapi_param: bExtractComments

  - key: automaticallyAcceptRevisions
    type: boolean
    default: true
    description: |
      Apply pending tracked changes before extraction so output reflects the
      accepted state. When true (default, matching Okapi's
      ConditionalParameters.java line 813), inserted runs are kept and
      deleted runs are dropped. Rows marked with <w:trPr><w:del/>
      (ECMA-376 §17.13.5.13) are removed entirely; rows marked with
      <w:trPr><w:ins/> (§17.13.5.16) are kept (the <w:ins> marker itself
      is stripped at write time).
    applies_to: [docx]
    okapi_param: bAutomaticallyAcceptRevisions

  # ── PPTX-specific ─────────────────────────────────────────────────
  - key: translateSlideNotes
    type: boolean
    default: true
    description: Extract speaker notes alongside slide content.
    applies_to: [pptx]
    okapi_param: bTranslateNotes

  - key: translateSlideMasters
    type: boolean
    default: false
    description: Extract text from slide masters and layouts.
    applies_to: [pptx]
    okapi_param: bTranslatePowerpointMasters

  - key: translateHiddenSlides
    type: boolean
    default: false
    description: Extract text from slides flagged as hidden.
    applies_to: [pptx]
    okapi_param: bTranslatePowerpointHidden

  # ── XLSX-specific ─────────────────────────────────────────────────
  - key: translateSheetNames
    type: boolean
    default: false
    description: Extract worksheet tab names as translatable strings.
    applies_to: [xlsx]
    okapi_param: bTranslateExcelSheetNames

  - key: excludedSheets
    type: string_list
    default: []
    description: Worksheet names to exclude from extraction.
    applies_to: [xlsx]
    okapi_param: tsExcludedWorksheetConfigurations

features:
  # ── DOCX features ─────────────────────────────────────────────────
  - id: docx_paragraph_extraction
    name: Body paragraph extraction (DOCX)
    description: |
      Extract text from `<w:p>` body paragraphs in document.xml,
      preserving inline run structure. Paragraphs are emitted as
      translatable Blocks in document order.
    applies_to: [docx]
    spec_refs:
      - "ECMA-376 Part 1 §17.3 WordprocessingML — paragraph (w:p) and run (w:r) (https://ecma-international.org/publications-and-standards/standards/ecma-376/)"
    examples:
      - name: simple
        origin: "authored: testdata/simple.docx — three-paragraph baseline fixture"
        variant: docx
        input_file: testdata/simple.docx
        block_count: 3
        block_texts:
          - "Hello, World!"
          - "Bold text and normal text"
          - "Italic then bold italic"
    okapi_refs:
      - OpenXMLTest#defaultWordRunFormattingConditionallyOptimisedForWordDocuments
    native_refs:
      - openxml.TestNative_SimpleDocx
      - openxml.TestRoundtripSimple

  - id: docx_inline_formatting
    name: Inline formatting in body paragraphs (DOCX)
    description: |
      Bold, italic, underline, hyperlinks, and other inline runs are
      preserved as Spans inside the surrounding Block, not split into
      separate Blocks.
    applies_to: [docx]
    spec_refs:
      - "ECMA-376 Part 1 §17.3.2 run properties (w:rPr) — bold, italic, underline"
    examples:
      - name: formatted
        origin: "authored: testdata/formatted.docx — mixed inline runs + heading + hyperlink"
        variant: docx
        input_file: testdata/formatted.docx
        block_count: 7
        first_block_text: "Simple paragraph"
        has_block_with_text:
          - "Bold underlined"
          - "Click here for more."
          - "A Heading"
    okapi_refs:
      - OpenXmlFormattingTest#extractsItalics
      - OpenXmlFormattingTest#extractsCaps
    native_refs:
      - openxml.TestNative_SimpleDocx

  # ── XLSX features ─────────────────────────────────────────────────
  - id: xlsx_cell_value_extraction
    name: Cell value extraction (XLSX)
    description: |
      Extract translatable string values from worksheet cells across
      all sheets, in row-major order per sheet. Numeric values and
      formulas are not extracted.
    applies_to: [xlsx]
    spec_refs:
      - "ECMA-376 Part 1 §18.3 SpreadsheetML — cell (c) and shared strings (sst)"
    examples:
      - name: filtering_workbook
        origin: "real-world: EksempelFiltrering.xlsx (Norwegian music-catalog filtering exercise)"
        variant: xlsx
        input_file: testdata/EksempelFiltrering.xlsx
        block_count_min: 50
        has_block_with_text:
          - "Artist"
          - "Tittel"
          - "Sjanger"
    okapi_refs:
      - OpenXmlXlsxTest#inlineStringsExtracted
    native_refs:
      - openxml.TestNative_SimpleXlsx

  - id: xlsx_comments_author
    name: Comments author handling (XLSX snippet)
    description: |
      The author element inside a comments part is preserved verbatim
      through round-trip. Verifies the snippet-level path the
      OpenXMLSnippetsTest exercises.
    applies_to: [xlsx]
    spec_refs:
      - "ECMA-376 Part 1 §18.7 SpreadsheetML comments — comments / authors elements"
    examples:
      - name: author_snippet
        origin: "okapi-fixture: OpenXMLSnippetsTest#testAuthor (raw XML snippet)"
        variant: xlsx
        input_xml: '<comments><author>Dan Higinbotham</author></comments>'
        # Both implementations require a full .xlsx ZIP package. Okapi's
        # internal ContentFilter (used by OpenXMLSnippetsTest in-tree)
        # can consume raw XML, but the public OpenXMLFilter the bridge
        # wraps can't. Re-express with a packaged .xlsx fixture later;
        # keeps the feature documented with a clear limitation note.
        bridge_only: true
        expected_fail: |
          Neither bridge nor native consumes raw XML — both wrap a
          ZIP-based reader. Tracking until we add a packaged fixture
          that exercises the same author/comments path.
        block_count: 0
    okapi_refs:
      - OpenXMLSnippetsTest#testAuthor

  # ── PPTX features (use upstream testdata; skipped if not fetched) ─
  - id: pptx_hidden_slide_excluded
    name: Hidden slides excluded by default (PPTX)
    description: |
      Slides marked hidden in the presentation are NOT extracted unless
      translateHiddenSlides is enabled. Default behavior should produce
      no blocks from a deck where every slide is hidden.
    applies_to: [pptx]
    spec_refs:
      - "ECMA-376 Part 1 §19.3 PresentationML — slide (sld) and `show` attribute"
    examples:
      - name: all_hidden_default
        origin: "okapi-fixture: okapi:filters/openxml/.../1010-slide1-hidden-slide2-hidden.pptx"
        variant: pptx
        input_file: okapi:okapi/filters/openxml/src/test/resources/1010-slide1-hidden-slide2-hidden.pptx
        # Default config: hidden slides skipped → no translatable text.
        expected_fail: |
          neokapi extracts slide masters and speaker notes from hidden
          slides even when translateSlideMasters=false and
          translateHiddenSlides=false. Native defaults disagree with
          the Okapi contract; tracked here until the reader honors the
          flags consistently.
        block_count_max: 0
    okapi_refs:
      - OpenXmlPptxTest#doesNotExtractHiddenSlides

  - id: pptx_hidden_slide_included
    name: Hidden slides included when configured (PPTX)
    description: |
      Setting translateHiddenSlides=true makes all slides extractable
      regardless of their hidden flag. Same input as the previous
      feature, different config — should now yield blocks.
    applies_to: [pptx]
    spec_refs:
      - "ECMA-376 Part 1 §19.3 PresentationML — `show` attribute on sld"
    config:
      translateHiddenSlides: true
      translateSlideMasters: false
    examples:
      - name: all_hidden_with_flag
        origin: "okapi-fixture: okapi:filters/openxml/.../1010-slide1-hidden-slide2-hidden.pptx (with translateHiddenSlides=true)"
        variant: pptx
        input_file: okapi:okapi/filters/openxml/src/test/resources/1010-slide1-hidden-slide2-hidden.pptx
        block_count_min: 1
    okapi_refs:
      - OpenXmlPptxTest#extractsHiddenSlides

  # ── Common: doc-properties opt-out ────────────────────────────────
  - id: doc_properties_opt_out
    name: Document properties opt-out (all variants)
    description: |
      With translateDocProperties=false the reader skips title /
      subject / keywords from docProps/core.xml. Verifies the Block
      count drops vs the default-on baseline.
    spec_refs:
      - "ECMA-376 Part 2 §11 Open Packaging Conventions — core properties part (docProps/core.xml)"
    config:
      translateDocProperties: false
    examples:
      - name: docx_default_minus_props
        origin: "authored: testdata/simple.docx with translateDocProperties=false config wiring"
        variant: docx
        input_file: testdata/simple.docx
        # simple.docx has no doc properties so block_count is unchanged
        # at 3 — this is more a smoke check on the config wiring than a
        # behavioral assertion. A future fixture with populated props
        # will tighten the assertion.
        block_count: 3
