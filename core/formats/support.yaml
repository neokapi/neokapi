# Support tiers — the per-format promise (docs/internals/format-maturity.md §1).
#
# Writer partition (rubric §1): the `tier-review` ritual (human-approved) writes
# `tier` / `tier_since` / `gates` / `notes`; the `triage-score` ritual may
# mechanically refresh ONLY `last_certified` on a passing run. No other writer
# exists, and a change that improves a score may not edit this file.
#
# Bootstrap seed (format-ops.md §9, 2026-06-12): tiers derived from the v2
# audit's coarse Engine level (L2 and above => maintained, else available); no
# format enters at `supported` until its gates are certified by a multi-axis
# triage-score run. `grandfathered: true` suspends the under-run rule and
# certification decay per format until its first multi-axis publish.
#
# Universe: exactly the real format dirs under core/formats/
# (exec/jsx/memorytest excluded). Validated by TestSupportYAML in
# core/formats/maturity_test.go and scripts/format-ops/check-support-gates.mjs.
