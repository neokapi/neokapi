format: ttx
fixtures:
  Issue_164.ttx:
    severity: bug
    summary: "Native drops <FrontMatter> on round-trip — the writer's skeleton path emits content for the Tu elements but the no-Tu wrapper has no fallback for re-emitting frontmatter metadata. Bridge produces output that matches upstream tikal."
  Test01.html.ttx:
    severity: bug
    summary: "Native: fixture has only <ut> markup and no <Tu>, so skeleton-store is empty and the writer falls to direct-XML path that emits a bare TRADOStag wrapper with empty <Raw>. Bridge: now byte-equal with okapi reference after the parity scan was switched to bridgeForcePseudoSourceBase (mirrors xliff2 — TTXFilter's PseudoTranslationStep uses the source as the pseudo base, not the existing FR-FR target)."
  Test02_allseg.html.ttx:
    severity: bug
    summary: "Native: same no-Tu/empty-wrapper bug as Test01.html.ttx. Bridge: now byte-equal with okapi reference (same forcePseudoSourceBase fix as Test01)."
  Test02_noseg.html.ttx:
    severity: bug
    summary: "Native: writer emits unescaped ']]>' inside CharData (XML 1.0 §2.4 forbids ']]>' in CharData outside CDATA sections); also drops <FrontMatter>. Bridge: now byte-equal with okapi reference — the daemon's StreamingTranslationApplier was joining the source via getUnSegmentedContentCopy() before code-id lookup, and createJoinedContent's TextFragment.insert reruns balanceMarkers which renumbers unpaired CLOSING codes' ids (those exist for `<ut Type=\"end\">` whose opener was a tag-typeless `<ut DisplayText=\"...\">` PLACEHOLDER). The renumbered ids no longer matched the wire-side SpanDTO ids, so OkapiCodeConverter.findUnusedSourceCode dropped to buildFreshCode (no outerData), and TTXSkeletonWriter's getOuterData() fell back to Code.data — emitting raw `</a>` instead of the full `<ut Type=\"end\" ...DisplayText=\"a\">&lt;/a&gt;</ut>` placeholder. Fix: applier now uses getFirstContent() in the single-segment branch to align with EventConverter's outbound view (okapi-bridge fix(grpc): preserve source code-id alignment for unpaired CLOSING codes)."
