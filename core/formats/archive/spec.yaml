# Archive (ZIP container) format specification.
#
# Single-variant meta-filter — Okapi's ArchiveFilter does not parse
# translatable text itself. It walks ZIP / JAR archive entries, matches
# each one against the configured `fileNames` patterns, and dispatches
# the matching entries through the corresponding `configIds` subfilter
# (e.g. `okf_xliff`, `okf_tmx`). Translatable Blocks come from those
# subfilters; the archive filter contributes containment, ordering, and
# skeleton (the surrounding ZIP structure).
#
# Authoring notes:
#   - Inputs are real `.zip` fixtures, copied byte-for-byte from
#     Okapi's `okapi-filter-archive-1.49.0-SNAPSHOT-tests.jar`. Inline
#     `input_xml` would not work — the filter requires a real ZIP
#     central directory to enumerate entries. Fixtures live under
#     `testdata/` with attribution in each example's `origin:`.
#   - Config keys mirror Okapi's flat parameter surface
#     (`identification.fileNames`, `identification.configIds`,
#     `identification.mimeType`) — these are the keys the bridge
#     composite schema exposes. The native reader currently uses a
#     different surface (`filePatterns`, `subfilterMappings`); that
#     divergence is part of the bug tracked in #504 and is explicitly
#     documented on each `okapi_param` entry.
#   - Every example is tagged `expected_fail:` referencing #504. The
#     native `core/formats/archive` reader implements a fundamentally
#     different contract (line-by-line text extraction of every
#     matching entry's bytes) than Okapi's ArchiveFilter (subfilter
#     dispatch). See the issue for the full repro and three suggested
#     fix paths.

format: okf_archive
mime_type: application/x-archive
description: |
  ZIP archive container meta-filter. Walks the entries of a `.zip` /
  `.jar` archive and dispatches each matching entry through a
  configured subfilter; translatable Blocks come from the subfilters,
  not from the archive filter itself. Useful for translating bundled
  XLIFF/TMX corpora, JAR resource bundles, and other ZIP-packaged
  content where each entry needs its own filter.

config:
  - key: fileNames
    type: string
    default: "*.tmx,*.xlf,*.xlff"
    description: |
      Comma-delimited list of file-name patterns to match against
      entries inside the archive. Patterns may include `?` and `*`
      wildcards; matches consider the entry's basename in any
      directory inside the ZIP. Must have the same number of
      comma-separated patterns as `configIds`, paired by position.
      Native config exposes the same patterns as a typed string array
      under `filePatterns`, with no positional pairing — see #504.
    okapi_param: fileNames

  - key: configIds
    type: string
    default: "okf_tmx,okf_xliff,okf_xliff"
    description: |
      Comma-delimited list of Okapi filter configuration ids, one per
      pattern in `fileNames`, matched by position. Each id selects
      the subfilter that processes entries matching the corresponding
      pattern. Native config exposes the same mapping as a typed
      array of `{pattern, format}` objects under `subfilterMappings`
      — see #504.
    okapi_param: configIds

  - key: mimeType
    type: string
    default: "application/x-archive"
    description: |
      MIME type identifying the archive container itself (not the
      entries inside it). The default `application/x-archive` covers
      generic ZIP containers; use `application/java-archive` for JAR
      files or another value when the surrounding pipeline cares
      about the specific container variant.
    okapi_param: mimeType

features:
  # ── Subfilter dispatch (the core path) ────────────────────────────
  - id: dispatch_default_subfilters
    name: Dispatch entries through default subfilters (XLIFF + TMX)
    description: |
      With the default `fileNames=*.tmx,*.xlf,*.xlff` and
      `configIds=okf_tmx,okf_xliff,okf_xliff`, the filter walks the
      ZIP's central directory and dispatches each matching entry to
      the paired subfilter. Translatable Blocks come from those
      subfilters: `RB-11-Test01.xlf` contributes its translatable
      `<trans-unit>` source segments (skipping the one tagged
      `translate="no"`) and `test1.tmx` contributes its `<tu>`
      source-language `<seg>`. Entries that do not match any pattern
      are treated as binary skeleton.
    spec_refs:
      - "PKWARE .ZIP File Format Specification §4.3.12 Central directory structure (https://pkware.cachefly.net/webdocs/casestudies/APPNOTE.TXT)"
      - "Okapi Archive Filter wiki (https://okapiframework.org/wiki/index.php/Archive_Filter)"
    examples:
      - name: xliff_plus_tmx
        origin: "okapi-fixture: ArchiveFilterTest test1_es.archive (renamed test1_es.zip) — XLIFF + TMX with es-ES target"
        input_file: testdata/test1_es.zip
        expected_fail: |
          native bug #504 — the native archive reader extracts ZIP
          entries line-by-line (one Block per non-empty line of raw
          XML) instead of dispatching through subfilters. Bridge
          correctly emits ~3 translatable Blocks from the XLIFF
          (skipping the translate="no" trans-unit) plus the TMX
          source segments; native emits ~56 Blocks of raw XML markup.
          Tracked separately as a native architectural bug.
        block_count_min: 2
        block_count_max: 6
        has_block_with_text:
          - "Paragraph"
          - "Text to translate"
        no_block_with_text:
          - "Text not to translate"
    okapi_refs:
      - ArchiveFilterTest#testFilterOpen
      - ArchiveFilterTest#testSubFilterOpen
      - ArchiveFilterTest#testExtractXLIFFandTMX

  - id: extract_xliff_only
    name: Extract only XLIFF entries via narrowed configuration
    description: |
      Restricting `fileNames=*.xlf` and `configIds=okf_xliff` makes
      the filter ignore the `.tmx` entry inside `test1_es.zip` and
      emit only the XLIFF subfilter's translatable Blocks. The
      Okapi test `testExtractXLIFFOnly` exercises exactly this
      narrowing. The example is `bridge_only:` because the native
      reader does not currently accept the bridge's `fileNames` /
      `configIds` parameter names — that surface mismatch is part
      of the divergence tracked in #504.
    spec_refs:
      - "Okapi Archive Filter wiki (https://okapiframework.org/wiki/index.php/Archive_Filter)"
    config:
      fileNames: "*.xlf"
      configIds: "okf_xliff"
    examples:
      - name: xliff_only
        origin: "okapi-fixture: ArchiveFilterTest test1_es.archive — narrowed to *.xlf only"
        input_file: testdata/test1_es.zip
        bridge_only: true
        block_count_min: 1
        block_count_max: 4
        has_block_with_text:
          - "Paragraph"
          - "Text to translate"
        no_block_with_text:
          - "test en-us"
    okapi_refs:
      - ArchiveFilterTest#testExtractXLIFFOnly

  - id: extract_tmx_only
    name: Extract only TMX entries via narrowed configuration
    description: |
      Symmetric to `extract_xliff_only` — restricting
      `fileNames=*.tmx` and `configIds=okf_tmx` makes the filter
      ignore the `.xlf` entry inside `test1_es.zip` and emit only
      the TMX subfilter's translatable units. Verifies the
      pattern→config positional pairing on a single-pattern config.
      `bridge_only:` for the same reason as `extract_xliff_only`
      — see #504.
    spec_refs:
      - "Okapi Archive Filter wiki (https://okapiframework.org/wiki/index.php/Archive_Filter)"
    config:
      fileNames: "*.tmx"
      configIds: "okf_tmx"
    examples:
      - name: tmx_only
        origin: "okapi-fixture: ArchiveFilterTest test1_es.archive — narrowed to *.tmx only"
        input_file: testdata/test1_es.zip
        bridge_only: true
        block_count_min: 1
        block_count_max: 4
        no_block_with_text:
          - "Paragraph"
          - "Text to translate"
    okapi_refs:
      - ArchiveFilterTest#testExtractTMXOnly

  # ── No-match policies ─────────────────────────────────────────────
  - id: unknown_entries_skipped
    name: Entries with no pattern match yield zero translatable blocks
    description: |
      An archive whose entries don't match any `fileNames` pattern
      produces no translatable Blocks. The container is still parsed
      and walked — entries are simply treated as binary skeleton when
      no subfilter dispatch applies. Verifies the default `*.tmx,
      *.xlf,*.xlff` pattern set rejects an unrelated `.txt` entry.
    spec_refs:
      - "Okapi Archive Filter wiki (https://okapiframework.org/wiki/index.php/Archive_Filter) — \"All the files named X (in any directory inside the ZIP file) will be extracted using the … Filter\""
    examples:
      - name: stuff_txt_only
        origin: "okapi-fixture: ArchiveFilterTest test2_unknownfiles.archive — single stuff.txt entry, no matching pattern"
        input_file: testdata/test2_unknownfiles.zip
        expected_fail: |
          native bug #504 — native default `filePatterns` includes
          `*.txt`, so the reader extracts `stuff.txt` line-by-line
          and emits one Block ("stuff not to extract") instead of
          zero. Bridge defaults to `*.tmx,*.xlf,*.xlff` which
          excludes `.txt` — the contract Okapi documents. Tracked
          separately as a native architectural bug (default-pattern
          surface mismatch is one symptom).
        block_count: 0
    okapi_refs:
      - ArchiveFilterTest#testNoTUs
      - ArchiveFilterTest#testNoExtraction

  # ── Container-format identification ───────────────────────────────
  - id: zip_central_directory_walk
    name: Standard ZIP central-directory walk over entries
    description: |
      The filter consumes a standard PKZIP container — entries are
      enumerated via the central directory, not by streaming local
      file headers. This makes the filter compatible with any ZIP
      variant Java's `java.util.zip.ZipFile` accepts (plain ZIP,
      JAR, WAR, EAR, OOXML containers, etc.) regardless of the
      compression method per entry.
    spec_refs:
      - "PKWARE .ZIP File Format Specification §4.3.12 Central directory structure (https://pkware.cachefly.net/webdocs/casestudies/APPNOTE.TXT)"
      - "PKWARE .ZIP File Format Specification §4.3.7 Local file header"
      - "JAR File Specification — \"a file format based on the popular ZIP file format\" (https://docs.oracle.com/en/java/javase/21/docs/specs/jar/jar.html)"
    examples:
      - name: multi_entry_zip
        origin: "okapi-fixture: ArchiveFilterTest test3_es.archive (renamed test3_es.zip) — XLIFF + TMX, distinct from test1_es"
        input_file: testdata/test3_es.zip
        expected_fail: |
          native bug #504 — same root cause as the other examples:
          the native reader extracts entry contents line-by-line
          instead of dispatching to subfilters. Bridge enumerates
          two entries (`SF-12-Test02.xlf`, `test1.tmx`), dispatches
          each through its configured subfilter, and emits ~2
          translatable Blocks; native emits ~49 raw-XML Blocks.
          Tracked separately as a native architectural bug.
        block_count_min: 1
        block_count_max: 4
        has_block_with_text:
          - "About"
    okapi_refs:
      - ArchiveFilterTest#testFilterOpen
      - ArchiveFilterTest#testWithStream

  # ── Round-trip integrity (bridge contract; native stub) ───────────
  - id: roundtrip_preserves_archive_structure
    name: Re-extraction reads back the same translatable inventory
    description: |
      Re-running the filter over its own output produces the same
      inventory of translatable Blocks. This is the contract Okapi
      tests with `testDoubelextraction` (sic) — the `ZipFilterWriter`
      preserves the archive's central directory and entry layout, so
      a second pass through the filter sees exactly what the first
      pass did. Asserted here at the spec level via the same fixture
      input on a single read; the writer-side roundtrip is exercised
      by the dedicated reader/writer tests in this package.
    spec_refs:
      - "PKWARE .ZIP File Format Specification §4.3.12 Central directory structure (https://pkware.cachefly.net/webdocs/casestudies/APPNOTE.TXT)"
    examples:
      - name: doubleextraction_inventory
        origin: "okapi-fixture: ArchiveFilterTest test1_es.archive — same input as dispatch_default_subfilters"
        input_file: testdata/test1_es.zip
        expected_fail: |
          native bug #504 — the native reader emits ~56 raw-XML
          Blocks instead of the bridge's ~3 translatable Blocks; the
          inventory it would re-extract on a second pass is its own
          line-by-line output, not the subfilter contract. Tracked
          separately as a native architectural bug.
        block_count_min: 2
        block_count_max: 6
        has_block_with_text:
          - "Paragraph"
    okapi_refs:
      - ArchiveFilterTest#testDoubelextraction
