# JSON format specification.
#
# Single-variant filter — no variants block. Inputs are inline JSON
# strings (input_xml is reused for any text snippet; the field is
# named for XML historically but holds raw text bytes for any text
# format). The reader uses the framework's text streaming primitives,
# no ZIP container.
#
# Config keys mirror the JSONFilter parameters in upstream Okapi.
# okapi_param values track the Java field names so drift detection
# can flag schema renames.

format: okf_json
mime_type: application/json
description: |
  Generic JSON filter. Walks the document tree, extracts string
  values according to the configured policy, preserves the surrounding
  structure (keys, nesting, whitespace) as skeleton for round-trip.

config:
  - key: extractAllPairs
    type: boolean
    default: true
    description: |
      Extract every string value reachable from the root. When false,
      only values whose path matches `exceptions` are extracted —
      inverting the filter's behavior.
    okapi_param: extractAllPairs

  - key: extractIsolatedStrings
    type: boolean
    default: false
    description: |
      Extract bare string values (e.g. top-level "hello world" rather
      than "key": "hello world"). Off by default — most JSON
      catalogues are key/value, isolated strings are usually noise.
    okapi_param: extractIsolatedStrings

  - key: useKeyAsName
    type: boolean
    default: true
    description: Use the JSON key as the Block name (translation context).
    okapi_param: useKeyAsName

  - key: useFullKeyPath
    type: boolean
    default: false
    description: |
      Use the full dotted key path (e.g. `parent.child`) as the Block
      name. Combined with `useKeyAsName: true`, gives nested keys
      unambiguous identifiers.
    okapi_param: useFullKeyPath

  - key: useLeadingSlashOnKeyPath
    type: boolean
    default: false
    description: |
      Prefix the key path with `/` (e.g. `/parent/child`). Only
      applies when `useFullKeyPath` is true.
    okapi_param: useLeadingSlashOnKeyPath

  - key: escapeForwardSlashes
    type: boolean
    default: false
    description: |
      On write, encode `/` as `\/`. Default off — modern JSON consumers
      handle bare `/` fine; the option exists for legacy interop.
    okapi_param: escapeForwardSlashes

  - key: exceptions
    type: string
    default: ""
    description: |
      Regex matched against key names. When `extractAllPairs` is true,
      matching values are EXCLUDED. When false, they're INCLUDED.
    okapi_param: exceptions

features:
  # ── Value extraction (the core path) ──────────────────────────────
  - id: object_value_extraction
    name: String value in an object
    description: |
      The simplest case: a `{"key": "value"}` document yields one
      translatable Block whose source is "value" and whose name is
      "key" (under default `useKeyAsName: true`).
    spec_refs:
      - "RFC 8259 §4 Objects (https://www.rfc-editor.org/rfc/rfc8259)"
    examples:
      - name: single_pair
        origin: "authored: minimal RFC 8259 §4 single-pair object"
        input_xml: '{"key": "Text1"}'
        block_count: 1
        first_block_text: "Text1"
    okapi_refs:
      - JSONFilterTest#testValue
    native_refs:
      - json.TestSnippets_Value

  - id: nested_object_extraction
    name: Nested object string values
    description: |
      String values inside nested objects are extracted recursively.
      Each value becomes its own Block; container keys carry no
      translatable text themselves.
    spec_refs:
      - "RFC 8259 §4 Objects (https://www.rfc-editor.org/rfc/rfc8259)"
    examples:
      - name: two_levels
        origin: "authored: two-level nested object per RFC 8259 §4"
        input_xml: '{"key": {"key2": "Text1"}}'
        block_count: 1
        first_block_text: "Text1"
    okapi_refs:
      - JSONFilterTest#testObject
    native_refs:
      - json.TestSnippets_Object

  - id: array_string_extraction
    name: String elements in arrays
    description: |
      Bare string elements in JSON arrays are NOT extracted by default
      — they're keyless and treated as isolated strings. Setting
      `extractIsolatedStrings: true` opts them in. Objects inside
      arrays always get their key/value pairs extracted regardless.
    spec_refs:
      - "RFC 8259 §5 Arrays (https://www.rfc-editor.org/rfc/rfc8259)"
    examples:
      - name: bare_strings_default_skipped
        origin: "authored: array of bare strings, default extractIsolatedStrings=false"
        input_xml: '{"items": ["alpha", "beta", "gamma"]}'
        # Default config: no Blocks. Bare array strings need the opt-in.
        block_count: 0
      - name: bare_strings_opt_in
        origin: "authored: same array with extractIsolatedStrings=true opt-in"
        input_xml: '{"items": ["alpha", "beta", "gamma"]}'
        config:
          extractIsolatedStrings: true
        block_count: 3
        block_texts: ["alpha", "beta", "gamma"]
      - name: object_in_array_always_extracted
        origin: "authored: object inside array — keyed values always extract"
        input_xml: '{"items": [{"key": "Text1"}]}'
        block_count: 1
        first_block_text: "Text1"
    okapi_refs:
      - JSONFilterTest#testList
    native_refs:
      - json.TestSnippets_List

  # ── Key path naming (config-driven behavior) ──────────────────────
  - id: full_key_path_naming
    name: Full dotted key path as Block name
    description: |
      Nested values get their full path as the Block name when
      `useFullKeyPath: true`. Useful for translation tools that need
      stable identifiers across structural changes.
    config:
      useFullKeyPath: true
      useKeyAsName: true
    examples:
      - name: parent_child
        origin: "authored: nested object with useFullKeyPath=true config"
        input_xml: '{"parent": {"child": "Text1"}}'
        block_count: 1
        first_block_text: "Text1"
        # Block name assertion would be valuable here — adding to the
        # vocabulary in a follow-up rather than expanding the seed.
    okapi_refs:
      - JSONFilterTest#testPath
    native_refs:
      - json.TestSnippets_Path

  - id: leading_slash_key_path
    name: Leading slash on key path
    description: |
      With `useLeadingSlashOnKeyPath: true`, paths get a `/` prefix
      (e.g. `/parent/child`). Compatible with JSON Pointer-ish
      conventions some consumers expect.
    config:
      useFullKeyPath: true
      useKeyAsName: true
      useLeadingSlashOnKeyPath: true
    examples:
      - name: parent_child_slashed
        origin: "authored: nested object with useLeadingSlashOnKeyPath=true config"
        input_xml: '{"parent": {"child": "Text1"}}'
        block_count: 1
        first_block_text: "Text1"
    okapi_refs:
      - JSONFilterTest#testLeadingSlash
    native_refs:
      - json.TestSnippets_LeadingSlash

  # ── Escape handling ───────────────────────────────────────────────
  - id: unicode_escape_decoding
    name: Decode \\uXXXX escapes
    description: |
      JSON's `\uXXXX` escape sequences decode to their actual
      character before extraction. The block text carries the decoded
      character, not the escape sequence.
    spec_refs:
      - "RFC 8259 §7 Strings (https://www.rfc-editor.org/rfc/rfc8259)"
    examples:
      - name: a_grave
        origin: "authored: RFC 8259 §7 \\uXXXX escape (à precomposed shown)"
        input_xml: '{"key": "à"}'
        block_count: 1
        first_block_text: "à"
    okapi_refs:
      - JSONFilterTest#testEscape
    native_refs:
      - json.TestSnippets_Escape

  # ── Filtering by key (extractAllPairs + exceptions) ───────────────
  - id: extract_all_with_exception
    name: Extract all values except matching keys
    description: |
      Default `extractAllPairs: true` extracts every value; the
      `exceptions` regex EXCLUDES keys that match. Used to skip
      structural / metadata keys that aren't translatable.
    config:
      extractAllPairs: true
      exceptions: "^_internal$"
    examples:
      - name: skip_internal
        origin: "authored: object with `_internal` key excluded by regex"
        input_xml: '{"hello": "Hi", "_internal": "skip me"}'
        block_count: 1
        first_block_text: "Hi"
        no_block_with_text: ["skip me"]
    okapi_refs:
      - JSONFilterTest#testAllWithKeyWithException
    native_refs:
      - json.TestSnippets_AllWithKeyWithException

  # ── Round-trip fidelity (the writer-output view) ──────────────────
  - id: roundtrip_fidelity
    name: Byte-exact round-trip of a source-only document
    description: |
      Reading then writing a source-only JSON document reproduces the
      input byte-for-byte — the structural skeleton (keys, nesting,
      whitespace, quoting) is preserved and the unedited source values
      are re-emitted verbatim. This is the writer-output contract that
      the source-text extraction view cannot express
      (format-spec-cases.md §5, expected.roundtrip).
    spec_refs:
      - "RFC 8259 §2 JSON Grammar (https://www.rfc-editor.org/rfc/rfc8259)"
    examples:
      - name: single_pair_byte_exact
        id: JRT1
        class: valid
        origin: "authored: minimal single-pair object, asserted via the roundtrip view"
        input_xml: '{"key": "Text1"}'
        cite:
          spec: rfc8259
          version: "2017"
          url: "https://www.rfc-editor.org/rfc/rfc8259#section-2"
          clause: "2"
          heading: "JSON Grammar"
        tags: [roundtrip, byte-exact]
        expected:
          roundtrip:
            mode: byte_exact

  # ── Malformed input (the invalid class) ───────────────────────────
  - id: malformed_input
    name: Unterminated string is rejected cleanly
    description: |
      A JSON document with an unterminated string literal is malformed
      and must be rejected by the reader without a panic (one fault per
      case, format-spec-cases.md §3 / §5 expected.error).
    spec_refs:
      - "RFC 8259 §7 Strings (https://www.rfc-editor.org/rfc/rfc8259)"
    examples:
      - name: unterminated_string
        id: JBAD1
        class: invalid
        origin: "authored: string literal missing its closing quote"
        input_xml: '{"key": "unterminated'
        cite:
          spec: rfc8259
          version: "2017"
          url: "https://www.rfc-editor.org/rfc/rfc8259#section-7"
          clause: "7"
          heading: "Strings"
        tags: [malformed, syntax]
        expected:
          error:
            category: syntax
            message_contains: "unterminated string"
