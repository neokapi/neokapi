    version: "2025.10"
    url: https://tr.designtokens.org/format/
    watch: https://www.w3.org/community/design-tokens/
    notes: >-
      Design Tokens Community Group format — $value/$type/$description, token
      groups, aliases ({group.token}), composite types. First stable
      "2025.10"; calendar-versioned train (re-validate yearly). Only $description
      (and string $value where applicable) is translatable.
