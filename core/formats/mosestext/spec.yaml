# Moses InlineText format specification.
#
# Single-variant filter — no variants block. Inputs are inline text
# snippets (input_xml is reused for any text snippet; the field is
# named for XML historically but holds raw text bytes for any text
# format) plus two committed testdata fixtures.
#
# Format id `okf_mosestext` matches the bridge composite schema. The
# upstream `MosesTextFilter` ships an empty parameter set
# (`@UsingParameters()` annotation, `DefaultParameters` instance), and
# the bridge composite schema (v1) declares no properties. The spec
# therefore omits `config:` entirely — there is no config surface to
# vary.
#
# The native reader is intentionally simpler than the upstream filter:
# it walks the input line-by-line (CR / LF / CRLF all act as line
# separators) and emits each non-empty line as one translatable Block
# with whitespace preserved. Empty lines flow out as Data parts.
# That covers the dominant Moses use case — line-aligned source/target
# corpora for statistical MT — and matches what every line-based
# consumer of Moses files expects.
#
# The native reader also implements Okapi's Moses InlineText *markup*
# decoding, treating each entry as a structured XLIFF-flavoured surface
# (a direct port of MosesTextFilter.fromPseudoXLIFF + the entry-grouping
# loop in next()):
#   - `<g id="N">…</g>` parse into paired inline codes (PcOpen/PcClose);
#     `<x id="N"/>` into a placeholder; `<bx id="N"/>` / `<ex id="N"/>`
#     into paired open/close codes. Only the surrounding text reaches
#     the flattened Block source
#   - `<lb/>` decodes to a literal newline inside the Block source
#   - XML entities (`&lt;`, `&gt;`, `&amp;`, `&quot;`, `&apos;`,
#     `&#NN;`, `&#xNN;`) decode to their character values
#   - `<mrk mtype="seg">…</mrk>` annotations are recognised: the entry
#     body is the text between the markers (which may span several
#     physical lines, joined with newlines), and the markers themselves
#     are skeleton, not translatable content
# On write, the native writer re-encodes the decoded body back to the
# pseudo-XLIFF surface (mirroring Okapi's MosesTextEncoder), keeping a
# read → write round trip byte-exact. The format-agnostic code finder
# (`useCodeFinder` / `codeFinderRules`) remains available as an opt-in,
# verbatim-preservation alternative that bypasses InlineText decoding.
#
# Authoring notes:
#   - okapi_refs target the upstream `MosesTextFilterTest` and
#     `MosesTextFilterWriterTest` classes shipped under
#     okapi-filters-mosestext (16 + 5 @Test methods in Okapi 1.47.0).
#     Drift detection asserts each ref still exists in the bridge's
#     pinned surefire output. Note the upstream typo
#     `testineBreaks_CRLF` (missing `L`) is preserved verbatim — it's
#     the canonical Okapi method name.
#   - native_refs point at the existing
#     `core/formats/mosestext/reader_test.go` ports of the upstream
#     suite plus the additional native-only reader tests.
#   - The bridge emits two non-translatable, empty bookend Blocks per
#     document (artefacts of how it wraps `START_DOCUMENT` /
#     `END_DOCUMENT` events). These are filtered out by `BlockTexts`
#     (`!blk.Translatable` || empty text), so block_count assertions
#     reflect translatable Blocks only — the bookends are invisible
#     to the spec vocabulary.

format: okf_mosestext
mime_type: text/x-mosestext
description: |
  Moses InlineText filter — the plain-text exchange format used by the
  Moses statistical MT system. Each non-empty line of input becomes
  one translatable Block; blank lines become Data parts (preserved
  for round-trip but not extracted). Whitespace inside lines is kept
  verbatim so MT-aligned corpora stay byte-stable through merge.

features:
  # ── Empty / whitespace-only input ─────────────────────────────────
  - id: empty_input
    name: Whitespace-only input produces no translatable Blocks
    description: |
      A document containing only line terminators yields zero
      translatable Blocks. The bridge requires at least one byte to
      open the document (the daemon rejects an empty `InputBytes`
      payload), so the smallest representable empty input that flows
      through both implementations is a single LF.
    examples:
      - name: single_newline
        origin: "authored: minimal whitespace-only input (single LF)"
        input_xml: "\n"
        block_count: 0
      - name: two_blank_lines
        origin: "authored: two consecutive blank lines"
        input_xml: "\n\n"
        block_count: 0
    okapi_refs:
      - MosesTextFilterTest#testStartDocument
    native_refs:
      - mosestext.TestReadEmpty
      - mosestext.TestStartDocument

  # ── Single-line content ───────────────────────────────────────────
  - id: single_line
    name: Single line is one Block
    description: |
      A document with one line of text (with or without a trailing
      newline) yields a single translatable Block whose source text
      is the line's content verbatim. No segmentation occurs —
      Moses InlineText has one line per text unit.
    spec_refs:
      - "Okapi Moses Text Filter (https://okapiframework.org/wiki/index.php/Moses_Text_Filter) — one entry per line"
    examples:
      - name: hello_world_no_lf
        origin: "authored: single line without trailing LF"
        input_xml: "Hello world"
        block_count: 1
        first_block_text: "Hello world"
      - name: hello_world_trailing_lf
        # Trailing LF is consumed as skeleton; no phantom empty Block.
        origin: "authored: single line with trailing LF — verifies no phantom empty Block"
        input_xml: "Hello world\n"
        block_count: 1
        first_block_text: "Hello world"
    okapi_refs:
      - MosesTextFilterTest#testStartDocument
      - MosesTextFilterTest#testEntry
    native_refs:
      - mosestext.TestSingleLine
      - mosestext.TestStartDocument
      - mosestext.TestLayerStructure

  # ── Multi-line LF extraction ──────────────────────────────────────
  - id: multi_line_lf
    name: One Block per line (LF)
    description: |
      LF terminates a line. Each non-empty line emits one Block in
      document order; the LF itself is consumed as skeleton, not
      added to the Block text. A trailing LF after the last line
      does not introduce a phantom empty Block.
    spec_refs:
      - "Okapi Moses Text Filter (https://okapiframework.org/wiki/index.php/Moses_Text_Filter) — line-per-entry extraction"
    examples:
      - name: three_lines_with_trailing_lf
        origin: "authored: three LF-separated lines with trailing LF"
        input_xml: "Hello world\nSecond line\nThird line\n"
        block_count: 3
        block_texts:
          - "Hello world"
          - "Second line"
          - "Third line"
      - name: three_lines_no_trailing_lf
        origin: "authored: three LF-separated lines without trailing LF"
        input_xml: "Line 1\nLine 2\nLine 3"
        block_count: 3
        block_texts:
          - "Line 1"
          - "Line 2"
          - "Line 3"
    okapi_refs:
      - MosesTextFilterTest#testLineBreaks_LF
      - MosesTextFilterTest#testEntry
    native_refs:
      - mosestext.TestEntries
      - mosestext.TestLineBreaks_LF
      - mosestext.TestBlockIDs

  # ── CRLF line endings ─────────────────────────────────────────────
  - id: line_endings_crlf
    name: CRLF line endings (Windows)
    description: |
      Windows-style CRLF sequences terminate a line and are consumed
      as skeleton. Output line-break style matches the input on
      round-trip (Okapi processing-note guarantee), but the extracted
      Block text never carries the CR or LF.
    spec_refs:
      - "Okapi Moses Text Filter (https://okapiframework.org/wiki/index.php/Moses_Text_Filter) — output line-breaks match input"
    examples:
      - name: three_lines_crlf
        origin: "authored: three CRLF-separated lines"
        input_xml: "Line 1\r\nLine 2\r\nLine 3"
        block_count: 3
        block_texts:
          - "Line 1"
          - "Line 2"
          - "Line 3"
    okapi_refs:
      - MosesTextFilterTest#testineBreaks_CRLF
    native_refs:
      - mosestext.TestLineBreaks_CRLF

  # ── Bare CR line endings ──────────────────────────────────────────
  - id: line_endings_cr
    name: Bare CR line endings (legacy classic-Mac)
    description: |
      Bare CR (no following LF) terminates a line on both sides.
      Unlike the generic okf_plaintext filter, MosesTextFilter
      explicitly handles bare CR — the upstream filter splits on
      either CR or LF, and the native reader's `scanLines()` uses
      `strings.Split(line, "\r")` to match. Each line emits its own
      Block.
    spec_refs:
      - "Okapi Moses Text Filter (https://okapiframework.org/wiki/index.php/Moses_Text_Filter) — line-per-entry extraction (CR/LF/CRLF terminators)"
    examples:
      - name: three_lines_cr
        origin: "authored: three bare-CR-separated lines (legacy classic-Mac)"
        input_xml: "Line 1\rLine 2\rLine 3"
        block_count: 3
        block_texts:
          - "Line 1"
          - "Line 2"
          - "Line 3"
      - name: trailing_cr_two_lines
        origin: "authored: two CR-terminated lines with trailing CR"
        input_xml: "Line 1\rLine 2\r"
        block_count: 2
        block_texts:
          - "Line 1"
          - "Line 2"
    okapi_refs:
      - MosesTextFilterTest#testLineBreaks_CR
    native_refs:
      - mosestext.TestLineBreaks_CR
      - mosestext.TestEntry

  # ── Blank lines (skeleton, not extracted) ─────────────────────────
  - id: blank_lines_as_data
    name: Blank lines flow out as Data parts, not Blocks
    description: |
      Blank lines between content lines are emitted as Data parts on
      both sides (preserved in skeleton for round-trip fidelity) and
      do NOT produce translatable Blocks. Multiple consecutive blank
      lines collapse to zero Blocks between the surrounding content.
    examples:
      - name: single_blank
        origin: "authored: two content lines separated by one blank line"
        input_xml: "Line 1\n\nLine 3\n"
        block_count: 2
        block_texts:
          - "Line 1"
          - "Line 3"
      - name: triple_blank
        origin: "authored: two content lines separated by multiple consecutive blank lines"
        input_xml: "Line 1\n\n\n\nLine 5\n"
        block_count: 2
        block_texts:
          - "Line 1"
          - "Line 5"
    okapi_refs:
      - MosesTextFilterTest#testEntry
    native_refs:
      - mosestext.TestEmptyLinesAsData

  # ── Whitespace preservation ───────────────────────────────────────
  - id: whitespace_preserved
    name: Whitespace inside lines is preserved verbatim
    description: |
      Internal whitespace (spaces, tabs, multiple spaces between
      words) is preserved exactly as written. The native reader sets
      `PreserveWhitespace: true` on every Block; the upstream filter
      asserts the same via `tu.preserveWhitespaces()`. Tab characters
      and unusual punctuation pass through unchanged.
    examples:
      - name: extra_spaces
        origin: "authored: lines containing runs of multiple internal spaces"
        input_xml: "Text 1   .\nLine with   extra   spaces"
        block_count: 2
        block_texts:
          - "Text 1   ."
          - "Line with   extra   spaces"
      - name: tab_and_punct
        # Tab and bracketed punctuation flow through verbatim.
        origin: "authored: line containing a literal tab character and bracketed punctuation"
        input_xml: "Text with tab[\t] and more [{|/\\}]"
        block_count: 1
        first_block_text: "Text with tab[\t] and more [{|/\\}]"
    okapi_refs:
      - MosesTextFilterTest#testWhiteSpaces
      - MosesTextFilterTest#testSpecialChars
    native_refs:
      - mosestext.TestWhiteSpaces
      - mosestext.TestPreserveWhitespace
      - mosestext.TestSpecialChars

  # ── Unicode content ───────────────────────────────────────────────
  - id: unicode_content
    name: Unicode content is preserved
    description: |
      Multi-byte UTF-8 sequences (CJK, accented Latin, emoji) flow
      through the line-based extractor unchanged. Both implementations
      treat input as UTF-8 by default (Moses Text spec processing
      note: "If the document has a BOM, it is used to determine the
      input encoding; otherwise UTF-8 is used regardless of any
      specified default encoding").
    spec_refs:
      - "Okapi Moses Text Filter (https://okapiframework.org/wiki/index.php/Moses_Text_Filter) — UTF-8 default with BOM-based encoding detection"
    examples:
      - name: cjk_and_latin
        origin: "authored: CJK characters mixed with Latin to verify UTF-8 multi-byte handling"
        input_xml: "Hello 世界\nこんにちは世界\n"
        block_count: 2
        block_texts:
          - "Hello 世界"
          - "こんにちは世界"
    okapi_refs:
      - MosesTextFilterTest#testEntry
    native_refs:
      - mosestext.TestEntries

  # ── File-based extraction (committed fixture) ─────────────────────
  - id: file_extraction
    name: Multi-line file is extracted line by line
    description: |
      The committed `testdata/simple.txt` fixture exercises the
      reader's file path. Three plain lines, each a translatable
      Block, in document order.
    examples:
      - name: simple_three_lines
        origin: "authored: minimal Moses InlineText file (three plain LF-separated lines) to exercise file-path read"
        input_file: testdata/simple.txt
        block_count: 3
        block_texts:
          - "Hello world"
          - "Second line"
          - "Third line"
    okapi_refs:
      - MosesTextFilterTest#testFromFile
      - MosesTextFilterTest#testDoubleExtraction
    native_refs:
      - mosestext.TestFromFile
      - mosestext.TestRoundTrip

  # ── Inline `<g>` / `<x>` / `<bx>` / `<ex>` codes ──────────────────
  #
  # The native reader parses Moses InlineText markup the same way as
  # upstream MosesTextFilter.fromPseudoXLIFF: `<g id="N">…</g>` become
  # paired inline codes, `<x id="N"/>` a placeholder, `<bx>`/`<ex>` a
  # paired open/close. Only the surrounding text reaches the flattened
  # Block source.
  - id: inline_g_codes
    name: "Inline `<g>` paired codes parse into inline codes"
    description: |
      Moses InlineText uses `<g id="N">…</g>` for paired inline codes
      (bold, italic, etc.). Both the Okapi MosesTextFilter and the
      native reader recognise the pattern via the `<g id="...">…</g>`
      regex and emit opening / closing codes; the Block source carries
      only the surrounding plain text. Self-closing `<x id="N"/>`
      placeholders are likewise carved out of the translatable text.
    spec_refs:
      - "Okapi Moses Text Filter (https://okapiframework.org/wiki/index.php/Moses_Text_Filter) — inline codes <g id=\"N\">, <x id=\"N\"/>, <bx id=\"N\"/>, <ex id=\"N\"/>"
    examples:
      - name: paired_g_with_text
        origin: "authored: paired <g> wrapping inline text plus a self-closing <x> placeholder"
        # `<g id="2">Text</g>` parses into a paired inline code wrapping
        # plain "Text" per Okapi MosesTextFilter testCode2; the trailing
        # `<x id="1"/>` is an isolated placeholder. Only the surrounding
        # text ("Text" plus the literal space) is translatable.
        input_xml: "<g id=\"2\">Text</g> <x id=\"1\"/>"
        block_count: 1
        # Text outside the <g> and standalone <x>: "Text" + the space.
        first_block_text: "Text "
    okapi_refs:
      - MosesTextFilterTest#testCode1
      - MosesTextFilterTest#testCode2
      - MosesTextFilterTest#testCode3
      - MosesTextFilterTest#testCode4
    native_refs:
      - mosestext.TestSpec

  # ── `<lb/>` line-break-within-entry ───────────────────────────────
  - id: lb_linebreak
    name: "`<lb/>` line-break decodes to a literal newline"
    description: |
      Moses InlineText uses `<lb/>` to encode a hard line break inside
      a single entry — a way to express "this multi-line paragraph is
      one TextUnit". Both the Okapi filter and the native reader decode
      `<lb/>` to a literal newline character in the Block source. The
      native writer re-encodes the newline back to `<lb/>` on output, so
      a read → write round trip is byte-exact.
    spec_refs:
      - "Okapi Moses Text Filter (https://okapiframework.org/wiki/index.php/Moses_Text_Filter) — <lb/> line-break decoded to literal newline"
    examples:
      - name: spans_three_lines
        origin: "authored: single entry containing two <lb/> markers to exercise in-entry line-break decoding"
        # `<lb/>` decodes to "\n" per Okapi MosesTextFilter testFromFile
        # (Test02.txt third entry). The two markers split the entry into
        # three newline-joined lines within one Block.
        input_xml: "Text of the second entry<lb/>which spans<lb/>several lines\n"
        block_count: 1
        first_block_text: "Text of the second entry\nwhich spans\nseveral lines"
    okapi_refs:
      - MosesTextFilterTest#testFromFile
    native_refs:
      - mosestext.TestSpec
      - mosestext.TestDoubleExtraction

  # ── XML entity decoding ───────────────────────────────────────────
  - id: xml_entities
    name: XML entities decode to their character values
    description: |
      Moses InlineText follows XLIFF-flavoured entity conventions:
      `&lt;`, `&gt;`, `&amp;`, `&quot;`, `&apos;` decode to their
      literal characters; the carriage-return numeric references
      (`&#13;`, `&#xD;`) decode to U+000D. Both the Okapi filter and the
      native reader decode these on read; the native writer re-encodes
      `<`/`&`/`\r` back to entities on output so the round trip is
      byte-exact.
    spec_refs:
      - "XML 1.0 §4.6 Predefined Entities (https://www.w3.org/TR/xml/#sec-predefined-ent)"
    examples:
      - name: basic_entities
        origin: "authored: line containing &lt;/&gt;/&amp; XML entities to exercise decoding"
        # `&lt;`/`&gt;`/`&amp;` decode to `<`/`>`/`&` per Okapi
        # MosesTextFilter testLiterals.
        input_xml: "&lt;=lt &gt;=gt &amp;=amp"
        block_count: 1
        first_block_text: "<=lt >=gt &=amp"
    okapi_refs:
      - MosesTextFilterTest#testLiterals
    native_refs:
      - mosestext.TestSpec
      - mosestext.TestDoubleExtraction

  # ── `<mrk mtype="seg">` segmentation ──────────────────────────────
  - id: mrk_segmentation
    name: '`<mrk mtype="seg">` annotations extract only the body text'
    description: |
      Moses InlineText uses `<mrk mtype="seg">…</mrk>` to annotate a
      segment boundary. Both the Okapi filter and the native reader
      treat the `<mrk>` body as the entry's translatable content — the
      `<mrk …>` and `</mrk>` markers are skeleton, not source text. A
      segment body may span several physical lines (the markers don't
      have to close on the same line); the body lines are joined with
      newlines, matching MosesTextFilter.next().
    examples:
      - name: single_mrk_in_line
        origin: "authored: single line wrapped in <mrk mtype=\"seg\"> to exercise XLIFF-style segment annotation"
        # Only the `<mrk>` body is translatable; the literal tags are
        # dropped (held as skeleton) per Okapi MosesTextFilter
        # testWhiteSpaces.
        input_xml: "<mrk mtype=\"seg\">Inside marker</mrk>"
        block_count: 1
        first_block_text: "Inside marker"
    okapi_refs:
      - MosesTextFilterTest#testWhiteSpaces
      - MosesTextFilterTest#testFromFile
    native_refs:
      - mosestext.TestSpec
      - mosestext.TestFromFileMultiline

# ── Intentionally under-specified ──────────────────────────────────
#
# Round-trip / double-extraction (testDoubleExtraction) is verified by
# the native mosestext.TestRoundTrip test but is not expressible
# through the BlockTexts assertion vocabulary this spec uses — there
# is no roundtrip assertion type. Captured here as a known coverage
# gap rather than as a synthetic Feature.
#
# Writer-side behaviour (MosesTextFilterWriterTest#testSimpleOutput,
# testMultilineOutput, testFileOutputFromXLIFF01,
# testOutputFromXLIFF01/02) exercises the Moses Text *writer* and the
# XLIFF→Moses pipeline. Those are write-time behaviours that the
# reader-only assertion vocabulary in this spec cannot express. The
# native writer tests (mosestext.TestWriterSimpleOutput,
# TestWriterMultilineOutput, TestRoundTripWithTargetLocale) cover the
# read → write path.
#
# `testEscapedG` upstream throws `EmptyStackException` deliberately
# (the input is malformed: `&lt;g&gt;a&lt;/g&gt;` decodes to `<g>a</g>`
# where the bare `<g>` lacks an `id` attribute, so the parser cannot
# stack-balance the trailing `</g>`). The native reader entity-decodes
# the same way, but its code parser has no stack to underflow — the bare
# `<g>` is not a valid opening code and the unmatched `</g>` is captured
# as a closing code run, so the native reader accepts the input without
# error. This divergence (Okapi throws, native tolerates) is verified by
# the native-only `mosestext.TestEscapedGDecodesWithoutError` test and is
# implicit in the `xml_entities` and `inline_g_codes` features above. No
# standalone Feature is added here.
#
# `testDefaultInfo` and `testStartDocument` upstream are upstream
# API-shape / harness tests rather than user-observable extraction
# behaviour. Their semantics are folded into the other features
# (`testStartDocument` is referenced under empty_input and single_line;
# `testDefaultInfo` has no observable consequence on extraction).
