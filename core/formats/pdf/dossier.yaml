# Knowledge dossier (K1) — contract: docs/internals/format-maturity.md §2.4.
# spec_sources ids resolve against specs/catalog.yaml. pdf is read-only by
# design (no writer; writer/vocabulary write cells are na).
format: pdf
spec_sources:
  - id: pdf-1.7
    version: "1.7 (ISO 32000-1)"
    url: https://opensource.adobe.com/dc-acrobat-sdk-docs/pdfstandards/PDF32000_2008.pdf
    watch: null
    notes: >-
      PDF 1.7 — Adobe's freely published copy of ISO 32000-1 (the ISO text
      itself is never vendored; this is the permitted free twin). Content
      streams + text-showing operators. neokapi extracts text only (read-only).
implementations:
  - name: Okapi PDF Filter (okf_pdf)
    kind: okapi
    pointer: okapi/filters/pdf
    watch: https://gitlab.com/okapiframework/Okapi/-/tags?format=atom
  - name: pdfcpu / pdf text extraction (Go)
    kind: other
    pointer: https://github.com/pdfcpu/pdfcpu
    license_note: Apache-2.0 — Go PDF tooling reference
learning_materials:
  - web/docs/reference/formats/pdf.mdx
  - scripts/gen-refs/nativedocs/formats/pdf.yaml
divergences: []
