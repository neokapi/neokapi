# PDF format specification.
#
# `okf_pdf` per Okapi (PdfFilter) is a text-extraction filter for PDF
# documents. Okapi wraps Apache PDFBox: a Java PDF library that walks
# the document's content streams and emits text positions, which the
# filter then segments into paragraphs by feeding the extracted string
# back through okf_plaintext (newline-delimited TextUnits). The filter
# is read-only in practical terms — the Okapi docs explicitly note
# that "this filter merges back in plain text format, not PDF" so a
# round-trip through the filter does not preserve the original PDF
# layout.
#
# The native Go reader at `core/formats/pdf/` is a regex-based content-
# stream walker: it locates `stream`/`endstream` pairs in the raw PDF
# bytes, decompresses FlateDecode segments, then runs four regex
# patterns (`(text) Tj`, `(text) '`, `[(t) num (t)] TJ`, plus its
# tokenizer for escape sequences inside the string literals) over
# everything between `BT` and `ET` markers. It does not consult the
# document's font dictionary, so PDFs whose strings are encoded as
# glyph indices through a `ToUnicode` CMap surface as garbage or
# nothing at all; it does not handle escaped parentheses inside string
# literals because the capture group is `[^)]*`; and it has no
# paragraph segmentation — every text run inside a page becomes one
# Block joined with single spaces. These limitations are inherent to
# the regex approach and are documented as `expected_fail` blocks on
# the affected examples below.
#
# ── Native vs bridge divergence (#461) ─────────────────────────────────
# The two implementations share the same goal (extract text from PDF
# pages) but disagree on:
#
#   - Paragraph segmentation. The bridge feeds PDFBox's extracted text
#     through okf_plaintext and emits one Block per newline-delimited
#     paragraph (`indentThreshold` and `spacingTolerance` parameters
#     drive the heuristic). The native reader emits one Block per page
#     containing every text run on that page joined with single
#     spaces. Examples whose source PDFs have multiple text runs per
#     page therefore assert `has_block_with_text` over both runs
#     rather than a strict `block_count`, so the same contract holds
#     for either segmentation strategy and the bytewise difference
#     surfaces as a parity_warn instead of a hard fail.
#
#   - Escape handling. The native regex `\(([^)]*)\)` doesn't recurse
#     into balanced parens inside string literals, so PDFs with
#     escaped parens (`\(`, `\)`) extract as zero blocks because the
#     capture group never closes. PDFBox handles the PDF string
#     grammar correctly (ISO 32000-1 §7.3.4.2 Literal Strings).
#
#   - Glyph/CMap decoding. Real PDFs from word processors and
#     ghostscript encode strings as glyph indices that map back to
#     Unicode via a `ToUnicode` CMap. PDFBox consults the font and
#     produces Unicode text; the native reader returns the raw byte
#     contents of the string literal (often unprintable garbage).
#     This means real-world fixtures (`okapi-testdata/.../*.pdf`)
#     extract cleanly through the bridge but produce zero or garbled
#     text through the native reader.
#
#   - Configuration surface. The native reader's Config struct is
#     empty — `ApplyMap` rejects every parameter with
#     `pdf: unknown parameter: <key>`. The bridge accepts the six
#     PdfFilter parameters declared below. Any spec example with a
#     non-default config block fatals the native runner at
#     `c.ApplyMap(cfg)` (see core/format/spec/runner.go line 77 —
#     `t.Fatalf("apply config %v: %v", cfg, err)`) before the
#     `expected_fail` handling can kick in, so examples with config
#     are tagged `bridge_only:` and the native side skips them
#     cleanly rather than logging an expected failure.
#
# Authoring notes:
#   - All inline fixtures are minimal hand-crafted PDF files committed
#     under `testdata/`. They use the Type 1 base font Helvetica
#     (which doesn't require an embedded font program) and uncompressed
#     content streams so both regex and PDFBox can read them. The
#     fixtures were generated with byte-accurate xref offsets (PDFBox
#     rejects PDFs whose xref offsets don't match the actual object
#     positions) and committed verbatim — no runtime generation step.
#   - There is no public spec for "PDF text extraction" — the relevant
#     normative reference is ISO 32000-1:2008 (the PDF reference, also
#     republished as Adobe PDF 1.7 Reference). The text-showing
#     operators (Tj, TJ, ', ") live in §9.4.3, string-literal escape
#     sequences in §7.3.4.2, and content streams in §7.8.2. ISO copies
#     are paywalled — `spec_refs` cite the section by name only when
#     the open-access mirror at opensource.adobe.com is the closest
#     verifiable URL.
#   - okapi_refs target `PdfFilterTest#methodName` from the upstream
#     `okapi-filter-pdf` test class (4 @Test methods in 1.47.0).
#   - native_refs link to the existing `core/formats/pdf/reader_test.go`
#     functions so the docs site can surface the native implementation
#     alongside the contract.
#   - Config keys mirror the Okapi parameter names exactly — the same
#     names the bridge composite schema's `x-okapi-flatten-path`
#     entries expose, so drift detection lines up. Examples that need
#     a non-default config block use `bridge_only:` (see
#     `preserve_whitespace_config` for the canonical case) so the
#     native runner skips them cleanly while the bridge side still
#     exercises the parameter wiring.

format: okf_pdf
kind: top_level
mime_type: application/pdf
description: |
  PDF Filter — extracts translatable text from PDF documents. The
  upstream Okapi PdfFilter wraps Apache PDFBox to walk the document's
  content streams (PDF text-showing operators Tj, TJ, ', ") and feeds
  the resulting string through the plaintext sub-filter so each
  newline-delimited paragraph becomes one TextUnit. Paragraph
  boundaries are inferred from PDFBox's `indentThreshold` (vertical
  spacing between lines) and `spacingTolerance` (horizontal gap
  threshold). The filter is text-extraction only — it does not
  round-trip back to PDF; its writer emits plain text.

config:
  - key: useCodeFinder
    type: boolean
    default: false
    description: |
      Enable pattern-based detection of inline codes (placeholders,
      tags, variables) inside extracted text. When true, the
      `codeFinderRules` parameter supplies regex patterns whose
      matches become inline-code Spans on the surrounding Block
      instead of part of the source text.
    okapi_param: useCodeFinder

  - key: indentThreshold
    type: string
    default: "2.0"
    description: |
      Vertical spacing (in PDF user-space units) used to decide when
      two consecutive text runs belong to different paragraphs. Larger
      values fold more lines together into a single Block; smaller
      values split aggressively. PDFBox passes this to its
      `PDFTextStripper.setSpacingTolerance` analogue.
    okapi_param: indentThreshold

  - key: spacingTolerance
    type: string
    default: "0.5"
    description: |
      Horizontal spacing (in fractions of font space-width) that
      counts as a single inter-word space between adjacent glyphs.
      Smaller values insert spaces more eagerly between glyph runs;
      larger values join glyphs into a single word.
    okapi_param: spacingTolerance

  - key: preserveWhitespace
    type: boolean
    default: false
    description: |
      Keep the original whitespace verbatim in extracted text rather
      than collapsing runs of whitespace to a single space. Off by
      default; matches the okf_plaintext sub-filter's normalization.
    okapi_param: preserveWhitespace

  - key: lineSeparator
    type: string
    default: "\n"
    description: |
      Character emitted between consecutive lines within the same
      paragraph when extracting text. The default `\n` produces
      Unix-style line breaks; downstream tooling that needs CRLF can
      override.
    okapi_param: lineSeparator

  - key: paragraphSeparator
    type: string
    default: "\n"
    description: |
      Character emitted between paragraphs (i.e. between TextUnits)
      when extracting text. Combined with `indentThreshold` to drive
      the okf_plaintext sub-filter's paragraph segmentation.
    okapi_param: paragraphSeparator

features:
  # ── Single-page text extraction (the canonical case) ──────────────
  - id: single_page_text_extraction
    name: Extract text from a single-page PDF
    description: |
      A one-page PDF with a single `BT … (Hello World) Tj … ET` text
      block yields one translatable Block whose source text is the
      shown string. The bridge runs the extracted text through
      okf_plaintext and emits one TextUnit per newline-delimited
      paragraph; with a single line of text both implementations
      agree on one Block.
    spec_refs:
      - "ISO 32000-1:2008 §9.4.3 Text-Showing Operators (Tj operator) — open-access copy at opensource.adobe.com/dc-acrobat-sdk-docs/pdfstandards/PDF32000_2008.pdf"
      - "Apache PDFBox text extraction (https://pdfbox.apache.org/) — drives the upstream PdfFilter's content-stream walk"
    examples:
      - name: hello_world
        origin: "authored: testdata/hello.pdf — minimal one-page PDF with a single Tj operator showing 'Hello World'"
        input_file: testdata/hello.pdf
        block_count: 1
        first_block_text: "Hello World"
    okapi_refs:
      - PdfFilterTest#firstTextUnit
      - PdfFilterTest#firstParagraphTextUnit
    native_refs:
      - pdf.TestReadMinimalPDF

  # ── TJ array operator (kerning-aware glyph runs) ──────────────────
  - id: tj_array_extraction
    name: Extract text from TJ array operator
    description: |
      The `TJ` operator takes an array of strings interleaved with
      numeric kerning offsets (`[(Hello) -10 ( ) -5 (World)] TJ`) and
      shows each string with the offset adjusting glyph position. The
      filter must concatenate the string literals back together
      regardless of the kerning values. Both implementations recover
      the words; the native reader's regex preserves the literal
      space-and-empty-string from the array verbatim (yielding
      "Hello   World" with extra spaces) while the bridge's PDFBox
      backend collapses adjacent space-only runs.
    spec_refs:
      - "ISO 32000-1:2008 §9.4.3 Text-Showing Operators (TJ operator with kerning array) — open-access copy at opensource.adobe.com/dc-acrobat-sdk-docs/pdfstandards/PDF32000_2008.pdf"
    examples:
      - name: kerned_hello_world
        origin: "authored: testdata/tjarray.pdf — TJ array operator with kerning offsets between 'Hello', ' ', 'World'"
        input_file: testdata/tjarray.pdf
        # Asserts the bridge contract: PDFBox normalises the kerned
        # array back to the original two-word phrase. Native preserves
        # the literal array contents verbatim ("Hello   World" with
        # the space-glyph + extra inter-glyph space) — captured as
        # has_block_with_text on both 'Hello' and 'World' so the
        # assertion is satisfied for both implementations and the
        # bytewise difference falls out as a parity_warn.
        block_count: 1
        has_block_with_text:
          - "Hello"
          - "World"
    okapi_refs:
      - PdfFilterTest#firstTextUnit
    native_refs:
      - pdf.TestReadTJArray

  # ── Multi-page documents ──────────────────────────────────────────
  - id: multi_page_extraction
    name: Extract text from each page of a multi-page PDF
    description: |
      A two-page PDF with one paragraph per page yields two
      translatable Blocks in document order — one per page. The
      bridge segments via PDFBox's per-page text + okf_plaintext
      paragraph separator; the native reader emits one Block per page
      because each page's content stream is walked as a unit.
    spec_refs:
      - "ISO 32000-1:2008 §7.7.3 Page Tree (Pages object with Kids array) — open-access copy at opensource.adobe.com/dc-acrobat-sdk-docs/pdfstandards/PDF32000_2008.pdf"
    examples:
      - name: two_pages
        origin: "authored: testdata/multi.pdf — two-page PDF, each page contains one Tj operator with distinct text"
        input_file: testdata/multi.pdf
        block_count: 2
        block_texts:
          - "Page one text"
          - "Page two text"
    okapi_refs:
      - PdfFilterTest#testStartDocument
    native_refs:
      - pdf.TestPageLayers

  # ── Multi-line text (each Tj run extractable) ─────────────────────
  - id: multiple_text_runs_per_page
    name: Multiple text-showing operators on the same page
    description: |
      A page with two consecutive `Tj` operators (e.g. two text lines
      shown via `Td` + `Tj` then a relative `Td` + `Tj`) carries two
      runs of text content. The native reader joins every text run
      on the page into a single Block with single spaces between
      them; the bridge feeds the runs through okf_plaintext with
      the configured `paragraphSeparator` and may emit the two lines
      as separate paragraph TextUnits depending on the
      `indentThreshold` heuristic. The spec asserts the source text
      contains both runs without prescribing how many Blocks the
      filter splits them into — both implementations must surface
      "First line" and "Second line" as translatable text.
    spec_refs:
      - "ISO 32000-1:2008 §9.4.3 Text-Showing Operators (Tj after Td positioning) — open-access copy at opensource.adobe.com/dc-acrobat-sdk-docs/pdfstandards/PDF32000_2008.pdf"
    examples:
      - name: two_lines_extracted
        origin: "authored: testdata/multiline.pdf — two Tj operators with relative Td positioning on the same page"
        input_file: testdata/multiline.pdf
        # Both implementations must surface both lines as
        # translatable text. has_block_with_text is satisfied by
        # either a single combined Block ("First line Second line",
        # the native shape) or two separate Blocks ("First line" +
        # "Second line", the bridge shape) — the bytewise difference
        # falls out as a parity_warn.
        has_block_with_text:
          - "First line"
          - "Second line"
    okapi_refs:
      - PdfFilterTest#firstParagraphTextUnit
    native_refs:
      - pdf.TestReadMinimalPDF

  # ── Apostrophe operator (move + show on next line) ────────────────
  - id: quote_operator_extraction
    name: Extract text from the ' (move-to-next-line + show) operator
    description: |
      The `'` operator is a shorthand combining `T*` (move to next
      line) with `Tj` (show string). PDFs generated by older Okapi
      tooling and some commercial PDF generators emit `'` for line
      continuations. Both implementations must surface the shown
      string as translatable text the same way as a `Tj` would —
      the assertion is on text presence rather than block count to
      keep the contract independent of paragraph-segmentation
      heuristics.
    spec_refs:
      - "ISO 32000-1:2008 §9.4.3 Text-Showing Operators ( ' operator: move to next line and show string) — open-access copy at opensource.adobe.com/dc-acrobat-sdk-docs/pdfstandards/PDF32000_2008.pdf"
    examples:
      - name: tj_then_quote
        origin: "authored: testdata/quote.pdf — first line shown via Tj, second line shown via ' operator"
        input_file: testdata/quote.pdf
        has_block_with_text:
          - "First line"
          - "Second line"
    okapi_refs:
      - PdfFilterTest#firstTextUnit
    native_refs:
      - pdf.TestReadMinimalPDF

  # ── String literal escape sequences ───────────────────────────────
  - id: escaped_parens_in_string
    name: Decode escaped parentheses inside string literals
    description: |
      PDF string literals use `\(` and `\)` to embed parentheses
      inside the `(...)` delimiters. ISO 32000-1 §7.3.4.2 also
      defines `\\` (backslash), `\n`/`\r`/`\t`/`\b`/`\f` (control
      characters), and `\nnn` (octal byte). The bridge's PDFBox
      backend handles the full grammar; the native reader's regex
      `\(([^)]*)\)` does not recurse into escaped delimiters and
      misses any string containing `\(` or `\)`.
    spec_refs:
      - "ISO 32000-1:2008 §7.3.4.2 Literal Strings (escape sequences for parens, backslash, octal) — open-access copy at opensource.adobe.com/dc-acrobat-sdk-docs/pdfstandards/PDF32000_2008.pdf"
    examples:
      - name: cost_with_escaped_parens
        origin: "authored: testdata/special.pdf — Tj operator with escaped parens, escaped backslash, and octal escape (\\101 → 'A')"
        input_file: testdata/special.pdf
        expected_fail: |
          native bug — the regex `\(([^)]*)\)\s*Tj` in
          core/formats/pdf/reader.go does not allow escaped `\)` in
          the capture group, so a string like `(Cost: \(US\$50\) \\
          \101OK)` never matches and the block is dropped entirely
          (zero blocks extracted). PDFBox correctly decodes the
          string per ISO 32000-1 §7.3.4.2. Tracked as #510 (native
          bug filed alongside this spec) — fixing it requires
          replacing the regex tokenizer with a small PDF
          string-literal parser.
        block_count: 1
        first_block_text: "Cost: (US$50) \\ AOK"
    okapi_refs:
      - PdfFilterTest#firstTextUnit
    native_refs:
      - pdf.TestReadMinimalPDF

  # ── Empty document (zero-content baseline) ────────────────────────
  - id: empty_document
    name: PDF with no text content yields no translatable blocks
    description: |
      A valid PDF whose pages have no content stream (or only
      non-text drawing operators) produces zero translatable Blocks.
      Verifies neither implementation hallucinates text from an
      empty document.
    spec_refs:
      - "ISO 32000-1:2008 §7.7.3 Page Tree — a Page object without a Contents entry — open-access copy at opensource.adobe.com/dc-acrobat-sdk-docs/pdfstandards/PDF32000_2008.pdf"
    examples:
      - name: blank_page
        origin: "authored: testdata/empty.pdf — single page with no Contents entry, no Resources"
        input_file: testdata/empty.pdf
        block_count: 0
    okapi_refs:
      - PdfFilterTest#testDefaultInfo
      - PdfFilterTest#testStartDocument
    native_refs:
      - pdf.TestReadEmptyPDF

  # ── Real-world PDF (CMap / glyph index decoding) ──────────────────
  - id: real_world_compressed_pdf
    name: Real PDF with compressed streams and ToUnicode CMap
    description: |
      Real-world PDFs (produced by word processors, ghostscript, or
      desktop publishing tools) compress content streams via
      FlateDecode and encode strings as glyph indices that map back
      to Unicode through a `ToUnicode` CMap on the font dictionary.
      The bridge's PDFBox backend honours the CMap and produces
      Unicode text; the native reader walks string literals as raw
      bytes without consulting the font, so glyph-index strings
      surface as garbage or — when the entire stream uses
      glyph-index encoding — as zero blocks.
    spec_refs:
      - "ISO 32000-1:2008 §9.10.3 ToUnicode CMaps (mapping character codes to Unicode) — open-access copy at opensource.adobe.com/dc-acrobat-sdk-docs/pdfstandards/PDF32000_2008.pdf"
      - "ISO 32000-1:2008 §7.4.4 LZWDecode and FlateDecode Filters (compressed content streams) — open-access copy at opensource.adobe.com/dc-acrobat-sdk-docs/pdfstandards/PDF32000_2008.pdf"
    examples:
      - name: palc_2011
        origin: "okapi-fixture: okapi:okapi/filters/pdf/src/test/resources/PALC_2011_LT.pdf (real-world 11-page conference paper, ghostscript-produced)"
        input_file: okapi:okapi/filters/pdf/src/test/resources/PALC_2011_LT.pdf
        expected_fail: |
          native bug — the regex content-stream walker in
          core/formats/pdf/reader.go cannot decode glyph-index strings
          via a font's ToUnicode CMap (it has no font handling at
          all), so this 11-page paper extracts zero Blocks instead of
          the body text the bridge recovers. Tracked as #510 (native
          bug filed alongside this spec) along with the escape-paren
          gap. PDFBox handles both correctly.
        block_count_min: 1
    okapi_refs:
      - PdfFilterTest#firstTextUnit
      - PdfFilterTest#firstParagraphTextUnit
    native_refs:
      - pdf.TestReadMinimalPDF

  # ── Configuration surface (preserveWhitespace) ────────────────────
  - id: preserve_whitespace_config
    name: preserveWhitespace=true keeps inter-line whitespace verbatim
    description: |
      Setting `preserveWhitespace: true` tells PDFBox + okf_plaintext
      to keep runs of whitespace in extracted text rather than
      collapsing them to a single space. Verifies the parameter name
      maps through the bridge composite schema to the native
      configuration field.
    spec_refs:
      - "Okapi PdfFilter Parameters (preserveWhitespace flag — controls okf_plaintext sub-filter whitespace normalisation; no formal external spec)"
    config:
      preserveWhitespace: true
    examples:
      - name: tjarray_whitespace_preserved
        origin: "authored: testdata/tjarray.pdf with preserveWhitespace=true config"
        input_file: testdata/tjarray.pdf
        # bridge_only because the native PDF reader's Config struct
        # in core/formats/pdf/config.go has no fields and ApplyMap
        # rejects every parameter with `pdf: unknown parameter:
        # preserveWhitespace`. The native runner fatals on the config
        # error before the expected_fail handling kicks in (see
        # core/format/spec/runner.go line 77 — `t.Fatalf("apply
        # config %v: %v", cfg, err)`), so the example skips the
        # native side entirely. Tracked as #510 (native bug filed
        # alongside this spec): a full fix requires both a parameter
        # surface and a real PDFBox-equivalent extractor.
        bridge_only: true
        block_count: 1
        has_block_with_text:
          - "Hello"
          - "World"
    okapi_refs:
      - PdfFilterTest#firstTextUnit
    native_refs:
      - pdf.TestReadTJArray
