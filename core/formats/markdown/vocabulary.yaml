# core/formats/markdown/vocabulary.yaml — Markdown representation-fidelity matrix.
#
# Vocabulary maturity axis (docs/internals/format-maturity.md §2.2), scored
# against core/formats/constructs.yaml. Cells record only what the
# reader/writer code provably does, evidence-bound for the audit.
#
# READER (core/formats/markdown/reader.go): the goldmark AST emphasis/strong/
# link/code switch maps strong→fmt:bold, emphasis→fmt:italic, inline code→
# fmt:code, link/autolink→link:hyperlink, strikethrough→fmt:strikethrough,
# image→media:image — all canonical pack strings. Links and images additionally
# carry format-neutral Attrs (href/src/alt/title) so a foreign writer can
# re-synthesize them without parsing the markdown-literal Data.
#
# (The same reader is shared by the mdx format; per the task scope no mdx
# vocabulary.yaml is authored here.)
#
# WRITER (core/formats/markdown/writer.go): two paths. The byte-exact skeleton
# path re-emits captured Data via model.RenderRunsWithData (round-trip). The
# cross-format (no-skeleton) path authors inline markup from each run's
# canonical Type via mdInlineTag + renderInlineMarkdown (links/images from
# Attrs, code-block language from Block.CodeLanguage()), so a foreign document
# projects to clean markdown — verified by the core/formats TestCrossFormat_*
# suite and TestMarkdownInlineTagCoverage (drift guard).
#
# DEFERRED to V3 (no grounding test asserting the canonical type yet):
# block.paragraph / block.list-item / block.quote, placeholder.footnote-ref,
# placeholder.named ({{interpolation}}). Emitted by the reader but omitted
# rather than claimed without resolvable evidence.
version: 1
family: rich-markup

constructs:
  - construct: inline.bold
    expressible: true
    read:
      status: lossless
      evidence: ["core/formats/vocab_equivalence_test.go:TestVocabEquivalence"]
    write:
      status: lossless
      evidence: ["core/formats.TestCrossFormat_HTMLToMarkdown"]
      notes: >-
        The cross-format path authors **bold** from the canonical fmt:bold Type
        (mdInlineTag); the skeleton path round-trips captured Data.

  - construct: inline.italic
    expressible: true
    read:
      status: lossless
      evidence: [markdown.TestRead_Emphasis]
    write:
      status: lossless
      evidence: ["core/formats.TestCrossFormat_MarkdownToHTML"]
      notes: Authored from canonical fmt:italic on the cross-format path.

  - construct: inline.code
    expressible: true
    read:
      status: lossless
      evidence: [markdown.TestRead_Code]
    write:
      status: lossless
      evidence: ["core/formats.TestCrossFormat_HTMLToMarkdown"]
      notes: Authored from canonical fmt:code on the cross-format path.

  - construct: link.hyperlink
    expressible: true
    read:
      status: lossless
      evidence: [markdown.TestRead_Link]
    write:
      status: lossless
      evidence: ["core/formats.TestCrossFormat_HTMLToMarkdown"]
      notes: >-
        The []() destination is re-authored from link:hyperlink + the run's
        href Attr on the cross-format path; the skeleton path round-trips Data.

  - construct: inline.strikethrough
    expressible: true
    read:
      status: lossless
      evidence: [markdown.TestRead_StrikethroughSubscript]
      notes: >-
        The reader emits the canonical fmt:strikethrough type
        (core/formats/markdown/reader.go); the ~~...~~ marker is preserved in
        Data for byte-exact round-trip.
    write:
      status: lossless
      evidence: [markdown.TestMarkdownInlineTagCoverage]
      notes: Authored as ~~...~~ from canonical fmt:strikethrough.

  - construct: media.image
    expressible: true
    read:
      status: lossless
      evidence: [markdown.TestRead_Image]
      notes: >-
        The reader emits the canonical media:image type with the src/alt/title
        carried as format-neutral Attrs; the ![]() markup is preserved in Data
        for byte-exact round-trip.
    write:
      status: lossless
      evidence: ["core/formats.TestCrossFormat_HTMLToMarkdown"]
      notes: Re-authored as ![alt](src) from canonical media:image + Attrs.

  - construct: block.heading
    expressible: true
    read:
      status: lossless
      evidence: [markdown.TestReadHeadings]
      notes: >-
        Block.Type set to "heading" with the level on Properties["level"]
        (block-kind row; model_mapping block:type).
    write:
      status: unknown
      notes: >-
        Heading markers (# / underline) round-trip via the block skeleton /
        captured Data, not re-authored from the block kind.
