# Knowledge dossier (K1) — contract: docs/internals/format-maturity.md §2.4.
format: markdown
spec_sources:
  - id: commonmark
    version: "0.31.2"
    url: https://spec.commonmark.org/0.31.2/
    watch: https://github.com/commonmark/commonmark-spec/releases.atom
    notes: >-
      Dormant since 2024-01-28; risk is profile/dialect drift (GFM, MDX,
      Markdoc, AI-context conventions), not core churn. spec.txt doubles as
      the upstream test corpus.
  - id: gfm
    version: "0.29-gfm"
    url: https://github.github.com/gfm/
    watch: https://github.com/github/cmark-gfm/releases.atom
    notes: >-
      GitHub Flavored Markdown extensions (tables, strikethrough) — the
      native reader enables the matching goldmark extensions; spec.yaml
      spec_refs cite the tables/strikethrough extension anchors.
implementations:
  - name: Okapi Markdown filter (okf_markdown)
    kind: okapi
    pointer: okapi/filters/markdown
    license_note: Apache-2.0; built on flexmark-java (BSD-2-Clause)
  - name: goldmark
    kind: other
    pointer: github.com/yuin/goldmark
    license_note: MIT — the CommonMark+GFM parser the native reader walks
    watch: https://github.com/yuin/goldmark/releases.atom
  - name: Pandoc Markdown reader/writer
    kind: pandoc
    pointer: https://github.com/jgm/pandoc
    license_note: GPL-2.0-or-later — read-about only, never harvest
learning_materials:
  - web/docs/reference/formats/markdown.mdx
  - scripts/gen-refs/nativedocs/formats/markdown.yaml
divergences: []
