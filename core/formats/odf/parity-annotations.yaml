format: odf
# Native (neokapi) ODF reader/writer divergences against the upstream
# okapi-bridge reference. Bridge engine is byte-equal with okapi on all
# 15 fixtures (literally invokes Okapi's OpenOfficeFilter via
# okapi-bridge#11's two-pass pipeline). Divergences below are native-
# side bugs/gaps unless noted.
fixtures:
  TestDocument01.odt:
    severity: bug
    summary: "Native serialises content.xml with the source's original namespace prefixes (xmlns:office=..., xmlns:style=...) while okapi's ODFFilter re-emits canonical form (xmlns=..., xmlns:_=same-uri, prefixed attrs as _:attr, original-prefix aliased via xmlns:_xmlns). After XML canonicalisation the namespace URIs match but the wire format diverges from offset 1. Cosmetic in isolation, but stacked with the bugs below across the corpus."
    spec_ref: "OpenDocument 1.2 §1.4 (namespace handling)"
  TestDocument02.odt:
    severity: bug
    summary: "Native drops the inline <script> wrapper in paragraph text — pseudo-translates the script body as if it were paragraph text, losing the <script xmlns:script:1.0 language=JavaScript> element. okapi preserves <script>…</script> as inline markup and pseudo-translates only the text around it."
  TestDocument03.odt:
    severity: bug
    summary: "Same namespace-canonicalisation pattern as TestDocument01 (this fixture happens to declare _:version=\"1.1\" — older ODF spec — so prefix shapes diverge similarly)."
    spec_ref: "OpenDocument 1.1 §1.4"
  TestDocument04.odt:
    severity: bug
    summary: "Same namespace-canonicalisation pattern as TestDocument01."
  TestDocument05.odt:
    severity: bug
    summary: "Same namespace-canonicalisation pattern as TestDocument01."
  TestDocument06.odt:
    severity: bug
    summary: "Residual: style:num-prefix / style:num-suffix attribute extraction now matches okapi (\"Text before>\" / \"<Text after\" pseudo-translate). What remains is the same namespace-canonicalisation pattern as TestDocument01 — native emits xmlns:office=.../xmlns:style=...; okapi rewrites to xmlns=...+xmlns:_=... . After XML canonicalisation the namespace URIs match but the wire format diverges from offset 1."
    spec_ref: "OpenDocument 1.2 §1.4 (namespace handling) / §19.711 / §19.812"
  TestDocumentWithFormulaResults.ods:
    severity: bug
    summary: "Residual: table:name extraction (\"Sheet1\") and style:num-prefix/num-suffix extraction now match okapi. What remains is (a) a trailing-whitespace trim in cell paragraphs — native's strings.TrimSpace(b.PlainText()) drops the 10 trailing spaces in \"spaces at the end          \" that okapi preserves — and (b) the styles.xml <text:page-number> inline element being flattened to literal \"1\" (same pattern as TestDocumentWithMetadata)."
    spec_ref: "OpenDocument 1.2 §6.4.5 (text:page-number) / paragraph whitespace handling / §19.731"
  TestDocumentWithMetadata.odt:
    severity: bug
    summary: "Native flattens <page-count>2</page-count> and <page-number>2</page-number> inline markup in footer/header content into literal \"2 of 2\" text; the inline elements are part of the paragraph runs and should be preserved as inline markup with their numeric placeholders intact (okapi does this)."
    spec_ref: "OpenDocument 1.2 §6.4.5 (text:page-number) / §6.4.6 (text:page-count)"
  TestDocumentWithNumberTag.odp:
    severity: bug
    summary: "styles.xml namespace canonicalisation differs from offset 1 (same shape as TestDocument01)."
  TestDocumentWithTableWrappingAboutTable.odt:
    severity: bug
    summary: "Native drops <frame> inline markup inside paragraph runs — pseudo-translates the paragraph text as a single string, losing the framed content boundary. okapi keeps <frame xmlns:draw=… name=\"Frame1\" style-name=\"fr1\"> as inline markup around its inner text."
    spec_ref: "OpenDocument 1.2 §10.4.2 (draw:frame)"
  TestDocument_WithITS.odt:
    severity: bug
    summary: "Native ignores ITS translate annotations — pseudo-translates content marked with its:translate=\"no\" (the \"NOT to translate\" span) which okapi correctly preserves. ITS metadata recognition is a known gap in the native ODF reader."
    spec_ref: "ITS 2.0 §6.2 (Translate)"
  TestDrawing01.odg:
    severity: bug
    summary: "Native drops the inline <span style-name=\"T1\">bold</span> markup inside text boxes — pseudo-translates the entire paragraph as flat text, losing the styled-run boundaries. Same drop-inline-markup pattern as TestDocument02/TestDocumentWithTableWrappingAboutTable."
    spec_ref: "OpenDocument 1.2 §6.1.7 (text:span)"
  TestPresentation01.odp:
    severity: bug
    summary: "Native does not extract the meta:description Dublin-Core metadata as translatable (\"Orange title on dark blue background...\") — leaves it in source language while okapi pseudo-translates it."
    spec_ref: "OpenDocument 1.2 §4.3.2.6 (dc:description)"
  TestSpreadsheet01.ods:
    severity: bug
    summary: "Residual: table:name extraction (\"Title of sheet one\") now matches okapi. What remains is the annotation/comment <text:span> inline markup being flattened — native drops the <span text:style-name=\"T1\">…</span> wrapper inside cell comments. Same drop-inline-markup pattern as TestDrawing01 / TestPresentation01."
    spec_ref: "OpenDocument 1.2 §6.1.7 (text:span) / §19.731 (table:name)"
  bookmark-reference.odt:
    severity: bug
    summary: "Same namespace-canonicalisation pattern as TestDocument01."
