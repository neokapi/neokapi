# Doxygen format specification.
#
# Single-variant filter for Doxygen / Javadoc / Qt-style documentation
# comments embedded in C/C++/Java/Python/Objective-C source files. The
# reader scans the source line-by-line, recognises the documentation
# comment delimiters, and extracts the translatable prose while leaving
# code commands, type annotations, and inline non-translatable commands
# in skeleton.
#
# Authoring notes:
#   - Inputs are inline source snippets via input_xml (the field is
#     named for XML historically but holds raw text bytes for any text
#     format). Multi-comment fixtures live under testdata/ and are
#     referenced through input_file.
#   - Config keys mirror the DoxygenFilter parameters in upstream Okapi
#     (also exposed by the bridge composite schema). The Doxygen
#     Java filter exposes a deep `doxygen_commands` / `html_commands`
#     map plus a single top-level `preserve_whitespace` flag; the spec
#     surfaces only the top-level flag because per-command overrides
#     are not user-facing knobs in the native reader yet.
#   - Inline-codes settings (useCodeFinder, codeFinderRules) live under
#     the bridge schema's $defs/inlineCodes block and are deliberately
#     omitted from spec.config: the contract-audit walker does not
#     follow $ref into $defs, so listing them as flat keys would trigger
#     a false drift report. They remain native ApplyMap aliases for
#     callers that need pattern-based inline-code detection.
#   - okapi_refs are pinned to the upstream class+method names. Drift
#     detection asserts each ref still exists in Okapi 1.47.0.
#   - This is the SEED spec — features cover the user-facing comment
#     extraction behaviors that have native + Okapi test counterparts.
#     Custom Doxygen command tables (e.g. project-specific commands
#     defined under doxygen_commands) and per-command preserve_whitespace
#     overrides are deliberately out of scope.

format: okf_doxygen
mime_type: text/x-doxygen-txt

# Parity-runner config (#852): native and Okapi agree the file parses but
# disagree on which segments are translatable; the filter-level parity
# runner skips the format. Documented gap: #453.
parity:
  skip: "documented divergence — see #453"
description: |
  Doxygen-commented source code. Extracts the documentation prose from
  `///`, `//!`, `/** */`, and `/*! */` comment styles plus the trailing
  `///<` and `/*!< */` variants, while preserving the surrounding code,
  command markers, and code/verbatim blocks as non-translatable
  skeleton. Recognises the standard Doxygen command vocabulary so that
  metadata commands like `\class` or `\file` are skipped and
  description commands like `\brief`, `\param`, `\return` extract just
  the description text.

config:
  - key: preserveWhitespace
    type: boolean
    default: false
    description: |
      Preserve original intra-comment whitespace on extraction. Off by
      default — comment text is trimmed and normalised so translators
      see clean prose. Turn on for code samples or pre-formatted
      paragraphs where indentation carries meaning.
    okapi_param: preserve_whitespace

  - key: parser
    type: string_map
    default: {}
    description: |
      Container for parser configuration. Holds `preserveWhitespace`
      plus the `doxygenCommands` / `htmlCommands` command tables the
      Java filter consumes. Declared here as a parent group so the
      contract-audit drift check sees the schema's top-level property;
      individual leaves (notably the deeply-nested command definitions)
      are not surfaced as separate spec keys.
    okapi_param: parser

  - key: inlineCodes
    type: string_map
    default: {}
    description: |
      Container for inline-code detection settings (mirrors Okapi's
      inline-code finder, also exposed under the bridge composite
      schema's `$defs/inlineCodes` block). Declared as a parent group
      to keep drift detection clean; the native reader exposes the
      effective `useCodeFinder` / `codeFinderRules` knobs through
      Config.ApplyMap aliases.
    okapi_param: inlineCodes

features:
  # ── Comment-style extraction ──────────────────────────────────────
  - id: triple_slash_line_comment
    name: Triple-slash line comment (///)
    description: |
      A `///` line comment yields one translatable Block whose source
      is the trimmed comment text. Consecutive `///` lines fold into a
      single Block whose lines join with newlines; an interrupting
      non-comment line breaks the run.
    spec_refs:
      - "Doxygen manual — Documenting the code: /// triple-slash comment style (https://www.doxygen.nl/manual/docblocks.html)"
    examples:
      - name: single_line
        origin: "authored: minimal one-line /// comment"
        input_xml: "/// A simple line comment\n"
        block_count: 1
        first_block_text: "A simple line comment"
      - name: consecutive_lines_merge
        origin: "authored: three consecutive /// lines folding into one Block"
        input_xml: "/// First line\n/// Second line\n/// Third line\n"
        block_count: 1
        has_block_with_text:
          - "First line"
          - "Second line"
          - "Third line"
      - name: interrupted_run_splits
        origin: "authored: /// run interrupted by non-comment code line"
        input_xml: "/// First comment\nint x;\n/// Second comment\n"
        block_count: 2
        block_texts:
          - "First comment"
          - "Second comment"
    okapi_refs:
      - DoxygenFilterTest#testSimpleLine
      - DoxygenFilterTest#testMultipleLines
      - DoxygenFilterTest#testDelimiterTokenizer
    native_refs:
      - doxygen.TestExtract_SimpleLine
      - doxygen.TestExtract_MultipleLines
      - doxygen.TestExtract_DelimiterTokenizer

  - id: exclamation_line_comment
    name: Exclamation line comment (//!)
    description: |
      The Qt-style `//!` line comment behaves identically to `///` for
      extraction — the comment text becomes a translatable Block.
      Distinguishing the marker is left to the writer, which preserves
      the original style on round-trip.
    spec_refs:
      - "Doxygen manual — Documenting the code: //! exclamation line comment style"
    examples:
      - name: single_line
        origin: "authored: minimal one-line //! comment"
        input_xml: "//! An exclamation line comment\n"
        block_count: 1
        first_block_text: "An exclamation line comment"
    okapi_refs:
      - DoxygenFilterTest#testSimpleLine
    native_refs:
      - doxygen.TestExtract_ExclamationLineComment

  - id: javadoc_block_comment
    name: Javadoc-style block comment (/** */)
    description: |
      A `/** */` block comment extracts as one Block. Single-line
      blocks (`/** text */`) carry the inline text; multi-line blocks
      strip the leading ` * ` line markers and the closing `*/`,
      joining the surviving lines with newlines.
    spec_refs:
      - "Doxygen manual — Documenting the code: /** */ Javadoc-style block comments"
    examples:
      - name: single_line_block
        origin: "authored: minimal one-line /** ... */ block"
        input_xml: "/** A Javadoc comment */\n"
        block_count: 1
        first_block_text: "A Javadoc comment"
      - name: multi_line_block
        origin: "authored: multi-line /** with leading * line markers */"
        input_xml: "/**\n * First line\n * Second line\n */\n"
        block_count: 1
        has_block_with_text:
          - "First line"
          - "Second line"
    okapi_refs:
      - DoxygenFilterTest#testJavadocLine
      - DoxygenFilterTest#testJavadocMultiline
    native_refs:
      - doxygen.TestExtract_JavadocLine
      - doxygen.TestExtract_JavadocMultiline

  - id: qt_block_comment
    name: Qt-style block comment (/*! */)
    description: |
      A `/*! */` block comment extracts as one Block, mirroring the
      Javadoc shape. Multiple `/*! */` blocks separated by code emit
      one Block each, in document order.
    spec_refs:
      - "Doxygen manual — Documenting the code: /*! */ Qt-style block comments"
    examples:
      - name: multi_line_block
        origin: "authored: multi-line /*! ... */ Qt-style block"
        input_xml: "/*!\n  A Qt-style block comment.\n*/\n"
        block_count: 1
        first_block_text: "A Qt-style block comment."
      - name: multiple_blocks_separated_by_code
        origin: "authored: two /*! */ blocks separated by code"
        input_xml: "/*! Block comment 1 */\nint x;\n/*! Block comment 2 */\n"
        block_count: 2
        block_texts:
          - "Block comment 1"
          - "Block comment 2"
    okapi_refs:
      - DoxygenFilterTest#testPrefixSuffixTokenizer
    native_refs:
      - doxygen.TestExtract_QtBlockComment
      - doxygen.TestExtract_PrefixSuffixTokenizer

  # ── Trailing comments ─────────────────────────────────────────────
  - id: trailing_line_comment
    name: Trailing line comment (///<)
    description: |
      A `///<` marker after code on the same line attaches a
      documentation comment to the preceding declaration. The reader
      emits the code prefix as skeleton Data and the comment text as a
      translatable Block. An empty `///<` (no comment text) produces
      no Block but the layer envelope is still well-formed.
    spec_refs:
      - "Doxygen manual — Documenting the code: ///< trailing-member comment style"
    examples:
      - name: trailing_with_text
        origin: "authored: code line + ///< trailing comment"
        input_xml: "int x; ///< A one-liner comment\n"
        block_count: 1
        first_block_text: "A one-liner comment"
      - name: blank_trailing
        origin: "authored: code line + bare ///< marker (no comment text)"
        input_xml: "int x; ///<\n"
        block_count: 0
        expected_fail: |
          bridge segments at finer granularity — Okapi DoxygenFilter
          extracts an empty Block for the bare `///<` marker where the
          spec contract (and native reader) treat an empty trailing
          comment as no extractable content. Spec asserts native
          behavior; the divergence is whether an empty-content marker
          should still emit an envelope-only Block.
    okapi_refs:
      - DoxygenFilterTest#testOneLiner
      - DoxygenFilterTest#testBlankOneLiner
    native_refs:
      - doxygen.TestExtract_OneLiner
      - doxygen.TestExtract_BlankOneLiner

  - id: trailing_qt_block_comment
    name: Trailing Qt block comment (/*!< */)
    description: |
      A `/*!< text */` marker after code attaches a documentation
      comment to the preceding declaration, Qt-style. The reader
      emits the code prefix as skeleton and the comment text as a
      translatable Block.
    spec_refs:
      - "Doxygen manual — Documenting the code: /*!< */ trailing Qt-style block comment"
    examples:
      - name: trailing_qt
        origin: "authored: code line + /*!< */ trailing Qt block comment"
        input_xml: "int x; /*!< Trailing Qt comment */\n"
        block_count: 1
        first_block_text: "Trailing Qt comment"
    okapi_refs:
      - DoxygenFilterTest#testOneLiner
    native_refs:
      - doxygen.TestExtract_TrailingQtComment

  # ── Doxygen commands ──────────────────────────────────────────────
  - id: structural_command_skipped
    name: Structural commands skipped (\class, \file, \author …)
    description: |
      Doxygen structural commands like `\class`, `\file`, `\author`,
      `\date`, `\namespace` carry metadata about the documented entity
      — their arguments are not translatable. The surrounding
      description text is still extracted; only the structural
      command's own argument is dropped.
    spec_refs:
      - "Doxygen manual — Special commands: \\class, \\file, \\author (https://www.doxygen.nl/manual/commands.html)"
    examples:
      - name: class_then_brief
        origin: "authored: \\class structural command followed by description"
        input_xml: "/// \\class MyClass\n/// Brief description.\n"
        block_count: 1
        first_block_text: "Brief description."
        no_block_with_text:
          - "MyClass"
      - name: class_with_header_then_brief
        origin: "authored: \\class with header path + \\brief description block"
        input_xml: "/*! \\class Test class.h \"inc/class.h\"\n *  \\brief This is a test class.\n *\n * Some details about the Test class\n */\n"
        block_count: 1
        has_block_with_text:
          - "This is a test class."
        no_block_with_text:
          - "inc/class.h"
        expected_fail: |
          bridge segments at finer granularity — Okapi DoxygenFilter
          extracts the trailing details line ("Some details about the
          Test class") as a separate Block, where the spec folds it
          into the brief description's surroundings. Both legitimate
          interpretations of the comment block; spec asserts native
          (single-block) behavior.
    okapi_refs:
      - DoxygenFilterTest#testDoxygenClassCommand1
      - DoxygenFilterTest#testDoxygenClassCommand2
    native_refs:
      - doxygen.TestExtract_ClassCommand1
      - doxygen.TestExtract_ClassCommand2

  - id: brief_description_command
    name: Brief description command (\brief)
    description: |
      The `\brief` (or `@brief`) command introduces a short description
      that is translatable. The command marker itself is skeleton; only
      the prose argument extracts as a Block.
    spec_refs:
      - "Doxygen manual — Special commands: \\brief (https://www.doxygen.nl/manual/commands.html)"
    examples:
      - name: backslash_brief
        origin: "authored: minimal \\brief command with single description line"
        input_xml: "/// \\brief A short description.\n"
        block_count: 1
        first_block_text: "A short description."
        expected_fail: |
          bridge produces leading space — Okapi DoxygenFilter preserves
          the whitespace after the `\brief` command marker that the
          native reader trims. Spec asserts native (trimmed) behavior.
    okapi_refs:
      - DoxygenFilterTest#testDoxygenClassCommand2
    native_refs:
      - doxygen.TestExtract_ClassCommand2

  - id: param_description_command
    name: Parameter description command (\param)
    description: |
      `\param <name> <description>` documents a function parameter.
      The parameter name is metadata (skipped); the description is
      translatable. Same pattern applies to `\tparam`, `\throw`,
      `\throws`, `\exception`, `\retval` — first argument is the
      identifier, the rest is description.
    spec_refs:
      - "Doxygen manual — Special commands: \\param (https://www.doxygen.nl/manual/commands.html)"
    examples:
      - name: param_with_description
        origin: "authored: \\param identifier + description (identifier is skeleton)"
        input_xml: "/// \\param name The name of the person\n"
        block_count: 1
        first_block_text: "The name of the person"
        no_block_with_text:
          - "name The name"
    okapi_refs:
      - DoxygenFilterTest#testDoxygenClassCommand2
    native_refs:
      - doxygen.TestExtract_ParamDescription

  - id: return_description_command
    name: Return description command (\return)
    description: |
      The `\return` / `\returns` command documents the value returned
      by a function. The whole argument is translatable description.
    spec_refs:
      - "Doxygen manual — Special commands: \\return (https://www.doxygen.nl/manual/commands.html)"
    examples:
      - name: return_with_description
        origin: "authored: \\return command + single description line"
        input_xml: "/// \\return The computed result\n"
        block_count: 1
        first_block_text: "The computed result"
        expected_fail: |
          bridge produces leading space — Okapi DoxygenFilter preserves
          the whitespace after the `\return` command marker that the
          native reader trims. Spec asserts native (trimmed) behavior.
    okapi_refs:
      - DoxygenFilterTest#testDoxygenClassCommand2
    native_refs:
      - doxygen.TestExtract_ReturnDescription

  - id: section_commands
    name: Section commands (\note, \warning, \todo …)
    description: |
      Section-marker commands like `\note`, `\warning`, `\todo`,
      `\attention`, `\bug`, `\remark`, `\since`, `\pre`, `\post`
      introduce a translatable paragraph. Each command's description
      becomes its own Block so translators can address them
      independently.
    spec_refs:
      - "Doxygen manual — Special commands: \\note, \\warning, \\todo (https://www.doxygen.nl/manual/commands.html)"
    examples:
      - name: note_then_warning
        origin: "authored: consecutive \\note and \\warning section commands"
        input_xml: "/// \\note Important note.\n/// \\warning Be careful.\n"
        block_count: 2
        block_texts:
          - "Important note."
          - "Be careful."
        expected_fail: |
          bridge produces leading space — Okapi DoxygenFilter preserves
          the whitespace after the `\note` / `\warning` command markers
          that the native reader trims. Spec asserts native (trimmed)
          behavior on both blocks.
    okapi_refs:
      - DoxygenFilterTest#testDoubleExtractionSpecialCommands
    native_refs:
      - doxygen.TestExtract_SpecialCommandsFile

  # ── Code / verbatim exclusion ─────────────────────────────────────
  - id: code_block_excluded
    name: Code blocks excluded (\code … \endcode)
    description: |
      Content inside `\code … \endcode` is not translatable — the code
      passes through as skeleton. Surrounding prose extracts normally;
      the code block partitions the comment so text before and after
      become separate Blocks.
    spec_refs:
      - "Doxygen manual — Special commands: \\code / \\endcode (https://www.doxygen.nl/manual/commands.html)"
    examples:
      - name: code_between_prose
        origin: "authored: \\code … \\endcode block sandwiched between two prose lines"
        input_xml: "/// Before code\n/// \\code\n///     some_code();\n/// \\endcode\n/// After code\n"
        block_count: 2
        block_texts:
          - "Before code"
          - "After code"
        no_block_with_text:
          - "some_code()"
    okapi_refs:
      - DoxygenFilterTest#testDoxygenCodeCommand
    native_refs:
      - doxygen.TestExtract_CodeCommand

  - id: verbatim_block_excluded
    name: Verbatim blocks excluded (\verbatim … \endverbatim)
    description: |
      Content inside `\verbatim … \endverbatim` is preserved literally
      and is NOT translatable. The same pass-through rule applies to
      `\dot`, `\msc`, `\htmlonly`, `\latexonly`, `\xmlonly`,
      `\manonly`, `\rtfonly`, `\docbookonly`.
    spec_refs:
      - "Doxygen manual — Special commands: \\verbatim / \\endverbatim (https://www.doxygen.nl/manual/commands.html)"
    examples:
      - name: verbatim_between_prose
        origin: "authored: \\verbatim … \\endverbatim block between two prose lines"
        input_xml: "/// Before verbatim\n/// \\verbatim\n///   not translated\n/// \\endverbatim\n/// After verbatim\n"
        block_count: 2
        block_texts:
          - "Before verbatim"
          - "After verbatim"
        no_block_with_text:
          - "not translated"
        expected_fail: |
          bridge bug — Okapi DoxygenFilter extracts the verbatim block
          content ("not translated") as a translatable Block, despite
          the spec contract that `\verbatim … \endverbatim` content is
          non-translatable. Native correctly skips. Tracked separately
          as a bridge verbatim-handling bug.
    okapi_refs:
      - DoxygenFilterTest#testDoubleExtractionSpecialCommands
    native_refs:
      - doxygen.TestExtract_VerbatimExcluded

  - id: image_command_skipped
    name: Image command skipped (\image)
    description: |
      The `\image` command embeds a figure — its arguments (format,
      filename, optional caption) are filenames or rendering hints and
      are not translatable in this reader. Surrounding prose extracts
      as normal Blocks.
    spec_refs:
      - "Doxygen manual — Special commands: \\image (https://www.doxygen.nl/manual/commands.html)"
    examples:
      - name: image_between_prose
        origin: "authored: \\image command between two prose lines"
        input_xml: "/// Here is a snapshot:\n/// \\image html application.jpg\n/// End of description.\n"
        block_count: 1
        has_block_with_text:
          - "Here is a snapshot:"
          - "End of description."
        no_block_with_text:
          - "application.jpg"
        expected_fail: |
          bridge bug — Okapi DoxygenFilter splits the surrounding prose
          into two Blocks instead of folding it into one and may extract
          the `\image` argument despite the spec contract that `\image`
          arguments (filenames, rendering hints) are non-translatable.
          Native correctly skips. Tracked separately as a bridge
          image-command-handling bug.
    okapi_refs:
      - DoxygenFilterTest#testDoxygenImageCommand
    native_refs:
      - doxygen.TestExtract_ImageCommand

  # ── Inline markup inside translatable text ────────────────────────
  - id: inline_doxygen_commands
    name: Inline Doxygen commands stripped (\e, \a, \b, \c, \p, \em)
    description: |
      Inline commands `\e`, `\a`, `\b`, `\c`, `\p`, `\em` mark up the
      next word for italic / argument / bold / typewriter / parameter
      formatting. The reader strips the command marker so the bare
      word reaches the translator inside the surrounding prose.
    spec_refs:
      - "Doxygen manual — Special commands: \\e, \\a, \\b, \\c, \\p, \\em (https://www.doxygen.nl/manual/commands.html)"
    examples:
      - name: italic_and_argument
        origin: "authored: inline \\e italic + \\a argument formatting"
        input_xml: "/// This has \\e italic and \\a arg text\n"
        block_count: 1
        has_block_with_text:
          - "italic"
          - "arg"
    okapi_refs:
      - DoxygenFilterTest#testDoxygenItalicCommand
    native_refs:
      - doxygen.TestExtract_ItalicCommand

  - id: html_inline_markup_preserved
    name: HTML inline markup preserved in extracted text
    description: |
      HTML inline tags like `<b>`, `<i>`, `</summary>` that appear
      inside a Doxygen comment pass through into the extracted Block
      text as literal characters. The reader does not strip them;
      downstream tools (or the writer's inline-code finder) decide
      whether to convert them into Spans.
    # Doxygen recognises HTML tags inside comments per its HTML
    # commands reference; the manual lists supported tags but does
    # not normatively define their presentation — left without URL.
    examples:
      - name: html_bold_inline
        origin: "authored: <b>bold</b> inline HTML inside /// comment"
        input_xml: "/// This has <b>bold</b> text\n"
        block_count: 1
        has_block_with_text:
          - "bold"
      - name: orphaned_end_tag
        origin: "authored: orphaned </summary> end tag inside /// comment"
        input_xml: "/// Some text </summary> more text\n"
        block_count: 1
        has_block_with_text:
          - "Some text"
        expected_fail: |
          bridge segments at finer granularity — Okapi DoxygenFilter
          treats the orphaned `</summary>` end tag as a Block boundary,
          splitting the comment text into two Blocks where native folds
          it into one (HTML inline markup pass-through). Both
          legitimate; spec asserts native (single-block) behavior.
    okapi_refs:
      - DoxygenFilterTest#testHtmlBoldCommand
      - DoxygenFilterTest#testOrphanedEndCommand
    native_refs:
      - doxygen.TestExtract_HtmlBoldCommand
      - doxygen.TestExtract_OrphanedEndCommand

  # ── Robustness ────────────────────────────────────────────────────
  - id: float_numbers_not_command
    name: Floats inside text are not mistaken for commands
    description: |
      A bare float like `1.0` or `2.5` in a sentence does not trigger
      list / command tokenisation. The text extracts intact as a single
      Block.
    # Robustness against false-positive command tokenisation —
    # behavioral, no formal spec authority.
    examples:
      - name: float_in_sentence
        origin: "authored: prose containing `1.0` and `2.5` decimal numbers"
        input_xml: "/// The value is 1.0 or 2.5 here.\n"
        block_count: 1
        first_block_text: "The value is 1.0 or 2.5 here."
    okapi_refs:
      - DoxygenFilterTest#testPositiveFloatListFalsePositive
    native_refs:
      - doxygen.TestExtract_PositiveFloatListFalsePositive

  - id: regular_comment_excluded
    name: Regular C/C++ comments are not extracted
    description: |
      Plain `// …` and `/* … */` comments (without the Doxygen
      activator characters) are NOT documentation comments and are
      passed through as code, not extracted as Blocks. Distinguishing
      Doxygen-flagged from plain comments is the filter's core
      filtering job.
    spec_refs:
      - "Doxygen manual — Documenting the code: regular comments are NOT documentation"
    examples:
      - name: line_comment_skipped
        origin: "authored: regular `// ...` comment without Doxygen activator"
        input_xml: "// This is a regular comment, not Doxygen\nint x = 0;\n"
        block_count: 0
    okapi_refs:
      - DoxygenFilterTest#testSimpleLine
    native_refs:
      - doxygen.TestExtract_RegularCommentExcluded

  - id: idempotent_double_extraction
    name: Reading the same source twice yields identical Blocks
    description: |
      Re-parsing the same input produces the same Block sequence —
      identical count, identical source text per Block. This is the
      double-extraction contract Okapi enforces across its sample
      corpus (sample.h, qt-style.h, javadoc-style.h, special_commands.h).
    # Idempotent re-extraction is an Okapi-side contract, not a
    # Doxygen-format property — no spec_refs.
    examples:
      - name: simple_input_stable
        origin: "authored: minimal /// comment for double-extraction smoke check"
        input_xml: "/// Hello from Doxygen\n"
        block_count: 1
        first_block_text: "Hello from Doxygen"
    okapi_refs:
      - DoxygenFilterTest#testOpenTwiceWithString
      - DoxygenFilterTest#testDoubleExtractionSample
      - DoxygenFilterTest#testDoubleExtractionQtStyle
      - DoxygenFilterTest#testDoubleExtractionJavadocStyle
      - DoxygenFilterTest#testDoubleExtractionSpecialCommands
    native_refs:
      - doxygen.TestExtract_OpenTwiceWithString
      - doxygen.TestDoubleExtraction_Sample
      - doxygen.TestDoubleExtraction_QtStyle
      - doxygen.TestDoubleExtraction_JavadocStyle
      - doxygen.TestDoubleExtraction_SpecialCommands

  # ── Sample fixture coverage ───────────────────────────────────────
  - id: sample_file_extraction
    name: Sample header file (mixed comment styles)
    description: |
      A representative `.h` source file mixing `///`, `/** */`,
      `///<`, code blocks, and `\param` / `\return` tags. Validates
      that the reader handles realistic source layout end-to-end and
      that code-block content stays out of the translatable stream.
    # Mixed-style sample fixture; spec authority is each style's
    # own ref, already covered by the per-style features above.
    examples:
      - name: sample_h
        origin: "okapi-fixture: testdata/sample.h (mirrors Okapi DoxygenFilterTest sample.h)"
        input_file: testdata/sample.h
        block_count: 7
        has_block_with_text:
          - "Brief description of the class."
          - "After the code block."
          - "Constructor description."
          - "A trailing comment"
          - "A Javadoc method description."
          - "The name parameter"
          - "The result value"
        no_block_with_text:
          - "jimmy.crack"
          - "Not a Doxygen comment"
        expected_fail: |
          bridge segments at finer granularity — Okapi DoxygenFilter
          extracts 8 Blocks across the sample header where native
          extracts 7. The has_block_with_text / no_block_with_text
          assertions still match in spirit (no untranslatable content
          leaks into bridge output), the divergence is purely in
          paragraph segmentation. Both legitimate; spec asserts
          native (folded) behavior.
    okapi_refs:
      - DoxygenFilterTest#testDoubleExtractionSample
    native_refs:
      - doxygen.TestExtract_SampleFile
      - doxygen.TestDoubleExtraction_Sample

  - id: qt_style_file_extraction
    name: Qt-style header file (//! and /*! */ comments)
    description: |
      A header file using only Qt-style comment markers. Both line
      (`//!`) and block (`/*! */`) variants extract their prose as
      Blocks; the reader does not require a single comment style per
      file.
    # Per-style spec authority lives on the //! and /*! */ features above.
    examples:
      - name: qt_style_h
        origin: "okapi-fixture: testdata/qt-style.h (mirrors Okapi DoxygenFilterTest qt-style.h)"
        input_file: testdata/qt-style.h
        block_count: 2
        has_block_with_text:
          - "A test class."
          - "A Qt-style block comment."
        expected_fail: |
          bridge segments at finer granularity — Okapi DoxygenFilter
          extracts 3 Blocks from the qt-style header where native folds
          adjacent comment runs into 2. Both legitimate; spec asserts
          native (folded) behavior.
    okapi_refs:
      - DoxygenFilterTest#testDoubleExtractionQtStyle
    native_refs:
      - doxygen.TestExtract_QtStyleFile
      - doxygen.TestDoubleExtraction_QtStyle

  - id: javadoc_style_file_extraction
    name: Javadoc-style header file (/** */ comments)
    description: |
      A header file using exclusively `/** */` Javadoc comments,
      including class, constructor, member function, and `\param` /
      `\return` documentation. The full set of descriptions extracts
      as Blocks in source order.
    # Per-style spec authority lives on the /** */ feature above.
    examples:
      - name: javadoc_style_h
        origin: "okapi-fixture: testdata/javadoc-style.h (mirrors Okapi DoxygenFilterTest javadoc-style.h)"
        input_file: testdata/javadoc-style.h
        block_count: 5
        has_block_with_text:
          - "A test class."
          - "A constructor."
          - "A member function."
          - "The first parameter."
          - "The result."
    okapi_refs:
      - DoxygenFilterTest#testDoubleExtractionJavadocStyle
    native_refs:
      - doxygen.TestExtract_JavadocStyleFile
      - doxygen.TestDoubleExtraction_JavadocStyle

  - id: special_commands_file_extraction
    name: Special-commands header file (\addtogroup, \verbatim, inline)
    description: |
      A header file exercising the harder-edge command vocabulary:
      `\file` / `\author` / `\date` (skipped), `\addtogroup` (group
      title is translatable), `\note` / `\warning` / `\todo`
      (translatable paragraph), `\verbatim` (excluded), and inline
      `\e` / `\b` / `\c` formatting.
    spec_refs:
      - "Doxygen manual — Special commands (full reference) (https://www.doxygen.nl/manual/commands.html)"
    examples:
      - name: special_commands_h
        origin: "okapi-fixture: testdata/special_commands.h (mirrors Okapi DoxygenFilterTest special_commands.h)"
        input_file: testdata/special_commands.h
        block_count: 7
        has_block_with_text:
          - "Additional documentation for the group."
          - "This function does something."
          - "Important note about this function."
          - "Be careful with this."
          - "Implement error handling."
          - "After verbatim section."
        no_block_with_text:
          - "This text is not translated"
        expected_fail: |
          bridge bug — Okapi DoxygenFilter extracts 10 Blocks instead of
          7 from the special-commands header AND extracts the verbatim
          block content ("This text is not translated") as a Block,
          despite the spec contract that `\verbatim … \endverbatim` is
          non-translatable. Native correctly skips. Same root cause as
          `verbatim_block_excluded/verbatim_between_prose`. Tracked
          separately as a bridge verbatim-handling bug.
    okapi_refs:
      - DoxygenFilterTest#testDoubleExtractionSpecialCommands
    native_refs:
      - doxygen.TestExtract_SpecialCommandsFile
      - doxygen.TestDoubleExtraction_SpecialCommands

  # ── Layer / output contract ───────────────────────────────────────
  - id: document_envelope
    name: Layer envelope and MIME type metadata
    description: |
      Every read produces a well-formed `LayerStart` / `LayerEnd`
      envelope around the part stream, with the layer carrying
      `text/x-doxygen-txt` as MIME type and the document's source
      locale (defaulting to English when the document has none).
      The simplest possible single-comment input still produces this
      envelope alongside the comment Block.
    # Layer envelope is a neokapi pipeline contract, not a property
    # of the Doxygen format itself — no spec_refs.
    examples:
      - name: minimal_layer
        origin: "authored: smallest-possible Doxygen comment for layer-envelope smoke check"
        input_xml: "/// Hello\n"
        block_count: 1
        first_block_text: "Hello"
    okapi_refs:
      - DoxygenFilterTest#testDefaultInfo
      - DoxygenFilterTest#testStartDocument
    native_refs:
      - doxygen.TestExtract_DefaultInfo
      - doxygen.TestExtract_StartDocument
      - doxygen.TestExtract_LayerStructure

  - id: roundtrip_preserves_text
    name: Read-write roundtrip preserves comment text
    description: |
      A read → write cycle preserves the extracted comment text in the
      output stream, including the original code prefix for trailing
      `///<` comments. Verifies the writer's contract for the simplest
      shapes Okapi exercises (testOutputSimpleLine, testOutputOneLiner,
      testOutputMultipleLines, testOutputJavadocMultipleLines).
      Bytewise roundtrip is exercised by the dedicated native writer
      tests; the spec runner only asserts the extracted Block set so
      the same fixture validates both sides.
    # Round-trip preservation is a neokapi writer contract, not a
    # Doxygen-format property — no spec_refs.
    examples:
      - name: simple_line_extracts
        origin: "authored: minimal /// comment for round-trip verification"
        input_xml: "/// A simple line comment\n"
        block_count: 1
        first_block_text: "A simple line comment"
    okapi_refs:
      - DoxygenFilterTest#testOutputSimpleLine
      - DoxygenFilterTest#testOutputOneLiner
      - DoxygenFilterTest#testOutputMultipleLines
      - DoxygenFilterTest#testOutputJavadocMultipleLines
    native_refs:
      - doxygen.TestOutput_SimpleLine
      - doxygen.TestOutput_OneLiner
      - doxygen.TestOutput_MultipleLines
      - doxygen.TestOutput_JavadocMultipleLines
