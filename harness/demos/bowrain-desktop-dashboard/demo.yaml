id: bowrain-desktop-dashboard
title: The desktop app, on your team's server
subtitle: An equal, real-time client of the shared workspace.
tagline: the server-side platform companion to kapi
kind: use-case
publishAs: bowrain-desktop-dashboard
terminal: desktop
target: bowrain-desktop
brand: bowrain
needsAi: false
oneshot: true
aspects:
  - Native desktop app
  - An equal real-time client
  - The same shared workspace
  - Works offline, syncs back

narration:
  - id: title
    kind: title
    text: >-
      Bowrain Desktop — a native, real-time client of your team's server.

  - id: intro
    kind: desktop
    beat: intro
    text: >-
      Bowrain also ships as a native desktop app — an equal, real-time client of
      the server. It opens the very same workspace the web editor does, with
      presence and edits shared live, and it keeps working offline, syncing back
      when you reconnect.

  - id: stats
    kind: desktop
    beat: stats
    caption: The workspace at a glance.
    text: >-
      The dashboard sums up the workspace — projects, words, languages, and
      files — pulled live from the server.

  - id: projects
    kind: desktop
    beat: projects
    caption: The team's projects, on the desktop.
    text: >-
      Every project the team works on is here, with its languages and file
      counts, ready to open in the same editor the browser uses.

  - id: connectors
    kind: desktop
    beat: connectors
    caption: Connect remote content sources.
    text: >-
      It also connects remote content sources — like a CMS or a design tool —
      so the team can pull content in, alongside the visual flow builder.

  - id: outro
    kind: outro
    text: >-
      The same governed workspace, in a native app — the desktop side of the
      platform that stewards a team's work on top of the open kapi tools.
