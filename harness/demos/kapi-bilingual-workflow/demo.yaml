id: kapi-bilingual-workflow
title: The bilingual round-trip — extract, translate, merge
subtitle: kapi emits a clean bilingual XLIFF, accepts the translated one back, and keeps the project translation memory in the loop on both sides.
tagline: the engineering glue around the translator hand-off — with full TM provenance.
kind: use-case
publishAs: bilingual-workflow
# A scripted plain-shell demo (no Claude): extract/merge/tm are deterministic, so
# the commands run for real and their output is recorded exactly. KAPI_NO_PROJECT
# is set by the shell harness, so extract/merge take the recipe via `-p app.kapi`.
terminal: shell
brand: kapi
cwd: ~/app
needsAi: false
captureTimeoutSec: 120
aspects:
  - XLIFF 2.x round-trip
  - TM pre-fill + absorb
  - any CAT tool
  - full provenance

# Each comment names exactly what the command below it does.
script:
  - comment: A React app's English strings, ready to send out for translation.
  - command: cat src/locales/en/messages.json
  - comment: "One-time: seed the project TM from a corporate TMX."
  - command: kapi tm import corporate.tmx --file .kapi/tm.db --all-pairs
  - comment: kapi extract — one bilingual XLIFF per target locale, TM pre-filled.
  - command: kapi extract -p app.kapi
  - command: ls out/
  - comment: A translator fills the <target>s in their CAT tool (here, a stand-in).
  - command: ./fake-translator.sh out/*.xliff
  - comment: kapi merge — apply the returned XLIFFs back onto the source.
  - command: kapi merge -p app.kapi -i out/
  - comment: kapi tm audit — trace exactly what this merge wrote into the TM.
  - command: kapi tm audit --file .kapi/tm.db --batch $(ls .kapi/cache/extractions | head -1) --limit 10
  - comment: The source is now localized — French, ready to ship.
  - command: cat src/locales/fr-FR/messages.json

artifacts:
  - id: fr
    caption: "src/locales/fr-FR/messages.json — merged from the translator's return"
    source: report
    report: catalog
    reportTitle: "src/locales/fr-FR/messages.json — Français"
    reportSub: "kapi · keys preserved, every value localized"
    path: src/locales/fr-FR/messages.json
    width: 1120
    height: 720

narration:
  - id: title
    kind: title
    text: >
      Most serious localization runs on bilingual exchange files — XLIFF — that a
      translator opens in a CAT tool, fills in, and sends back. kapi is the
      engineering glue on either side of that hand-off.
  - id: extract
    kind: terminal
    text: >
      Here's a React app's English strings. We seed the project's translation
      memory from a corporate TMX, then run extract — and kapi writes one bilingual
      XLIFF per target locale, pre-filling every segment the memory already knows.
    caption: "extract emits one XLIFF per locale, pre-filled from TM"
  - id: merge
    kind: terminal
    text: >
      The translator fills the remaining targets and returns the files. Merge
      applies them back onto the source, absorbs every accepted segment into the
      memory, and tm audit traces exactly which return each entry came from.
    caption: "merge reconciles the return and absorbs it into TM, with provenance"
  - id: fr
    kind: artifact
    artifact: fr
    text: >
      The French source is localized — every key preserved, every value translated
      — and the memory is warmer for the next extract.
  - id: outro
    kind: outro
    text: >
      Extract, translate, merge: a clean bilingual round-trip through any CAT tool,
      with the translation memory in the loop on both sides.

# Norwegian Bokmål narration (full coverage — required for published demos).
# Follows l10n/brand-voice.yaml (nb) and l10n/termbase.csv terminology.
locales:
  nb:
    narration:
      - id: title
        text: >
          Det meste av seriøs lokalisering går via tospråklige utvekslingsfiler
          — XLIFF — som en oversetter åpner i CAT-verktøyet sitt, fyller ut og
          sender tilbake. kapi er det tekniske limet på hver side av den
          overleveringen.
      - id: extract
        text: >
          Her er de engelske strengene i en React-app. Vi mater prosjektets
          oversettelsesminne fra en TMX fra konsernet, og kjører så extract —
          og kapi skriver én tospråklig XLIFF per målspråk, ferdig utfylt med
          hvert segment minnet allerede kjenner.
        caption: "extract lager én XLIFF per språk, forhåndsutfylt fra oversettelsesminnet"
      - id: merge
        text: >
          Oversetteren fyller ut resten og sender filene tilbake. Merge fletter
          dem tilbake i kilden, tar hvert godkjente segment opp i minnet, og tm
          audit sporer nøyaktig hvilken retur hver oppføring kom fra.
        caption: "merge fletter returen inn og tar den opp i minnet, med full sporbarhet"
      - id: fr
        text: >
          Den franske kilden er lokalisert — hver nøkkel bevart, hver verdi
          oversatt — og minnet er varmere til neste uttrekk.
      - id: outro
        text: >
          Trekk ut, oversett, flett: en ren tospråklig rundtur gjennom hvilket
          som helst CAT-verktøy, med oversettelsesminnet i løkka på begge
          sider.
