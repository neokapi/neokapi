id: 05-ai-checks-guardrail
title: Check AI output like you test code
subtitle: An AI translated the app into German. kapi check reads the translation against the source and reports exactly what would break in production.
tagline: do-not-translate, placeholders and terminology — deterministic checks that gate a bad translation before it ships.
kind: use-case
publishAs: kapi-checks-guardrail
# A scripted plain-shell demo (no Claude): the checks are deterministic, so the
# commands run for real and their output is recorded exactly.
terminal: shell
brand: kapi
cwd: ~/checkout
needsAi: false
captureTimeoutSec: 120
aspects:
  - checks as tests
  - do-not-translate
  - placeholder integrity
  - gate in CI

# --no-fail keeps the demo's exit code clean while still printing the FAIL
# verdict and the findings; with the gate on (no --no-fail) the same check exits
# non-zero and blocks a merge.
script:
  - comment: An AI translated app.json into German. Is it safe to ship?
  - command: cat app.de.json
  - comment: Check the translation against the source — like running tests.
  - command: kapi check app.json app.de.json --target-lang de --dnt "Acme Cloud" --no-fail 2>/dev/null
  - comment: Two real breakages — a dropped placeholder and a translated product name. Apply the fixes.
  - command: cp -f app.de.fixed.json app.de.json && cat app.de.json
  - comment: Run the same check again.
  - command: kapi check app.json app.de.json --target-lang de --dnt "Acme Cloud" --no-fail 2>/dev/null

narration:
  - id: title
    kind: title
    text: >
      An AI translated this app into German. Most of it is fine — but two things
      would break in production: a placeholder was dropped, and the product name
      was translated.
  - id: check
    kind: terminal
    text: >
      kapi check reads the German against the English and runs the rules like
      tests — do-not-translate, placeholder integrity, terminology. It reports
      exactly what broke: the count placeholder is missing, and Acme Cloud was
      translated.
    caption: "kapi check reports the do-not-translate and placeholder findings"
  - id: fix
    kind: terminal
    text: >
      We apply the two corrections — restore the placeholder, keep the product
      name verbatim — and run the very same check again.
    caption: "apply the fixes, re-run the check"
  - id: pass
    kind: terminal
    text: >
      Now it passes. With the gate on, this is what stops a bad translation from
      shipping — in continuous integration, or inside an assistant's fix-loop.
  - id: outro
    kind: outro
    text: >
      Checks that keep AI output in line, the way tests keep code in line:
      deterministic, multilingual, and run on every change.

# Norwegian Bokmål narration (full coverage — required for published demos).
# Follows l10n/brand-voice.yaml (nb: du-form, plain register, product names and
# CLI commands untranslated) and l10n/termbase.csv terminology.
locales:
  nb:
    narration:
      - id: title
        text: >
          En KI har oversatt denne appen til tysk. Det meste er bra — men to
          ting ville sviktet i produksjon: en plassholder er borte, og
          produktnavnet er oversatt.
      - id: check
        text: >
          kapi check leser den tyske oversettelsen mot den engelske kilden og
          kjører reglene som tester — ikke-oversettbare navn,
          plassholderintegritet, terminologi. Den rapporterer nøyaktig hva som
          røk: antall-plassholderen mangler, og Acme Cloud er oversatt.
        caption: "kapi check rapporterer funnene for ikke-oversettbart og plassholdere"
      - id: fix
        text: >
          Vi retter de to feilene — gjenoppretter plassholderen og lar
          produktnavnet stå urørt — og kjører nøyaktig samme kontroll på nytt.
        caption: "rett feilene, kjør kontrollen på nytt"
      - id: pass
        text: >
          Nå passerer den. Med porten på er det dette som stopper en dårlig
          oversettelse fra å gå ut — i kontinuerlig integrasjon, eller i en
          assistents rettesløyfe.
      - id: outro
        text: >
          Kontroller som holder KI-resultater i sjakk, slik tester holder koden
          i sjakk: deterministiske, flerspråklige, og kjørt ved hver endring.
