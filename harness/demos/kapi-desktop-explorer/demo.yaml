id: kapi-desktop-explorer
title: Browse a termbase and translation memory
subtitle: A visual tour of terminology and translation memory in Kapi Desktop.
tagline: the visual companion to the kapi command line
kind: use-case
publishAs: kapi-desktop-explorer
terminal: desktop
brand: desktop
needsAi: false
# One continuous narration read — uniform voice speed and tone across scenes.
oneshot: true
aspects:
  - Termbases
  - Translation memory
  - Multi-locale terms
  - Inline formatting
  - Entity placeholders

# A "desktop" demo replays the recorded Kapi Desktop screencast (public/<id>/
# screencast.{json,webm}) inside the macOS window frame. Each narration scene of
# kind "desktop" names a `beat` from screencast.json and inherits that beat's
# zoom region; the scene plays the beat's slice fit to the narration length.

narration:
  - id: title
    kind: title
    text: >-
      Kapi Desktop — the visual companion to the kapi command line.

  - id: intro
    kind: desktop
    beat: intro
    text: >-
      It opens to a calm home screen. Everything a translator leans on — the
      glossaries and the remembered translations — sits one click away in the
      sidebar.

  - id: termbases
    kind: desktop
    beat: open-termbases
    caption: The Termbases section lists each glossary on disk.
    text: >-
      The Termbases section lists each glossary stored on disk, with its size
      and when it last changed.

  - id: glossary
    kind: desktop
    beat: open-glossary
    caption: Opening a glossary shows every concept it holds.
    text: >-
      Opening the product glossary brings up every concept it holds — eight here
      — with an activity chart of recent edits across the top.

  - id: concept
    kind: desktop
    beat: inspect-concept
    caption: Each concept carries a definition and its approved terms.
    text: >-
      Each concept carries a definition and its approved terms across languages.
      A status badge marks the preferred wording, and flags the terms that are
      deprecated.

  - id: search-term
    kind: desktop
    beat: search-term
    caption: Full-text search finds a term fast.
    text: >-
      Full-text search finds a term in an instant. Here, the invoice concept,
      with its approved translations.

  - id: open-tm
    kind: desktop
    beat: open-tm
    caption: The translation memory works the same way.
    text: >-
      The translation memory works the same way. We cross over and open the
      memory for the Acme app.

  - id: inspect-tm
    kind: desktop
    beat: inspect-tm
    caption: Each entry pairs a source string with its translations.
    text: >-
      Each entry pairs a source string with its translations. Inline formatting,
      like bold text and links, is preserved as tags rather than literal markup.

  - id: entity
    kind: desktop
    beat: entity
    caption: Names are held as placeholders, ready to reuse.
    text: >-
      Names and other entities are held as placeholders, so a remembered
      translation can be reused later with a different value.

  - id: search-tm
    kind: desktop
    beat: search-tm
    caption: The memory is searchable too.
    text: >-
      And the memory is searchable too — every string that mentions the word
      invite.

  - id: outro
    kind: outro
    text: >-
      That's the terminology and translation memory at the heart of kapi,
      browsable in one place.

# Norwegian Bokmål narration (full coverage — required for published demos).
# Follows l10n/brand-voice.yaml (nb) and l10n/termbase.csv terminology.
locales:
  nb:
    narration:
      - id: title
        text: >-
          Kapi Desktop — den visuelle følgesvennen til kapi-kommandolinjen.
      - id: intro
        text: >-
          Den åpner til en rolig startskjerm. Alt en oversetter støtter seg på
          — ordlistene og de lagrede oversettelsene — ligger ett klikk unna i
          sidefeltet.
      - id: termbases
        text: >-
          Termbase-seksjonen lister hver ordliste lagret på disk, med
          størrelsen og når den sist ble endret.
        caption: Termbase-seksjonen lister hver ordliste på disk.
      - id: glossary
        text: >-
          Åpner du produktordlisten, får du opp hvert begrep den inneholder —
          åtte her — med et aktivitetsdiagram over de siste endringene øverst.
        caption: En åpnet ordliste viser hvert begrep den inneholder.
      - id: concept
        text: >-
          Hvert begrep bærer en definisjon og de godkjente termene sine på
          tvers av språk. Et statusmerke markerer den foretrukne ordlyden, og
          flagger termene som er utgått.
        caption: Hvert begrep har en definisjon og godkjente termer.
      - id: search-term
        text: >-
          Fulltekstsøk finner en term på et øyeblikk. Her: faktura-begrepet,
          med de godkjente oversettelsene sine.
        caption: Fulltekstsøk finner en term raskt.
      - id: open-tm
        text: >-
          Oversettelsesminnet fungerer på samme måte. Vi går over og åpner
          minnet for Acme-appen.
        caption: Oversettelsesminnet fungerer på samme måte.
      - id: inspect-tm
        text: >-
          Hver oppføring parer en kildestreng med oversettelsene sine.
          Formatering i teksten, som fet skrift og lenker, bevares som tagger i
          stedet for rå markup.
        caption: Hver oppføring parer en kildestreng med oversettelsene.
      - id: entity
        text: >-
          Navn og andre entiteter holdes som plassholdere, slik at en lagret
          oversettelse kan gjenbrukes senere med en annen verdi.
        caption: Navn holdes som plassholdere, klare til gjenbruk.
      - id: search-tm
        text: >-
          Og minnet er søkbart, det også — hver streng som nevner ordet invite.
        caption: Minnet er også søkbart.
      - id: outro
        text: >-
          Det er terminologien og oversettelsesminnet i hjertet av kapi — å bla
          i på ett sted.
