id: kapi-desktop-projects
title: Create and manage a project
subtitle: Set up a localisation project in Kapi Desktop.
tagline: the visual companion to the kapi command line
kind: use-case
publishAs: kapi-desktop-projects
terminal: desktop
brand: desktop
needsAi: false
# One continuous narration read — uniform voice speed and tone across scenes.
oneshot: true
aspects:
  - Projects
  - Source & target languages
  - Content patterns
  - Project settings

narration:
  - id: title
    kind: title
    text: >-
      Kapi Desktop — let's create and set up a localisation project.

  - id: intro
    kind: desktop
    beat: intro
    text: >-
      It opens to a home screen. A new project starts right here.

  - id: new-project
    kind: desktop
    beat: new-project
    caption: New Project asks only for a name.
    text: >-
      New Project asks only for a name — here, the Acme Help Center. Kapi
      derives the folder and the rest from it.

  - id: templates
    kind: desktop
    beat: templates
    caption: Start from a structure, or a blank project.
    text: >-
      It offers a structure to start from: source files in, translations out —
      or a blank project you shape yourself.

  - id: project-home
    kind: desktop
    beat: project-home
    caption: The project opens to an overview.
    text: >-
      The project opens to an overview — its content, flows, tools and settings,
      with the source and target languages across the top.

  - id: project-settings
    kind: desktop
    beat: project-settings
    caption: "Project Settings: languages, plugins, processing."
    text: >-
      Project Settings is where you choose the source language and the locales
      you're translating into, alongside plugins and processing options.

  - id: content
    kind: desktop
    beat: content
    caption: Content defines which files belong to the project.
    text: >-
      And Content defines which files belong to the project — glob patterns the
      engine reads from and writes back to.

  - id: outro
    kind: outro
    text: >-
      That's a project — created, structured, and ready to translate.

# Norwegian Bokmål narration (full coverage — required for published demos).
# Follows l10n/brand-voice.yaml (nb) and l10n/termbase.csv terminology.
locales:
  nb:
    narration:
      - id: title
        text: >-
          Kapi Desktop — la oss opprette og sette opp et lokaliseringsprosjekt.
      - id: intro
        text: >-
          Den åpner til en startskjerm. Et nytt prosjekt starter rett her.
      - id: new-project
        text: >-
          Nytt prosjekt spør bare om et navn — her: Acme Help Center. Kapi
          utleder mappen og resten fra det.
        caption: Nytt prosjekt spør bare om et navn.
      - id: templates
        text: >-
          Den tilbyr en struktur å starte fra: kildefiler inn, oversettelser ut
          — eller et blankt prosjekt du former selv.
        caption: Start fra en struktur, eller et blankt prosjekt.
      - id: project-home
        text: >-
          Prosjektet åpner til en oversikt — innholdet, flytene, verktøyene og
          innstillingene, med kilde- og målspråkene øverst.
        caption: Prosjektet åpner til en oversikt.
      - id: project-settings
        text: >-
          Prosjektinnstillinger er der du velger kildespråket og språkene du
          oversetter til, ved siden av tillegg og prosesseringsvalg.
        caption: "Prosjektinnstillinger: språk, tillegg, prosessering."
      - id: content
        text: >-
          Og Innhold definerer hvilke filer som hører til prosjektet —
          glob-mønstre motoren leser fra og skriver tilbake til.
        caption: Innhold definerer hvilke filer som hører til prosjektet.
      - id: outro
        text: >-
          Det er et prosjekt — opprettet, strukturert og klart til
          oversettelse.
