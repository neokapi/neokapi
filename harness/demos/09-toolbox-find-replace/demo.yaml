id: 09-toolbox-find-replace
title: grep, sed and cat — for any format
subtitle: kcat, kgrep and ksed work on the text kapi reads out of a document — Word, Excel, Markdown — not raw bytes.
tagline: muscle memory from the tools you already know, on content those tools can't see into.
kind: use-case
publishAs: toolbox-explainer
# A scripted plain-shell demo (no Claude): the toolbox is deterministic, so the
# commands run for real and their output is recorded exactly.
terminal: shell
brand: kapi
cwd: ~/sales
needsAi: false
captureTimeoutSec: 120
aspects:
  - format-aware
  - kcat · kgrep · ksed
  - docx + xlsx + markdown
  - one pass, in place

# Each comment names exactly what the command below it does. Wildcards (`*`)
# fan a single pattern or substitution across every file, regardless of format.
script:
  - comment: A sales team's collateral — one product name, three formats.
  - command: ls
  - comment: kcat the Word proposal — its prose, as plain lines.
  - command: kcat proposal.docx
  - comment: kcat the Excel price list — one cell per line.
  - command: kcat pricing.xlsx
  - comment: kgrep every "SalesPilot" across all three files at once.
  - command: kgrep -n SalesPilot *
  - comment: ksed renames SalesPilot to Northstar, in place, in all three.
  - command: ksed -i 's/SalesPilot/Northstar/g' *
  - comment: kgrep the new name to confirm — same matches, renamed.
  - command: kgrep -c Northstar *
  - command: kcat proposal.docx

artifacts:
  - id: after
    caption: "proposal.docx — renamed to Northstar, heading and bold intact"
    source: docx
    path: proposal.docx
    reportTitle: "proposal.docx"
    reportSub: "still a valid Word document — only the words changed"
    width: 1100
    height: 760

narration:
  - id: title
    kind: title
    text: >
      kcat, kgrep and ksed are cat, grep and sed for the text inside a document.
      They read the words kapi extracts from a Word file, a spreadsheet, or
      Markdown — not the raw bytes — so the tools you already know work on content
      they normally can't see into.
  - id: cat
    kind: terminal
    text: >
      Here's a sales team's collateral: a Markdown pitch, a Word proposal, and an
      Excel price list. kcat reads the text straight out of the Word document and
      the spreadsheet, as plain lines.
    caption: "kcat reads the text inside the .docx and the .xlsx"
  - id: grep
    kind: terminal
    text: >
      kgrep searches that text across all three files at once, and finds every
      mention of the product name.
    caption: "kgrep finds the product name across every format"
  - id: sed
    kind: terminal
    text: >
      And one ksed renames the product everywhere, in place — each file saved back
      in its own format.
    caption: "one ksed renames across all three, in place"
  - id: after
    kind: artifact
    artifact: after
    text: >
      The proposal is still a valid Word document — heading and structure intact.
      Only the words changed.
  - id: outro
    kind: outro
    text: >
      kcat, kgrep and ksed: grep, sed and cat, for the words inside the document,
      data, and localization formats neokapi reads.

# Norwegian Bokmål narration (full coverage — required for published demos).
# Follows l10n/brand-voice.yaml (nb) and l10n/termbase.csv terminology.
locales:
  nb:
    narration:
      - id: title
        text: >
          kcat, kgrep og ksed er cat, grep og sed for teksten inni et dokument.
          De leser ordene kapi henter ut av en Word-fil, et regneark eller
          Markdown — ikke de rå bytene — så verktøyene du allerede kan, virker på
          innhold de vanligvis ikke ser inn i.
      - id: cat
        text: >
          Her er salgsmateriellet til et team: en pitch i Markdown, et forslag
          i Word og en prisliste i Excel. kcat leser teksten rett ut av
          Word-dokumentet og regnearket, som rene linjer.
        caption: "kcat leser teksten inni .docx- og .xlsx-filene"
      - id: grep
        text: >
          kgrep søker i den teksten på tvers av alle tre filene samtidig, og
          finner hver forekomst av produktnavnet.
        caption: "kgrep finner produktnavnet på tvers av alle formatene"
      - id: sed
        text: >
          Og én ksed gir produktet nytt navn overalt, direkte i filene — hver
          fil lagres tilbake i sitt eget format.
        caption: "én ksed endrer navnet i alle tre, direkte i filene"
      - id: after
        text: >
          Forslaget er fortsatt et gyldig Word-dokument — overskrift og
          struktur er intakt. Bare ordene er endret.
      - id: outro
        text: >
          kcat, kgrep og ksed: grep, sed og cat, for ordene inni dokument-,
          data- og lokaliseringsformatene neokapi leser.
