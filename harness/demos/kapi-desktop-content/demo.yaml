id: kapi-desktop-content
title: Manage content in a project
subtitle: The files a project translates, and how they map.
tagline: the visual companion to the kapi command line
kind: use-case
publishAs: kapi-desktop-content
terminal: desktop
brand: desktop
needsAi: false
# One continuous narration read — uniform voice speed and tone across scenes.
oneshot: true
aspects:
  - Content collections
  - File patterns
  - Source & target files
  - Format detection

narration:
  - id: title
    kind: title
    text: >-
      In Kapi, a project's content is the set of files it translates.

  - id: intro
    kind: desktop
    beat: intro
    text: >-
      We'll open a sample project to see how that content is organised.

  - id: open-project
    kind: desktop
    beat: open-project
    caption: KapiMart — a ready-made sample project.
    text: >-
      KapiMart is a ready-made sample — a small store with documentation, a
      storefront, contracts and templates.

  - id: overview
    kind: desktop
    beat: overview
    caption: Source and target languages sit across the top.
    text: >-
      The source language and the locales it translates into sit across the top
      of the project.

  - id: content
    kind: desktop
    beat: content
    caption: The Content view — patterns on the left, files on the right.
    text: >-
      The Content view has two halves: the patterns that define what belongs to
      the project on the left, and the files they match on the right.

  - id: patterns
    kind: desktop
    beat: patterns
    caption: Patterns are grouped into named collections.
    text: >-
      Patterns are grouped into collections — the website, the online store, the
      contracts and the templates — each a glob that the engine reads from and
      writes back to.

  - id: files
    kind: desktop
    beat: files
    caption: Each matched file carries its detected format.
    text: >-
      On the right, every matched file is listed with the format Kapi detected
      for it — Markdown, JSON, properties, Office documents and more.

  - id: outro
    kind: outro
    text: >-
      That's a project's content — grouped, matched, and ready to translate.

# Norwegian Bokmål narration (full coverage — required for published demos).
# Follows l10n/brand-voice.yaml (nb) and l10n/termbase.csv terminology.
locales:
  nb:
    narration:
      - id: title
        text: >-
          I Kapi er innholdet i et prosjekt settet av filer det oversetter.
      - id: intro
        text: >-
          Vi åpner et eksempelprosjekt for å se hvordan innholdet er
          organisert.
      - id: open-project
        text: >-
          KapiMart er et ferdig eksempel — en liten butikk med dokumentasjon,
          en nettbutikk, kontrakter og maler.
        caption: KapiMart — et ferdig eksempelprosjekt.
      - id: overview
        text: >-
          Kildespråket og språkene det oversettes til ligger øverst i
          prosjektet.
        caption: Kildespråk og målspråk ligger øverst.
      - id: content
        text: >-
          Innholdsvisningen har to halvdeler: mønstrene som definerer hva som
          hører til prosjektet til venstre, og filene de treffer til høyre.
        caption: Innholdsvisningen — mønstre til venstre, filer til høyre.
      - id: patterns
        text: >-
          Mønstrene er gruppert i samlinger — nettstedet, nettbutikken,
          kontraktene og malene — hvert et glob-mønster som motoren leser fra
          og skriver tilbake til.
        caption: Mønstrene er gruppert i navngitte samlinger.
      - id: files
        text: >-
          Til høyre står hver fil som treffes, med formatet Kapi har gjenkjent
          for den — Markdown, JSON, properties, Office-dokumenter og mer.
        caption: Hver treff-fil viser formatet Kapi har gjenkjent.
      - id: outro
        text: >-
          Det er innholdet i et prosjekt — gruppert, truffet og klart til
          oversettelse.
