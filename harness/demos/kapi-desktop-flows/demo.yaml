id: kapi-desktop-flows
title: Compose flows for a project
subtitle: The pipelines a project runs over its content.
tagline: the visual companion to the kapi command line
kind: use-case
publishAs: kapi-desktop-flows
terminal: desktop
brand: desktop
needsAi: false
# One continuous narration read — uniform voice speed and tone across scenes.
oneshot: true
aspects:
  - Project flows
  - Pipelines of steps
  - AI translation & QA
  - Composable tools

narration:
  - id: title
    kind: title
    text: >-
      A project's flows are the pipelines it runs over its content.

  - id: intro
    kind: desktop
    beat: intro
    text: >-
      We'll open the KapiMart sample to see the flows it carries.

  - id: open-project
    kind: desktop
    beat: open-project
    caption: KapiMart — opened from the home screen.
    text: >-
      KapiMart opens from the home screen, with its own content, settings and
      flows.

  - id: library
    kind: desktop
    beat: library
    caption: Flows defined in the project.
    text: >-
      Its Flows view lists the pipelines defined in the project, saved alongside
      it and shared through version control.

  - id: library-zoom
    kind: desktop
    beat: library-zoom
    caption: Each flow is a named sequence of steps.
    text: >-
      Each one is a named sequence of steps — a plain translate, a translate
      with quality checks, and a pseudo-translation for testing.

  - id: open-flow
    kind: desktop
    beat: open-flow
    caption: Opening a flow shows its pipeline.
    text: >-
      Opening translate-and-qa reveals its pipeline.

  - id: pipeline
    kind: desktop
    beat: pipeline
    caption: Source flows through AI translation, then a quality check.
    text: >-
      The source flows through AI translation and then a quality check before it
      is written back — steps you can reorder, add to, or build into your own.

  - id: outro
    kind: outro
    text: >-
      Project flows — composed visually, saved with the project, run anywhere.
