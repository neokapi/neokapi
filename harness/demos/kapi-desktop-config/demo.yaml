id: kapi-desktop-config
title: Configure Kapi Desktop
subtitle: Appearance, AI providers, and plugins — in one place.
tagline: the visual companion to the kapi command line
kind: use-case
publishAs: kapi-desktop-config
terminal: desktop
brand: desktop
needsAi: false
# One continuous narration read — uniform voice speed and tone across scenes.
oneshot: true
aspects:
  - Appearance
  - AI providers
  - Plugins
  - Keychain-backed keys

narration:
  - id: title
    kind: title
    text: >-
      Kapi Desktop keeps all its configuration in one place.

  - id: intro
    kind: desktop
    beat: intro
    text: >-
      From the home screen, the gear at the bottom opens Settings.

  - id: open-settings
    kind: desktop
    beat: open-settings
    caption: Settings — appearance, credentials, plugins, locales.
    text: >-
      Settings gathers appearance, AI credentials, plugins and locales under one
      roof.

  - id: general
    kind: desktop
    beat: general
    caption: Appearance follows the system, or pin light or dark.
    text: >-
      Appearance follows your system, or you can pin light or dark. The
      interface itself can even run in pseudo-English for localisation testing.

  - id: credentials
    kind: desktop
    beat: credentials
    caption: AI Credentials — keys live in the OS keychain.
    text: >-
      AI Credentials hold the providers Kapi translates with — Anthropic,
      OpenAI, Gemini. The keys live in your operating system's keychain, never
      on disk.

  - id: plugins
    kind: desktop
    beat: plugins
    caption: Plugins extend the formats and tools available.
    text: >-
      And plugins extend Kapi — adding formats, connectors and tools beyond the
      built-in set.

  - id: outro
    kind: outro
    text: >-
      Appearance, providers, plugins — configured once, used everywhere.

# Norwegian Bokmål narration (full coverage — required for published demos).
# Follows l10n/brand-voice.yaml (nb) and l10n/termbase.csv terminology.
locales:
  nb:
    narration:
      - id: title
        text: >-
          Kapi Desktop samler all konfigurasjon på ett sted.
      - id: intro
        text: >-
          Fra startskjermen åpner tannhjulet nederst Innstillinger.
      - id: open-settings
        text: >-
          Innstillinger samler utseende, KI-legitimasjon, tillegg og språk
          under ett tak.
        caption: Innstillinger — utseende, legitimasjon, tillegg, språk.
      - id: general
        text: >-
          Utseendet følger systemet ditt, eller du kan låse det til lyst eller
          mørkt. Selve grensesnittet kan til og med kjøre i pseudoengelsk for
          lokaliseringstesting.
        caption: Utseendet følger systemet, eller låses til lyst eller mørkt.
      - id: credentials
        text: >-
          KI-legitimasjon holder leverandørene Kapi oversetter med — Anthropic,
          OpenAI, Gemini. Nøklene ligger i operativsystemets nøkkelring, aldri
          på disk.
        caption: KI-legitimasjon — nøklene ligger i nøkkelringen til operativsystemet.
      - id: plugins
        text: >-
          Og tillegg utvider Kapi — med formater, koblinger og verktøy utover
          det innebygde.
        caption: Tillegg utvider formatene og verktøyene som er tilgjengelige.
      - id: outro
        text: >-
          Utseende, leverandører, tillegg — konfigurert én gang, brukt overalt.
