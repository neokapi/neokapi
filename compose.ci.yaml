# CI overlay — no Traefik, no TLS, direct port mapping.
#
# Usage:
#   docker compose -f compose.yaml -f compose.ci.yaml up -d --wait
#
# This re-exposes Keycloak and Mailpit on their original ports and
# disables Traefik so CI doesn't need mkcert, dnsmasq, or DNS config.

services:
  traefik:
    profiles: ["disabled"]

  keycloak:
    ports:
      - "8180:8080"
    environment:
      KC_HOSTNAME: ""
      KC_PROXY_HEADERS: ""
    labels: []

  mailpit:
    ports:
      - "8025:8025"
    labels: []
