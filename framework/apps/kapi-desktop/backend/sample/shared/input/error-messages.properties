# API Error Messages — KapiMart Backend
# These messages are shown to users when something goes wrong.

error.auth.invalid_credentials=Invalid email or password. Please try again.
error.auth.account_locked=Your account has been locked after too many failed attempts. Please try again in 30 minutes.
error.auth.session_expired=Your session has expired. Please sign in again.
error.auth.email_not_verified=Please verify your email address before signing in.

error.cart.item_unavailable=Sorry, "{0}" is no longer available. It has been removed from your cart.
error.cart.quantity_exceeded=We only have {0} units of "{1}" in stock. Please adjust your quantity.
error.cart.empty=Your cart is empty. Add some items before checking out.
error.cart.price_changed=The price of "{0}" has changed since you added it. Please review your cart.

error.payment.declined=Your payment was declined. Please check your card details or try a different payment method.
error.payment.processing=We're having trouble processing your payment. Please try again in a few minutes.
error.payment.insufficient_funds=Your payment could not be completed due to insufficient funds.

error.shipping.address_invalid=We couldn't validate your shipping address. Please check and try again.
error.shipping.region_unavailable=Unfortunately, we don't currently ship to your region.
error.shipping.estimate_unavailable=Shipping estimates are temporarily unavailable. Please try again later.

error.order.not_found=We couldn't find order #{0}. Please check the order number and try again.
error.order.cancel_too_late=This order has already been shipped and can no longer be cancelled.

error.general.unexpected=Something went wrong on our end. Please try again later.
error.general.maintenance=KapiMart is currently undergoing maintenance. We'll be back shortly.
error.general.rate_limited=You're making requests too quickly. Please wait a moment and try again.
