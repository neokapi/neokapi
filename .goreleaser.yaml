version: 2

project_name: kapi

before:
  hooks:
    # Create placeholders so //go:embed all:frontend/dist succeeds
    # without real frontend builds (desktop apps are built separately).
    - mkdir -p bowrain/apps/bowrain/frontend/dist && touch bowrain/apps/bowrain/frontend/dist/placeholder
    - mkdir -p apps/kapi-desktop/frontend/dist && touch apps/kapi-desktop/frontend/dist/placeholder
    # Tests are already run by the release workflow before GoReleaser.
    - go mod tidy
    - bash -c "cd cli && go mod tidy"
    - bash -c "cd apps/kapi-desktop && go mod tidy"
    - bash -c "cd bowrain/core && go mod tidy"
    - bash -c "cd kapi && go mod tidy"
    - bash -c "cd bowrain/cli && go mod tidy"
    - bash -c "cd bowrain && go mod tidy"

builds:
  - id: kapi
    dir: kapi
    main: ./cmd/kapi
    binary: kapi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/neokapi/neokapi/core/version.Version={{.Version}}
      - -X github.com/neokapi/neokapi/core/version.Commit={{.Commit}}
      - -X github.com/neokapi/neokapi/core/version.BuildDate={{.Date}}

  - id: kapi-bowrain
    dir: bowrain/cli
    main: ./cmd/kapi-bowrain
    binary: kapi-bowrain
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.pluginVersion={{.Version}}
      - -X github.com/neokapi/neokapi/core/version.Version={{.Version}}
      - -X github.com/neokapi/neokapi/core/version.Commit={{.Commit}}
      - -X github.com/neokapi/neokapi/core/version.BuildDate={{.Date}}

archives:
  - id: kapi
    ids:
      - kapi
    name_template: "kapi_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

  # kapi-bowrain plugin tarball — top-level "bowrain/" dir per the
  # unified plugin model (#438). Manual install:
  #   tar -xzf kapi-bowrain-*.tar.gz -C ~/.local/share/kapi/plugins/
  - id: kapi-bowrain
    ids:
      - kapi-bowrain
    name_template: "kapi-bowrain_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: bowrain
    files:
      - src: bowrain/cli/cmd/kapi-bowrain/manifest.json
        strip_parent: true
    format_overrides:
      - goos: windows
        formats: [zip]

# Cosign keyless signing for the kapi-bowrain plugin tarballs.
# kapi's plugin install verifier (sigstore-go) requires a Sigstore JSON
# bundle pinning the signing cert to this release.yml workflow.
signs:
  - id: kapi-bowrain-cosign
    cmd: cosign
    artifacts: archive
    ids:
      - kapi-bowrain
    output: true
    args:
      - sign-blob
      - "--yes"
      - "--new-bundle-format=true"
      - "--bundle"
      - "${artifact}.sigstore.json"
      - "${artifact}"
    signature: "${artifact}.sigstore.json"
    env:
      - COSIGN_EXPERIMENTAL=true

brews:
  # kapi CLI (Apache-2.0) — manifest-driven plugins discovered at runtime.
  # `brew install neokapi/tap/kapi-cli` produces an Apache-clean binary with
  # no vendor plugins compiled in. The formula is named kapi-cli so the
  # `kapi` token stays reserved for the desktop app cask (Casks/kapi.rb).
  - name: kapi-cli
    ids:
      - kapi
    repository:
      owner: neokapi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/neokapi/neokapi"
    description: "AI-native localization framework — format-aware parsing, concurrent pipelines, and pluggable tools"
    license: "Apache-2.0"
    download_strategy: GitHubPrivateRepositoryReleaseDownloadStrategy
    custom_require: "lib/private_download_strategy"
    test: |
      system "#{bin}/kapi", "version"

  # bowrain-cli — installs kapi (via depends_on) plus the kapi-bowrain
  # plugin into Homebrew's standard kapi plugin dir
  # (#{HOMEBREW_PREFIX}/share/kapi/plugins/bowrain/). After install,
  # `kapi push`, `kapi pull`, etc. dispatch to the plugin.
  - name: bowrain-cli
    ids:
      - kapi-bowrain
    repository:
      owner: neokapi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/neokapi/neokapi"
    description: "Bowrain plugin for kapi — sync .kapi projects with Bowrain Server"
    license: "Apache-2.0"
    download_strategy: GitHubPrivateRepositoryReleaseDownloadStrategy
    custom_require: "lib/private_download_strategy"
    dependencies:
      - name: kapi-cli
    install: |
      plugin_dir = pkgshare/"plugins/bowrain"
      plugin_dir.mkpath
      plugin_dir.install Dir["bowrain/*"]
      # Symlink so HOMEBREW_PREFIX/share/kapi/plugins/bowrain/ resolves
      # to this formula's pkgshare/plugins/bowrain/.
      kapi_share = HOMEBREW_PREFIX/"share/kapi/plugins"
      kapi_share.mkpath
      ln_sf plugin_dir, kapi_share/"bowrain"
    test: |
      system HOMEBREW_PREFIX/"share/kapi/plugins/bowrain/kapi-bowrain", "version"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  abbrev: 7
  format: "[`{{ .SHA }}`](https://github.com/neokapi/neokapi/commit/{{ .SHA }}) {{ .Message }}"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  mode: append
  header: |
    ## Installation

    **Homebrew (kapi CLI, Apache-2.0, no plugins):**
    ```
    brew install neokapi/tap/kapi
    ```

    **Homebrew (kapi + bowrain plugin):**
    ```
    brew install neokapi/tap/bowrain-cli
    ```

    **Homebrew (Kapi desktop app, macOS):**
    ```
    brew install --cask neokapi/tap/kapi
    ```

    **Homebrew (Bowrain desktop app, macOS):**
    ```
    brew install --cask neokapi/tap/bowrain
    ```

    **Docker (server):**
    ```
    docker pull ghcr.io/neokapi/bowrain-server:{{ .Version }}
    ```

    ## Platform Support

    | Component | Linux amd64 | Linux arm64 | macOS (universal) | Windows amd64 | Windows arm64 |
    |-----------|:-----------:|:-----------:|:------------------:|:-------------:|:-------------:|
    | kapi CLI | ✓ | ✓ | ✓ | ✓ | ✓ |
    | bowrain CLI | ✓ | ✓ | ✓ | ✓ | ✓ |
    | Kapi Desktop | ✓ | ✓ | ✓ | ✓ | ✓ |
    | Bowrain Desktop | ✓ | ✓ | ✓ | ✓ | ✓ |
    | Docker (server) | ✓ | ✓ | — | — | — |
