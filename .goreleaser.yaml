version: 2

project_name: kapi

before:
  hooks:
    # Create placeholder so bowrain/apps/bowrain/main.go's //go:embed all:frontend/dist succeeds
    # without a real frontend build (bowrain is built separately in the release workflow).
    - mkdir -p bowrain/apps/bowrain/frontend/dist && touch bowrain/apps/bowrain/frontend/dist/placeholder
    # Tests are already run by the release workflow before GoReleaser.
    - go mod tidy
    - bash -c "cd bowrain && go mod tidy"

builds:
  - id: kapi
    dir: bowrain
    main: ./cmd/kapi
    binary: kapi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/gokapi/gokapi/bowrain/cmd/kapi.version={{.Version}}
      - -X github.com/gokapi/gokapi/bowrain/cmd/kapi.commit={{.Commit}}
      - -X github.com/gokapi/gokapi/bowrain/cmd/kapi.buildDate={{.Date}}

archives:
  - id: kapi
    ids:
      - kapi
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - name: kapi
    repository:
      owner: gokapi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/gokapi/gokapi"
    description: "AI-native localization framework — format-aware parsing, concurrent pipelines, and pluggable tools"
    license: "Apache-2.0"
    download_strategy: GitHubPrivateRepositoryReleaseDownloadStrategy
    custom_require: "lib/private_download_strategy"
    test: |
      system "#{bin}/kapi", "version"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  abbrev: 7
  format: "[`{{ .SHA }}`](https://github.com/gokapi/gokapi/commit/{{ .SHA }}) {{ .Message }}"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  mode: append
  header: |
    ## Installation

    **Homebrew (CLI):**
    ```
    brew install gokapi/tap/kapi
    ```

    **Homebrew (Bowrain desktop app, macOS):**
    ```
    brew install --cask gokapi/tap/bowrain
    ```

    **Docker (server):**
    ```
    docker pull ghcr.io/gokapi/bowrain-server:{{ .Version }}
    ```
