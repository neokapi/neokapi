version: 2

project_name: kapi

before:
  hooks:
    # Create placeholder so platform/apps/platform/main.go's //go:embed all:frontend/dist succeeds
    # without a real frontend build (bowrain is built separately in the release workflow).
    - mkdir -p platform/apps/bowrain/frontend/dist && touch platform/apps/bowrain/frontend/dist/placeholder
    # Tests are already run by the release workflow before GoReleaser.
    - bash -c "cd framework && go mod tidy"
    - bash -c "cd framework/cli && go mod tidy"
    - bash -c "cd platform/core && go mod tidy"
    - bash -c "cd framework/kapi && go mod tidy"
    - bash -c "cd platform/cli && go mod tidy"
    - bash -c "cd platform && go mod tidy"

builds:
  - id: kapi
    dir: framework/kapi
    main: ./cmd/kapi
    binary: kapi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/neokapi/neokapi/core/version.Version={{.Version}}
      - -X github.com/neokapi/neokapi/core/version.Commit={{.Commit}}
      - -X github.com/neokapi/neokapi/core/version.BuildDate={{.Date}}

  - id: bowrain-cli
    dir: platform/cli
    main: ./cmd/bowrain
    binary: bowrain
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/neokapi/neokapi/core/version.Version={{.Version}}
      - -X github.com/neokapi/neokapi/core/version.Commit={{.Commit}}
      - -X github.com/neokapi/neokapi/core/version.BuildDate={{.Date}}

archives:
  - id: kapi
    ids:
      - kapi
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

  - id: bowrain-cli
    ids:
      - bowrain-cli
    name_template: "bowrain-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - name: kapi
    ids:
      - kapi
    repository:
      owner: neokapi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/neokapi/neokapi"
    description: "AI-native localization framework — format-aware parsing, concurrent pipelines, and pluggable tools"
    license: "Apache-2.0"
    download_strategy: GitHubPrivateRepositoryReleaseDownloadStrategy
    custom_require: "lib/private_download_strategy"
    test: |
      system "#{bin}/kapi", "version"

  - name: bowrain-cli
    ids:
      - bowrain-cli
    repository:
      owner: neokapi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/neokapi/neokapi"
    description: "Bowrain CLI — manage localization projects, sync with Bowrain Server"
    license: "Apache-2.0"
    download_strategy: GitHubPrivateRepositoryReleaseDownloadStrategy
    custom_require: "lib/private_download_strategy"
    test: |
      system "#{bin}/bowrain", "version"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  abbrev: 7
  format: "[`{{ .SHA }}`](https://github.com/neokapi/neokapi/commit/{{ .SHA }}) {{ .Message }}"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  mode: append
  header: |
    ## Installation

    **Homebrew (kapi CLI):**
    ```
    brew install neokapi/tap/kapi
    ```

    **Homebrew (bowrain CLI):**
    ```
    brew install neokapi/tap/bowrain-cli
    ```

    **Homebrew (Bowrain desktop app, macOS):**
    ```
    brew install --cask neokapi/tap/bowrain
    ```

    **Docker (server):**
    ```
    docker pull ghcr.io/neokapi/bowrain-server:{{ .Version }}
    ```

    ## Platform Support

    | Component | Linux amd64 | Linux arm64 | macOS (universal) | Windows amd64 | Windows arm64 |
    |-----------|:-----------:|:-----------:|:------------------:|:-------------:|:-------------:|
    | kapi CLI | ✓ | ✓ | ✓ | ✓ | ✓ |
    | bowrain CLI | ✓ | ✓ | ✓ | ✓ | ✓ |
    | Bowrain Desktop | ✓ | ✓ | ✓ | ✓ | ✓ |
    | Docker (server) | ✓ | ✓ | — | — | — |
