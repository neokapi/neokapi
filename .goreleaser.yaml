version: 2

project_name: kapi

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: kapi
    main: ./cmd/kapi
    binary: kapi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/gokapi/gokapi/cmd/kapi.version={{.Version}}
      - -X github.com/gokapi/gokapi/cmd/kapi.commit={{.Commit}}
      - -X github.com/gokapi/gokapi/cmd/kapi.buildDate={{.Date}}

archives:
  - id: kapi
    builds:
      - kapi
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: kapi
    repository:
      owner: gokapi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/gokapi/gokapi"
    description: "AI-native localization framework — format-aware parsing, concurrent pipelines, and pluggable tools"
    license: "Apache-2.0"
    install: |
      bin.install "kapi"
    test: |
      system "#{bin}/kapi", "version"

release:
  mode: append
  header: |
    ## Installation

    **Homebrew (CLI):**
    ```
    brew install gokapi/tap/kapi
    ```

    **Homebrew Cask (Bowrain desktop app, macOS):**
    ```
    brew install --cask gokapi/tap/bowrain
    ```
