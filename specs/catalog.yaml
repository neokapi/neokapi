    url: https://json-schema.org/specification-links
    rights: vendor
    watch:
      - https://json-schema.org/specification-links
      - https://json-schema.org/blog
    notes: >-
      Community spec, per repo LICENSE. The self-published "stable" release
      has still not shipped as of mid-2026; 2020-12 is the de-facto deployed
      dialect (including as MCP's default). Low urgency.

  - id: dtcg
    name: DTCG Design Tokens Specification
    version: "2025.10"
    url: https://www.designtokens.org/
    rights: vendor
    watch:
      - https://www.designtokens.org/blog/
      - https://github.com/design-tokens/community-group
    notes: >-
      W3C Community Group Final Specification Agreement — permissive,
      vendorable. First stable version "2025.10" (2025-10-28) starts a
      calendar-versioned train: re-validate the designtokens format yearly
      (CSS Color 4 spaces — Display-P3/Oklch, aliases, resolver/theming).

  - id: regex-re2
