    notes: >-
      W3C Document License — verbatim copies with notice; excerpts ride the
      implementation carve-out. The estate cites the undated latest-version
      /TR/ URI; pin the dated TR snapshot when the first snapshot lands.

  - id: webvtt
    name: WebVTT — The Web Video Text Tracks Format (W3C)
