      W3C Document License — verbatim copies with notice. Remains a
      Candidate Recommendation; steady maintenance, low churn.

  - id: dapt
    name: DAPT — Dubbing and Audio description Profiles of TTML2 (W3C)
    version: "cr-2025-12-18"
    url: https://www.w3.org/TR/dapt/
    rights: vendor
    watch:
      - https://www.w3.org/groups/wg/timed-text/publications/
      - https://www.w3.org/blog/news/feed
    notes: >-
      W3C Document License — verbatim copies with notice. The active
      timed-text spec: updated CR snapshots Jul and 2025-12-18, Rec expected
      2026. Netflix publishes a TTAL→DAPT converter
      (https://github.com/Netflix/ttal-dapt-conv).

