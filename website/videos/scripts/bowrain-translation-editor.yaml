video:
  id: bowrain-translation-editor-{theme}
  title: Translation Editor
  themes: [dark, light]
  width: 1920
  height: 1080
  fps: 30

branding:
  logo: logo.png
  primaryColor: "#6366f1"
  backgroundColor: "#09090b"
  fontFamily: "Inter, system-ui, sans-serif"
  cornerRadius: 12

scenes:
  - type: title-card
    duration: 3
    heading: Translation Editor
    subheading: Bowrain Desktop
    style: branded

  - type: transition
    effect: fade-black
    duration: 0.5

  - type: recording
    source: bowrain/{theme}/translation-editor-workflow.webm
    duration: auto
    frame:
      type: desktop
      title: Bowrain
    overlays:
      - text: "Open a project and select a file"
        position: bottom-center
        startAt: 1.0
        duration: 3.0
        style: caption
      - text: "Click a block to start translating"
        position: bottom-center
        startAt: 6.0
        duration: 3.0
        style: caption
      - text: "Type your translation in the target column"
        position: bottom-center
        startAt: 10.0
        duration: 4.0
        style: caption

  - type: transition
    effect: crossfade
    duration: 0.8

  - type: title-card
    duration: 2.5
    heading: neokapi
    subheading: Open, AI-native localization platform
    style: branded
