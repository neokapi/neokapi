# Development dependencies: Keycloak OIDC + Mailpit SMTP
#
# The bowrain-server runs locally for faster iteration — no Docker
# image rebuild needed for Go changes.
#
# Usage:
#   docker compose up -d --wait         # start deps
#   make dev-server                     # run server locally
#   docker compose down -v              # stop deps
#
# Services:
#   - Keycloak OIDC provider:  http://localhost:8180  (admin/admin)
#   - Mailpit (dev SMTP):      http://localhost:8025  (web UI), :1025 (SMTP)

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev --import-realm
    environment:
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./docker/keycloak/realm.json:/opt/keycloak/data/import/realm.json
      - ./bowrain/apps/keycloak-theme/dist_keycloak/keycloak-theme-for-kc-all-other-versions.jar:/opt/keycloak/providers/keycloak-theme.jar
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 15

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
