// gokapi_service.proto - gRPC service definitions for Bowrain Server.
// Provides streaming access to projects, blocks, flows, connectors, and events.

syntax = "proto3";

package gokapi.server.v1;

option go_package = "github.com/gokapi/gokapi/proto/v1;serverv1";

// GokapiService provides platform operations via gRPC.
service GokapiService {
  // Project management
  rpc CreateProject(CreateProjectRequest) returns (ProjectResponse);
  rpc GetProject(GetProjectRequest) returns (ProjectResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);

  // Block operations
  rpc StoreBlocks(StoreBlocksRequest) returns (StoreBlocksResponse);
  rpc StreamBlocks(StreamBlocksRequest) returns (stream BlockResponse);

  // Version management
  rpc CreateVersion(CreateVersionRequest) returns (VersionResponse);
  rpc ListVersions(ListVersionsRequest) returns (ListVersionsResponse);

  // Connector operations
  rpc PullContent(PullContentRequest) returns (PullContentResponse);
  rpc PushContent(PushContentRequest) returns (PushContentResponse);

  // Flow execution with progress streaming
  rpc ExecuteFlow(ExecuteFlowRequest) returns (stream FlowProgressResponse);

  // Event subscription
  rpc Subscribe(SubscribeRequest) returns (stream EventResponse);
}

// --- Project messages ---

message CreateProjectRequest {
  string name = 1;
  string source_locale = 2;
  repeated string target_locales = 3;
  map<string, string> properties = 4;
}

message GetProjectRequest {
  string project_id = 1;
}

message ListProjectsRequest {}

message ProjectResponse {
  string id = 1;
  string name = 2;
  string source_locale = 3;
  repeated string target_locales = 4;
  map<string, string> properties = 5;
  string created_at = 6;
  string updated_at = 7;
}

message ListProjectsResponse {
  repeated ProjectResponse projects = 1;
}

// --- Block messages ---

message BlockMessage {
  string id = 1;
  string name = 2;
  string type = 3;
  string source = 4;
  map<string, string> targets = 5;
  string content_hash = 6;
  string context_hash = 7;
  map<string, string> properties = 8;
}

message StoreBlocksRequest {
  string project_id = 1;
  repeated BlockMessage blocks = 2;
}

message StoreBlocksResponse {
  int32 stored_count = 1;
}

message StreamBlocksRequest {
  string project_id = 1;
  repeated string block_ids = 2;  // Empty means all blocks
}

message BlockResponse {
  BlockMessage block = 1;
  string project_id = 2;
  string stored_at = 3;
  string updated_at = 4;
}

// --- Version messages ---

message CreateVersionRequest {
  string project_id = 1;
  string label = 2;
  string description = 3;
}

message VersionResponse {
  string id = 1;
  string project_id = 2;
  string label = 3;
  string description = 4;
  int32 block_count = 5;
  string created_at = 6;
}

message ListVersionsRequest {
  string project_id = 1;
}

message ListVersionsResponse {
  repeated VersionResponse versions = 1;
}

// --- Connector messages ---

message PullContentRequest {
  string connector_id = 1;
  string project_id = 2;
  string source_locale = 3;
}

message PullContentResponse {
  int32 block_count = 1;
}

message PushContentRequest {
  string connector_id = 1;
  string project_id = 2;
  string target_locale = 3;
}

message PushContentResponse {
  int32 pushed_count = 1;
}

// --- Flow messages ---

message ExecuteFlowRequest {
  string flow_config = 1;  // YAML flow configuration
  string project_id = 2;   // Optional store project
}

message FlowProgressResponse {
  string stage = 1;
  int32 processed = 2;
  int32 total = 3;
  string message = 4;
  bool done = 5;
}

// --- Event messages ---

message SubscribeRequest {
  repeated string event_types = 1;  // Empty means all events
}

message EventResponse {
  string id = 1;
  string type = 2;
  string source = 3;
  string project_id = 4;
  string block_id = 5;
  string timestamp = 6;
  map<string, string> metadata = 7;
}
