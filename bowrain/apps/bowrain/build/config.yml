version: "3"

info:
  companyName: "neokapi"
  productName: "Bowrain"
  productIdentifier: "io.github.neokapi.bowrain"
  description: "Localization Workbench - powered by neokapi"
  copyright: "© 2025-2026 neokapi"
  comments: "AI-native translation editor"
  version: "0.0.0-dev"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary
