<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bowrain for Office</title>
    <!--
      Office.js MUST load from the Microsoft CDN at this exact URL and runs only
      inside an Office host. Subresource Integrity is intentionally omitted:
      Microsoft updates this file in place, so a pinned integrity hash would
      break the add-in (and AppSource certification requires the un-pinned CDN
      URL). This is the one trusted external script the add-in loads.
    -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
