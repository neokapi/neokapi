# Development dependencies: Keycloak OIDC + Mailpit SMTP
#
# The bowrain-server and Vite dev server run locally — not in Docker.
#
# Local dev (Traefik + TLS):
#   docker compose up -d --wait         # auto-loads compose.override.yaml
#   make dev-server                     # bowrain-server on :8080
#   make dev-web                        # Vite dev server on :5173
#   → https://bowrain.mymac             # web app via Traefik
#   → https://ctrl.bowrain.mymac        # control plane via Traefik
#   → https://auth.bowrain.mymac        # Keycloak via Traefik
#   → https://mail.bowrain.mymac        # Mailpit via Traefik
#
# CI (plain HTTP, no Traefik):
#   docker compose -f compose.yaml up -d --wait   # skips override
#   → Keycloak at http://localhost:8180
#   → Mailpit at http://localhost:8025

services:
  keycloak:
    build:
      context: .
      dockerfile: docker/keycloak/Dockerfile.dev
    # The custom "bowrain" login theme is OPTIONAL. When its provider jar has
    # been built (`make keycloak-theme`) it is installed and used; otherwise the
    # realm's loginTheme is stripped at import so login still renders with
    # Keycloak's default theme. This keeps device-login working with no theme
    # build. (dist_keycloak is gitignored; an empty bind-mount is harmless.)
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        mkdir -p /opt/keycloak/data/import
        cp /realm-src/bowrain-admin-realm.json /opt/keycloak/data/import/bowrain-admin-realm.json
        jar="$$(find /theme-src -maxdepth 1 -type f -name '*.jar' 2>/dev/null | head -1)"
        if [ -n "$$jar" ]; then
          cp "$$jar" /opt/keycloak/providers/
          cp /realm-src/realm.json /opt/keycloak/data/import/realm.json
          echo "keycloak: using the custom bowrain login theme"
        else
          sed 's/"loginTheme": "bowrain",//' /realm-src/realm.json > /opt/keycloak/data/import/realm.json
          echo "keycloak: bowrain login theme not built — using the default theme (run 'make keycloak-theme' for the branded UI)"
        fi
        exec /opt/keycloak/bin/kc.sh start-dev --import-realm
    environment:
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      OIDC_CLIENT_SECRET: bowrain-secret
    volumes:
      - ./docker/keycloak/realm.json:/realm-src/realm.json:ro
      - ./docker/keycloak/bowrain-admin-realm.json:/realm-src/bowrain-admin-realm.json:ro
      - ./apps/keycloak-theme/dist_keycloak:/theme-src:ro
    ports:
      - "8180:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000",
        ]
      interval: 10s
      timeout: 5s
      retries: 15

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Apache AGE extends PostgreSQL with graph database capabilities.
  # It is a drop-in replacement for the standard postgres image — all
  # existing services (Keycloak, bowrain-server) work unchanged.
  postgres:
    image: apache/age:release_PG16_1.6.0
    environment:
      POSTGRES_USER: bowrain
      POSTGRES_PASSWORD: bowrain
      POSTGRES_DB: bowrain_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bowrain -d bowrain_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/init-age.sql:/docker-entrypoint-initdb.d/01-init-age.sql

volumes:
  nats-data:
  postgres-data:
