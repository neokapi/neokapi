<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Agent/robot head -->
  <rect x="6" y="10" width="20" height="16" rx="4" fill="#D4A03C"/>
  <!-- Eyes -->
  <circle cx="12" cy="18" r="2.5" fill="#1a1a1a"/>
  <circle cx="20" cy="18" r="2.5" fill="#1a1a1a"/>
  <!-- Eye highlights -->
  <circle cx="13" cy="17" r="0.8" fill="#fff"/>
  <circle cx="21" cy="17" r="0.8" fill="#fff"/>
  <!-- Antenna -->
  <line x1="16" y1="10" x2="16" y2="4" stroke="#D4A03C" stroke-width="2" stroke-linecap="round"/>
  <circle cx="16" cy="3" r="2" fill="#D4A03C"/>
  <!-- Mouth/speaker grille -->
  <rect x="11" y="22" width="10" height="1.5" rx="0.75" fill="#1a1a1a" opacity="0.5"/>
</svg>
