# E2E test stack — all services from pre-built Docker images.
#
# Usage:
#   docker compose -f e2e/compose.yaml up -d --wait
#   go test -tags=e2e -count=1 -v ./e2e/
#   docker compose -f e2e/compose.yaml down -v

services:
  # Init container: copies static web files to a shared volume, then exits.
  web-init:
    image: ghcr.io/gokapi/bowrain-web:latest
    entrypoint: ["/bin/sh", "-c", "cp -r /usr/share/nginx/html/* /web/ && echo 'Web files copied.'"]
    volumes:
      - web-dist:/web

  bowrain-server:
    image: ghcr.io/gokapi/bowrain-server:latest
    depends_on:
      web-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
      mailpit:
        condition: service_started
      nats:
        condition: service_started
    environment:
      BOWRAIN_JWT_SECRET: dev-secret-change-in-production
      BOWRAIN_OIDC_ISSUER_URL: http://keycloak:8080/realms/bowrain
      BOWRAIN_OIDC_PUBLIC_URL: http://localhost:8180/realms/bowrain
      BOWRAIN_OIDC_CLIENT_ID: bowrain
      BOWRAIN_OIDC_CLIENT_SECRET: bowrain-secret
      BOWRAIN_SMTP_HOST: mailpit:1025
      BOWRAIN_SMTP_FROM: noreply@bowrain.cloud
      BOWRAIN_STORE: /data/bowrain.db
      BOWRAIN_GRPC_PORT: "9080"
      BOWRAIN_WEB_UI_DIR: /web
      BOWRAIN_NATS_URL: nats://nats:4222
    volumes:
      - web-dist:/web:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  keycloak:
    image: ghcr.io/gokapi/bowrain-keycloak:latest
    # Override CMD: use start-dev (H2 in-memory DB) instead of the production
    # "start --optimized" which requires PostgreSQL.
    command: ["start-dev", "--import-realm"]
    environment:
      KC_HOSTNAME: http://localhost:8180
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      OIDC_CLIENT_SECRET: bowrain-secret
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 15

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - nats-data:/data

volumes:
  web-dist:
  nats-data:
