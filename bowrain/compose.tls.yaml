# Traefik TLS overlay for the full-Docker stack (compose.full.yaml).
#
# Layers a Traefik reverse proxy in front of the containerized server/keycloak/
# mailpit and terminates TLS with mkcert-generated certs, so the dockerized
# stack is reachable at the same friendly *.bowrain.mymac hostnames as the
# local-server dev mode (compose.yaml + compose.override.yaml) — but with the
# server + worker + web all running in Docker.
#
# Routing here is via Docker labels (to the *containers*), unlike
# compose.override.yaml which routes to host-running services.
#
# First-time host setup (same as the local-server mode):
#   brew install dnsmasq mkcert
#   echo 'address=/.mymac/127.0.0.1' >> $(brew --prefix)/etc/dnsmasq.conf
#   sudo brew services restart dnsmasq
#   sudo mkdir -p /etc/resolver && echo 'nameserver 127.0.0.1' | sudo tee /etc/resolver/mymac
#   mkcert -install && make -C bowrain certs
#
# Usage:
#   docker compose -f compose.full.yaml -f compose.tls.yaml --profile web up -d --build --wait
#   → https://bowrain.mymac        (web app + API + gRPC, served by bowrain-server)
#   → https://auth.bowrain.mymac   (Keycloak)
#   → https://mail.bowrain.mymac   (Mailpit)

services:
  traefik:
    image: traefik:v3
    volumes:
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic-tls.yml:/etc/traefik/dynamic.yml:ro
      - ./docker/traefik/certs:/etc/certs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      bowrain-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bowrain-server:
    # Browser-facing OIDC now goes through Traefik TLS; the in-cluster issuer
    # (http://keycloak:8080/...) is unchanged — the server reaches Keycloak
    # directly inside the compose network.
    environment:
      BOWRAIN_OIDC_PUBLIC_URL: https://auth.bowrain.mymac/realms/bowrain
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bowrain.rule=Host(`bowrain.mymac`)"
      - "traefik.http.routers.bowrain.tls=true"
      # h2c so gRPC (HTTP/2 cleartext) and REST multiplex on the one backend port.
      - "traefik.http.services.bowrain.loadbalancer.server.port=8080"
      - "traefik.http.services.bowrain.loadbalancer.server.scheme=h2c"

  keycloak:
    environment:
      KC_HOSTNAME: https://auth.bowrain.mymac
      KC_PROXY_HEADERS: xforwarded
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`auth.bowrain.mymac`)"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  mailpit:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailpit.rule=Host(`mail.bowrain.mymac`)"
      - "traefik.http.routers.mailpit.tls=true"
      - "traefik.http.services.mailpit.loadbalancer.server.port=8025"
