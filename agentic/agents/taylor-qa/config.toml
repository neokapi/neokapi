[llm]
# Azure OpenAI GPT-4o — QA needs strong reasoning for issue categorization
default_provider = "custom"
default_model = "gpt-4o"

[providers.custom]
name = "azure-openai"
base_url = "https://oai-bowrain-d.openai.azure.com/openai/deployments/gpt-4o/v1"
api_key_env = "AZURE_OPENAI_API_KEY"

[security]
# QA needs gh CLI for filing bug reports
allowed_commands = ["gh"]

[mcp.bowrain]
transport = "http"
url = "${BRAVO_MCP_ENDPOINT}"
headers = { Authorization = "Bearer ${BRAVO_AGENT_TOKEN}" }
tool_timeout_secs = 120

[mcp.email]
transport = "http"
url = "http://email-mcp:3001/mcp"

# No cron — heartbeat-driven only (every 2h via daemon heartbeat interval)
[daemon]
heartbeat_interval_secs = 7200   # 2 hours
