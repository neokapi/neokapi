[llm]
# ZeroClaw native env vars handle provider config

[security]
# Language expert has no shell access — API only via MCP
allowed_commands = []

[mcp]
[[mcp.servers]]
name = "bowrain"
transport = "http"
url = "${BRAVO_MCP_ENDPOINT}"
headers = { Authorization = "Bearer ${BRAVO_AGENT_TOKEN}" }
tool_timeout_secs = 120

[daemon]
[daemon.cron]
"translate-batch" = "0 14 * * 1-5"   # Weekday afternoons
