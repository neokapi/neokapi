[llm]
# ZeroClaw native env vars handle provider config

[security]
# Reviewer has no shell access — API only via MCP
allowed_commands = []

[mcp]
[[mcp.servers]]
name = "bowrain"
transport = "http"
url = "${BRAVO_MCP_ENDPOINT}"
headers = { Authorization = "Bearer ${BRAVO_AGENT_TOKEN}" }
tool_timeout_secs = 120

# No cron — heartbeat-driven only (every 2h via daemon heartbeat interval)
[daemon]
heartbeat_interval_secs = 7200   # 2 hours
