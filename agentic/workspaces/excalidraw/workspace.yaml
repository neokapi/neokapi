# Excalidraw Localization Experiment
name: Excalidraw
slug: excalidraw-l10n
description: "AI agents localizing Excalidraw — collaborative whiteboard"

upstream:
  repo: excalidraw/excalidraw
  fork: neokapi/agentic-excalidraw

source_language: en-US
target_languages:
  - fr-FR
  - de-DE
  - ja-JP

content_paths:
  - path: "src/locales/en.json"
    format: json

agents:
  - name: maria
    role: "French Language Expert"
  - name: katrin
    role: "German Language Expert"
  - name: yuki
    role: "Japanese Language Expert"
  - name: alex
    role: "Quality Reviewer"
