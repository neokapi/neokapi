upstream:
  repo: excalidraw/excalidraw
  fork: neokapi/agentic-excalidraw

project:
  name: Excalidraw
  source_language: en-US
  target_languages: [fr-FR, de-DE, ja-JP]

content:
  hint: >
    Excalidraw is a React whiteboard app. Locale files are flat JSON
    key-value pairs. Look for en.json in a locales/ directory — the path
    has moved between releases (src/locales/ in older tags,
    packages/excalidraw/locales/ in newer ones). Other locale files
    (fr-FR.json, de-DE.json, ja-JP.json) live alongside en.json.
  format: json
  source_file_pattern: "**/locales/en.json"

release_strategy:
  mode: accelerated-then-realtime
  start_tag: v0.14.0
  end_tag: latest
  tags: [v0.14.0, v0.14.2, v0.15.0, v0.16.0, v0.17.0, v0.18.0]
  pace: 2_hours_between_releases

agent_team:
  alex: developer
  maria: translator-fr
  katrin: translator-de
  yuki: translator-ja
