services:
  # === Platform ===
  bowrain-server:
    image: bowrain/server:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://bowrain:bowrain@postgres:5432/bowrain
      KEYCLOAK_URL: http://keycloak:8080
      BOWRAIN_REDIS_URL: redis://redis:6379
      BOWRAIN_AGENTIC_EVENTS: "true"
    depends_on:
      - postgres
      - keycloak
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bowrain
      POSTGRES_PASSWORD: bowrain
      POSTGRES_DB: bowrain
    volumes:
      - pgdata:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # === Email ===
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI for operator (browse captured emails)
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # Standalone email MCP server (wraps Mailpit SMTP + API)
  email-mcp:
    build: ./email-mcp
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      MAILPIT_API_HOST: mailpit
    depends_on:
      - mailpit

  # === Optional: Redis for event signaling (accelerated mode) ===
  redis:
    image: redis:7-alpine
    profiles:
      - accelerated
    ports:
      - "6379:6379"

  # === Optional: Release Walker (accelerated mode) ===
  release-walker:
    build: ./release-walker
    profiles:
      - accelerated
    environment:
      REDIS_URL: redis://redis:6379
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      FORKS_DIR: /app/forks
      CONFIG_DIR: /app/config
    volumes:
      - ./forks:/app/forks
      - ./config:/app/config
    depends_on:
      - bowrain-server
      - redis

  # === Optional: Ollama for zero-cost local dev ===
  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  # === Agents ===
  # Each agent connects directly to bowrain-server's /mcp/ endpoint
  # using a per-agent JWT token (same auth as Bravo interactive sessions).
  # No MCP sidecar needed — the MCP server is built into bowrain-server.

  # --- Developer ---
  alex-developer:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    command: daemon
    restart: unless-stopped
    environment:
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      BRAVO_MCP_ENDPOINT: http://bowrain-server:8080/mcp/
      BRAVO_AGENT_TOKEN: ${ALEX_AGENT_TOKEN}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      AGENT_NAME: Alex Chen
      AGENT_EMAIL: alex.chen@bowrain.test
    volumes:
      - ./agents/alex-developer:/root/.zeroclaw
      - ./forks:/root/.zeroclaw/workspace
    depends_on:
      - bowrain-server

  # --- Translator: French ---
  jeanpierre-fr:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    command: daemon
    restart: unless-stopped
    environment:
      AZURE_AI_FOUNDRY_KEY: ${AZURE_AI_FOUNDRY_KEY}
      BRAVO_MCP_ENDPOINT: http://bowrain-server:8080/mcp/
      BRAVO_AGENT_TOKEN: ${JEANPIERRE_AGENT_TOKEN}
      AGENT_NAME: Jean-Pierre Dubois
      AGENT_EMAIL: jeanpierre.dubois@bowrain.test
    volumes:
