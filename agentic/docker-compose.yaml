services:
  # === Platform ===
  bowrain-server:
    image: bowrain/server:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://bowrain:bowrain@postgres:5432/bowrain
      KEYCLOAK_URL: http://keycloak:8080
      BOWRAIN_REDIS_URL: redis://redis:6379
      BOWRAIN_AGENTIC_EVENTS: "true"
    depends_on:
      - postgres
      - keycloak
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bowrain
      POSTGRES_PASSWORD: bowrain
      POSTGRES_DB: bowrain
    volumes:
      - pgdata:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # === Email ===
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI for operator (browse captured emails)
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # Standalone email MCP server (wraps Mailpit SMTP + API)
  email-mcp:
    build: ./email-mcp
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      MAILPIT_API_HOST: mailpit
    depends_on:
      - mailpit

  # === Optional: Release Walker (accelerated mode) ===
  release-walker:
    build: ./release-walker
    profiles:
      - accelerated
    environment:
      REDIS_URL: redis://redis:6379
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      FORKS_DIR: /app/forks
      CONFIG_DIR: /app/config
    volumes:
      - ./forks:/app/forks
      - ./config:/app/config
    depends_on:
      - bowrain-server
      - redis

  # === Optional: Ollama for zero-cost local dev ===
  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  # ==========================================================================
  # Workspace Agents
  #
  # Each workspace is a self-contained localization experiment for an open-source
  # project. Agents within a workspace have context-specific personas (not generic
  # roles). You can start a single workspace's agents independently.
  # ==========================================================================

  # === Excalidraw Workspace ===
  # Collaborative whiteboard — fr-FR + de-DE
  # See workspaces/excalidraw/README.md for details

  # --- L10N Engineer ---
  excalidraw-alex:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    command: daemon
    restart: unless-stopped
    environment:
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      BOWRAIN_API_TOKEN: ${EXCALIDRAW_ALEX_TOKEN}
      BRAVO_MCP_ENDPOINT: http://bowrain-server:8080/mcp/
      ZEROCLAW_PROVIDER: azure_openai
      ZEROCLAW_MODEL: gpt-4o-mini
      AZURE_OPENAI_RESOURCE: ${AZURE_OPENAI_RESOURCE}
      ZEROCLAW_API_KEY: ${AZURE_OPENAI_API_KEY}
      AGENT_NAME: alex
      AGENT_EMAIL: alex@excalidraw-l10n.bowrain.test
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ./workspaces/excalidraw/agents/alex:/root/.zeroclaw
      - ./forks/excalidraw:/root/.zeroclaw/workspace
    depends_on:
      - bowrain-server

  # --- French Language Expert ---
  excalidraw-sophie:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    command: daemon
    restart: unless-stopped
    environment:
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      BOWRAIN_API_TOKEN: ${EXCALIDRAW_SOPHIE_TOKEN}
      BRAVO_MCP_ENDPOINT: http://bowrain-server:8080/mcp/
      ZEROCLAW_PROVIDER: azure_openai
      ZEROCLAW_MODEL: gpt-4o
      AZURE_OPENAI_RESOURCE: ${AZURE_OPENAI_RESOURCE}
      ZEROCLAW_API_KEY: ${AZURE_OPENAI_API_KEY}
      AGENT_NAME: sophie
      AGENT_EMAIL: sophie@excalidraw-l10n.bowrain.test
    volumes:
      - ./workspaces/excalidraw/agents/sophie:/root/.zeroclaw
    depends_on:
      - bowrain-server

  # --- German Language Expert ---
  excalidraw-thomas:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    command: daemon
    restart: unless-stopped
    environment:
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      BOWRAIN_API_TOKEN: ${EXCALIDRAW_THOMAS_TOKEN}
      BRAVO_MCP_ENDPOINT: http://bowrain-server:8080/mcp/
      ZEROCLAW_PROVIDER: azure_openai
      ZEROCLAW_MODEL: gpt-4o
      AZURE_OPENAI_RESOURCE: ${AZURE_OPENAI_RESOURCE}
      ZEROCLAW_API_KEY: ${AZURE_OPENAI_API_KEY}
      AGENT_NAME: thomas
      AGENT_EMAIL: thomas@excalidraw-l10n.bowrain.test
    volumes:
      - ./workspaces/excalidraw/agents/thomas:/root/.zeroclaw
    depends_on:
      - bowrain-server

  # --- Reviewer ---
  excalidraw-mei:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    command: daemon
    restart: unless-stopped
    environment:
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      BOWRAIN_API_TOKEN: ${EXCALIDRAW_MEI_TOKEN}
      BRAVO_MCP_ENDPOINT: http://bowrain-server:8080/mcp/
      ZEROCLAW_PROVIDER: azure_openai
      ZEROCLAW_MODEL: gpt-4o
      AZURE_OPENAI_RESOURCE: ${AZURE_OPENAI_RESOURCE}
      ZEROCLAW_API_KEY: ${AZURE_OPENAI_API_KEY}
      AGENT_NAME: mei
      AGENT_EMAIL: mei@excalidraw-l10n.bowrain.test
    volumes:
      - ./workspaces/excalidraw/agents/mei:/root/.zeroclaw
    depends_on:
      - bowrain-server

volumes:
  pgdata:
  ollama-data:
